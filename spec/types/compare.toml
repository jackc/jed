# Comparison, promotion, and NULL logic — CANONICAL DATA (CLAUDE.md §4, §5).
#
# Build-time input to per-language codegen; never parsed at runtime.
# Reasoning lives in ../design/types.md — read it before editing this file.
#
# This file governs *comparison* (=, <, >, ORDER BY, index order). Operator
# RESULT types (e.g. the type of `int32 + int32`) belong to ../functions/, not here.

schema_version = 1

# --- promotion tower ---------------------------------------------------------
# When two values of the same family meet, both promote to a common type before
# comparison. For the integer family the common type is the operand with the
# higher `rank` in scalars.toml (widening is always lossless). int16 < int32 < int64.
[[promotion]]
family = "integer"
strategy = "max-rank"

# text has no promotion tower — there is one text type, so two text operands need
# no reconciliation before comparison (strategy = "none"). (A `strategy` entry is
# still required so the catalog's referential check sees a promotion rule for the
# family, even though the comparison resolution is "none" — see catalog.toml.)
[[promotion]]
family = "text"
strategy = "none"

# boolean likewise has no promotion tower — one boolean type, so two boolean operands
# need no reconciliation (strategy = "none"). Required so the catalog's referential
# check sees a promotion rule for the boolean family (catalog.toml).
[[promotion]]
family = "boolean"
strategy = "none"

# decimal has no within-family promotion tower — there is one decimal type and a value
# carries its own scale, so two decimal operands need no reconciliation (strategy =
# "none"; scale is aligned per-operation, not by promotion). The integer<->decimal
# CROSS-family reconciliation is the `via = "promote-to-decimal"` comparable rule below.
[[promotion]]
family = "decimal"
strategy = "none"

# bytea, like text, has a single type with no promotion tower (strategy = "none"):
# two bytea operands compare directly by unsigned byte order, no reconciliation.
[[promotion]]
family = "bytea"
strategy = "none"

# uuid, like bytea, has a single type with no promotion tower (strategy = "none"): two uuid
# operands compare directly by unsigned byte order over the 16 bytes, no reconciliation.
[[promotion]]
family = "uuid"
strategy = "none"

# timestamp / timestamptz each have a single type with no promotion tower (strategy =
# "none"): two same-type datetime operands compare directly by their int64 instant, no
# reconciliation. The two families do NOT reconcile with EACH OTHER (that would require a
# zone) — there is deliberately no cross comparable rule below, so timestamp × timestamptz
# is a 42804 type error (../design/timestamp.md).
[[promotion]]
family = "timestamp"
strategy = "none"

[[promotion]]
family = "timestamptz"
strategy = "none"

# interval has a single type with no promotion tower (strategy = "none"): two interval operands
# compare directly by the canonical 128-bit span (../design/interval.md §2), no reconciliation.
[[promotion]]
family = "interval"
strategy = "none"

# float (float32, float64) forms a PROMOTION TOWER like the integers (strategy = "max-rank"):
# when two floats of different width meet, both widen to the higher-rank type (float32 -> float64,
# lossless) before comparison/arithmetic — exactly the integer rule, and matching PG (real promotes
# to double). There is deliberately NO CROSS-family float reconciliation: int/decimal × float is a
# 42804 type error (no comparable rule below) — float is a strict island requiring an explicit cast,
# UNLIKE PG which promotes the other operand to float (a documented divergence — ../design/float.md §6).
[[promotion]]
family = "float"
strategy = "max-rank"

# --- comparability -----------------------------------------------------------
# Which (family, family) pairs may be compared at all. Anything not listed is a
# type error. Step 1 has exactly one family, so there is one rule. Cross-family
# rules are added as new families (decimal, text, ...) arrive.
[[comparable]]
left_family = "integer"
right_family = "integer"
via = "promote"          # promote both to the common type, then compare as integers

# text × text only. via = "none": both operands are already text, so no promotion;
# compare by the `C` collation (byte / code-point order over UTF-8). text × integer
# (or any cross-family text pair) is NOT listed, so it is a 42804 type error.
[[comparable]]
left_family = "text"
right_family = "text"
via = "none"

# boolean × boolean only. via = "none": both operands are already boolean, no
# promotion; compare by value (false < true). A mixed pair (boolean × integer,
# boolean × text) is NOT listed, so it is a 42804 type error, exactly as before —
# this rule only unblocks comparing two booleans, e.g. `flag = true`, `(a = b) =
# (c = d)`, and `ORDER BY flag` (../design/types.md §4).
[[comparable]]
left_family = "boolean"
right_family = "boolean"
via = "none"

# decimal × decimal. via = "none": one decimal type, no promotion; compare by aligning
# the two scales (multiply the lower-scale coefficient up — exact, no rounding) and
# comparing coefficients, so 1.5 = 1.50 is true and decimals order by numeric value.
[[comparable]]
left_family = "decimal"
right_family = "decimal"
via = "none"

# integer × decimal and decimal × integer — the first CROSS-family comparability (the
# slot anticipated above). via = "promote-to-decimal": the integer operand converts to
# decimal (scale 0, lossless), then both compare as decimals. This is PostgreSQL's
# numeric comparison (an integer and a numeric compare by value). So `int_col = 1.5` is
# well-typed (and simply never matches a non-integral 1.5), not a 42804 error.
[[comparable]]
left_family = "integer"
right_family = "decimal"
via = "promote-to-decimal"

[[comparable]]
left_family = "decimal"
right_family = "integer"
via = "promote-to-decimal"

# bytea × bytea only. via = "none": compare by unsigned byte order (memcmp over the
# raw bytes). bytea × text and bytea × integer are NOT listed, so they are 42804 type
# errors (bytea is its own family — bytes are not text).
[[comparable]]
left_family = "bytea"
right_family = "bytea"
via = "none"

# uuid × uuid only. via = "none": compare by unsigned byte order (memcmp over the 16 raw
# bytes — exactly PostgreSQL's uuid comparison). uuid × bytea / uuid × text / uuid × integer
# are NOT listed, so they are 42804 type errors (uuid is its own family — a uuid is not a
# bytea even when the bytes coincide).
[[comparable]]
left_family = "uuid"
right_family = "uuid"
via = "none"

# timestamp × timestamp and timestamptz × timestamptz only. via = "none": one type per
# family, no promotion; compare by the int64 instant (signed numeric order), which places
# -infinity < every finite < infinity for free (../design/timestamp.md). There is NO
# timestamp × timestamptz rule (it would require a zone), so a mixed datetime pair is a
# 42804 type error — likewise timestamp × {integer,decimal,text,bool,bytea}.
[[comparable]]
left_family = "timestamp"
right_family = "timestamp"
via = "none"

[[comparable]]
left_family = "timestamptz"
right_family = "timestamptz"
via = "none"

# interval × interval only. via = "none": one type per family, no promotion; compare by the
# canonical 128-bit span (1 month = 30 days, 1 day = 24 h — ../design/interval.md §2), so
# `'1 mon'` = `'30 days'` = `'720:00:00'`. interval × any other family is NOT listed, so it is a
# 42804 type error.
[[comparable]]
left_family = "interval"
right_family = "interval"
via = "none"

# float × float (either width). via = "promote": a mixed-width pair widens to the higher rank
# (float32 -> float64) via the tower, then compares. Operands compare by the TOTAL order (below):
# -0 = +0, NaN = NaN, NaN is the largest value (PG float btree order — NOT raw IEEE, where NaN is
# unordered). So `NaN = NaN` is TRUE and two NaNs dedup. float vs ANY other family (incl. integer
# and decimal) is NOT listed, so it is a 42804 type error — float is a strict island, requiring an
# explicit cast (../design/float.md §3, §6).
[[comparable]]
left_family = "float"
right_family = "float"
via = "promote"

# --- value ordering ----------------------------------------------------------
# The total order over non-NULL integers used by ORDER BY and by index/key
# iteration. Plain signed numeric order; matches the order-preserving key
# encoding in scalars.toml (CLAUDE.md §8) so stored byte order == logical order.
[ordering]
integer = "numeric-ascending"
# text orders by the `C` collation: raw UTF-8 bytes compared lexicographically
# (memcmp), which for UTF-8 equals Unicode code-point order. This is PostgreSQL's
# `C`/POSIX collation. The order-preserving key encoding (scalars.toml
# "text-terminated-escape") reproduces exactly this order in raw bytes, so stored
# byte order == logical order, as for integers.
text = "codepoint-ascending"
# boolean orders false < true — the `bool-byte` encoding (0x00 false < 0x01 true) is
# this order in raw bytes. NULL sorts last in ascending order, as for every type
# (null_ordering below). PostgreSQL orders booleans the same way (false < true).
boolean = "false-before-true"
# decimal orders by exact numeric value, independent of stored scale (1.5 and 1.50 are
# equal; -10 < -1 < 0 < 0.5 < 1 < 10). The order-preserving key encoding (scalars.toml
# "decimal-order-preserving") reproduces this in raw bytes — authored but unexercised
# this slice (decimal is not yet a key; ../design/encoding.md §2.5).
decimal = "numeric-ascending"
# bytea orders by unsigned byte order: the raw bytes compared lexicographically
# (memcmp), exactly PostgreSQL's bytea comparison. A shorter byte string that is a
# prefix of a longer one sorts first (\x61 < \x6161 < \x62). The order-preserving
# key encoding (scalars.toml "bytea-terminated-escape") reproduces this order in raw
# bytes, so stored byte order == logical order.
bytea = "byte-ascending"
# uuid orders by unsigned byte order over its 16 bytes (memcmp), exactly PostgreSQL's uuid
# comparison. Fixed-width, so there is no prefix/length case (every value is 16 bytes). The
# order-preserving key encoding (scalars.toml "uuid-raw16") is literally those 16 bytes, so
# stored byte order == logical order — and uuid is the first non-integer type that EXERCISES
# this as a real key (../design/encoding.md §2.7).
uuid = "byte-ascending"
# timestamp / timestamptz order by their int64 microsecond instant (signed numeric order),
# so -infinity (i64::MIN) < every finite value < infinity (i64::MAX). The order-preserving
# key encoding (scalars.toml "int-be-signflip", the same as int64) reproduces this in raw
# bytes — and unlike text/bytea/decimal it is EXERCISED this slice (a timestamp PRIMARY KEY
# is allowed), so stored byte order == logical order. No NaN exists for timestamps, so the
# order is total (contrast decimal/float).
timestamp = "numeric-ascending"
timestamptz = "numeric-ascending"
# interval orders by its canonical 128-bit microsecond span (1 month = 30 days, 1 day = 24 h —
# ../design/interval.md §2), a total order (no NaN). The order-preserving key encoding is NOT
# authored this slice (interval is not yet a key), so there is no "stored byte order == logical
# order" claim to make for it — ordering is the in-memory span comparison only.
interval = "span-ascending"
# float64 orders by the PG float8 TOTAL order (not raw IEEE): -Infinity < every finite value <
# +Infinity < NaN, with -0 = +0 and NaN = NaN (NaN is the single largest value, above +Infinity).
# This makes ORDER BY / DISTINCT / GROUP BY / MIN / MAX total and deterministic over a type that
# is otherwise only partially ordered by IEEE. The order-preserving key encoding (scalars.toml
# "float-order-preserving", ../design/encoding.md §2.8) reproduces THIS order in raw bytes
# (canonicalize -0 and NaN, then the sign-flip bit transform) — authored but UNEXERCISED this
# slice (float64 is not yet a key). Note the contrast with timestamp (no NaN, so totally ordered
# for free) and decimal (excludes NaN/∞ entirely); float carries them as real, ordered values.
float = "float-total-order"

# NULL's position in the physical total order of encoded keys (index/key
# iteration), RATIFIED with the key-encoding spec (CLAUDE.md §11 step 4) and
# re-ratified to the PostgreSQL model: NULL is the LARGEST value, so NULLs sort
# LAST (after every present value) in ascending order; descending inverts this
# (NULLs first). Implemented by the 1-byte presence tag on a nullable key slot
# (0x00 present < 0x01 NULL) — see ../design/encoding.md §4 and the fixtures in
# ../encoding/integers.toml. A query-level ORDER BY ... NULLS FIRST|LAST override
# is a separate feature that layers on top of this; its default placement follows
# this physical order (ASC -> NULLS LAST, DESC -> NULLS FIRST).
null_ordering = "nulls-last-ascending"

# --- NULL logic --------------------------------------------------------------
# Three-valued logic (CLAUDE.md §4). Any comparison with a NULL operand yields
# UNKNOWN, never TRUE or FALSE. Equality is NOT reflexive for NULL: NULL = NULL is
# UNKNOWN. With the `boolean` type (scalars.toml) UNKNOWN has a concrete carrier: a
# NULL boolean, so {true, false, NULL} is exactly the three-valued domain. The
# Kleene truth tables for the AND/OR/NOT connectives over that domain live in
# ../design/types.md (the catalog records only each operator's NULL discipline).
# `IS [NOT] NULL` is the way to test for NULL; `IS [NOT] DISTINCT FROM` (NULL-safe
# equality) is now unblocked by the boolean type but not yet authored.
[null]
logic = "three-valued"
comparison_with_null = "unknown"
