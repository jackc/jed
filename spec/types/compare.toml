# Comparison, promotion, and NULL logic — CANONICAL DATA (CLAUDE.md §4, §5).
#
# Build-time input to per-language codegen; never parsed at runtime.
# Reasoning lives in ../design/types.md — read it before editing this file.
#
# This file governs *comparison* (=, <, >, ORDER BY, index order). Operator
# RESULT types (e.g. the type of `int32 + int32`) belong to ../functions/, not here.

schema_version = 1

# --- promotion tower ---------------------------------------------------------
# When two values of the same family meet, both promote to a common type before
# comparison. For the integer family the common type is the operand with the
# higher `rank` in scalars.toml (widening is always lossless). int16 < int32 < int64.
[[promotion]]
family = "integer"
strategy = "max-rank"

# --- comparability -----------------------------------------------------------
# Which (family, family) pairs may be compared at all. Anything not listed is a
# type error. Step 1 has exactly one family, so there is one rule. Cross-family
# rules are added as new families (decimal, text, ...) arrive.
[[comparable]]
left_family = "integer"
right_family = "integer"
via = "promote"          # promote both to the common type, then compare as integers

# --- value ordering ----------------------------------------------------------
# The total order over non-NULL integers used by ORDER BY and by index/key
# iteration. Plain signed numeric order; matches the order-preserving key
# encoding in scalars.toml (CLAUDE.md §8) so stored byte order == logical order.
[ordering]
integer = "numeric-ascending"

# NULL's position in the physical total order of encoded keys (index/key
# iteration), RATIFIED with the key-encoding spec (CLAUDE.md §11 step 4) and
# re-ratified to the PostgreSQL model: NULL is the LARGEST value, so NULLs sort
# LAST (after every present value) in ascending order; descending inverts this
# (NULLs first). Implemented by the 1-byte presence tag on a nullable key slot
# (0x00 present < 0x01 NULL) — see ../design/encoding.md §4 and the fixtures in
# ../encoding/integers.toml. A query-level ORDER BY ... NULLS FIRST|LAST override
# is a separate feature that layers on top of this; its default placement follows
# this physical order (ASC -> NULLS LAST, DESC -> NULLS FIRST).
null_ordering = "nulls-last-ascending"

# --- NULL logic --------------------------------------------------------------
# Three-valued logic (CLAUDE.md §4). Any comparison with a NULL operand yields
# UNKNOWN, never TRUE or FALSE. Equality is NOT reflexive for NULL: NULL = NULL is
# UNKNOWN. With the `boolean` type (scalars.toml) UNKNOWN has a concrete carrier: a
# NULL boolean, so {true, false, NULL} is exactly the three-valued domain. The
# Kleene truth tables for the AND/OR/NOT connectives over that domain live in
# ../design/types.md (the catalog records only each operator's NULL discipline).
# `IS [NOT] NULL` is the way to test for NULL; `IS [NOT] DISTINCT FROM` (NULL-safe
# equality) is now unblocked by the boolean type but not yet authored.
[null]
logic = "three-valued"
comparison_with_null = "unknown"
