# Scalar type definitions — CANONICAL DATA (CLAUDE.md §4, §5).
#
# Build-time input to per-language codegen; never parsed at runtime.
# Reasoning lives in ../design/types.md — read it before editing this file.
#
# Step-1 scope: signed integers only. Every other scalar is deferred (CLAUDE.md §4).

schema_version = 1

# --- conventions -------------------------------------------------------------
# id            canonical name. ALL aliases normalize to this. It is the single
#               name that appears in error messages, the catalog, and conformance
#               `query` column-type tags (determinism: one name per type). Integer and
#               float names state the width in BITS under the `i`/`f` prefix (i16/i32/i64,
#               f32/f64) — the Rust/Zig convention. The `i`/`f` prefix is load-bearing: it
#               makes jed's bit-namespace (i8…i64) LEXICALLY DISJOINT from PostgreSQL's
#               byte-namespace (int2/int4/int8, float4/float8), so jed can accept BOTH without
#               the `int8`-means-8-bit-vs-64-bit collision, and a future 8-bit `i8` stays free
#               (../design/types.md §11; CLAUDE.md §1/§4).
# aliases       additional SQL spellings accepted on input: the SQL-standard words
#               (smallint/int/integer/bigint, real/double precision/float) AND PostgreSQL's
#               byte-shorthand (int2/int4/int8, float4/float8 — safe per the disjoint-namespace
#               rule above). The old jed bit-names int16/int32/int64/float32/float64 are NO
#               LONGER accepted (replaced by the i/f prefix; a clean break, not back-compat).
# family        types in the same family share comparison/promotion rules.
# storable      true if a column may be declared of this type (and a value of it
#               stored on disk). false = the type exists only as an EXPRESSION type
#               (literals, operator results) but is not a column type this slice;
#               declaring such a column, or CASTing to it, traps 0A000. Integer
#               fields below (signed/bits/min/max/overflow/rank) apply only to the
#               integer family.
# signed        two's-complement signed integer.
# bits          storage width in bits.
# min / max     inclusive value range.
# overflow      what happens when an operation would exceed the range: "trap"
#               raises `overflow_error`; values are never silently wrapped
#               (CLAUDE.md §8 — strict typing forbids silent reinterpretation).
# encoding      order-preserving key encoding (CLAUDE.md §8). method
#               "int-be-signflip" = fixed-width big-endian with the sign bit
#               inverted; "bool-byte" = a single byte 0x00 (false) < 0x01 (true);
#               "text-terminated-escape" = UTF-8 bytes (the `C` collation), each
#               0x00 escaped to 0x00 0xFF and the string terminated with 0x00 0x01
#               (order-preserving + self-delimiting — see ../design/encoding.md §2.4);
#               "bytea-terminated-escape" = the same escape+terminator rule over a
#               value's RAW bytes (no UTF-8 / collation framing — ../design/encoding.md
#               §2.6); "decimal-order-preserving" = sign/class byte + order-preserving
#               exponent + big-endian base-100 mantissa pairs + terminator (CockroachDB
#               style — ../design/encoding.md §2.5); "uuid-raw16" = the 16 raw bytes of
#               the value, big-endian, with NO sign-flip, escape, or terminator (fixed-
#               width, so unsigned memcmp over the bytes IS the order — ../design/encoding.md
#               §2.7); "bool-byte" = a single byte 0x00 (false) < 0x01 (true), fixed-width
#               1, no sign-flip/escape/terminator (../design/encoding.md §2.9). All sort
#               byte-for-byte identically to logical order. width_bytes is omitted for the
#               variable-width types (text, bytea, decimal) but PRESENT for the fixed-width
#               non-integer keys uuid (16) and boolean (1). Exercised non-integer keys: uuid,
#               boolean, the i64/i32-backed timestamp/timestamptz/date, and the variable-width
#               text/bytea (their terminated-escape encoding self-delimits); decimal/interval/
#               float remain authored-but-unexercised key methods.
# max_precision for decimal only: the maximum DECLARABLE precision p of numeric(p,s) —
#               1000, PG's NUMERIC_MAX_PRECISION — and (as in PG) the display-scale clamp
#               on a division result (../design/decimal.md §4). NOT a cap on what an
#               unconstrained value may carry; that is the pair below.
# max_int_digits for decimal only: the maximum integer-part digits ANY value may carry —
#               131072, PG's (NUMERIC_WEIGHT_MAX + 1) * DEC_DIGITS. Exceeding traps 22003
#               (../design/decimal.md §2).
# max_scale     for decimal only: the maximum digits after the point ANY value may carry —
#               16383, PG's NUMERIC_DSCALE_MAX. Exceeding traps 22003 on input; a
#               multiplication result instead ROUNDS to this scale (../design/decimal.md §2).
# rank          position in the integer promotion tower; the common type of two
#               integers is the one with the higher rank (see compare.toml). Omitted
#               for non-integer types (boolean and text do not promote).
# collation     for text only: the one defined collation. "C" = byte / code-point
#               order over UTF-8 (PostgreSQL's `C`/POSIX collation, = SQLite BINARY),
#               the deterministic, version-independent, table-free choice (CLAUDE.md
#               §8; ../design/types.md §11). Locale/ICU collations are a later feature.
# -----------------------------------------------------------------------------

[[type]]
id = "i16"
aliases = ["smallint", "int2"]
family = "integer"
storable = true
signed = true
bits = 16
min = -32768
max = 32767
overflow = "trap"
overflow_error = "22003"
encoding = { method = "int-be-signflip", width_bytes = 2 }
rank = 1

[[type]]
id = "i32"
aliases = ["int", "integer", "int4"]
family = "integer"
storable = true
signed = true
bits = 32
min = -2147483648
max = 2147483647
overflow = "trap"
overflow_error = "22003"
encoding = { method = "int-be-signflip", width_bytes = 4 }
rank = 2

[[type]]
id = "i64"
aliases = ["bigint", "int8"]
family = "integer"
storable = true
signed = true
bits = 64
min = -9223372036854775808
max = 9223372036854775807
overflow = "trap"
overflow_error = "22003"
encoding = { method = "int-be-signflip", width_bytes = 8 }
rank = 3

# --- boolean: a storable non-integer scalar ----------------------------------
# boolean is the result of comparisons and logical connectives and the type of the
# TRUE/FALSE literals (../functions/catalog.toml). Its three states under NULL are
# exactly Kleene's true/false/unknown — unknown is a NULL boolean (../design/types.md).
# STORABLE this slice (storable = true): `CREATE TABLE t(b boolean)` works, values are
# stored on disk (on-disk type code 5 — ../fileformat/format.md), and boolean columns
# compare/order/dedup (false < true; boolean × boolean is comparable — compare.toml).
# The value codec is the 1-byte `bool-byte` body (0x00 false, 0x01 true) behind the
# shared presence tag. The domain is {false, true} plus NULL (= unknown), ordered
# false < true. boolean is ALSO usable as a key: its order-preserving `bool-byte` KEY
# encoding (a single byte, 0x00 false < 0x01 true — fixed-width 1, so self-delimiting with
# NO sign-flip/escape/terminator, like uuid; ../design/encoding.md §2.9) is EXERCISED — a
# boolean PRIMARY KEY / index is supported and byte-pinned (the second non-integer key
# type after uuid). `CAST(x AS boolean)` and boolean⇄integer casts ARE still rejected
# (deferred to a casts slice — casts.toml). width_bytes = 1 (the fixed key/value body).
# No bits/min/max/overflow/rank — those are integer-family fields.
[[type]]
id = "boolean"
aliases = ["bool"]
family = "boolean"
storable = true
encoding = { method = "bool-byte", width_bytes = 1 }

# --- text: the first storable non-integer scalar -----------------------------
# Variable-width UTF-8 string. STORABLE this slice: `CREATE TABLE t(s text)` works,
# values are stored on disk (on-disk type code 4 — ../fileformat/format.md), and
# text columns compare/order/dedup. Its one collation is `C` (byte / code-point
# order over UTF-8) — see ../design/types.md §11 for why one collation, and why
# locale/ICU collation is deferred. The empty string '' is a distinct, non-NULL
# value. Aliases cover the SQL spellings; varchar(n) LENGTH limits, text⇄int casts,
# and string functions/LIKE are all deferred (../design/types.md §11). The text
# KEY encoding rule (text-terminated-escape, encoding.md §2.4) is EXERCISED: text IS a
# valid PRIMARY KEY / ordered index / UNIQUE key — the first variable-width non-integer
# key (an oversized text key, which cannot spill, is 0A000). No bits/min/max/overflow/
# rank — those are integer-family fields; no width_bytes — text is variable-width.
[[type]]
id = "text"
aliases = ["varchar", "character varying", "string"]
family = "text"
storable = true
encoding = { method = "text-terminated-escape" }
collation = "C"

# --- decimal: the exact arbitrary-precision numeric (CLAUDE.md §4) ------------
# An EXACT base-10 numeric: value = (-1)^sign * coefficient * 10^(-scale), held as a
# hand-rolled sign + base-10^9 limb coefficient + scale (no binary float anywhere —
# CLAUDE.md §8). STORABLE this slice with the on-disk value codec (type code 6 —
# ../fileformat/format.md). The first PARAMETERIZED type: `numeric` (unconstrained),
# `numeric(p)` (= numeric(p,0)), and `numeric(p,s)` where p = total significant digits
# (1..=max_precision) and s = digits after the point (0..=p); a bad typmod traps 22023.
# Coercion to a scale ROUNDS HALF AWAY FROM ZERO (PG numeric; ../design/decimal.md §3),
# the rounding decision CLAUDE.md §8 deferred. ALWAYS FINITE — no NaN/±Infinity (a
# documented PG divergence: there is no float source and 0/0 traps 22012). Canonical id
# is `decimal`; `numeric`/`dec` are accepted aliases. The order-preserving KEY encoding
# (decimal-order-preserving) is authored (encoding.md §2.5) but UNEXERCISED this slice —
# a decimal PRIMARY KEY is rejected 0A000 (the text-PK narrowing). No bits/min/max/rank
# (decimal forms no integer-style promotion tower); no collation; no width_bytes
# (variable-width). An UNCONSTRAINED value is bounded by PG's numeric-format caps
# (max_int_digits / max_scale — ../design/decimal.md §2); these were lifted from the
# original 1000/1000 cap when over-page values landed (large-values.md), with the
# size-scaled `decimal_work` cost unit bounding the arithmetic an untrusted query can
# drive (../cost/schedule.toml, ../design/cost.md §3).
[[type]]
id = "decimal"
aliases = ["numeric", "dec"]
family = "decimal"
storable = true
overflow = "trap"
overflow_error = "22003"
encoding = { method = "decimal-order-preserving" }
max_precision = 1000
max_int_digits = 131072
max_scale = 16383

# --- bytea: a variable-width binary string (raw bytes) -----------------------
# STORABLE this slice: `CREATE TABLE t(b bytea)` works, values are stored on disk
# (on-disk type code 7 — ../fileformat/format.md), and bytea columns compare/order/
# dedup by UNSIGNED byte order (memcmp over the raw bytes — exactly PostgreSQL's
# bytea comparison). The empty byte string is a distinct, non-NULL value. There is
# NO collation (bytea is bytes, not text) and NO alias (PostgreSQL spells it only
# `bytea`). A bytea literal is written as a single-quoted string in a bytea context
# (../design/types.md §6): the HEX input form `\x` + an even count of hex digits,
# decoded to the raw bytes; rendered back as `\x` + lowercase hex (PG bytea_output =
# hex). Invalid hex input traps 22P02. The traditional escape input format, text⇄
# bytea casts, and binary functions are deferred. The bytea KEY encoding rule
# (bytea-terminated-escape, encoding.md §2.6) is EXERCISED: bytea IS a valid PRIMARY KEY /
# ordered index / UNIQUE key (like text — the embedded-0x00 escape is routinely hit; an
# oversized bytea key is 0A000). No bits/min/max/overflow/rank (integer-family fields);
# no width_bytes — bytea is variable-width; no collation.
[[type]]
id = "bytea"
aliases = []
family = "bytea"
storable = true
encoding = { method = "bytea-terminated-escape" }

# --- uuid: a fixed 16-byte value (RFC 4122) ----------------------------------
# STORABLE this slice: `CREATE TABLE t(id uuid)` works, values are stored on disk (on-disk
# type code 8 — ../fileformat/format.md), and uuid columns compare/order/dedup by UNSIGNED
# byte order over the 16 bytes (memcmp — exactly PostgreSQL's uuid comparison). There is NO
# collation (uuid is bytes, not text) and NO alias (PostgreSQL spells it only `uuid`). A uuid
# literal is written as a single-quoted string in a uuid context (../design/types.md §6/§14):
# input replicates PostgreSQL's `uuid_in` — optional surrounding braces `{}`, any case, and an
# optional hyphen after each whole pair of bytes (canonical 8-4-4-4-12, hyphen-less 32-hex, and
# every-4-digit grouping all accepted; a misplaced hyphen is rejected) — normalizing to 16 bytes; rendered
# back as the canonical `8-4-4-4-12` LOWERCASE-hex spelling (PG uuid_out). Malformed input
# traps 22P02. No arithmetic; uuid⇄other casts and uuid functions (gen_random_uuid) are
# deferred. UNLIKE the other non-integer types, uuid IS allowed in a PRIMARY KEY / key: it is
# the FIRST non-integer key type, because its order-preserving `uuid-raw16` encoding is the 16
# raw bytes (fixed-width — no escape/terminator, no sign-flip), exercised this slice
# (encoding.md §2.7). It is also the first fixed-width non-integer value, so `width_bytes` is
# present (16). No bits/min/max/overflow/rank (integer-family fields); no collation.
[[type]]
id = "uuid"
aliases = []
family = "uuid"
storable = true
encoding = { method = "uuid-raw16", width_bytes = 16 }

# --- timestamp / timestamptz: the datetime types (../design/timestamp.md) ----
# Two DISTINCT types that share ONE physical representation: i64 MICROSECONDS since
# the Unix epoch (1970-01-01 00:00:00), proleptic Gregorian, NO leap seconds. They are
# the PostgreSQL *instant* model, not the SQL-standard *offset-bearing* model, and this
# slice ships NO time-zone database and NO named zones (a deliberate divergence, kept
# deterministic + dependency-free — CLAUDE.md §8/§13):
#   timestamp    a zoneless WALL CLOCK; no zone, ever, never converted.
#   timestamptz  an absolute UTC INSTANT; input text MAY carry a numeric offset
#                (Z, +HH, +HH:MM, +HH:MM:SS) which normalizes the value to UTC and is
#                then DISCARDED (only the UTC instant is stored — no offset retained).
# STORABLE this slice (on-disk type code 9 timestamp / 10 timestamptz —
# ../fileformat/format.md). Both are FIXED-WIDTH 8-byte and reuse the i64 order-
# preserving KEY encoding (int-be-signflip) verbatim — so unlike text/bytea/decimal a
# timestamp PRIMARY KEY is SUPPORTED this slice (the encoding is already exercised). The
# two families do NOT compare or cast to each other (that needs a zone): timestamp ×
# timestamptz is 42804 (compare.toml). A value is written as a single-quoted string in a
# timestamp context (literal adaptation, like bytea — ../design/types.md, timestamp.md):
# ISO-8601-ish `YYYY-MM-DD[ T]HH:MM:SS[.ffffff][offset]` with optional BC/AD era; the
# special values `infinity`/`-infinity` are first-class (the i64::MAX/i64::MIN sentinels —
# unlike decimal, which EXCLUDES ±Infinity as a float artifact, decimal.md §2; a timestamp
# infinity is a genuine, totally-ordered sentinel). Sub-microsecond input ROUNDS to µs
# half-away-from-zero (decimal.md §3). Malformed input traps 22007; out-of-range fields /
# representable-range overflow trap 22008. now()/CURRENT_TIMESTAMP, the timestamp(p)
# modifier, interval arithmetic, CAST, and named zones are all DEFERRED. No bits/min/max/
# overflow/rank (not the integer family); no collation.
[[type]]
id = "timestamp"
aliases = ["timestamp without time zone"]
family = "timestamp"
storable = true
encoding = { method = "int-be-signflip", width_bytes = 8 }

[[type]]
id = "timestamptz"
aliases = ["timestamp with time zone"]
family = "timestamptz"
storable = true
encoding = { method = "int-be-signflip", width_bytes = 8 }

# --- interval: a span of time (../design/interval.md) ------------------------
# PostgreSQL's three INDEPENDENT fields — months (i32), days (i32), micros (i64) —
# kept separate so `+ 1 month` is calendar-aware (Jan 31 + 1 month -> Feb 28/29, day clamped)
# and genuinely distinct from `+ 30 days`. STORABLE this slice (on-disk type code 11 —
# ../fileformat/format.md), with a FIXED 16-byte value body (i32 months + i32 days + i64
# micros, big-endian two's-complement; NO sign-flip — a value codec, not a key). Comparison,
# ordering, and dedup (DISTINCT/GROUP BY/set-ops) collapse the three fields via the canonical
# 128-bit SPAN (1 month = 30 days, 1 day = 24 h): span = (months*30 + days)*86_400_000_000 +
# micros, compared as a signed 128-bit integer (PG `interval_cmp_value`). So `'1 mon'` ==
# `'30 days'` == `'720:00:00'`, while each value still RENDERS its own fields. A value is written
# as a single-quoted string in an interval context (literal adaptation, like timestamp) OR with
# the `INTERVAL '...'` keyword literal (context-free): the "unit + time" input subset (units with
# abbreviations, per-field signs, trailing `ago`, the fractional-unit cascade `1.5 days` ->
# `1 day 12:00:00`, and a bare `HH:MM:SS[.ffffff]`). Malformed input traps 22007; an out-of-range
# field 22008. ISO-8601 `P…`, the SQL-standard combined forms (`1-2`/`3 4:05:06`), field
# qualifiers (`YEAR TO MONTH`), the `interval(p)` precision typmod, and CAST to/from interval are
# all DEFERRED. NOT a key this slice — its order-preserving key encoding is not authored, so an
# interval PRIMARY KEY / index is rejected 0A000 (like decimal/text/bytea). No bits/min/max/
# overflow/rank (not the integer family); no collation; no width_bytes (the fixed body is
# multi-field, not a single int through the integer codec). `interval * / number` arithmetic
# computes the fractional cascade EXACTLY (no float — CLAUDE.md §8), a documented PG divergence
# on sub-unit ties (../design/interval.md §5).
[[type]]
id = "interval"
aliases = []
family = "interval"
storable = true
encoding = { method = "interval-fixed16" }

# --- f64: IEEE 754 double precision (../design/float.md) ------------------
# The engine's APPROXIMATE numeric and the FIRST type deliberately EXEMPTED from
# cross-core byte-identity (CLAUDE.md §2/§8; ../design/determinism.md §6, class A).
# The exemption is NARROW: storage, the total order, the +-*/ /sqrt arithmetic kernel,
# the exact-sum SUM/AVG, MIN/MAX/COUNT, and cost are all kept fully deterministic and
# cross-core; only TRANSCENDENTAL function values and text-rendering LAYOUT are exempt
# (absorbed by the conformance `R` tag's tolerant compare). STORABLE this slice with the
# on-disk value codec (type code 12 — ../fileformat/format.md): the 8 IEEE bytes, big-
# endian, behind the presence tag (fixed-width, no length prefix, like uuid/timestamp).
# Two widths forming a PROMOTION TOWER like the integers (f32 rank 1 < f64 rank 2):
#   f64  canonical; aliases `double precision`, `float`, and PG's byte-shorthand `float8` (in
#            PG a bare `float` with NO precision IS double precision / 64-bit — NOT 32-bit; the
#            C/Java intuition is wrong).
#   f32  canonical; aliases `real` and PG's byte-shorthand `float4` (PG's 32-bit single).
# PG's byte-shorthand `float8`/`float4` IS accepted (like int8/int4) — the `f` prefix keeps jed's
# bit-namespace disjoint from PG's byte-namespace, so there is no collision (CLAUDE.md §1/§4). The
# `float(p)` precision typmod is NOT accepted. WIDENING f32 -> f64 is LOSSLESS (every binary32 is an
# exact binary64), so
# it is IMPLICIT, exactly like i16 -> i64 (casts.toml); f64 -> f32 is lossy -> explicit.
# Cross-family int/decimal <-> float stays EXPLICIT either way (float is a strict island — the only
# implicit edge is within-family widening). Mixed-width float arithmetic/comparison promotes to the
# higher rank (compare.toml `max-rank`), matching PG (real promotes to double).
# TOTAL ORDER (PG float8 btree): -0 = +0, NaN = NaN, NaN is the LARGEST value (above
# +Infinity) — see compare.toml `ordering` and ../design/float.md §3. NaN/±Infinity are
# FIRST-CLASS values (unlike decimal, which excludes them): they enter only via literals/
# casts/stored values and propagate; FINITE arithmetic that would produce them TRAPS
# instead (overflow 22003, x/0 22012), the PG trap model. The order-preserving KEY
# encoding (float-order-preserving — ../design/encoding.md §2.8) is AUTHORED but
# UNEXERCISED: a f64 PRIMARY KEY is rejected 0A000 (the text/decimal/bytea/interval
# precedent, reinforced by the determinism.md §4 contamination rule — float stays out of
# stored order). No bits/min/max/rank (not the integer family); no collation. overflow =
# "trap" (finite-overflow 22003, the §3 rule). width_bytes present (fixed 8).
[[type]]
id = "f32"
aliases = ["real", "float4"]
family = "float"
storable = true
overflow = "trap"
overflow_error = "22003"
encoding = { method = "float-order-preserving", width_bytes = 4 }
rank = 1

[[type]]
id = "f64"
aliases = ["double precision", "float", "float8"]
family = "float"
storable = true
overflow = "trap"
overflow_error = "22003"
encoding = { method = "float-order-preserving", width_bytes = 8 }
rank = 2

# --- date: a calendar date (../design/date.md) -------------------------------
# A year/month/day with NO time and NO zone — PostgreSQL's `date`, the day-granular member of
# the datetime family and the sibling of timestamp. A value is an i32 count of DAYS since the
# Unix epoch (1970-01-01), proleptic Gregorian, reusing timestamp's days_from_civil/
# civil_from_days calendar core VERBATIM (same epoch) so the two types cannot drift. (PostgreSQL
# stores days since 2000-01-01 internally — an INVISIBLE divergence, since the integer is never
# exposed; jed owns its representation, CLAUDE.md §1.) STORABLE this slice (on-disk type code 16
# — ../fileformat/format.md), a FIXED-WIDTH 4-byte body reusing the i32 order-preserving codec.
# Finite values occupy i32::MIN+1 .. i32::MAX-1 (≈ 5877550 BC … 5879610 AD around 1970 — WIDER
# than PG's 4713 BC … 5874897 AD; a date jed accepts beyond PG's range is a documented divergence,
# oracle ledger). The infinity/-infinity sentinels are i32::MAX/i32::MIN (PG DATEVAL_NOEND/NOBEGIN;
# unlike decimal, which excludes ±Infinity — a date infinity is a genuine, totally-ordered value).
# A value is written as a single-quoted string in a date context (literal adaptation, like
# timestamp — ../design/types.md §6, date.md §2) OR with the `DATE '...'` keyword literal: the
# strict ISO `YYYY-MM-DD` grammar with optional BC/AD era, reusing timestamp's FULL literal
# grammar but keeping ONLY the date portion — a time/offset is validated then DISCARDED (PG), and
# 24:00:00 does NOT roll into the day (unlike timestamp). Malformed input traps 22007; an
# out-of-range field / a day count beyond the i32 range traps 22008. Date is its OWN family and
# does NOT compare or cast to timestamp/timestamptz/int this slice (a documented divergence — PG
# implicitly casts date→timestamp; deferred to the cast follow-on). Like timestamp (and unlike
# text/decimal/bytea/interval), the int-be-signflip KEY encoding (width 4) is EXERCISED — a date
# PRIMARY KEY is supported. Date arithmetic (date±int, date-date, date±interval), CAST, the
# clock-relative literals (today/epoch), and date functions are all DEFERRED (date.md §6). No
# bits/min/max/overflow/rank (not the integer family); no collation. width_bytes = 4.
[[type]]
id = "date"
aliases = []
family = "date"
storable = true
encoding = { method = "int-be-signflip", width_bytes = 4 }
