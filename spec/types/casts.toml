# Coercion / cast matrix — CANONICAL DATA (CLAUDE.md §4, §5).
#
# Build-time input to per-language codegen; never parsed at runtime.
# Reasoning lives in ../design/types.md — read it before editing this file.
#
# STRICT by default: any (from, to) pair not listed here is FORBIDDEN — values are
# never silently reinterpreted (CLAUDE.md §4). Identity casts (int16->int16, ...) are
# implicit and always succeed; they are implied and not listed.
#
# boolean (scalars.toml) is now a STORABLE type, but its casts are still DEFERRED to a
# dedicated cast slice: it is NEITHER a cast source NOR a cast target here. `CAST(x AS
# boolean)` traps 0A000 (an explicit, relaxable narrowing — like a text PRIMARY KEY),
# and there is no boolean->integer rule, so casting a boolean value is a forbidden pair
# (CAST-from-boolean is a 42804 datatype mismatch). PostgreSQL's boolean<->integer casts
# are asymmetric (bool->int yes, int->bool no), so they are authored deliberately in a
# later slice rather than falling out of making boolean storable.
#
# bytea and uuid (scalars.toml) are likewise NEITHER a cast source NOR a cast target here:
# CAST(x AS bytea) / CAST(x AS uuid) trap 0A000 and casting FROM a bytea/uuid value is a
# forbidden pair (42804). text/bytea/uuid inter-casts are deferred to a dedicated cast slice
# (PostgreSQL has text<->uuid etc., authored deliberately later rather than falling out of
# making the types storable).
#
# timestamp / timestamptz (scalars.toml) are likewise STORABLE but have NO cast rules here:
# they are NEITHER a cast source NOR a cast target this slice. A single-quoted string lands
# in a timestamp column by LITERAL ADAPTATION (parsed to the int64 instant in a timestamp
# context — like bytea), which is the executor's resolve-time coercion, NOT a (text,
# timestamp) cast pair. `CAST(x AS timestamp)`, text<->timestamp, and the zone-requiring
# timestamp<->timestamptz conversion are all DEFERRED to a later cast slice (and the latter
# needs a zone, so timestamp and timestamptz never reconcile — see compare.toml).
#
# interval (scalars.toml) is likewise STORABLE with NO cast rules here. A single-quoted string
# lands in an interval column by LITERAL ADAPTATION (parsed in an interval context), and the
# `INTERVAL '...'` keyword literal names the type directly — neither is a (text, interval) CAST.
# `CAST(x AS interval)` and casting FROM an interval are DEFERRED to a later cast slice (0A000 /
# 42804), exactly like timestamp (../design/interval.md §6).
#
# STRING-LITERAL coercion is the one (text -> T) cast admitted ahead of the general cast slice,
# and it is NOT a (from, to) pair in this matrix because its source is a string LITERAL, not the
# `text` TYPE. PostgreSQL's `type 'string'` form and `CAST(<string literal> AS T)` coerce the
# literal's string to the NAMED type T at resolve time, for EVERY scalar T — the type's own parse
# (int16/int32/int64, decimal, boolean, text-identity, plus the string-native bytea/uuid/timestamp/
# timestamptz/interval). Folded at resolve: 42704 unknown type, 22P02 malformed, 22003 out of range
# (../design/grammar.md §36, ../design/types.md §5). This does NOT relax the matrix below: a RUNTIME
# text->T cast on a non-literal text expression (`CAST(text_col AS int)`) stays DEFERRED (0A000), and
# a BARE string never silently becomes a number/bool (`int_col = '42'` is 42804). Only the explicit,
# named, literal spelling is admitted. For integer/decimal the coercion follows jed's OWN literal
# grammar (no hex/underscore/scientific/NaN — documented §36 divergences from PG).
#
# mode:
#   implicit    inserted automatically anywhere a value of `to` is wanted (safe, lossless)
#   assignment  inserted on INSERT/UPDATE into a column of `to` (safe, lossless)
#   explicit    only via an explicit CAST(...) ; may fail at runtime
# on_overflow:
#   trap        raise the named error when the value does not fit `to` (CLAUDE.md §8)

schema_version = 1

# --- widening: lossless, allowed implicitly ----------------------------------
[[cast]]
from = "int16"
to = "int32"
mode = "implicit"

[[cast]]
from = "int16"
to = "int64"
mode = "implicit"

[[cast]]
from = "int32"
to = "int64"
mode = "implicit"

# --- narrowing: lossy, explicit CAST only, traps on overflow ------------------
[[cast]]
from = "int32"
to = "int16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "int64"
to = "int16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "int64"
to = "int32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# --- integer -> decimal: lossless (every integer is an exact decimal), implicit -------
# An integer widens to decimal with scale 0 and no rounding, so it is implicit, like the
# integer widenings above. This is what lets a bare integer literal land in a decimal
# column and an `int_col <op> decimal` pair promote the integer to decimal (compare.toml).
[[cast]]
from = "int16"
to = "decimal"
mode = "implicit"

[[cast]]
from = "int32"
to = "decimal"
mode = "implicit"

[[cast]]
from = "int64"
to = "decimal"
mode = "implicit"

# --- decimal -> integer: lossy, explicit CAST only, traps on overflow -----------------
# A decimal is rounded to scale 0 (HALF AWAY FROM ZERO — the one engine rounding mode,
# ../design/decimal.md §3; so 2.5 -> 3, -2.5 -> -3, matching PG numeric->int), then
# range-checked against the integer type and trapped (22003) if it does not fit. EXPLICIT
# only — STRICTER than PostgreSQL, which assignment-casts numeric->int; jed forbids the
# silent narrowing, consistent with its strict matrix (CLAUDE.md §4, design/types.md).
[[cast]]
from = "decimal"
to = "int16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "decimal"
to = "int32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "decimal"
to = "int64"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# decimal -> decimal is the identity cast (implicit, always succeeds), like every identity
# pair, so it is NOT listed. Re-scaling to a TARGET TYPMOD — `CAST(x AS numeric(p,s))` or
# assignment into a numeric(p,s) column — is not a distinct (from,to) type pair (decimal is
# one type; p/s are parameters): the executor rounds x to scale s half-away and traps 22003
# if the integer-part digits exceed p-s (../design/decimal.md §2). It is the assignment/
# explicit coercion the casts vocabulary reserves, applied within the decimal type.

# --- float64 casts: ALL explicit (every one is lossy or representation-changing) -------
# float64 is a strict family: NO implicit coercion crosses into or out of it (UNLIKE PG, which
# promotes int/decimal -> float8 implicitly). int->float and decimal->float are lossy (int64 >
# 2^53 and most decimals are not exactly representable in binary64), so they are EXPLICIT, not
# implicit like int->decimal. Conversion is to the nearest binary64, round-ties-to-even (the
# IEEE conversion). A finite value whose magnitude overflows binary64 traps 22003 rather than
# yielding ±Infinity (the §3 finite-overflow rule — NaN/∞ are input-only). ../design/float.md §6.
[[cast]]
from = "int16"
to = "float64"
mode = "explicit"

[[cast]]
from = "int32"
to = "float64"
mode = "explicit"

[[cast]]
from = "int64"
to = "float64"
mode = "explicit"

[[cast]]
from = "decimal"
to = "float64"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# float64 -> integer: round HALF AWAY FROM ZERO to an integer (jed's one engine rounding mode —
# ../design/decimal.md §3; a DOCUMENTED divergence from PG, which rounds half-to-even via rint),
# then range-check (22003). NaN / ±Infinity -> 22003 (no integer representation).
[[cast]]
from = "float64"
to = "int16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "float64"
to = "int32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "float64"
to = "int64"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# float64 -> decimal: the exact decimal of the binary64 value, then the target typmod's scale
# coercion (../design/decimal.md §3). NaN / ±Infinity -> 22003 (decimal is always finite).
[[cast]]
from = "float64"
to = "decimal"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# text <-> float64: the `float '...'` typed literal / CAST(<string literal> AS float64) is the
# text-LITERAL -> float64 coercion (the string-literal cast above, ../design/grammar.md §36 — and
# float64's string parse DOES accept e-notation and Infinity/NaN, unlike a bare decimal literal).
# A RUNTIME CAST(text_col AS float64) and CAST(float_expr AS text) stay DEFERRED (0A000), the
# general runtime-text-cast slice — so they are NOT (from,to) pairs here, exactly like decimal.

# --- within the float family: float32 <-> float64 (the tower) -------------------------
# float32 -> float64 is LOSSLESS (every binary32 is an exact binary64), so it is IMPLICIT — the
# float analogue of int16 -> int64, and what lets a mixed-width float pair promote (compare.toml
# `max-rank`). float64 -> float32 is lossy (round-ties-to-even to binary32) and EXPLICIT; a finite
# value beyond the binary32 range traps 22003 (the §3 finite-overflow rule — not ±Inf). NaN/±Inf
# convert across widths unchanged.
[[cast]]
from = "float32"
to = "float64"
mode = "implicit"

[[cast]]
from = "float64"
to = "float32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# --- float32 cross-family casts: ALL explicit (mirror the float64 rows above) ----------
# Same strict rules as float64: int/decimal -> float32 explicit (lossy; nearest binary32,
# round-ties-to-even; finite overflow traps 22003); float32 -> integer explicit (round half-away,
# range-check 22003; NaN/±Inf -> 22003); float32 -> decimal explicit (exact decimal of the
# binary32, then typmod scale; NaN/±Inf -> 22003). text <-> float32 via the `real '...'` typed
# literal only; runtime text casts deferred (0A000) — not (from,to) pairs, like float64.
[[cast]]
from = "int16"
to = "float32"
mode = "explicit"

[[cast]]
from = "int32"
to = "float32"
mode = "explicit"

[[cast]]
from = "int64"
to = "float32"
mode = "explicit"

[[cast]]
from = "decimal"
to = "float32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "float32"
to = "int16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "float32"
to = "int32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "float32"
to = "int64"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "float32"
to = "decimal"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"
