# Coercion / cast matrix — CANONICAL DATA (CLAUDE.md §4, §5).
#
# Build-time input to per-language codegen; never parsed at runtime.
# Reasoning lives in ../design/types.md — read it before editing this file.
#
# STRICT by default: any (from, to) pair not listed here is FORBIDDEN — values are
# never silently reinterpreted (CLAUDE.md §4). Identity casts (i16->i16, ...) are
# implicit and always succeed; they are implied and not listed.
#
# boolean (scalars.toml) <-> i32: the boolean cast slice (the two rows at the end of this
# file). PostgreSQL ties BOTH directions of the boolean<->integer cast to int4 ONLY and makes
# both EXPLICIT: `true::int` -> 1 / `false::int` -> 0, and `0::int::boolean` -> false /
# `<nonzero>::int::boolean` -> true (any nonzero, including negative). There is NO bool<->int2
# and NO bool<->int8 cast in PG (`true::smallint` / `1::bigint::boolean` are errors), so jed
# admits ONLY (boolean, i32) and (i32, boolean). Every other boolean<->integer pair (boolean
# <-> i16, boolean <-> i64) is NOT in the matrix, so it is FORBIDDEN: jed reports a 42804
# datatype mismatch (`cannot cast boolean to i16` / `cannot cast i64 to boolean`), where PG
# reports 42846 (cannot_coerce) — a documented divergence, jed's standing convention for a
# forbidden cast pair (per-core unit tests, not the oracle corpus). boolean is NOT implicitly
# or assignment-castable to/from any integer (PG's contexts are `e` explicit): `INSERT INTO
# int_col VALUES (true)` and `int_col = true` stay 42804.
#
# uuid (scalars.toml) now participates in four EXPLICIT cast pairs (the uuid cast slice — the four
# [[cast]] rows at the end of this file, ../design/types.md §14): text <-> uuid and bytea <-> uuid.
#   text -> uuid : runtime uuid_in (the same PG-flexible parser as the literal cast); 22P02 on a
#                  malformed string. EXPLICIT — matches PostgreSQL exactly (PG's text->uuid is an
#                  explicit I/O cast; there is no pg_cast row, so it is never implicit/assignment).
#   uuid -> text : the canonical lowercase 8-4-4-4-12 spelling (uuid_out). EXPLICIT — STRICTER than
#                  PostgreSQL (which assignment-casts any type to text via I/O), the same strict-matrix
#                  convention as decimal->int (below) and jed's json/jsonb->text casts: jed forbids the
#                  silent (assignment/implicit) coercion, only the explicit CAST/`::` spelling. So
#                  `INSERT INTO text_col VALUES (uuid_expr)` / `text_col = uuid_expr` stay 42804.
#   uuid -> bytea / bytea -> uuid : the 16 raw bytes, both directions. A jed cast PostgreSQL LACKS
#                  (PG `bytea::uuid` / `uuid::bytea` is 42846 cannot_coerce) — a deliberate, documented
#                  divergence: a uuid IS exactly 16 bytes, so the conversion is natural and lossless.
#                  EXPLICIT. bytea -> uuid requires exactly 16 bytes; any other length traps 22P02
#                  (invalid_text_representation, reused for the wrong-width body — there is no PG
#                  precedent to match). Because these two pairs SUCCEED where PG errors, they cannot
#                  live in the PG-clean oracle corpus and are covered by per-core unit tests.
# bytea is otherwise still NEITHER a cast source NOR target except via uuid: text<->bytea and every
# other bytea cast remain deferred (0A000), the bytea cast slice's own follow-on (../design/types.md
# §13).
#
# timestamp / timestamptz / date (scalars.toml) — the CROSS-FAMILY datetime cast matrix LANDED with
# the tz conversion slice (../design/timezones.md §9.3): the six explicit (timestamp, timestamptz,
# date) pairs below. Every pair that crosses the `timestamptz` boundary consults the SESSION zone
# (timestamp<->timestamptz, date->timestamptz, timestamptz->date) — the cast's value transform is
# zone-dependent, so it is hand-written over the tz reader (timezones.md §5), not expressible as a
# plain (from,to) value map here; the entries record the matrix + mode. The zone-free pairs
# (timestamp<->date) are pure calendar arithmetic. All are EXPLICIT (PG makes the lossy/zone ones
# explicit). A single-quoted string still lands in a timestamp/timestamptz/date column by LITERAL
# ADAPTATION (the `TIMESTAMP '…'` / `DATE '…'` keyword literal / resolve-time coercion), NOT a (text,
# T) cast pair — but the RUNTIME text -> date cast has since LANDED as a real (text, date) pair
# (the runtime text→date section below, ../design/date.md §6). STILL DEFERRED: text -> timestamp /
# timestamptz, datetime -> text (a formatting surface — to_char / session-zone rendering), and
# timestamp/timestamptz/date <-> interval (interval is a span, not an instant).
#
# interval (scalars.toml) is likewise STORABLE with NO cast rules here. A single-quoted string
# lands in an interval column by LITERAL ADAPTATION (parsed in an interval context), and the
# `INTERVAL '...'` keyword literal names the type directly — neither is a (text, interval) CAST.
# `CAST(x AS interval)` and casting FROM an interval are DEFERRED to a later cast slice (0A000 /
# 42804), exactly like the deferred text casts (../design/interval.md §6).
#
# STRING-LITERAL coercion is the one (text -> T) cast admitted ahead of the general cast slice,
# and it is NOT a (from, to) pair in this matrix because its source is a string LITERAL, not the
# `text` TYPE. PostgreSQL's `type 'string'` form and `CAST(<string literal> AS T)` coerce the
# literal's string to the NAMED type T at resolve time, for EVERY scalar T — the type's own parse
# (i16/i32/i64, decimal, boolean, text-identity, plus the string-native bytea/uuid/timestamp/
# timestamptz/interval). Folded at resolve: 42704 unknown type, 22P02 malformed, 22003 out of range
# (../design/grammar.md §36, ../design/types.md §5). This does NOT relax the matrix below: a RUNTIME
# text->T cast on a non-literal text expression (`CAST(text_col AS int)`) stays DEFERRED (0A000), and
# a BARE string never silently becomes a number/bool (`int_col = '42'` is 42804). Only the explicit,
# named, literal spelling is admitted. For integer/decimal the coercion follows jed's OWN literal
# grammar (no hex/underscore/scientific/NaN — documented §36 divergences from PG).
#
# ARRAY casts (the array cast follow-ons — ../design/array.md §7) likewise do NOT add (from, to)
# rows here: an array is a STRUCTURAL container type (i32[] exists for every element with no catalog
# object), so the three array casts route through the same out-of-matrix path the array literal uses,
# keeping this matrix scalar-only. (1) runtime text -> T[]: array_in per row. (2) array -> text:
# array_out per row, EXPLICIT-only (stricter than PG's assignment-cast-to-text, the same convention
# as uuid/json -> text below — INSERT INTO text_col VALUES (arr) stays 42804). (3) element-wise
# array -> other-element-array: each element through the SCALAR cast defined HERE (so the admitted
# element pairs are exactly numeric<->numeric, text->numeric/boolean/uuid, boolean<->i32,
# uuid<->text/bytea, bytea->uuid — this file is the source of truth); a forbidden scalar element pair
# is 42804 (PG 42846), a composite-element array cast 0A000. The element cast reuses each scalar pair's
# rule below (typmod-free — an array type takes no modifier), so it inherits their 22003/22P02 traps.
#
# mode:
#   implicit    inserted automatically anywhere a value of `to` is wanted (safe, lossless)
#   assignment  inserted on INSERT/UPDATE into a column of `to` (safe, lossless)
#   explicit    only via an explicit CAST(...) ; may fail at runtime
# on_overflow:
#   trap        raise the named error when the value does not fit `to` (CLAUDE.md §8)

schema_version = 1

# --- widening: lossless, allowed implicitly ----------------------------------
[[cast]]
from = "i16"
to = "i32"
mode = "implicit"

[[cast]]
from = "i16"
to = "i64"
mode = "implicit"

[[cast]]
from = "i32"
to = "i64"
mode = "implicit"

# --- narrowing: lossy, explicit CAST only, traps on overflow ------------------
[[cast]]
from = "i32"
to = "i16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "i64"
to = "i16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "i64"
to = "i32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# --- integer -> decimal: lossless (every integer is an exact decimal), implicit -------
# An integer widens to decimal with scale 0 and no rounding, so it is implicit, like the
# integer widenings above. This is what lets a bare integer literal land in a decimal
# column and an `int_col <op> decimal` pair promote the integer to decimal (compare.toml).
[[cast]]
from = "i16"
to = "decimal"
mode = "implicit"

[[cast]]
from = "i32"
to = "decimal"
mode = "implicit"

[[cast]]
from = "i64"
to = "decimal"
mode = "implicit"

# --- decimal -> integer: lossy, explicit CAST only, traps on overflow -----------------
# A decimal is rounded to scale 0 (HALF AWAY FROM ZERO — the one engine rounding mode,
# ../design/decimal.md §3; so 2.5 -> 3, -2.5 -> -3, matching PG numeric->int), then
# range-checked against the integer type and trapped (22003) if it does not fit. EXPLICIT
# only — STRICTER than PostgreSQL, which assignment-casts numeric->int; jed forbids the
# silent narrowing, consistent with its strict matrix (CLAUDE.md §4, design/types.md).
[[cast]]
from = "decimal"
to = "i16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "decimal"
to = "i32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "decimal"
to = "i64"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# decimal -> decimal is the identity cast (implicit, always succeeds), like every identity
# pair, so it is NOT listed. Re-scaling to a TARGET TYPMOD — `CAST(x AS numeric(p,s))` or
# assignment into a numeric(p,s) column — is not a distinct (from,to) type pair (decimal is
# one type; p/s are parameters): the executor rounds x to scale s half-away and traps 22003
# if the integer-part digits exceed p-s (../design/decimal.md §2). It is the assignment/
# explicit coercion the casts vocabulary reserves, applied within the decimal type.

# --- f64 casts: ALL explicit (every one is lossy or representation-changing) -------
# f64 is a strict family: NO implicit coercion crosses into or out of it (UNLIKE PG, which
# promotes int/decimal -> float8 implicitly). int->float and decimal->float are lossy (i64 >
# 2^53 and most decimals are not exactly representable in binary64), so they are EXPLICIT, not
# implicit like int->decimal. Conversion is to the nearest binary64, round-ties-to-even (the
# IEEE conversion). A finite value whose magnitude overflows binary64 traps 22003 rather than
# yielding ±Infinity (the §3 finite-overflow rule — NaN/∞ are input-only). ../design/float.md §6.
[[cast]]
from = "i16"
to = "f64"
mode = "explicit"

[[cast]]
from = "i32"
to = "f64"
mode = "explicit"

[[cast]]
from = "i64"
to = "f64"
mode = "explicit"

[[cast]]
from = "decimal"
to = "f64"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# f64 -> integer: round HALF AWAY FROM ZERO to an integer (jed's one engine rounding mode —
# ../design/decimal.md §3; a DOCUMENTED divergence from PG, which rounds half-to-even via rint),
# then range-check (22003). NaN / ±Infinity -> 22003 (no integer representation).
[[cast]]
from = "f64"
to = "i16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "f64"
to = "i32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "f64"
to = "i64"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# f64 -> decimal: the exact decimal of the binary64 value, then the target typmod's scale
# coercion (../design/decimal.md §3). NaN / ±Infinity -> 22003 (decimal is always finite).
[[cast]]
from = "f64"
to = "decimal"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# text <-> f64: the `float '...'` typed literal / CAST(<string literal> AS f64) is the
# text-LITERAL -> f64 coercion (the string-literal cast above, ../design/grammar.md §36 — and
# f64's string parse DOES accept e-notation and Infinity/NaN, unlike a bare decimal literal).
# A RUNTIME CAST(text_col AS f64) and CAST(float_expr AS text) stay DEFERRED (0A000), the
# general runtime-text-cast slice — so they are NOT (from,to) pairs here, exactly like decimal.

# --- within the float family: f32 <-> f64 (the tower) -------------------------
# f32 -> f64 is LOSSLESS (every binary32 is an exact binary64), so it is IMPLICIT — the
# float analogue of i16 -> i64, and what lets a mixed-width float pair promote (compare.toml
# `max-rank`). f64 -> f32 is lossy (round-ties-to-even to binary32) and EXPLICIT; a finite
# value beyond the binary32 range traps 22003 (the §3 finite-overflow rule — not ±Inf). NaN/±Inf
# convert across widths unchanged.
[[cast]]
from = "f32"
to = "f64"
mode = "implicit"

[[cast]]
from = "f64"
to = "f32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# --- f32 cross-family casts: ALL explicit (mirror the f64 rows above) ----------
# Same strict rules as f64: int/decimal -> f32 explicit (lossy; nearest binary32,
# round-ties-to-even; finite overflow traps 22003); f32 -> integer explicit (round half-away,
# range-check 22003; NaN/±Inf -> 22003); f32 -> decimal explicit (exact decimal of the
# binary32, then typmod scale; NaN/±Inf -> 22003). text <-> f32 via the `real '...'` typed
# literal only; runtime text casts deferred (0A000) — not (from,to) pairs, like f64.
[[cast]]
from = "i16"
to = "f32"
mode = "explicit"

[[cast]]
from = "i32"
to = "f32"
mode = "explicit"

[[cast]]
from = "i64"
to = "f32"
mode = "explicit"

[[cast]]
from = "decimal"
to = "f32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "f32"
to = "i16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "f32"
to = "i32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "f32"
to = "i64"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "f32"
to = "decimal"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

# --- boolean <-> i32 (int4) ONLY: both directions EXPLICIT (the header block above) ----------
# bool -> i32: true -> 1, false -> 0. Never overflows (1/0 always fit i32). i32 -> bool: 0 ->
# false, any NONZERO (including negative) -> true. Never traps. NULL -> NULL either way. PG ties
# both casts to int4 alone, so there is deliberately no bool<->i16 / bool<->i64 row (those pairs
# are a forbidden 42804 — the header block). Matches PostgreSQL `pg_cast`: bool->int4 `e`,
# int4->bool `e`.
[[cast]]
from = "boolean"
to = "i32"
mode = "explicit"

[[cast]]
from = "i32"
to = "boolean"
mode = "explicit"

# --- cross-family datetime casts (timestamp / timestamptz / date) -----------------------------
# The tz conversion slice (../design/timezones.md §9.3). All EXPLICIT. The pairs that cross the
# `timestamptz` boundary consult the SESSION zone (a hand-written transform over the tz reader —
# timezones.md §5); the timestamp<->date pairs are zone-free calendar arithmetic. None overflow
# (every reachable instant/date fits its i64/i32 domain). NULL -> NULL throughout.
#   timestamptz -> timestamp : render the instant in the session zone (= AT TIME ZONE session)
#   timestamp   -> timestamptz: interpret the wall clock in the session zone (DST gap/overlap as PG)
#   timestamptz -> date       : the date of the session-zone wall clock
#   date        -> timestamptz: midnight in the session zone -> the instant
#   timestamp   -> date       : the date part (zone-free)
#   date        -> timestamp  : midnight (zone-free)
[[cast]]
from = "timestamptz"
to = "timestamp"
mode = "explicit"

[[cast]]
from = "timestamp"
to = "timestamptz"
mode = "explicit"

[[cast]]
from = "timestamptz"
to = "date"
mode = "explicit"

[[cast]]
from = "date"
to = "timestamptz"
mode = "explicit"

[[cast]]
from = "timestamp"
to = "date"
mode = "explicit"

[[cast]]
from = "date"
to = "timestamp"
mode = "explicit"

# --- uuid cast slice: text <-> uuid and bytea <-> uuid (the header block above) --------------
# All EXPLICIT. text -> uuid runs the PG-flexible uuid_in (22P02 on malformed); uuid -> text emits
# the canonical lowercase 8-4-4-4-12 form (uuid_out). uuid <-> bytea are the 16 raw bytes (a jed
# cast PG lacks — a documented divergence; bytea -> uuid traps 22P02 on any length != 16). NULL ->
# NULL throughout; uuid -> uuid is the identity (not listed, like every identity pair).
[[cast]]
from = "text"
to = "uuid"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22P02"

[[cast]]
from = "uuid"
to = "text"
mode = "explicit"

[[cast]]
from = "uuid"
to = "bytea"
mode = "explicit"

[[cast]]
from = "bytea"
to = "uuid"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22P02"

# --- runtime text -> numeric/boolean (the runtime-text-cast slice — ../design/grammar.md §36,
# ../design/types.md §5) ----------------------------------------------------------------------
# CAST(text_expr AS T) / text_expr :: T on a NON-LITERAL text expression (a text column, a
# function result) for the numeric + boolean scalar targets. Each runs the SAME per-type coercion
# the `type 'string'` LITERAL form folds at resolve (parse_int_literal / parse_decimal_literal /
# parse_f*_literal / parse_bool_literal), but per row in the evaluator. All EXPLICIT. A malformed
# string traps 22P02; an out-of-range integer/decimal traps 22003 (the decimal target re-scales to
# its numeric(p,s) typmod first). jed's OWN literal grammar governs — hex / digit-underscore /
# NaN / +-Infinity trap 22P02 where PostgreSQL accepts them (the documented grammar.md §36
# divergences, identical to the literal path; per-core tested). text -> uuid is the row above;
# text -> date is the runtime text→date section below; the remaining string-native targets
# (timestamp/timestamptz/interval/bytea) stay deferred (0A000), each its own follow-on. NULL ->
# NULL throughout. These AGREE with PostgreSQL for jed's accepted grammar and are oracle-checked
# (suites/cast/text_to_scalar.test, postgres:18).
[[cast]]
from = "text"
to = "i16"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "text"
to = "i32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "text"
to = "i64"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "text"
to = "decimal"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "text"
to = "f32"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "text"
to = "f64"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22003"

[[cast]]
from = "text"
to = "boolean"
mode = "explicit"

# --- runtime text -> date (the text→date cast follow-on — ../design/date.md §6) ---------------
# CAST(text_expr AS date) / text_expr :: date on a NON-LITERAL text expression runs the SAME
# parse_date the date literal folds at resolve, per row: strict-ISO grammar (any time/offset
# validated then discarded), 22007 malformed / 22008 out-of-range field or day count. STABLE, not
# immutable — the input grammar admits the clock-relative specials (date.md §6) — so an index
# expression containing it is 42P17 (indexes.md §2), exactly as PostgreSQL's stable date_in is
# unindexable. The strict-ISO accepted grammar AGREES with PostgreSQL and is oracle-checked
# (suites/cast/text_to_date.test, postgres:18); the jed-stricter rejections (DateStyle-dependent
# spellings, `:60` seconds) are per-core tested, identical to the literal path. text -> timestamp
# / timestamptz / interval / bytea stay deferred (0A000), each its own follow-on.
[[cast]]
from = "text"
to = "date"
mode = "explicit"
on_overflow = "trap"
overflow_error = "22008"
