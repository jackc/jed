# Error-code registry — CANONICAL DATA (CLAUDE.md §5, §10).
#
# Errors are structured data, not free text, so `statement error <pattern>` matching
# in the conformance corpus is stable across every implementation.
# Build-time input to per-language codegen; never parsed at runtime.
#
# code      stable SQLSTATE (5-char class+subclass). The machine-legible identity.
# name      stable snake_case symbolic name.
# class     human label for the SQLSTATE class.
# template  message template; {placeholders} are filled by the engine. Message TEXT
#           is informational — matching is on `code`/`name`, never on prose.
#
# Grows per subsystem. The conformance corpus matches on the codes it asserts
# (22003 overflow, 22012 division-by-zero, and the 0A000/42xxx it tests directly);
# others are raised by the engine for failures that surface as a failed
# `statement ok`. Each core cross-checks its SqlState constants against this
# registry (impl/*/tests).

schema_version = 1

# --- cardinality violation (class 21) ---------------------------------------
[[error]]
code = "21000"
name = "cardinality_violation"
class = "cardinality violation"
template = "more than one row returned by a subquery used as an expression"

# --- data exception (class 22) ----------------------------------------------
[[error]]
code = "22003"
name = "numeric_value_out_of_range"
class = "data exception"
template = "value out of range for type {type}"

[[error]]
code = "22007"
name = "invalid_datetime_format"
class = "data exception"
template = "invalid input syntax for type {type}: {detail}"

[[error]]
code = "22008"
name = "datetime_field_overflow"
class = "data exception"
template = "date/time field value out of range: {detail}"

[[error]]
code = "22012"
name = "division_by_zero"
class = "data exception"
template = "division by zero"

[[error]]
code = "2201W"
name = "invalid_row_count_in_limit_clause"
class = "data exception"
template = "LIMIT must not be negative"

[[error]]
code = "2201X"
name = "invalid_row_count_in_offset_clause"
class = "data exception"
template = "OFFSET must not be negative"

[[error]]
code = "22023"
name = "invalid_parameter_value"
class = "data exception"
template = "invalid parameter value: {detail}"

[[error]]
code = "22025"
name = "invalid_escape_sequence"
class = "data exception"
template = "LIKE pattern must not end with escape character"

[[error]]
code = "2202E"
name = "array_subscript_error"
class = "data exception"
template = "{detail}"

[[error]]
code = "22P02"
name = "invalid_text_representation"
class = "data exception"
template = "invalid input syntax for type {type}: {detail}"

# --- integrity constraint violation (class 23) ------------------------------
[[error]]
code = "23502"
name = "not_null_violation"
class = "integrity constraint violation"
template = "null value in column {name} violates not-null constraint"

[[error]]
code = "23505"
name = "unique_violation"
class = "integrity constraint violation"
# {name} is the violated constraint: a unique index's name (which IS the UNIQUE
# constraint's name — spec/design/indexes.md §8), or the derived "<table>_pkey" for the
# primary key (PostgreSQL's auto-name; jed does not persist or reserve it —
# spec/design/constraints.md §5).
template = "duplicate key value violates unique constraint: {name}"

[[error]]
code = "23514"
name = "check_violation"
class = "integrity constraint violation"
template = "new row for relation {table} violates check constraint {name}"

# --- invalid transaction state (class 25) -----------------------------------
# Raised by the transaction-control surface (spec/design/transactions.md §4/§6):
# BEGIN/COMMIT/ROLLBACK, the read-only access mode, and the failed-transaction
# state. A per-core SQL/API surface — the shared corpus asserts these only via
# deterministic BEGIN/…/ROLLBACK visibility tests, never the host-filesystem paths.
[[error]]
code = "25001"
name = "active_sql_transaction"
class = "invalid transaction state"
template = "there is already a transaction in progress"

[[error]]
code = "25006"
name = "read_only_sql_transaction"
class = "invalid transaction state"
template = "cannot execute {statement} in a read-only transaction"

[[error]]
code = "25P02"
name = "in_failed_sql_transaction"
class = "invalid transaction state"
template = "current transaction is aborted, commands ignored until end of transaction block"

# --- dependent objects still exist (class 2B) -------------------------------
# Raised by `DROP TYPE ... RESTRICT` (the default) when a table column or another
# composite type still references the type being dropped (spec/design/composite.md §7).
# PG's exact SQLSTATE for this dependency error; `CASCADE` is not supported this slice
# (0A000), so RESTRICT is the only behavior and this is always the dependents error.
[[error]]
code = "2BP01"
name = "dependent_objects_still_exist"
class = "dependent objects still exist"
template = "cannot drop type {name} because other objects depend on it: {detail}"

# --- syntax error / access rule violation (class 42) ------------------------
[[error]]
code = "42601"
name = "syntax_error"
class = "syntax error or access rule violation"
template = "syntax error: {detail}"

[[error]]
code = "42P01"
name = "undefined_table"
class = "syntax error or access rule violation"
template = "table does not exist: {name}"

[[error]]
code = "42703"
name = "undefined_column"
class = "syntax error or access rule violation"
template = "column does not exist: {name}"

[[error]]
code = "42702"
name = "ambiguous_column"
class = "syntax error or access rule violation"
template = "column reference {name} is ambiguous"

[[error]]
code = "42704"
name = "undefined_object"
class = "syntax error or access rule violation"
template = "{kind} does not exist: {name}"

[[error]]
code = "42P10"
name = "invalid_column_reference"
class = "syntax error or access rule violation"
template = "for SELECT DISTINCT, ORDER BY expressions must appear in select list"

[[error]]
code = "42804"
name = "datatype_mismatch"
class = "syntax error or access rule violation"
template = "datatype mismatch: {detail}"

[[error]]
code = "42701"
name = "duplicate_column"
class = "syntax error or access rule violation"
template = "duplicate column name: {name}"

[[error]]
code = "42712"
name = "duplicate_alias"
class = "syntax error or access rule violation"
template = "table name {name} specified more than once"

[[error]]
code = "42P07"
name = "duplicate_table"
class = "syntax error or access rule violation"
# "relation": index names share the table namespace (spec/design/indexes.md §2), so the
# code covers CREATE TABLE and CREATE INDEX collisions against either kind — PG's word.
template = "relation already exists: {name}"

[[error]]
code = "42P16"
name = "invalid_table_definition"
class = "syntax error or access rule violation"
template = "invalid table definition: {detail}"

[[error]]
code = "42803"
name = "grouping_error"
class = "syntax error or access rule violation"
template = "column {name} must appear in the GROUP BY clause or be used in an aggregate function"

[[error]]
code = "42883"
name = "undefined_function"
class = "syntax error or access rule violation"
template = "function does not exist: {name}"

[[error]]
code = "42P18"
name = "indeterminate_datatype"
class = "syntax error or access rule violation"
template = "could not determine data type of parameter ${index}"

[[error]]
code = "42P02"
name = "undefined_parameter"
class = "syntax error or access rule violation"
template = "there is no parameter ${index}"

[[error]]
code = "42710"
name = "duplicate_object"
class = "syntax error or access rule violation"
# PG's general wording: the per-table CONSTRAINT namespace is shared by CHECK and UNIQUE
# constraints (spec/design/constraints.md §4.3/§5), so the template names both.
template = "constraint {name} for relation {table} already exists"

[[error]]
code = "42809"
name = "wrong_object_type"
class = "syntax error or access rule violation"
# kind is "a table" / "an index": DROP TABLE of an index name, DROP INDEX of a table
# name (spec/design/indexes.md §2).
template = "{name} is not {kind}"

# --- feature not supported (class 0A) ---------------------------------------
[[error]]
code = "0A000"
name = "feature_not_supported"
class = "feature not supported"
template = "feature not supported: {detail}"

# --- program limit exceeded (class 54) --------------------------------------
# A caller-imposed (or engine-fixed) limit was exceeded. The two §13 untrusted-query
# safety gates live here.
#
# 54001 statement_too_complex — a statement's expression / subquery / set-operation
# nesting depth exceeds the engine's fixed maximum (spec/design/cost.md §7). This is the
# native-stack-safety gate: the recursive-descent parser and the resolve/eval walks recurse
# to a statement's nesting depth, so deeply-nested untrusted input (`1+1+…` thousands deep,
# nested parens / ARRAY / subqueries) could overflow the call stack DURING PARSE — before any
# cost is metered, so the 54P01 cost ceiling cannot catch it. The depth bound aborts such input
# deterministically instead. This BORROWS PostgreSQL's condition name + code (PG raises 54001
# `statement_too_complex` from check_stack_depth), but jed's trigger is a fixed nesting depth
# (deterministic, cross-core identical — §8) rather than PG's runtime stack-pointer probe
# (build-/platform-dependent). Asserted by the conformance corpus (the resource.depth_limit
# capability), since the abort point is part of the cross-core contract (no reference impl, §2).
[[error]]
code = "54001"
name = "statement_too_complex"
class = "program limit exceeded"
template = "statement too complex: nesting depth exceeds the maximum of {max}"

# 54P01 cost_limit_exceeded — a caller-imposed cost ceiling was exceeded during execution.
# jed-specific: PostgreSQL has no execution-cost ceiling, so this code (a `P` subclass, like
# 22P02/42P18/25P02) is a documented divergence (CLAUDE.md §1/§13; spec/design/cost.md §6). The
# deterministic cost meter (spec/cost/schedule.toml) accrues a query's cost; when it reaches the
# handle's `max_cost` (spec/design/api.md §8) execution aborts here — the safety gate for
# untrusted, user-supplied queries. Asserted by the conformance corpus (the resource.cost_limit
# capability), since the abort point is part of the cross-core contract (no reference impl, §2).
[[error]]
code = "54P01"
name = "cost_limit_exceeded"
class = "program limit exceeded"
template = "query exceeded the cost limit of {limit} (accrued {cost})"

# --- system error / host filesystem (class 58) ------------------------------
# Raised by the host API's file layer (spec/design/api.md), never by the SQL
# executor: open/create/commit touch the filesystem. Per-impl surface — the
# shared conformance corpus does not assert these (it is in-memory).
[[error]]
code = "58030"
name = "io_error"
class = "system error"
template = "I/O error: {detail}"

[[error]]
code = "58P01"
name = "undefined_file"
class = "system error"
template = "database file does not exist: {path}"

[[error]]
code = "58P02"
name = "duplicate_file"
class = "system error"
template = "database file already exists: {path}"

# --- internal error (class XX) ----------------------------------------------
[[error]]
code = "XX001"
name = "data_corrupted"
class = "internal error"
template = "on-disk database file is malformed: {detail}"
