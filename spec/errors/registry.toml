# Error-code registry — CANONICAL DATA (CLAUDE.md §5, §10).
#
# Errors are structured data, not free text, so `statement error <pattern>` matching
# in the conformance corpus is stable across every implementation.
# Build-time input to per-language codegen; never parsed at runtime.
#
# code      stable SQLSTATE (5-char class+subclass). The machine-legible identity.
# name      stable snake_case symbolic name.
# class     human label for the SQLSTATE class.
# template  message template; {placeholders} are filled by the engine. Message TEXT
#           is informational — matching is on `code`/`name`, never on prose.
#
# Grows per subsystem. The conformance corpus matches on the codes it asserts
# (22003 overflow, 22012 division-by-zero, and the 0A000/42xxx it tests directly);
# others are raised by the engine for failures that surface as a failed
# `statement ok`. Each core cross-checks its SqlState constants against this
# registry (impl/*/tests).

schema_version = 1

# --- cardinality violation (class 21) ---------------------------------------
[[error]]
code = "21000"
name = "cardinality_violation"
class = "cardinality violation"
template = "more than one row returned by a subquery used as an expression"

# --- data exception (class 22) ----------------------------------------------
# The bare class-22 catch-all. PostgreSQL raises it for "argument must be empty or
# one-dimensional array" — array_append/array_prepend on a multidimensional array
# (../design/array-functions.md §3.2). {detail} carries the message.
[[error]]
code = "22000"
name = "data_exception"
class = "data exception"
template = "{detail}"

[[error]]
code = "22003"
name = "numeric_value_out_of_range"
class = "data exception"
template = "value out of range for type {type}"

# array_position's optional start subscript must not be NULL (PostgreSQL "initial position
# must not be null" — ../design/array-functions.md §8). {detail} carries the message.
[[error]]
code = "22004"
name = "null_value_not_allowed"
class = "data exception"
template = "{detail}"

[[error]]
code = "22007"
name = "invalid_datetime_format"
class = "data exception"
template = "invalid input syntax for type {type}: {detail}"

[[error]]
code = "22008"
name = "datetime_field_overflow"
class = "data exception"
template = "date/time field value out of range: {detail}"

[[error]]
code = "22012"
name = "division_by_zero"
class = "data exception"
template = "division by zero"

# The bucket-count argument of ntile() must be > 0 (spec/design/window.md §4). PostgreSQL's code.
[[error]]
code = "22014"
name = "invalid_argument_for_ntile"
class = "data exception"
template = "argument of ntile must be greater than zero"

# The position argument of nth_value() must be > 0 (spec/design/window.md §4). PostgreSQL's code.
[[error]]
code = "22016"
name = "invalid_argument_for_nth_value"
class = "data exception"
template = "argument of nth_value must be greater than zero"

# A window frame PRECEDING/FOLLOWING offset must not be negative (spec/design/window.md §6). PG's code.
[[error]]
code = "22013"
name = "invalid_preceding_or_following_size"
class = "data exception"
template = "frame starting or ending offset must not be negative"

# nextval past a sequence bound without CYCLE (../design/sequences.md §4/§9).
[[error]]
code = "2200H"
name = "sequence_generator_limit_exceeded"
class = "data exception"
template = "nextval: reached {bound} value of sequence {sequence}"

[[error]]
code = "2201W"
name = "invalid_row_count_in_limit_clause"
class = "data exception"
template = "LIMIT must not be negative"

[[error]]
code = "2201X"
name = "invalid_row_count_in_offset_clause"
class = "data exception"
template = "OFFSET must not be negative"

[[error]]
code = "22023"
name = "invalid_parameter_value"
class = "data exception"
template = "invalid parameter value: {detail}"

[[error]]
code = "22025"
name = "invalid_escape_sequence"
class = "data exception"
template = "LIKE pattern must not end with escape character"

# A malformed regular-expression pattern given to `~`/`~*`/`!~`/`!~*` or a regexp_* function
# (../design/regex.md §7): unbalanced parenthesis/bracket, a trailing backslash, an unknown
# alphabetic escape, a quantifier with no operand, or a `{n,m}` with m<n. Borrows PostgreSQL's
# SQLSTATE for the same condition (the 22025/LIKE precedent of reusing a PG code for the analogous
# condition). The {detail} is a DETERMINISTIC, enumerated short phrase — part of the cross-core
# contract (no reference impl, §2), so the detail strings are fixed in regex.md §7, not free text.
# A WELL-FORMED but too-large compiled program is 54001 (statement_too_complex), not this code.
[[error]]
code = "2201B"
name = "invalid_regular_expression"
class = "data exception"
template = "invalid regular expression: {detail}"

[[error]]
code = "2202E"
name = "array_subscript_error"
class = "data exception"
template = "{detail}"

[[error]]
code = "22P02"
name = "invalid_text_representation"
class = "data exception"
template = "invalid input syntax for type {type}: {detail}"

# --- integrity constraint violation (class 23) ------------------------------
[[error]]
code = "23502"
name = "not_null_violation"
class = "integrity constraint violation"
template = "null value in column {name} violates not-null constraint"

[[error]]
code = "23505"
name = "unique_violation"
class = "integrity constraint violation"
# {name} is the violated constraint: a unique index's name (which IS the UNIQUE
# constraint's name — spec/design/indexes.md §8), or the derived "<table>_pkey" for the
# primary key (PostgreSQL's auto-name; jed does not persist or reserve it —
# spec/design/constraints.md §5).
template = "duplicate key value violates unique constraint: {name}"

[[error]]
code = "23514"
name = "check_violation"
class = "integrity constraint violation"
template = "new row for relation {table} violates check constraint {name}"

[[error]]
code = "23503"
name = "foreign_key_violation"
class = "integrity constraint violation"
# Two enforcement directions (spec/design/constraints.md §6). Child side — an INSERT/UPDATE whose
# foreign-key value is absent in the referenced (parent) table: "insert or update on table {table}
# violates foreign key constraint {name}". Parent side — a DELETE/UPDATE of a referenced row still
# referenced by a child: "update or delete on table {table} violates foreign key constraint {name}".
# {table} is the table the write targets; {name} is the foreign-key constraint. (Unlike PostgreSQL,
# jed carries no separate DETAIL line — house style, codes match.)
template = "insert or update on table {table} violates foreign key constraint {name}"

# --- invalid transaction state (class 25) -----------------------------------
# Raised by the transaction-control surface (spec/design/transactions.md §4/§6):
# BEGIN/COMMIT/ROLLBACK, the read-only access mode, and the failed-transaction
# state. A per-core SQL/API surface — the shared corpus asserts these only via
# deterministic BEGIN/…/ROLLBACK visibility tests, never the host-filesystem paths.
[[error]]
code = "25001"
name = "active_sql_transaction"
class = "invalid transaction state"
template = "there is already a transaction in progress"

[[error]]
code = "25006"
name = "read_only_sql_transaction"
class = "invalid transaction state"
template = "cannot execute {statement} in a read-only transaction"

[[error]]
code = "25P02"
name = "in_failed_sql_transaction"
class = "invalid transaction state"
template = "current transaction is aborted, commands ignored until end of transaction block"

# --- dependent objects still exist (class 2B) -------------------------------
# Raised by `DROP TYPE ... RESTRICT` (the default) when a table column or another
# composite type still references the type being dropped (spec/design/composite.md §7).
# PG's exact SQLSTATE for this dependency error; `CASCADE` is not supported this slice
# (0A000), so RESTRICT is the only behavior and this is always the dependents error.
[[error]]
code = "2BP01"
name = "dependent_objects_still_exist"
class = "dependent objects still exist"
template = "cannot drop type {name} because other objects depend on it: {detail}"

# --- syntax error / access rule violation (class 42) ------------------------
[[error]]
code = "42601"
name = "syntax_error"
class = "syntax error or access rule violation"
template = "syntax error: {detail}"

[[error]]
code = "42P01"
name = "undefined_table"
class = "syntax error or access rule violation"
template = "table does not exist: {name}"

[[error]]
code = "42703"
name = "undefined_column"
class = "syntax error or access rule violation"
template = "column does not exist: {name}"

[[error]]
code = "42702"
name = "ambiguous_column"
class = "syntax error or access rule violation"
template = "column reference {name} is ambiguous"

[[error]]
code = "42704"
name = "undefined_object"
class = "syntax error or access rule violation"
template = "{kind} does not exist: {name}"

[[error]]
code = "42P10"
name = "invalid_column_reference"
class = "syntax error or access rule violation"
template = "for SELECT DISTINCT, ORDER BY expressions must appear in select list"

[[error]]
code = "42804"
name = "datatype_mismatch"
class = "syntax error or access rule violation"
template = "datatype mismatch: {detail}"

[[error]]
code = "42830"
name = "invalid_foreign_key"
class = "syntax error or access rule violation"
# At CREATE TABLE (spec/design/constraints.md §6), a FOREIGN KEY whose referenced columns are not the
# parent's PRIMARY KEY or a UNIQUE constraint ("there is no unique constraint matching given keys for
# referenced table {name}"), or whose referencing/referenced column counts disagree ("number of
# referencing and referenced columns for foreign key disagree"). A referencing/referenced *type*
# mismatch is 42804 instead (datatype_mismatch).
template = "there is no unique constraint matching given keys for referenced table {name}"

[[error]]
code = "42701"
name = "duplicate_column"
class = "syntax error or access rule violation"
template = "duplicate column name: {name}"

[[error]]
code = "42712"
name = "duplicate_alias"
class = "syntax error or access rule violation"
template = "table name {name} specified more than once"

[[error]]
code = "42P07"
name = "duplicate_table"
class = "syntax error or access rule violation"
# "relation": index names share the table namespace (spec/design/indexes.md §2), so the
# code covers CREATE TABLE and CREATE INDEX collisions against either kind — PG's word.
template = "relation already exists: {name}"

[[error]]
code = "42P16"
name = "invalid_table_definition"
class = "syntax error or access rule violation"
template = "invalid table definition: {detail}"

[[error]]
code = "42803"
name = "grouping_error"
class = "syntax error or access rule violation"
template = "column {name} must appear in the GROUP BY clause or be used in an aggregate function"

[[error]]
code = "42883"
name = "undefined_function"
class = "syntax error or access rule violation"
template = "function does not exist: {name}"

[[error]]
code = "42P18"
name = "indeterminate_datatype"
class = "syntax error or access rule violation"
template = "could not determine data type of parameter ${index}"

[[error]]
code = "42P19"
name = "invalid_recursion"
class = "syntax error or access rule violation"
# A WITH RECURSIVE common table expression that references itself but is structurally ill-formed
# (spec/design/recursive-cte.md §6): not of the form non-recursive-term UNION [ALL] recursive-term,
# a self-reference in the wrong place (the non-recursive term, more than once, inside a sublink or
# outer join), or an aggregate in the recursive term. Matches PostgreSQL.
template = "{detail}"

[[error]]
code = "42P02"
name = "undefined_parameter"
class = "syntax error or access rule violation"
template = "there is no parameter ${index}"

[[error]]
code = "42P20"
name = "windowing_error"
class = "syntax error or access rule violation"
# A window function (a call carrying an OVER clause — spec/design/window.md §7) used where it
# cannot run: in WHERE / a JOIN ON / GROUP BY / HAVING / a CHECK or DEFAULT / a frame bound (all
# run BEFORE the window stage); nested inside another window function's argument or its
# PARTITION BY / ORDER BY / frame; a window-only function (row_number/rank/…) used WITHOUT OVER;
# or OVER on a scalar/SRF function. The windowing analog of the aggregate's 42803. Matches
# PostgreSQL (code only — the message detail is site-specific).
template = "{detail}"

[[error]]
code = "42P21"
name = "collation_mismatch"
class = "syntax error or access rule violation"
# Two DIFFERENT explicit collations combined in one comparison/operator (spec/design/collation.md
# §1/§7): `'a' COLLATE "C" < 'b' COLLATE "en-US"`. The collation slice's explicit-conflict error,
# resolved by removing one COLLATE. (PG's separate 42P22 indeterminate_collation — conflicting
# IMPLICIT collations — became reachable with per-column collations in slice 1d.)
template = "collation mismatch between explicit collations {left} and {right}"

[[error]]
code = "42P22"
name = "indeterminate_collation"
class = "syntax error or access rule violation"
# Two DIFFERENT IMPLICIT collations meet in one comparison / ORDER BY without an explicit COLLATE to
# break the tie (spec/design/collation.md §1/§7): two columns with different collations — e.g. a
# `text COLLATE "C"` column compared to a `text COLLATE "en-US"` column. PG-matching; reachable since
# slice 1d (per-column collations). Resolved by adding an explicit COLLATE to one side. C counts as a
# distinct implicit collation (so C-vs-en-US conflicts), matching PostgreSQL.
template = "could not determine which collation to use for string comparison"

[[error]]
code = "42710"
name = "duplicate_object"
class = "syntax error or access rule violation"
# PG's general wording: the per-table CONSTRAINT namespace is shared by CHECK and UNIQUE
# constraints (spec/design/constraints.md §4.3/§5), so the template names both.
template = "constraint {name} for relation {table} already exists"

[[error]]
code = "42809"
name = "wrong_object_type"
class = "syntax error or access rule violation"
# kind is "a table" / "an index": DROP TABLE of an index name, DROP INDEX of a table
# name (spec/design/indexes.md §2).
template = "{name} is not {kind}"

# 42622 name_too_long — an identifier (table / column / type / alias / function name) exceeds
# the engine's fixed maximum length of MAX_IDENTIFIER_LENGTH = 63 bytes (spec/design/cost.md §7;
# CLAUDE.md §13). The §13 input-hardening gate for identifiers: checked when the lexer constructs
# an identifier token, so it bounds every identifier on every parse path (and keeps a hostile name
# out of the on-disk catalog / keys). Borrows PG's `42622 name_too_long` code at PG's NAMEDATALEN−1
# boundary, but jed ERRORS where PG silently truncates — jed has no notices and a silent truncation
# could collide two distinct names (a documented PG divergence on the action, CLAUDE.md §1). The
# limit is a fixed constant (deterministic, cross-core identical — §8); identifiers are ASCII-only
# (grammar.md §3), so the byte length is the character count.
[[error]]
code = "42622"
name = "name_too_long"
class = "syntax error or access rule violation"
template = "identifier exceeds the maximum length of {max} bytes"

# 428C9 generated_always — a write supplying an explicit value to a GENERATED ALWAYS identity
# column (spec/design/sequences.md §13). Two messages: an INSERT of a non-DEFAULT value without
# OVERRIDING SYSTEM VALUE — "cannot insert a non-DEFAULT value into column {name}"; an UPDATE
# assigning the column — "column {name} can only be updated to DEFAULT". jed carries no separate
# DETAIL/HINT line (house style — like 23503); the code and core message match PostgreSQL.
[[error]]
code = "428C9"
name = "generated_always"
class = "syntax error or access rule violation"
template = "{detail}"

# 42501 insufficient_privilege — the session's authorization envelope (spec/design/session.md §5.3)
# withheld a privilege a statement needs: a per-table SELECT/INSERT/UPDATE/DELETE on a table it
# reads/writes, a function EXECUTE, or DDL permission (the `allow_ddl` gate). PostgreSQL's own
# permission-denied code, but jed has no in-database role catalog (CLAUDE.md §3) — the *host*
# configures the GRANT/REVOKE-shaped envelope on the session and the engine mechanically enforces
# it at name resolution, after the name resolves to an existing catalog object (a missing object
# stays 42P01). jed-specific surface (the envelope is host-configured, not reachable as SQL roles),
# so it is cross-core-checked by the conformance corpus, not the PostgreSQL oracle.
[[error]]
code = "42501"
name = "insufficient_privilege"
class = "syntax error or access rule violation"
template = "permission denied for {object}"

# --- feature not supported (class 0A) ---------------------------------------
[[error]]
code = "0A000"
name = "feature_not_supported"
class = "feature not supported"
template = "feature not supported: {detail}"

# --- program limit exceeded (class 54) --------------------------------------
# A caller-imposed (or engine-fixed) limit was exceeded. The §13 untrusted-query
# safety gates live here.
#
# 54000 program_limit_exceeded — the input SQL text exceeded the per-handle `max_sql_length`
# byte limit (spec/design/api.md §8, cost.md §7). The §13 input-size gate, the sibling of the
# nesting-depth gate below: both bound the parse BEFORE any cost is metered (the 54P01 cost
# ceiling cannot catch parse-time blowup), and together they bound the parse tree in both
# dimensions — depth (54001) and breadth/total size (54000). Because jed is single-statement
# per call and nothing desugars super-linearly, bounding the input bytes transitively bounds the
# parse-tree node count and the identifier length too. It is a per-handle setting (default 1 MiB,
# `0` ⇒ unlimited) so a trusted caller can raise it; the cap (a byte count) is checked at the
# handle's parse entry, deterministic and cross-core identical (§8). jed-specific (PostgreSQL has
# no fixed query-length limit), asserted by the conformance corpus (resource.sql_length_limit).
[[error]]
code = "54000"
name = "program_limit_exceeded"
class = "program limit exceeded"
template = "SQL statement exceeds the maximum length of {max} bytes"

# 54001 statement_too_complex — a statement's expression / subquery / set-operation
# nesting depth exceeds the engine's fixed maximum (spec/design/cost.md §7). This is the
# native-stack-safety gate: the recursive-descent parser and the resolve/eval walks recurse
# to a statement's nesting depth, so deeply-nested untrusted input (`1+1+…` thousands deep,
# nested parens / ARRAY / subqueries) could overflow the call stack DURING PARSE — before any
# cost is metered, so the 54P01 cost ceiling cannot catch it. The depth bound aborts such input
# deterministically instead. This BORROWS PostgreSQL's condition name + code (PG raises 54001
# `statement_too_complex` from check_stack_depth), but jed's trigger is a fixed nesting depth
# (deterministic, cross-core identical — §8) rather than PG's runtime stack-pointer probe
# (build-/platform-dependent). A SECOND trigger is the composite-type nesting-depth gate
# (spec/design/cost.md §7b): a CREATE TYPE whose result would nest deeper than MAX_COMPOSITE_DEPTH
# (32) raises 54001 too — the same native-stack hazard reached via the catalog graph rather than a
# single statement's AST (a corrupt over-deep file is XX001, not 54001). A THIRD trigger is the
# regex compiled-program size cap (spec/design/cost.md §7c, regex.md §6): a well-formed pattern
# whose compiled NFA program would exceed MAX_REGEX_PROGRAM (32768 instructions, after {n,m} unroll)
# aborts 54001 at compile — the same native-stack/allocation-bound structural-complexity gate reached
# via pattern size (a MALFORMED pattern is 2201B instead). Asserted by the conformance corpus (the
# resource.depth_limit, resource.composite_depth_limit and resource.regex_program_limit capabilities),
# since the abort point is part of the cross-core contract (no reference impl, §2).
[[error]]
code = "54001"
name = "statement_too_complex"
class = "program limit exceeded"
template = "statement too complex: nesting depth exceeds the maximum of {max}"

# 54P01 cost_limit_exceeded — a caller-imposed cost ceiling was exceeded during execution.
# jed-specific: PostgreSQL has no execution-cost ceiling, so this code (a `P` subclass, like
# 22P02/42P18/25P02) is a documented divergence (CLAUDE.md §1/§13; spec/design/cost.md §6). The
# deterministic cost meter (spec/cost/schedule.toml) accrues a query's cost; when it reaches the
# handle's `max_cost` (spec/design/api.md §8) execution aborts here — the safety gate for
# untrusted, user-supplied queries. Asserted by the conformance corpus (the resource.cost_limit
# capability), since the abort point is part of the cross-core contract (no reference impl, §2).
[[error]]
code = "54P01"
name = "cost_limit_exceeded"
class = "program limit exceeded"
template = "query exceeded the cost limit of {limit} (accrued {cost})"

# 54P02 session_cost_limit_exceeded — a per-SESSION cumulative cost budget was exhausted
# (spec/design/session.md §5.4). Sibling to 54P01: where 54P01 bounds ONE statement (`max_cost`),
# 54P02 bounds the whole session (`lifetime_max_cost`) — the session holds a running cumulative cost
# total into which every statement accrues, and the instant that total reaches the budget the
# running statement aborts here. The budget is a hard, monotonic allowance: an aborted statement's
# partial cost still counts (the work happened), and once it is spent every further statement is
# rejected here at admission (it cannot accrue). The cumulative is SESSION state, not snapshot state,
# so it does NOT roll back when a ROLLBACK undoes a statement's effects — the compute was spent
# regardless. jed-specific (PostgreSQL has no execution-cost budget), another documented `P`-subclass
# divergence (CLAUDE.md §1/§13), the multi-tenant/untrusted-host gate atop the per-statement 54P01.
# Asserted by the conformance corpus (the session.lifetime_cost capability) since the abort point is
# part of the cross-core contract (no reference impl, §2).
[[error]]
code = "54P02"
name = "session_cost_limit_exceeded"
class = "program limit exceeded"
template = "session exceeded the lifetime cost limit of {limit} (accrued {cost})"

# 54P03 temp_storage_limit_exceeded — a temporary table's storage exceeded its configured byte
# budget (spec/design/temp-tables.md §7). Temp tables are the engine's first relations whose data is
# RETAINED across statements yet never durable: the cost meter (54P01) bounds work PER STATEMENT and
# the lifetime budget (54P02) bounds CUMULATIVE work, but neither bounds bytes held BETWEEN cheap
# statements, so an adversary could `CREATE TEMP TABLE t(x text); INSERT …; INSERT …;` and accrue
# unbounded RAM at trivial per-statement cost. This is the §13 gate that closes that hole: a
# per-session `temp_buffers` budget (session-local temp storage) and a global `shared_temp_mem` budget
# (shared temp storage); the temp-spill disk ceiling joins them in a later slice. The budget is
# measured in BYTE-IDENTICAL on-disk record bytes (`record_size`, summed over every temp table + index
# store — NOT the per-core `work_mem` spill estimator), checked per-statement, so the abort point is a
# pure function of (operations, budget) — identical across cores (§8), never dependent on the
# allocator. jed-specific (PostgreSQL bounds temp storage only via nondeterministic
# OS OOM / disk-full): a `P`-subclass code in class 54 alongside 54P01/54P02 (the deterministic,
# host-configured ceilings), deliberately NOT PG's class 53 `insufficient_resources` (which denotes
# actual, platform-dependent exhaustion). Asserted by the conformance corpus (resource.temp_budget +
# resource.shared_temp_budget), since the abort point is part of the cross-core contract (no reference
# impl, §2).
[[error]]
code = "54P03"
name = "temp_storage_limit_exceeded"
class = "program limit exceeded"
template = "temporary table storage exceeded the limit of {limit} bytes"

# --- invalid object state (class 55) ----------------------------------------
# currval/lastval before nextval has defined the value in this session
# (../design/sequences.md §6).
[[error]]
code = "55000"
name = "object_not_in_prerequisite_state"
class = "object not in prerequisite state"
template = "{detail}"

