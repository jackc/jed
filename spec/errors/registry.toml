# Raised by the host API's file layer (spec/design/api.md), never by the SQL
# executor: open/create/commit touch the filesystem. Per-impl surface — the
# shared conformance corpus does not assert these (it is in-memory).
[[error]]
code = "58030"
name = "io_error"
class = "system error"
template = "I/O error: {detail}"

[[error]]
code = "58P01"
name = "undefined_file"
class = "system error"
template = "database file does not exist: {path}"

[[error]]
code = "58P02"
name = "duplicate_file"
class = "system error"
template = "database file already exists: {path}"

# --- internal error (class XX) ----------------------------------------------
[[error]]
code = "XX001"
name = "data_corrupted"
class = "internal error"
template = "on-disk database file is malformed: {detail}"

# The graded-open compatibility verdict's "fails closed and discoverably" code (CLAUDE.md §13,
# spec/design/compatibility.md §7, spec/design/collation.md §12/§14 slice 2d). A file references a
# collation by name + (unicode, cldr) version; if no loaded bundle provides that name the open is
# refused, and a WRITE that would maintain a collated structure whose pinned version differs from the
# loaded bundle's is refused (mixing two orderings in one B-tree would corrupt it) — the object stays
# read-only until a migration (REINDEX, deferred) rebuilds + re-pins it. DELIBERATELY DIVERGES from
# PostgreSQL, whose XX002 is `index_corrupted` — jed has no such concept and reserved XX002 for this
# verdict (CLAUDE.md §1, "we own our surface"). Collation-specific for now; a read-required built-in /
# host gap may get a sibling code later (compatibility.md §12, open decision #4).
[[error]]
code = "XX002"
name = "collation_version_mismatch"
class = "internal error"
template = "collation version mismatch: {detail}"
