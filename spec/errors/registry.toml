# Error-code registry — CANONICAL DATA (CLAUDE.md §5, §10).
#
# Errors are structured data, not free text, so `statement error <pattern>` matching
# in the conformance corpus is stable across every implementation.
# Build-time input to per-language codegen; never parsed at runtime.
#
# code      stable SQLSTATE (5-char class+subclass). The machine-legible identity.
# name      stable snake_case symbolic name.
# class     human label for the SQLSTATE class.
# template  message template; {placeholders} are filled by the engine. Message TEXT
#           is informational — matching is on `code`/`name`, never on prose.
#
# Grows per subsystem. The conformance corpus only matches on codes it asserts
# (currently 22003); the others are raised by the engine for failures that surface
# as a failed `statement ok`. Each core cross-checks its SqlState constants against
# this registry (impl/*/tests).

schema_version = 1

# --- data exception (class 22) ----------------------------------------------
[[error]]
code = "22003"
name = "numeric_value_out_of_range"
class = "data exception"
template = "value out of range for type {type}"

# --- syntax error / access rule violation (class 42) ------------------------
[[error]]
code = "42601"
name = "syntax_error"
class = "syntax error or access rule violation"
template = "syntax error: {detail}"

[[error]]
code = "42P01"
name = "undefined_table"
class = "syntax error or access rule violation"
template = "table does not exist: {name}"

[[error]]
code = "42703"
name = "undefined_column"
class = "syntax error or access rule violation"
template = "column does not exist: {name}"

[[error]]
code = "42704"
name = "undefined_object"
class = "syntax error or access rule violation"
template = "{kind} does not exist: {name}"

[[error]]
code = "42804"
name = "datatype_mismatch"
class = "syntax error or access rule violation"
template = "datatype mismatch: {detail}"

[[error]]
code = "42701"
name = "duplicate_column"
class = "syntax error or access rule violation"
template = "duplicate column name: {name}"

[[error]]
code = "42P07"
name = "duplicate_table"
class = "syntax error or access rule violation"
template = "table already exists: {name}"

[[error]]
code = "42P16"
name = "invalid_table_definition"
class = "syntax error or access rule violation"
template = "invalid table definition: {detail}"

# --- feature not supported (class 0A) ---------------------------------------
[[error]]
code = "0A000"
name = "feature_not_supported"
class = "feature not supported"
template = "feature not supported: {detail}"
