# Timestamp parse / render vectors — CANONICAL DATA (CLAUDE.md §8).
#
# The calendar/parse/render arithmetic of spec/design/timestamp.md, pinned as
# (input -> micros), (input -> error), and (micros -> text) vectors. A core's
# timestamp implementation is conformant iff, for every vector below:
#   parse        parse(input, type) == micros        (the int64 µs since 1970-01-01 UTC)
#   parse_error  parse(input, type) traps `error`    (the SQLSTATE, raised at resolve)
#   render       render(micros, type) == text        (the canonical output string)
# Reasoning + the algorithm live in ../design/timestamp.md. micros are computed by the
# Hinnant civil<->days algorithm there (the civil path uses TRUNCATING division; the µs
# decomposition uses FLOOR). Test-time only.
#
#   -infinity sentinel = i64::MIN = -9223372036854775808
#   +infinity sentinel = i64::MAX =  9223372036854775807

schema_version = 1

# --- parse: timestamp (zoneless) ---------------------------------------------
# A wall clock. An offset in the literal is ACCEPTED and IGNORED (not applied) — PG
# behavior. `T` or space separator; date-only defaults to 00:00:00; `24:00:00`
# normalizes to next-day 00:00:00; 7+ fractional digits round half-away to µs.
[[parse]]
type = "timestamp"
cases = [
  { input = "1970-01-01 00:00:00",          micros = 0 },
  { input = "1970-01-01",                    micros = 0 },                  # date-only -> midnight
  { input = "2024-01-01 12:00:00",           micros = 1704110400000000 },
  { input = "2024-01-01T12:00:00",           micros = 1704110400000000 },  # T separator
  { input = "  2024-01-01 12:00:00  ",       micros = 1704110400000000 },  # surrounding ws trimmed
  { input = "2024-01-01 12:00:00.5",         micros = 1704110400500000 },
  { input = "2024-01-01 12:00:00.001",       micros = 1704110400001000 },
  { input = "2024-01-01 12:00:00.123456",    micros = 1704110400123456 },
  { input = "2024-01-01 12:00:00+05",        micros = 1704110400000000 },  # offset IGNORED (zoneless)
  { input = "2024-01-01 12:00:00-08:30",     micros = 1704110400000000 },  # offset IGNORED
  { input = "2024-01-01 12:00:00.1234564",   micros = 1704110400123456 },  # 7 digits, rounds down
  # half-AWAY (jed's one rounding mode) -> 123457. PG rounds half-to-EVEN here (-> 123456): a
  # deliberate, documented divergence on exact ties (../design/timestamp.md §3, oracle-checked).
  { input = "2024-01-01 12:00:00.1234565",   micros = 1704110400123457 },
  { input = "2024-01-01 23:59:59.9999996",   micros = 1704153600000000 },  # rounds + carries to next day
  { input = "2024-01-01 24:00:00",           micros = 1704153600000000 },  # 24:00 -> next-day midnight
  { input = "1969-12-31 23:59:59",           micros = -1000000 },          # pre-epoch (negative)
  { input = "1969-12-31 23:59:59.5",         micros = -500000 },           # negative, floor-decomposed
  { input = "1969-07-20 20:17:00",           micros = -14182980000000 },
  { input = "0001-01-01 00:00:00",           micros = -62135596800000000 },# AD min 4-digit year
  { input = "9999-12-31 23:59:59.999999",    micros = 253402300799999999 },# AD max 4-digit year
  { input = "10000-01-01 00:00:00",          micros = 253402300800000000 },# wide (5-digit) year
  { input = "0001-01-01 00:00:00 BC",        micros = -62167219200000000 },# astro year 0
  { input = "0002-01-01 BC",                 micros = -62198755200000000 },# astro -1, date-only
  { input = "0044-03-15 00:00:00 BC",        micros = -63517824000000000 },# Ides, astro -43
  { input = "infinity",                      micros = 9223372036854775807 },
  { input = "+infinity",                     micros = 9223372036854775807 },# optional leading +
  { input = "INFINITY",                      micros = 9223372036854775807 },# case-insensitive
  { input = "-infinity",                     micros = -9223372036854775808 },
]

# --- parse: timestamptz (UTC instant) ----------------------------------------
# An instant. The offset normalizes the wall clock to UTC as `utc = wallclock - offset`,
# then is discarded; an absent offset means UTC; `Z` = +00.
[[parse]]
type = "timestamptz"
cases = [
  { input = "1970-01-01 00:00:00+00",        micros = 0 },
  { input = "1970-01-01 00:00:00Z",          micros = 0 },                 # Z == +00
  { input = "1970-01-01 00:00:00",           micros = 0 },                 # no offset -> UTC
  { input = "2024-01-01 12:00:00+00",        micros = 1704110400000000 },
  { input = "2024-01-01 12:00:00+05",        micros = 1704092400000000 },  # -5h to UTC
  { input = "2024-01-01 12:00:00-08",        micros = 1704139200000000 },  # +8h to UTC
  { input = "2024-01-01 12:00:00+05:30",     micros = 1704090600000000 },  # -5h30 to UTC
  { input = "0001-01-01 00:00:00+00 BC",     micros = -62167219200000000 },
  { input = "infinity",                      micros = 9223372036854775807 },
  { input = "-infinity",                     micros = -9223372036854775808 },
]

# --- parse_error: 22007 malformed syntax / 22008 field-or-range overflow -----
[[parse_error]]
type = "timestamp"
cases = [
  { input = "2024-13-01",                error = "22008" },  # month 13
  { input = "2024-00-01",                error = "22008" },  # month 0
  { input = "2024-01-32",                error = "22008" },  # day 32
  { input = "2024-02-30",                error = "22008" },  # Feb 30 never exists
  { input = "2023-02-29",                error = "22008" },  # 2023 is not a leap year
  { input = "2024-01-01 25:00:00",       error = "22008" },  # hour 25
  { input = "2024-01-01 12:60:00",       error = "22008" },  # minute 60
  # jed rejects :60 (strict). PG instead accepts :60 and rolls to the next minute — a
  # documented divergence (../design/timestamp.md §3, oracle-checked).
  { input = "2024-01-01 12:00:60",       error = "22008" },  # second 60
  { input = "2024-01-01 24:00:01",       error = "22008" },  # 24:xx other than exactly 24:00:00
  { input = "300000-01-01 00:00:00",     error = "22008" },  # beyond representable int64 µs range
  { input = "",                          error = "22007" },  # empty
  { input = "   ",                       error = "22007" },  # whitespace only
  { input = "not a timestamp",           error = "22007" },  # garbage
  { input = "2024/01/01",                error = "22007" },  # wrong separators
  { input = "now",                       error = "22007" },  # clock-relative special: deferred
  { input = "today",                     error = "22007" },  # deferred
  { input = "epoch",                     error = "22007" },  # deferred alias
  { input = "2024-01-01 12:00:00 XY",    error = "22007" },  # unknown era token
]

[[parse_error]]
type = "timestamptz"
cases = [
  { input = "2024-01-01 12:00:00+99",    error = "22008" },  # offset hours out of range
  { input = "garbage",                   error = "22007" },
  { input = "now",                       error = "22007" },  # deferred
]

# --- render: timestamp -------------------------------------------------------
# YYYY-MM-DD HH:MM:SS, space separator; fractional appended only when nonzero, trailing
# zeros trimmed; >=4-digit zero-padded year, full width beyond 9999; BC suffix for
# astronomical year <= 0 (displayed = 1 - astro). infinity/-infinity are bare.
[[render]]
type = "timestamp"
cases = [
  { micros = 0,                    text = "1970-01-01 00:00:00" },
  { micros = 1704110400000000,     text = "2024-01-01 12:00:00" },
  { micros = 1704110400500000,     text = "2024-01-01 12:00:00.5" },
  { micros = 1704110400001000,     text = "2024-01-01 12:00:00.001" },
  { micros = 1704110400123456,     text = "2024-01-01 12:00:00.123456" },
  { micros = -1000000,             text = "1969-12-31 23:59:59" },
  { micros = -500000,              text = "1969-12-31 23:59:59.5" },
  { micros = -62135596800000000,   text = "0001-01-01 00:00:00" },
  { micros = 253402300799999999,   text = "9999-12-31 23:59:59.999999" },
  { micros = 253402300800000000,   text = "10000-01-01 00:00:00" },
  { micros = -62167219200000000,   text = "0001-01-01 00:00:00 BC" },
  { micros = -62198755200000000,   text = "0002-01-01 00:00:00 BC" },
  { micros = -63517824000000000,   text = "0044-03-15 00:00:00 BC" },
  { micros = 9223372036854775807,  text = "infinity" },
  { micros = -9223372036854775808, text = "-infinity" },
]

# --- render: timestamptz (same, with a fixed +00; infinity stays bare) -------
[[render]]
type = "timestamptz"
cases = [
  { micros = 0,                    text = "1970-01-01 00:00:00+00" },
  { micros = 1704110400000000,     text = "2024-01-01 12:00:00+00" },
  { micros = 1704092400000000,     text = "2024-01-01 07:00:00+00" },
  { micros = 1704110400500000,     text = "2024-01-01 12:00:00.5+00" },
  { micros = -500000,              text = "1969-12-31 23:59:59.5+00" },
  { micros = -62167219200000000,   text = "0001-01-01 00:00:00+00 BC" },
  { micros = 9223372036854775807,  text = "infinity" },
  { micros = -9223372036854775808, text = "-infinity" },
]
