# Cost unit schedule — CANONICAL DATA (CLAUDE.md §5, §13).
#
# Build-time input to per-language codegen (scripts/gen_costs.rb); never parsed at
# runtime. Reasoning lives in ../design/cost.md — read it before editing this file.
#
# The deterministic cost units accrued while EXECUTING a query. The cost of a given
# (query, database state) is fully deterministic and IDENTICAL across every core (a
# CLAUDE.md §8 divergence hotspot) — because there is no reference implementation
# (§2), the cost is part of the shared contract and is asserted in the conformance
# corpus (the `# cost:` directive — conformance.md). Enforcement (a caller-set ceiling
# + a deterministic abort) has LANDED: a handle's `max_cost` aborts a statement with
# `54P01` the instant accrued cost reaches it (spec/design/cost.md §6, api.md §8); this
# table only defines the unit weights the seam accrues. Weights are uniform (all 1) for
# this slice — the point is that the seam reads them from DATA, tunable later with no
# code change.

schema_version = 1

# field doc -------------------------------------------------------------------
# id      stable snake_case unit name; the codegen handle (a named field on the
#         per-language CostSchedule).
# weight  cost accrued each time this unit fires (non-negative integer).
# event   where in the engine the unit fires (informational; maps to a hand-written
#         accrual site in the executor / expression evaluator / storage read — the
#         accrual SITES are hand-written per core, §5 forbids codegenning them; only
#         the WEIGHTS are shared data).
# -----------------------------------------------------------------------------

[[unit]]
id     = "storage_row_read"
weight = 1
event  = "one row read from a table store during a scan"
# The store is a page-backed B-tree (P6.1, ../design/storage.md §6): a scan reads N rows
# from it, so the row read is still a distinct structural unit — it coexists with
# `page_read` below (a row read and a page read are different events). Charged in the
# executor scan loop, not the storage iterator (../design/cost.md §3).

[[unit]]
id     = "page_read"
weight = 1
event  = "one B-tree node (page) touched while scanning a table store"
# Landed P6.3 (../design/cost.md §3 "page_read"). The store is a page-backed B-tree
# (P6.1) whose node boundaries are a §8 byte contract — identical across cores — so the
# node count a scan touches is deterministic and cross-core identical. A full table scan
# walks the whole tree, so it charges `page_read` once per node (interior + leaf); an
# empty table (no root) charges none. ADDED alongside `storage_row_read`, NOT a rename.
# Counted as a LOGICAL page access (the tree's structural node count), NOT a physical disk
# fetch, so a future buffer pool / cache (CLAUDE.md §9) cannot perturb the deterministic
# cost (§13, ../design/cost.md §3). A single-table primary-key predicate now pushes down to
# a BOUNDED scan (`query.point_lookup`): page_read charges only the nodes the key range
# intersects (a point lookup ≈ the tree height), the unbounded range reproducing the full
# scan exactly — so existing costs are unchanged (../design/cost.md §3 "Bounded scan"). The
# same bound also applies per JOIN base table (`query.join_pushdown`) and to a correlated
# subquery's inner re-scan when its PK is compared to an enclosing column
# (`query.correlated_pushdown`, resolved per outer row). The block also counts one per
# OVERFLOW chain page (page_type 4) of every record the bound admits, for every spilled
# column the query statically REFERENCES (the touched set — ../design/cost.md §3): an
# externalized value's chain is read only when the value is, so an untouched column charges
# nothing (../design/large-values.md §8.1/§12/§14); a fully-inline table charges exactly
# the node count as before.

[[unit]]
id     = "value_compress"
weight = 1
event  = "one C-byte slab of raw payload fed through the LZ4 encoder at a statement's write site"
# Landed with large-values Slice B (../design/large-values.md §13, ../design/cost.md §3). An
# over-`RECORD_MAX` record's disposition decision attempts to compress its largest values
# (../fileformat/format.md "Large values"); each ATTEMPT — adopted or not, the CPU is spent either
# way — fires this unit ceil(raw_len / C) times (C = page_size − 16, the same slab the chains use).
# Charged once per stored row version at the INSERT/UPDATE write site, never for the B-tree's
# internal re-encodes. A record that fits inline-plain attempts nothing and charges nothing.

[[unit]]
id     = "value_decompress"
weight = 1
event  = "one C-byte slab of decompressed payload reconstructed by the LZ4 decoder during a scan"
# Landed with large-values Slice B (../design/large-values.md §8.2/§13, ../design/cost.md §3).
# Fires ceil(raw_len / C) times per COMPRESSED stored value (inline- or external-compressed) of
# every record a scan's bound admits — folded into the same up-front block as `page_read` (eager
# materialization; the per-touched-value refinement rides the lazy-read follow-on). Does not
# short-circuit under LIMIT; a bound that misses charges nothing; fully-inline-plain tables are
# unchanged. Proportional to the real decompression work an untrusted query can drive (§13), yet
# computable from the stored raw_len alone — logical and cross-core identical.

[[unit]]
id     = "decimal_work"
weight = 1
event  = "one base-10^4 digit group of decimal arithmetic work beyond an operation's first"
# Landed with the decimal cap lift (../design/decimal.md §2/§6, ../design/cost.md §3
# "decimal_work"). A decimal arithmetic or comparison evaluation fires this unit W - 1 times,
# where W is the operation's work in base-10^4 digit groups (the on-disk digit unit, so the
# count is independent of each core's internal limb base): add/sub/compare/mod scale with the
# larger aligned operand, mul/div with the PRODUCT of their operands' group counts — the
# schoolbook-quadratic work an untrusted query can drive now that values reach PG's format
# caps (131072 integer + 16383 fractional digits, CLAUDE.md §13). Charged BEFORE the
# operation runs, so a cost ceiling aborts ahead of the work. Operands of <= 4 aligned digits
# have W = 1 and charge nothing — small-decimal costs are unchanged.

[[unit]]
id     = "row_produced"
weight = 1
event  = "one row emitted into a query result set"

[[unit]]
id     = "operator_eval"
weight = 1
event  = "one function/operator (interior expression node) evaluation"
# Charged once per INTERIOR expression node (cast/neg/not/arith/compare/and/or/
# is_null/distinct); leaf nodes (column/constant) charge nothing. The DEFAULT base for
# every operator; the per-operator `cost` field in ../functions/catalog.toml (functions.md
# §8) is now LIVE — an operator's evaluation charges its own `cost` if authored, else this
# uniform weight (the arithmetic/comparison/logical arms, via operator_cost). No built-in
# overrides it today, so cost is unchanged; tuning a base is a pure data change.

[[unit]]
id     = "aggregate_accumulate"
weight = 1
event  = "one aggregate accumulator update — one (input row x aggregate) folded into a group"
# Charged once per aggregate per post-WHERE input row folded into its group (or the single
# whole-table group when there is no GROUP BY). The aggregate's ARGUMENT expression is
# evaluated through the normal evaluator (charging its own operator_eval); each emitted
# group row charges row_produced; the bucketing and the finalize step (e.g. AVG's division)
# are UNMETERED, like the ORDER BY sort and the DISTINCT dedup (../design/cost.md §3).

[[unit]]
id     = "cte_scan_row"
weight = 1
event  = "one row read from a MATERIALIZED common-table-expression buffer at a reference site"
# Landed with non-recursive CTEs (../design/cte.md, ../design/cost.md §3 "cte_scan_row"). A CTE
# evaluated under PostgreSQL's hybrid rule is MATERIALIZED when referenced two or more times (or
# marked MATERIALIZED): its body runs ONCE — accruing its own intrinsic cost (page_read /
# storage_row_read / operator_eval / generated_row / row_produced), like any query — into a row
# buffer, and EACH reference then scans that buffer. The buffer is a computed source, not a table
# store (no B-tree, no node count), so a buffer scan charges neither page_read nor storage_row_read;
# instead this unit fires once per buffered row per reference, guarded so a runaway scan still
# aborts 54P01 deterministically. A CTE referenced exactly ONCE (and not MATERIALIZED) is INLINED
# instead — its body runs in place at the FROM position and charges only its intrinsic cost, never
# this unit. An unreferenced CTE is planned but not executed (no cost). DISTINCT from row_produced
# (one per row emitted into the FINAL result): a buffered row a WHERE filters out still charges
# cte_scan_row but not row_produced. Charged at the identical per-row point in every core
# (CLAUDE.md §8/§13).

[[unit]]
id     = "generated_row"
weight = 1
event  = "one row produced by a set-returning function (e.g. generate_series) in the FROM clause"
# Landed with generate_series — the first set-returning function (../design/functions.md §10,
# ../design/cost.md §3 "generated_row"); the polymorphic unnest SRF (../design/array-functions.md §9)
# reuses it unchanged, one charge per array element it emits. An SRF in the FROM clause is a COMPUTED
# row source, not a table store: it touches no page and reads no stored row, so it charges neither
# page_read nor
# storage_row_read. Instead this unit fires once per element the generator emits, charged AT THE
# SOURCE before the row flows into the join/WHERE pipeline — so it meters the GENERATION work an
# untrusted query can drive (a runaway generate_series(1, 10^18)) and a max_cost ceiling aborts
# it (54P01) mid-generation, deterministically, before the whole series materializes (§13). It is
# DISTINCT from row_produced (one per row EMITTED into the final result): a generated row filtered
# out by WHERE, or never reached under a join that produces nothing, still charges generated_row
# but not row_produced — and the two diverge under WHERE/LIMIT. The arguments are evaluated once
# up front (each charging its own operator_eval). Charged at the identical per-row point in every
# core, so the accrued cost and the abort point are cross-core identical (CLAUDE.md §8/§13).

[[unit]]
id     = "sequence_advance"
weight = 1
event  = "one nextval/setval sequence-state mutation (the catalog tuple read + rewrite)"
# Landed with sequences (../design/sequences.md §8, ../design/cost.md). Charged once per nextval (and,
# from S2, setval) evaluation IN ADDITION to the one operator_eval every function call already rides —
# the advance touches and rewrites a catalog tuple, more than a pure value→value map. currval reads
# only per-session state and charges nothing beyond its operator_eval. The catalog-tuple I/O is
# schema-bounded (a fixed SequenceDef), so a flat per-call weight is a sound bound; it keeps a runaway
# nextval (e.g. a generate_series-driven sweep of SELECT nextval('s')) bounded by max_cost — the 54P01
# ceiling aborts deterministically — and keeps cost cross-core identical (CLAUDE.md §8/§13). Charged at
# the identical point (the nextval kernel) in every core.

[[unit]]
id     = "gin_entry"
weight = 1
event  = "one GIN posting-list entry visited during a GIN-bounded scan's term gather"
# Landed with GIN inverted indexes (../design/gin.md §6, ../design/cost.md §3 "GIN-bounded scan").
# A `col @> const` / `col && const` scan over a GIN-indexed array column reads each query term's
# posting list (a prefix range of the entry B-tree) and combines them by intersection (@>) / union
# (&&); this unit fires once per posting entry visited across all those term scans. It bounds the
# per-entry gather work that `page_read` (a per-NODE count) under-meters when a term's posting list
# is long — so a many-term or high-posting predicate an untrusted query can drive stays cost-
# proportional and a max_cost ceiling aborts it (54P01). Distinct from `storage_row_read` (charged
# only per CANDIDATE row actually fetched after the combine) and from `page_read` (the index/table
# tree NODE count). Charged at the identical per-entry point in every core (CLAUDE.md §8/§13).

[[unit]]
id     = "gist_descent"
weight = 1
event  = "one GiST interior node visited during a consistent-descent of a GiST-bounded scan"
# Landed with GiST indexes (../design/gist.md §9, ../design/cost.md §3 "GiST-bounded scan").
# A `col && const` / `col @> const` scan over a GiST-indexed range column descends the index's
# resident R-tree, visiting only the children whose bounding key is `consistent` with the query
# (../design/gist.md §5); this unit fires once per INTERIOR node so visited, BESIDE the `page_read`
# charged per node touched (interior + leaf). It meters the per-node descent work `page_read`
# (a per-node count) leaves implicit — so a low-selectivity predicate an untrusted query can drive
# stays cost-proportional and a max_cost ceiling aborts it (54P01). The descent visits a tree that
# is a pure function of the indexed row SET (the resident tree is rebuilt canonically from the leaf
# set — content-deterministic, ../design/gist.md §3), so the node count, the gist_descent charge,
# and the abort point are cross-core identical (CLAUDE.md §8/§13). DISTINCT from `storage_row_read`
# (charged only per CANDIDATE row fetched after the descent) and from the residual `operator_eval`
# (the always-recheck of `&&`/`@>` on each candidate, ../design/gist.md §5). Charged at the
# identical per-interior-node point in every core.

[[unit]]
id     = "collate"
weight = 1
event  = "one code point processed while building a collation sort key for a collated comparison"
# Landed with the COLLATE expression operator (../design/collation.md §11, ../design/cost.md §3
# "collate"; collation slice 1c). A non-`C` collation orders text by its UCA sort key rather than
# raw bytes; building that key is per-code-point work the byte comparator does not do. This unit
# fires once per code point of EACH text operand of a collated ORDERING comparison (`< <= > >=`)
# at the point the comparison is evaluated — so a collated `WHERE`/`SELECT` comparison over long
# strings or many rows stays cost-proportional and a max_cost ceiling aborts it (54P01). It is
# charged ONLY for the ordering comparisons that actually invoke the collation: `=`/`<>` under a
# deterministic collation are byte-equality (../design/collation.md §7) and charge nothing beyond
# their operator_eval; a `C`/default comparison charges nothing here. The ORDER BY sort itself is
# UNMETERED like every sort (../design/cost.md §3, ../design/spill.md §6) — its input cardinality
# is bounded by the upstream storage_row_read / row_produced — so the collate unit lives at the
# expression-evaluation site, the one deterministic metering point (collation.md §11). Charged at
# the identical per-code-point point in every core, so cost stays cross-core identical (§8/§13).

[[unit]]
id     = "timezone"
weight = 1
event  = "one AT TIME ZONE conversion (an RFC 8536 reader lookup)"
# Landed with the AT TIME ZONE operator (../design/timezones.md §10, spec/tz/README.md §8). A
# conversion looks the instant up in a loaded zone's TZif transition table (a bounded binary search
# plus a bounded POSIX-footer evaluation) — bounded work the bare comparison does not do. Fires once
# per conversion at the operator's evaluation site (the deterministic, cross-core-identical metering
# point — like `collate`), so an AT TIME ZONE over many rows stays cost-proportional and a max_cost
# ceiling aborts it (54P01). A built-in `UTC`/fixed-offset conversion still charges the unit (one
# lookup's worth) so cost does not depend on whether a bundle is loaded. Charged at the identical
# point in every core, so cost stays cross-core identical (§8/§13).

[[unit]]
id     = "regex_compile"
weight = 1
event  = "one NFA instruction emitted while compiling a regular-expression pattern"
# Landed with regular expressions (../design/regex.md §3/§6, ../design/cost.md §3 "regex compile/step").
# A regex pattern compiles to a flat NFA bytecode program (Pike VM); this unit fires once per
# instruction EMITTED, so the charge equals the program's instruction count |program|. It bounds the
# compile work an untrusted query can drive — chiefly bounded-repetition unroll (`(a{1000}){1000}`
# expands the program quadratically, regex.md §3.3) — so a max_cost ceiling aborts a pathological
# pattern (54P01) before the program materializes; a VALID but too-large program is additionally
# capped structurally at MAX_REGEX_PROGRAM (54001), the gate that protects an UNLIMITED handle
# (regex.md §6). A CONSTANT pattern (`col ~ 'literal'`) compiles ONCE — charged |program| units at
# statement-execution start, never per row (the precompilation contract, regex.md §5); a non-constant
# pattern charges |program| each time it is compiled (per row), genuine repeated work. Charged BEFORE
# the program is used and immediately guarded (the `decimal_work` discipline). Every core compiles the
# identical program (../regex/program_vectors.toml), so the count is cross-core identical (§8/§13).

[[unit]]
id     = "regex_step"
weight = 1
event  = "one Pike-VM thread-step taken while matching a regular expression"
# Landed with regular expressions (../design/regex.md §4/§6, ../design/cost.md §3 "regex compile/step").
# The Pike VM simulates all NFA threads in lockstep over the input, one code point at a time; this unit
# fires once per instruction DISPATCHED — both in the main consume loop and in the epsilon-closure
# (add_thread) — with the per-position dedup-by-pc bounding the work to <= |program| threads per input
# position, so total regex_step <= |program| * (|input| + 1): LINEAR in the input, no backtracking
# (the RE2 guarantee, regex.md §4). It meters the match work an untrusted query can drive (a long
# subject * a large pattern) and a max_cost ceiling aborts it (54P01); guarded once per input position
# so the abort point is deterministic. DISTINCT from operator_eval (the `~`/`~*` node charges ONE
# operator_eval for the whole match, like LIKE) — regex_step is the per-thread-step work LIKE's matcher
# leaves unmetered (../design/cost.md §3 "regex compile/step"; LIKE is linear in input alone, regex in
# program * input). Charged at the identical per-step point in every core (../regex/match_vectors.toml),
# so the accrued cost and the abort point are cross-core identical (§8/§13).

[[unit]]
id     = "window_result"
weight = 1
event  = "one (input row x window function) result computed in the window stage"
# Landed with window functions (../design/window.md §8, ../design/cost.md §3). The window-stage
# analog of aggregate_accumulate: fires once per (input row x window function) whose value is
# materialized into the synthetic row. The partition bucketing and per-partition sort are
# UNMETERED (like the ORDER BY sort and the DISTINCT dedup — their input cardinality is already
# bounded by the upstream storage_row_read / row_produced). So a row_number()-only query over N
# rows accrues N storage_row_read + N window_result + N row_produced (+ page_read). Charged at the
# identical per-(row x function) point in every core, so cost is cross-core identical (§8/§13).

[[unit]]
id     = "varlen_compare"
weight = 1
event  = "one code point (text) or byte (bytea) of variable-length value comparison work beyond the first"
# Landed with per-operator cost weights (../design/cost.md §3 "varlen_compare"). A comparison
# (`= <> < <= > >=`) over two non-NULL TEXT or two non-NULL BYTEA operands scans up to the SHORTER
# operand's length — code points for text (the cross-core count, NOT UTF-16 units, CLAUDE.md §8),
# bytes for bytea — so it fires W - 1 times where W = max(1, min(len_lhs, len_rhs)). A byte/code-point
# comparison stops at the first differing position or the end of the shorter operand, so `min` is a
# true upper bound on the work AND keeps `WHERE body = $1` against one large-text row cheap (a length
# mismatch is O(1)). It is the text/bytea analog of `decimal_work`, metering the per-comparison length
# work a join / correlated re-scan can amplify by fan-out (the flat operator_eval charges 1 regardless
# of length, so a self-join comparing long strings does length×N² work charging only N²). It
# COMPLEMENTS `collate`, which already meters non-`C` collation ORDERING — so this unit covers `=`/`<>`
# (byte-equality under any collation), `C`/default-collation ordering, and ALL bytea comparison.
# Charged BEFORE the comparison runs and immediately guarded (the `decimal_work` discipline), so a
# max_cost ceiling aborts ahead of the work (54P01). Operands of <= 1 unit (empty / one char / one
# byte) have W = 1 and charge nothing; NULL or non-varlen pairs charge nothing. Charged at the
# identical point in every core, so cost stays cross-core identical (§8/§13).

[[unit]]
id     = "window_frame_step"
weight = 1
event  = "one frame row folded into a frame-sensitive window function's accumulator"
# Landed with window functions (../design/window.md §8). A frame-sensitive window function
# (an aggregate-over-OVER, first_value/last_value/nth_value — S3+) folds over its per-row frame;
# this unit fires once per frame row folded, bounding the per-frame work a naive O(partition^2)
# frame scan can drive so a max_cost ceiling aborts an untrusted running-window query
# deterministically (54P01, §13). The S5 sliding-window optimization only LOWERS this count; it
# never changes correctness or the result. Charged at the identical per-frame-row point in every
# core (§8/§13). Defined now; fires only once frame-sensitive functions land (S3) — row_number
# (S0) is frame-insensitive and never charges it.
