# Conformance manifest — CANONICAL DATA (CLAUDE.md §5, §7).
#
# The conformance taxonomy has THREE independent axes (see ../design/conformance.md):
#   1. suites/      — the directory tree; ORGANIZES tests by feature area.
#   2. capabilities — fine-grained features an implementation declares it supports.
#                     Each .test file declares the capabilities it needs via an
#                     in-band `# requires:` header line; a test runs for an impl iff
#                     the impl supports every capability the test requires.
#   3. profiles     — named, cumulative bundles of capabilities = the conformance
#                     LEVELS an implementation targets ("does impl X meet `core`?").
#
# This file defines axes 2 and 3 (axis 1 is the filesystem). TEST-TIME ONLY — the
# harness reads it; no shipped engine does. Validated by `rake verify`.

schema_version = 1

# --- capabilities ------------------------------------------------------------
# One feature an implementation may support, named with a dotted id. Add a
# capability only when some .test file actually requires it (the checker rejects
# orphans). Implementations declare the set they support; tests declare the set
# they require.

[[capability]]
id = "ddl.create_table"
description = "CREATE TABLE with typed columns"

[[capability]]
id = "ddl.primary_key"
description = "PRIMARY KEY column constraint (enables point lookup by key)"

[[capability]]
id = "ddl.drop_table"
description = "DROP TABLE — remove a table (definition + rows) from the catalog; missing table is 42P01 (grammar.md §13)"

[[capability]]
id = "ddl.not_null"
description = "NOT NULL column constraint — storing NULL (direct, defaulted, or omitted) traps 23502 (spec/design/constraints.md §1)"

[[capability]]
id = "dml.insert"
description = "INSERT ... VALUES"

[[capability]]
id = "dml.insert_multi_row"
description = "Multi-row INSERT ... VALUES (..),(..) — two-phase / all-or-nothing (grammar.md §12)"

[[capability]]
id = "dml.update"
description = "UPDATE ... SET ... [WHERE] (in-place value replacement)"

[[capability]]
id = "dml.delete"
description = "DELETE FROM ... [WHERE]"

[[capability]]
id = "query.select"
description = "SELECT of columns from a single table"

[[capability]]
id = "query.where_eq"
description = "WHERE with an equality predicate ( = )"

[[capability]]
id = "query.comparison_order"
description = "WHERE with an ordering predicate ( < , > , <= , >= )"

[[capability]]
id = "query.is_null"
description = "IS NULL / IS NOT NULL predicates"

[[capability]]
id = "query.is_distinct_from"
description = "IS [NOT] DISTINCT FROM (NULL-safe equality) predicates"

[[capability]]
id = "query.order_by"
description = "ORDER BY for deterministic multi-row output"

[[capability]]
id = "query.order_by_keys"
description = "ORDER BY with multiple keys, per-key ASC/DESC, and per-key NULLS FIRST|LAST"

[[capability]]
id = "query.select_star"
description = "SELECT * expands to all columns with their canonical names"

[[capability]]
id = "query.column_alias"
description = "Select-list output naming: bare column → canonical name, expr AS alias → alias, other expr → ?column?"

[[capability]]
id = "query.limit"
description = "LIMIT clause: cap the number of returned rows (non-negative integer literal)"

[[capability]]
id = "query.offset"
description = "OFFSET clause: skip leading rows of the result (non-negative integer literal)"

[[capability]]
id = "query.distinct"
description = "SELECT DISTINCT: deduplicate projected output rows (NULL-safe), with the PostgreSQL ORDER-BY-in-select-list restriction"

[[capability]]
id = "query.join_inner"
description = "INNER JOIN ... ON <expr> — combine rows from two tables on a boolean predicate (left-deep nested loop, 3-valued ON). A bare JOIN is INNER; an INNER JOIN with no ON is 42601 (spec/design/grammar.md §15)"

[[capability]]
id = "query.cross_join"
description = "CROSS JOIN — the Cartesian product of two tables (no ON)"

[[capability]]
id = "query.join_left"
description = "LEFT [OUTER] JOIN ... ON <expr> — every left row preserved; an unmatched left row is emitted once with the right side NULL-extended (3-valued ON; a NULL join key never matches → NULL-extends). spec/design/grammar.md §15"

[[capability]]
id = "query.join_right"
description = "RIGHT [OUTER] JOIN ... ON <expr> — every right row preserved; an unmatched right row is emitted with the left side NULL-extended. spec/design/grammar.md §15"

[[capability]]
id = "query.join_full"
description = "FULL [OUTER] JOIN ... ON <expr> — every row from both sides preserved; unmatched rows on either side are NULL-extended on the absent side. spec/design/grammar.md §15"

[[capability]]
id = "query.table_alias"
description = "Table aliases in FROM — `t AS a` / `t a`; the alias (else the table name) is the relation label, distinct per query (a self-join needs aliases; duplicate label is 42712)"

[[capability]]
id = "query.qualified_column"
description = "Qualified column references `rel.col` — resolved against the named relation; a bare column ambiguous across relations is 42702, unknown relation is 42P01 (spec/design/grammar.md §15)"

[[capability]]
id = "types.int16"
description = "int16 / smallint scalar type"

[[capability]]
id = "types.int32"
description = "int32 / int / integer scalar type"

[[capability]]
id = "types.int64"
description = "int64 / bigint scalar type"

[[capability]]
id = "types.text"
description = "text scalar type (variable-width UTF-8, collation C): storage, literals, and comparison/ordering. Non-key column only this slice — a text PRIMARY KEY is rejected 0A000 (spec/design/types.md §11)"

[[capability]]
id = "types.boolean_storable"
description = "storable boolean column: CREATE/INSERT/SELECT of false/true/NULL, boolean×boolean comparison and ORDER BY (false < true). Non-key column only — a boolean PRIMARY KEY is rejected 0A000; boolean⇄integer casts are deferred (spec/design/types.md §9)"

[[capability]]
id = "types.decimal"
description = "decimal / numeric scalar type (exact base-10): the first parameterized type (numeric(p,s)), storage, literals, comparison/ordering, casts (int<->decimal). Non-key column this slice — a decimal PRIMARY KEY is rejected 0A000 (spec/design/decimal.md)"

[[capability]]
id = "expr.decimal_arithmetic"
description = "Decimal arithmetic operators + - * / % and unary - with PostgreSQL result-scale rules and half-away-from-zero rounding (spec/design/decimal.md §4)"

[[capability]]
id = "types.bytea"
description = "bytea scalar type (variable-width raw bytes): storage, hex-input literals, and unsigned-byte comparison/ordering. Non-key column only this slice — a bytea PRIMARY KEY is rejected 0A000 (spec/design/types.md §13)"

[[capability]]
id = "null.three_valued"
description = "Three-valued NULL logic in comparisons (CLAUDE.md §4)"

[[capability]]
id = "error.overflow_trap"
description = "Integer overflow traps with SQLSTATE 22003 (CLAUDE.md §8)"

[[capability]]
id = "cast.explicit"
description = "Explicit CAST(x AS type), including narrowing that may trap"

[[capability]]
id = "compare.promotion"
description = "Cross-type integer comparison via the promotion tower (int16<int32<int64)"

[[capability]]
id = "types.boolean"
description = "boolean / bool scalar type (TRUE/FALSE literals, projected boolean values; expression-only)"

[[capability]]
id = "expr.arithmetic"
description = "Integer arithmetic operators + - * / % with trap-on-overflow (22003)"

[[capability]]
id = "expr.unary_minus"
description = "Unary minus (negation) as an expression operator"

[[capability]]
id = "expr.parens"
description = "Parenthesized sub-expressions"

[[capability]]
id = "expr.precedence"
description = "Operator precedence across logical / comparison / arithmetic levels"

[[capability]]
id = "expr.comparison_value"
description = "Comparisons produce boolean values usable in the SELECT list and nested expressions"

[[capability]]
id = "query.logical_connectives"
description = "AND / OR / NOT with three-valued (Kleene) truth tables"

[[capability]]
id = "error.division_by_zero"
description = "Integer division / modulo by zero is defined and traps SQLSTATE 22012"

# Resource accounting (CLAUDE.md §13) — orthogonal to the SQL feature levels, so it is
# not bundled into a profile. A core declares it once its harness can assert the
# deterministic, cross-core-identical query cost (the `# cost:` directive).
[[capability]]
id = "resource.cost_metering"
description = "Deterministic, cross-core-identical query cost accounting (CLAUDE.md §13)"

# --- profiles ----------------------------------------------------------------
# A named bundle of capabilities = a conformance level. `includes` (optional)
# inherits another profile's capabilities transitively, so profiles are cumulative.
# An implementation "meets" a profile iff its declared capability set is a superset
# of the profile's (transitive) capabilities.

[[profile]]
id = "core"
title = "The \"it's alive\" milestone — integer DDL/DML/SELECT (CLAUDE.md §11 step 5)"
capabilities = [
  "ddl.create_table",
  "ddl.primary_key",
  "dml.insert",
  "query.select",
  "query.where_eq",
  "query.is_null",
  "query.order_by",
  "types.int16",
  "types.int32",
  "types.int64",
  "null.three_valued",
  "error.overflow_trap",
]

[[profile]]
id = "mutation"
title = "core + row mutation (UPDATE / DELETE)"
includes = "core"
capabilities = ["dml.update", "dml.delete"]

[[profile]]
id = "casts"
title = "core + explicit CAST narrowing (spec/types/casts.toml)"
includes = "core"
capabilities = ["cast.explicit"]

[[profile]]
id = "comparison"
title = "core + cross-type comparison via the promotion tower (spec/types/compare.toml)"
includes = "core"
capabilities = ["query.comparison_order", "compare.promotion"]

[[profile]]
id = "expression"
title = "comparison + the general expression substrate (arithmetic, boolean, logical connectives)"
includes = "comparison"
capabilities = [
  "types.boolean",
  "expr.arithmetic",
  "expr.unary_minus",
  "expr.parens",
  "expr.precedence",
  "expr.comparison_value",
  "query.logical_connectives",
  "query.is_distinct_from",
  "error.division_by_zero",
]

[[profile]]
id = "decimal"
title = "expression + the exact decimal / numeric type (numeric(p,s), comparison, casts, arithmetic)"
includes = "expression"
capabilities = ["types.decimal", "expr.decimal_arithmetic"]

[[profile]]
id = "joins"
title = "decimal + multi-table FROM with INNER/CROSS JOIN, table aliases, and qualified columns (Phase 4)"
includes = "decimal"
capabilities = [
  "query.join_inner",
  "query.cross_join",
  "query.table_alias",
  "query.qualified_column",
]

[[profile]]
id = "outer_joins"
title = "joins + LEFT/RIGHT/FULL [OUTER] JOIN — unmatched rows NULL-extended on the absent side (Phase 4)"
includes = "joins"
capabilities = [
  "query.join_left",
  "query.join_right",
  "query.join_full",
]

[[profile]]
id = "constraints"
title = "outer_joins + the NOT NULL / DEFAULT column constraints (spec/design/constraints.md)"
includes = "outer_joins"
capabilities = [
  "ddl.not_null",
]
