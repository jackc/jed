description = "Select-list output naming: bare column → canonical name, expr AS alias → alias, other expr → ?column?"

[[capability]]
id = "query.limit"
description = "LIMIT clause: cap the number of returned rows (non-negative integer literal)"

[[capability]]
id = "query.offset"
description = "OFFSET clause: skip leading rows of the result (non-negative integer literal)"

[[capability]]
id = "query.distinct"
description = "SELECT DISTINCT: deduplicate projected output rows (NULL-safe), with the PostgreSQL ORDER-BY-in-select-list restriction"

[[capability]]
id = "query.select_no_from"
description = "FROM-less SELECT — the select list evaluates over ONE virtual zero-column row with no table access (PostgreSQL semantics, spec/design/grammar.md §34): WHERE/LIMIT/OFFSET/DISTINCT/HAVING/aggregates compose (SELECT 1 WHERE false → zero rows; SELECT count(*) → 1 via the single-group rule), and it is a full citizen of set operations, subqueries (a correlated zero-relation scope resolves purely outward), and INSERT ... SELECT. SELECT * with no FROM is 42601 (PG's exact message), a bare column the ordinary 42703. Cost charges no scan units — just the items' metered evaluation plus row_produced (spec/design/cost.md §3)"

[[capability]]
id = "query.set_returning"
description = "Set-returning functions in the FROM clause — generate_series(start, stop[, step]) over the integer family, the engine's first SRF, a COMPUTED row source rather than a scanned table (spec/design/functions.md §10, grammar.md §35). The produced relation has one column named generate_series, typed at the promoted integer type of the args; it joins/cross-joins with other FROM relations and composes with WHERE/ORDER BY/LIMIT/subqueries. PostgreSQL semantics: any NULL arg → zero rows; start > stop with a positive step → zero rows; a step of zero → 22023; an i64 overflow while stepping stops the series cleanly. Non-LATERAL (args see $N/outer, not sibling FROM tables); the SELECT-list SRF position, LATERAL, and the column-alias-list form (AS g(n)) are deferred narrowings (0A000). Each generated element charges one generated_row (spec/design/cost.md §3), so a max_cost ceiling bounds a runaway series (54P01)"

[[capability]]
id = "query.join_inner"
description = "INNER JOIN ... ON <expr> — combine rows from two tables on a boolean predicate (left-deep nested loop, 3-valued ON). A bare JOIN is INNER; an INNER JOIN with no ON is 42601 (spec/design/grammar.md §15)"

[[capability]]
id = "query.cross_join"
description = "CROSS JOIN — the Cartesian product of two tables (no ON)"

[[capability]]
id = "query.join_left"
description = "LEFT [OUTER] JOIN ... ON <expr> — every left row preserved; an unmatched left row is emitted once with the right side NULL-extended (3-valued ON; a NULL join key never matches → NULL-extends). spec/design/grammar.md §15"

[[capability]]
id = "query.join_right"
description = "RIGHT [OUTER] JOIN ... ON <expr> — every right row preserved; an unmatched right row is emitted with the left side NULL-extended. spec/design/grammar.md §15"

[[capability]]
id = "query.join_full"
description = "FULL [OUTER] JOIN ... ON <expr> — every row from both sides preserved; unmatched rows on either side are NULL-extended on the absent side. spec/design/grammar.md §15"

[[capability]]
id = "query.table_alias"
description = "Table aliases in FROM — `t AS a` / `t a`; the alias (else the table name) is the relation label, distinct per query (a self-join needs aliases; duplicate label is 42712)"

[[capability]]
id = "query.qualified_column"
description = "Qualified column references `rel.col` — resolved against the named relation; a bare column ambiguous across relations is 42702, unknown relation is 42P01 (spec/design/grammar.md §15)"

[[capability]]
id = "query.aggregates"
description = "Scalar aggregate functions COUNT/SUM/MIN/MAX/AVG over the whole table (no GROUP BY): single-row result; COUNT(*) counts rows, COUNT(expr)/SUM/AVG/MIN/MAX skip NULL; COUNT->0 and SUM/AVG/MIN/MAX->NULL over empty/all-NULL; PG widening (SUM i16/i32->i64, i64->decimal, decimal->decimal; AVG->decimal; MIN/MAX->input type); overflow 22003; aggregate in WHERE/nested is 42803; unknown function 42883; DISTINCT-in-aggregate 42601 (spec/design/aggregates.md)"

[[capability]]
id = "query.group_by"
description = "GROUP BY <column,...>: one result row per distinct grouping-key combination; NULL is its own group; decimal keys bucket value-canonically; first-occurrence group order (ORDER BY over a grouping column overrides); a non-aggregated SELECT/ORDER BY column not in GROUP BY is 42803; GROUP BY over an empty table yields zero rows (spec/design/aggregates.md §5-6, grammar.md §18)"

[[capability]]
id = "query.having"
description = "HAVING <predicate>: boolean filter over grouped rows, after aggregation and before ORDER BY; may reference aggregates (even ones not projected) and grouping keys; a non-grouped column is 42803, non-boolean is 42804; HAVING alone makes a query an aggregate query; HAVING with no GROUP BY filters the single whole-table group (spec/design/aggregates.md §8, grammar.md §19)"

[[capability]]
id = "query.window"
description = "Window functions — a SELECT-list call carrying OVER ([PARTITION BY cols] [ORDER BY ...]): a blocking window stage after GROUP BY/HAVING and before ORDER BY/LIMIT/DISTINCT (spec/design/window.md). S0: row_number() only (the 1-based sequence position within a partition); partitions bucket value-canonically (NULL its own partition); the within-partition order is the window ORDER BY then the primary key (always fully resolved — divergence D1 from PG's unspecified order). A window-only function without OVER is 42809 (PG's wrong_object_type); a window function in WHERE/JOIN ON/GROUP BY/HAVING/nested in another window is 42P20; a window function combined with aggregates/GROUP BY is 0A000 (S0 narrowing, lifted in S3); a collated window ORDER BY is 0A000; named windows (OVER name / WINDOW clause) are 0A000. Cost: window_result per (row x window function), the partition+sort unmetered"

[[capability]]
id = "query.window_ranking"
description = "Window ranking functions (spec/design/window.md §4, S1): rank() and dense_rank() — peer-aware (peers = rows equal on the window ORDER BY only; the PK tie-break sequences peers but does not split a peer group). rank() = 1 + rows in earlier peer groups (1,1,3); dense_rank() = 1 + earlier peer groups (1,1,2); both i64, frame-insensitive, matching PostgreSQL exactly. No window ORDER BY → every row one peer group → 1 for all. Builds on query.window"

[[capability]]
id = "query.window_ratio"
description = "Window ratio functions percent_rank() and cume_dist() (window.md §4, S1): peer-aware relative ranks. percent_rank = (rank-1)/(N-1), 0 when N=1; cume_dist = (rows through the current peer group)/N. Result DECIMAL via the exact division (select_div_scale + half-away, the AVG path), NOT PG float8 — divergence D2. Builds on query.window_ranking"

[[capability]]
id = "query.window_ntile"
description = "Window ntile(n) (window.md §4, S1): distribute the partition into n ranked buckets, larger first, numbered 1..n; n an integer evaluated once per partition; n<=0 is 22014, NULL n yields NULL for all rows. i64, position-based, matching PostgreSQL. Builds on query.window"

[[capability]]
id = "query.window_offset"
description = "Window offset functions lag() and lead() (window.md §4, S2): the value `offset` rows before (lag) / after (lead) the current row within the partition (window ORDER BY order); offset defaults to 1, a negative offset flips direction; out-of-partition yields the default argument else NULL; NULL offset yields NULL for all rows. Result = the value expression type (same_as_input). Frame-insensitive, matching PostgreSQL. Builds on query.window"

[[capability]]
id = "query.window_aggregate"
description = "Aggregates as window functions (window.md §6, S3): sum/count/min/max/avg carrying OVER are folded over the DEFAULT frame — a RUNNING aggregate with a window ORDER BY (RANGE UNBOUNDED PRECEDING TO CURRENT ROW, peer-aware) or the WHOLE partition without. Reuses the aggregate Acc kernels + widening (sum int->i64, avg->decimal). Explicit frame clauses are deferred to S4. Builds on query.window"

[[capability]]
id = "query.window_frame"
description = "Explicit window frames + frame-sensitive value functions (window.md §6, S4): the ROWS BETWEEN frame_start AND frame_end clause (UNBOUNDED PRECEDING/FOLLOWING, CURRENT ROW, n PRECEDING/FOLLOWING with non-negative integer offsets) restricting the rows an aggregate window or first_value/last_value/nth_value sees; nth_value(e,n) n<1 is 22016, a negative frame offset 22013. Explicit RANGE/GROUPS frames + EXCLUDE are deferred 0A000. Builds on query.window_aggregate"

[[capability]]
id = "query.window_named"
description = "Named windows (window.md §5, S5): the WINDOW name AS (definition) clause + OVER name reference, equivalent to inlining the definition (multiple functions may share a named window; one clause may define several). A reference to an undefined window name is 42704. The shared partition/sort optimization is a deferred follow-on. Builds on query.window"

[[capability]]
id = "query.union"
description = "UNION / UNION ALL — combine two SELECTs' result rows; the bare form deduplicates (NULL-safe, value-canonical), ALL keeps multiplicities; output column count + names come from the left operand; per-column type unification (integer max-rank, integer<->decimal, all-NULL->text); arity mismatch 42601, type mismatch 42804; INTERSECT binds tighter; optional trailing ORDER BY/LIMIT/OFFSET resolves by output column name (spec/design/grammar.md §25)"

[[capability]]
id = "query.intersect"
description = "INTERSECT / INTERSECT ALL — rows present in both operands; the bare form is distinct, ALL keeps min(m,n) multiplicities; same column/type unification and trailing ORDER BY rules as UNION; binds tighter than UNION/EXCEPT (spec/design/grammar.md §25)"

[[capability]]
id = "query.except"
description = "EXCEPT / EXCEPT ALL — rows in the left operand not in the right; the bare form is distinct, ALL keeps max(0,m-n) multiplicities; same column/type unification and trailing ORDER BY rules as UNION (spec/design/grammar.md §25)"

[[capability]]
id = "query.subquery_scalar"
description = "Uncorrelated scalar subquery (SELECT ...) in expression position — yields the single row/single column value; 0 rows -> typed NULL, >1 row -> 21000, >1 column -> 42601; executed once at plan time and folded to a constant carrying its output type (so it promotes/compares like that type); correlation is layered by query.subquery_correlated; a bind parameter inside is allowed, typed by its inner context (uninferable -> 42P18) (spec/design/grammar.md §26)"

[[capability]]
id = "query.subquery_in"
description = "x [NOT] IN (SELECT ...) — uncorrelated membership over the subquery's single column; folds to the literal-IN OR-chain so the three-valued NULL logic is inherited (a NULL in the result with no match -> NULL); an empty result -> FALSE (IN) / TRUE (NOT IN) regardless of x; >1 column -> 42601; correlation via query.subquery_correlated; a param inside is typed by its inner context (uninferable -> 42P18) (spec/design/grammar.md §26)"

[[capability]]
id = "query.subquery_exists"
description = "[NOT] EXISTS (SELECT ...) — uncorrelated existence test; boolean (rows>0) XOR negated, the select list is ignored entirely (even SELECT * / SELECT 1,2,3), never NULL; correlation via query.subquery_correlated; a param inside is typed by its inner context (uninferable -> 42P18) (spec/design/grammar.md §26)"

[[capability]]
id = "query.subquery_correlated"
description = "Correlated scalar / IN / EXISTS — the subquery references a column of an enclosing query, resolved via a scope chain (inner FROM first, then outward; nearest scope shadows). Planned once (type/structure errors raised even over an empty outer) and re-executed per outer row. Any correlation depth (parent, grandparent, ...); outer refs allowed inside an aggregate arg/select-list/HAVING as a per-row constant. A $N inside is allowed, typed by an inner context (uninferable -> 42P18). Narrowing: a correlated GROUP BY / ORDER BY key is 0A000 (degenerate) (spec/design/grammar.md §26)"

[[capability]]
id = "query.cte"
description = "Non-recursive common table expressions — WITH name [(cols)] AS [NOT] MATERIALIZED (query) [, ...] <query> (spec/design/cte.md). A CTE is a named, statement-local relation the FROM clause references like a table; a list defines one or more, each visible to LATER CTEs in the list and to the main query + its nested subqueries (forward-only: a self/forward reference is 42P01). A CTE name shadows a same-named catalog table in the statement, except inside its own body (which resolves the base table). A body is an INDEPENDENT query — not correlated to the reference site (an outer column inside a body is 42703/42P01). Bodies may be JOINs, aggregates, or set operations. The optional column-rename list renames the body's output columns (a count mismatch is 42P10). Evaluation follows PostgreSQL's hybrid rule: a single-reference CTE is INLINED (body runs in place, like a derived table — a volatile body re-evaluates), a multi-reference or MATERIALIZED one is MATERIALIZED (body runs once, rows buffered, each reference charges cte_scan_row per buffered row; an unreferenced CTE is planned but not executed); [NOT] MATERIALIZED overrides the choice (spec/design/cost.md §3). A duplicate CTE name in one list is 42712. A nested WITH (inside a subquery / derived table / CTE body) is supported — query.cte_nested. RECURSIVE, data-modifying CTEs, and WITH on UPDATE/DELETE have landed (query.cte_recursive / query.cte_data_modifying / dml.with_clause)"

[[capability]]
id = "query.cte_nested"
description = "Nested WITH — a WITH clause may prefix any parenthesized query expression (a subquery, a derived table, a scalar / IN / EXISTS / ANY/ALL subquery, a set-op operand, or another CTE's body), not only the statement top level (spec/design/cte.md §7). Recognized by a shape-based lookahead (WITH RECURSIVE … / WITH <name> ( / WITH <name> AS), so `with` stays a legal identifier elsewhere (x IN (with) is still a value list). The nested CTEs establish their OWN scope with the full query.cte / query.cte_recursive machinery (forward-only visibility, 42712 duplicate, 42P01 self/forward, the column-rename list 42P10, [NOT] MATERIALIZED, WITH RECURSIVE), and plan to a QueryPlan::With that materializes them ONCE then runs the inner body against a fresh CTE context — the same deterministic materialize-then-execute cost as the top-level WITH (cte_scan_row for a materialized buffer). A nested WITH adds no correlation frame (its body sees the same outer environment as the node's position, so a LATERAL wrapper still correlates; the CTE bodies stay parent=None). A data-modifying CTE in a nested WITH is rejected 0A000 (DML-WITH is top-level only — matching PG). Divergence: the nested scope does NOT inherit the ENCLOSING statement's CTE bindings — an enclosing CTE name referenced inside a nested WITH resolves to a base table / 42P01, not the enclosing CTE (PG inherits them; pinned by per-core unit tests, a documented follow-on). No new error code, no on-disk format change. Builds on query.cte / query.derived_table"

[[capability]]
id = "query.cte_recursive"
description = "Recursive common table expressions — WITH RECURSIVE name [(cols)] AS (non_recursive_term UNION [ALL] recursive_term) <query> (spec/design/recursive-cte.md). RECURSIVE is a flag on the whole WITH list that ENABLES a CTE to reference itself (lifting the query.cte forward-only 42P01); a CTE in a RECURSIVE list that does NOT reference itself is an ordinary non-recursive CTE. A recursive CTE's body must be a top-level UNION/UNION ALL: the non-recursive (anchor) term (the UNION's left, no self-reference) seeds the computation; the recursive term (the UNION's right) references the CTE name EXACTLY ONCE as a direct FROM/JOIN relation and is re-evaluated against the previous iteration's rows. UNION ALL keeps every row; UNION (DISTINCT) drops rows duplicating any already-emitted row (and so terminates a cyclic walk). Column types are fixed by the non-recursive term — the recursive term must be assignable to them, a wider column is 42804 (recursive query column N has type … in non-recursive term but type … overall; NOT the symmetric UNION widening). Evaluated to a fixpoint by the working-table method (the self-reference reads the working table; outer references read the full result) and ALWAYS materialized ([NOT] MATERIALIZED is inert, like PG). Termination is the per-statement max_cost ceiling (54P01) with continuous cross-iteration metering — no fixed iteration cap; an unbounded recursion on an unlimited handle loops forever, like PG. Cost reuses cte_scan_row (the working-table scan + outer scans) + row_produced, no new unit. Structural ill-formedness is 42P19 (invalid_recursion): not the UNION form, a self-ref in the non-recursive term / more than once / within a subquery / within an outer join, or an aggregate in the recursive term — all matching PG. Narrowings (deferred): ORDER BY/LIMIT in a recursive query (0A000, like PG); a set-operation recursive term or a self-ref inside a FROM derived table (0A000; PG allows); mutual recursion between WITH items (42P01 via forward-only visibility; PG uses 0A000); SEARCH/CYCLE. No on-disk format change. Builds on query.cte / query.union"

[[capability]]
id = "query.cte_data_modifying"
description = "Data-modifying (writable) CTEs — a WITH item's body may be an INSERT/UPDATE/DELETE with its own optional RETURNING (spec/design/writable-cte.md), feeding its RETURNING rows forward as a named relation (the move-rows / fan-out-write idioms). Every sub-statement of the WITH — each data-modifying CTE, each query CTE, and the primary — reads ONE pre-statement snapshot (a read pin): they cannot observe each other's effects on the target tables, so data crosses ONLY via a CTE's buffered RETURNING rows (oracle-verbatim: WITH t AS (INSERT INTO foo … RETURNING *) SELECT count(*) FROM foo reads the PRE-statement foo). The parts run in deterministic lexical (WITH-list) order — data-modifying CTEs first, each exactly once and ALWAYS to completion (regardless of references) and therefore always materialized (its buffer is its RETURNING rows; [NOT] MATERIALIZED is inert), then query CTEs by the query.cte rule (still pin-read), then the primary. The whole statement is one all-or-nothing transaction (any sub-statement error aborts it; committed is never touched). A data-modifying CTE WITHOUT RETURNING runs for its effect but a FROM reference to it is 0A000 (WITH query \"name\" does not have a RETURNING clause — matching PG); a data-modifying target resolves against the catalog only (a CTE name as target with no base table is 42P01). WITH RECURSIVE with a non-self-referencing data-modifying CTE is allowed (a data-modifying body is never the anchor-UNION-recursive shape). Conflicts: two parts inserting the same key is 23505 (the second part's phase-2 write meets the first's staged row — matching PG); update/update or update/delete of the SAME row is jed's deterministic last-write-wins (each part computes RETURNING from the pin; a documented divergence on PG's unspecified case, pinned by per-core unit tests, not this oracle corpus). No new cost unit (intrinsic DML cost once + cte_scan_row per reference) and no on-disk format change. Builds on query.cte / dml.returning / dml.insert_select"

[[capability]]
id = "dml.with_clause"
description = "WITH clause on a data-modifying primary — the WITH-prefixed statement may itself be an INSERT/UPDATE/DELETE (with its own optional RETURNING), the move-rows idiom's outer half: WITH moved AS (DELETE FROM inbox WHERE ready RETURNING *) INSERT INTO archive SELECT * FROM moved (spec/design/writable-cte.md). The CTEs (data-modifying or query) are visible to the primary exactly as to a query primary — in an INSERT … SELECT source, an UPDATE/DELETE WHERE, the SET right-hand sides, and any RETURNING subquery — and the primary reads the same one pre-statement snapshot (the read pin) as every CTE. The statement's result is the PRIMARY's: a query result, an affected-row count, or the primary's own RETURNING rows (a CTE's row count is never surfaced — PG's command tag is the primary's). The primary runs LAST, after every CTE has run to completion. Reuses the query.cte_data_modifying machinery; no new error code, no format change. Builds on query.cte_data_modifying / dml.update / dml.delete / dml.insert_select"

[[capability]]
id = "query.subquery_quantified"
description = "Quantified comparison over a subquery — x op ANY/SOME/ALL (SELECT …) (spec/design/array-functions.md §11.6), the subquery spelling of IN that bridges AF5 (the array quantifier) and the §26 subquery machinery. A leading SELECT after the quantifier's ( selects this form (the §26 lookahead); the body's single column (42601 if >1) folds through the SAME three-valued quantified_membership as the array form: ANY/SOME is the OR-fold (empty → FALSE), ALL the AND-fold (empty → TRUE), a NULL x or NULL row is the UNKNOWN element. No 21000 cardinality limit (any row count is a list). x = ANY(SELECT …) ≡ x IN (SELECT …); the six operators = <> < > <= >= generalize it (x <> ALL(SELECT …) is the quantified spelling of NOT IN). x and the body's column type must be comparable, else 42883 (operator does not exist, the §11.3 posture, not 42804). Uncorrelated → planned once and folded to a constant-array Quantified node (no per-row re-exec); correlated → re-executed per outer row, rows gathered into an array, same fold. SOME folds to ANY. Builds on query.subquery_correlated / func.array_quantified"

[[capability]]
id = "query.derived_table"
description = "Derived tables — FROM ( query_expr ) [AS] t: a parenthesized subquery used as a FROM relation (spec/design/grammar.md §42). The parser surface over the CTE inline seam — a derived table is mechanically an anonymous, always-inlined single-reference CTE: the body is planned once (structural/type errors surface regardless of outer cardinality) and run IN PLACE, charging its intrinsic cost (no materialize path, no cte_scan_row). The alias is OPTIONAL (PostgreSQL 18 relaxed the old mandatory-alias rule): present, it is the label and may carry a column-rename list AS t(a,b) renaming body output columns left-to-right (fewer is a partial rename, more is 42P10; a column list with no alias name is 42601); absent, the relation has no qualifier and two unaliased derived tables coexist. An explicit label must be distinct from other FROM relations (42712); a body with duplicate output names is allowed but a later bare reference is 42702. The body is an INDEPENDENT query (parent=None, NOT correlated / no LATERAL) inheriting statement CTE bindings — an outer/sibling column inside is 42703/42P01. Disambiguation: a leading ( followed by SELECT is a derived table (the §26 lookahead); a leading ( followed by VALUES is a VALUES-body derived table (query.values); any other leading ( in FROM is 42601 (no parenthesized-join FROM — a documented PG divergence). It composes with JOIN/WHERE/GROUP BY/ORDER BY/LIMIT/subqueries and is reachable inside an UPDATE/DELETE subquery; body nesting counts toward MAX_EXPR_DEPTH (54001). Narrowings: a parenthesized-join FROM is deferred (LATERAL has since landed — query.lateral). Builds on query.cte / query.subquery_scalar"

[[capability]]
id = "query.lateral"
description = "LATERAL joins — a FROM item whose body / arguments reference columns of the FROM relations BEFORE it, a dependent (correlated) join re-evaluated once per combined left-hand row (spec/design/grammar.md §44). Reached via explicit join syntax (no comma-FROM yet): CROSS JOIN LATERAL (…), [INNER] JOIN LATERAL (…) ON …, LEFT [OUTER] JOIN LATERAL (…) ON …. The keyword precedes a derived table ((SELECT …) or (VALUES …)) or a table function (SRF) only — LATERAL before a bare base table name is 42601. A sub-SELECT/VALUES derived table is lateral ONLY with the keyword (without it a sibling reference stays 42P01/42703, the §42 non-correlation rule); a table function is IMPLICITLY lateral (its args may reference an earlier sibling with or without the keyword — PG, lifting the §35 SRF non-LATERAL narrowing). Visibility is left-to-right and earlier-only: a forward/self reference is 42P01; lateral items chain (a later lateral sees an earlier lateral's columns); the first FROM item is never lateral (a LATERAL keyword on it is a no-op). Mechanically reuses the correlated-subquery machinery (the scope parent chain → Outer{level,index}, the per-outer-row eval stack): a correlated lateral item is re-materialized per left row with that row pushed as its immediate outer; an UNcorrelated one is materialized once. LEFT JOIN LATERAL … ON <pred> NULL-extends a left row when the lateral side yields no matching row (ON true keeps a left row even when the body returns zero rows). A RIGHT/FULL JOIN to a lateral item that references the left side is 42P10 (the combining join type must be INNER or LEFT for a LATERAL reference); an uncorrelated lateral-eligible item under RIGHT/FULL is materialized once and allowed (PG). Cost = the sum of the per-left-row body evaluations (deterministic, max_cost-bounded, 54P01). No on-disk format change (a query-plan construct). Narrowing: the RIGHT/FULL rejection is slightly broader than PG (jed rejects any outer correlation, PG only a left-side one) — an override-ledger divergence. Builds on query.derived_table / query.values / func.unnest / query.subquery_correlated / query.join_left"

[[capability]]
id = "query.values"
description = "VALUES-body derived table — FROM (VALUES (e11,…),(e21,…)) [AS] v(c1,…): a parenthesized VALUES list used as a FROM relation, a computed relation of literal rows (spec/design/grammar.md §42). The FROM-position sibling of the INSERT … VALUES source, reusing the derived-table seam (anonymous always-inlined single-reference CTE): the same alias / column-rename (AS v(a,b), 42P10) / 42712 / 42702 / non-correlation / intrinsic-cost rules as query.derived_table. A value is a GENERAL CONSTANT expression (1+1, upper('a'), now(), casts, CASE, ROW(…), ARRAY[…], an uncorrelated scalar subquery) — richer than the INSERT slot (which stays literal/$N/DEFAULT). The body is non-LATERAL (parent=None): a column reference is 42703/42P01, an aggregate is 42803, a bare $N with no inferable local type is 42P18 (no cross-row inference — the §26 posture; write $1::int). All rows must have the same arity (42601, 'VALUES lists must all be the same length'); the columns default to names column1, column2, … (PG, overridable by the rename list) and each column's type unifies across rows like a set operation (int widths widen, int+decimal→decimal, anything+NULL keeps the other, all-NULL→text; 42804 on a mismatch), then coerces each value (int→decimal). Disambiguation: a leading ( followed by VALUES selects this form. Narrowings: a trailing ORDER BY/LIMIT on the body is 42601 (deferred — PG accepts it). cost = row_produced per row + each value's operator_eval (jed's deterministic cross-core contract). Builds on query.derived_table / dml.insert_multi_row"

[[capability]]
id = "types.i16"
description = "i16 / smallint scalar type"

[[capability]]
id = "types.i32"
description = "i32 / int / integer scalar type"

[[capability]]
id = "types.i64"
description = "i64 / bigint scalar type"

[[capability]]
id = "types.text"
description = "text scalar type (variable-width UTF-8, collation C): storage, literals, and comparison/ordering. text is ALSO a KEY type — a text PRIMARY KEY / composite-key member / secondary index / UNIQUE uses the variable-width text-terminated-escape key encoding (the first non-fixed-width key; spec/design/encoding.md §2.4), with point lookup, 23505 on a duplicate key, and 23502 on a NULL key; an oversized text key is 0A000 (spec/design/types.md §11)"

[[capability]]
id = "types.boolean_storable"
description = "storable boolean column: CREATE/INSERT/SELECT of false/true/NULL, boolean×boolean comparison and ORDER BY (false < true). boolean is also a KEY type — a boolean PRIMARY KEY / composite-key member / secondary index uses the `bool-byte` key encoding (0x00 false < 0x01 true, the second non-integer key after uuid; spec/design/encoding.md §2.9), with point lookup, 23505 on a duplicate key, and 23502 on a NULL key. boolean⇄integer casts stay deferred (spec/design/types.md §9)"

[[capability]]
id = "types.decimal"
description = "decimal / numeric scalar type (exact base-10): the first parameterized type (numeric(p,s)), storage, literals, comparison/ordering, casts (int<->decimal). A valid PRIMARY KEY / ordered index / UNIQUE key via the order-preserving, scale-independent decimal-order-preserving encoding (1.5 and 1.50 index as one — spec/design/encoding.md §2.5, spec/design/decimal.md)"

[[capability]]
id = "expr.decimal_arithmetic"
description = "Decimal arithmetic operators + - * / % and unary - with PostgreSQL result-scale rules and half-away-from-zero rounding (spec/design/decimal.md §4)"

[[capability]]
id = "types.bytea"
description = "bytea scalar type (variable-width raw bytes): storage, hex-input literals, and unsigned-byte comparison/ordering. bytea is ALSO a KEY type — a bytea PRIMARY KEY / composite-key member / secondary index / UNIQUE uses the variable-width bytea-terminated-escape key encoding (encoding.md §2.6; the embedded-0x00 escape is routinely exercised), with point lookup, 23505 on a duplicate key, and 23502 on a NULL key; an oversized bytea key is 0A000 (spec/design/types.md §13)"

[[capability]]
id = "types.uuid"
description = "uuid scalar type (fixed 16-byte RFC 4122 value): storage, PostgreSQL-flexible input literals (braces/hyphens-anywhere/32-hex, any case; canonical 8-4-4-4-12 lowercase output), and unsigned-byte comparison/ordering. uuid is the FIRST non-integer type usable as a PRIMARY KEY — its uuid-raw16 key encoding is exercised (spec/design/types.md §14, encoding.md §2.7)"

[[capability]]
id = "types.timestamp"
description = "timestamp / timestamp without time zone scalar type (zoneless wall clock, i64 microseconds): storage, ISO-8601-ish literals, comparison/ordering, infinity sentinels, and timestamp PRIMARY KEY (key encoding = i64). No time zone db (spec/design/timestamp.md)"

[[capability]]
id = "types.timestamptz"
description = "timestamptz / timestamp with time zone scalar type (UTC instant, i64 microseconds): storage, literals with offset→UTC normalization (offset then discarded), comparison/ordering, infinity, and timestamptz PRIMARY KEY. No named zones (spec/design/timestamp.md)"

[[capability]]
id = "types.interval"
description = "interval scalar type (a span — months/days/micros): storage, the 'unit + time' input subset (units with abbreviations, per-field signs, trailing 'ago', the fractional-unit cascade, bare HH:MM:SS) via a single-quoted literal or the INTERVAL '...' keyword, PG 'postgres' render, and comparison/ordering/dedup by the canonical 128-bit span (1 month = 30 days, 1 day = 24 h — so '1 mon' = '30 days'). KEYABLE — a valid PRIMARY KEY / ordered index / UNIQUE / FK target / GIN element via the 16-byte interval-span-i128 span key (encoding.md §2.10); span-equal values ('1 mon' / '30 days') share a key, so a UNIQUE interval index treats them as one. CAST and field qualifiers/precision are deferred (spec/design/interval.md)"

[[capability]]
id = "types.f64"
description = "f64 / double precision scalar type (IEEE 754 binary64): storage, literals (incl Infinity/-Infinity/NaN, e-notation), the float total order (-0=+0, NaN=NaN, NaN largest), the trapping +-*/ /sqrt arithmetic kernel, casts, the order-independent canonical-fold SUM/AVG, and MIN/MAX/COUNT. The FIRST type exempted from cross-core byte-identity for COMPUTED/RENDERED values (compared via the R tag at tolerance — conformance.md §1, float.md, determinism.md §6); storage/ordering/kernel/exact-sum/cost stay in-contract. Non-key column only — a f64 PRIMARY KEY is rejected 0A000. Cross-family int/decimal<->float is explicit-only (else 42804)"

[[capability]]
id = "types.f32"
description = "f32 / real scalar type (IEEE 754 binary32): the same surface as f64 at single precision; forms a promotion tower with f64 (f32->f64 lossless-implicit). Exempt from cross-core byte-identity for computed/rendered values (R tag); storage (4 bytes, on-disk code 13) / total order / kernel / exact-sum SUM/AVG / cost in-contract. Non-key column only (0A000). spec/design/float.md"

[[capability]]
id = "types.date"
description = "date scalar type (a calendar date — year/month/day, no time/zone; i32 days since 1970-01-01, reusing timestamp's calendar core): storage, strict ISO YYYY-MM-DD literals (a single-quoted string adapting to a date context, or the DATE '…' keyword literal) with optional BC/AD era and the infinity/-infinity sentinels, where a trailing time/offset is validated then DROPPED (24:00:00 does NOT roll into the day, unlike timestamp), comparison/ordering by the day count, and a date PRIMARY KEY (key encoding = i32 int-be-signflip; on-disk type code 16). jed owns a WIDER range than PG (≈ ±5.88M years). date is a STRICT ISLAND — it does not compare/cast to timestamp/timestamptz/int this slice (date × timestamp is 42804, a documented PG divergence); date arithmetic, casts, the clock-relative literals (today/epoch), and date functions are deferred. Malformed input traps 22007, an out-of-range field / day count 22008 (spec/design/date.md)"

[[capability]]
id = "types.composite"
description = "composite (row) types — CREATE TYPE name AS (field type [NOT NULL], …) / DROP TYPE [IF EXISTS] name [RESTRICT]: a named, user-defined heterogeneous tuple living in the database's type catalog, persisted across reopen (format_version 9 — the catalog becomes kind-tagged entries with a composite-type section, two-pass load). Named composites only (no anonymous record); nested composites (a field typed as another composite) supported by name. Duplicate type 42710, unknown field type 42704, duplicate field 42701, DROP with dependents 2BP01, DROP missing 42704 (unless IF EXISTS). This slice (S2) creates/drops/persists the TYPE; a composite-typed COLUMN, the ROW(…) constructor, field access, comparison, and text I/O are later slices (rejected 0A000 for now) — composite-as-key stays 0A000. spec/design/composite.md"

[[capability]]
id = "types.array"
description = "array types (spec/design/array.md) — a structural T[] type over any scalar element type (i32[], text[], …): the ARRAY[…] constructor + the '{…}' text literal ('{}'::T[] / a bare string adapting to an array column), the compact value codec (the array body — ndim/flags/dims + a HAS_NULLS-gated bitmap + element bodies, type_code 15), array_out rendering ({e1,e2,…} with PG element quoting + unquoted NULL elements), element-wise comparison with PG BTREE NULL semantics (NULLs comparable and mutually equal — array equality is always a definite boolean, NOT the composite 3VL rule), ORDER BY / DISTINCT / GROUP BY array keys (the array_cmp total order, NULLs-last per element, shorter-prefix-first), and the whole-value IS NULL rule (a non-null array of NULL elements is NOT NULL). v1 ships 1-D values of scalar elements; multidimensional values (types.array_multidim), array slices (expr.array_slice), array-of-composite elements (types.array_composite), and the array function surface (func.array) landed as their own capabilities; arrays-in-keys (0A000) stay deferred. A bad element value traps 22003; a malformed array literal traps 22P02; comparing arrays of different element types is 42804; an array PRIMARY KEY is 0A000. Builds on types.i32"

[[capability]]
id = "types.range"
description = "range types (spec/design/ranges.md) — the six built-in PostgreSQL range types as a structural type over a scalar element (i32range/i64range/numrange/tsrange/tstzrange/daterange; PG int4range/int8range are aliases of i32range/i64range). This slice (R0–R3): the '[1,5)' text literal coerced by a named type ('[1,5)'::int4range / a bare string adapting to a range column), inclusive/exclusive + unbounded ([1,), (,5), (,)) endpoints and the distinguished empty value; the compact value codec (a flags byte EMPTY/LB_INF/UB_INF/LB_INC/UB_INC + present bound bodies, type_code 17, format_version 16); range_out rendering ([lo,hi) with PG bound quoting where the element text has special chars — a tsrange bound's space → double-quoted, a daterange bound bare); canonicalization of discrete subtypes (i32/i64/date stored in the canonical [) form — '[1,5]'::int4range → [1,6), '(5,)' → [6,)) with continuous subtypes (num/ts/tstz) kept verbatim; empty normalization (equal bounds not-both-inclusive → empty); the whole-value IS NULL rule (empty IS NULL and '(,)' IS NULL are both FALSE); and (R3) the range_cmp total order driving =/<>/</<=/>/>=/ORDER BY/DISTINCT/GROUP BY (empty < every non-empty; then lower bound, then upper, each accounting for infinity + inclusivity — a range compares only with a range over the SAME element type, else 42804). A range lower > upper is 22000; a canonicalization step past the element domain is 22003; a malformed range literal is 22P02; an unknown range type (textrange) is 42704. A range IS a valid PRIMARY KEY / ordered (btree) secondary index / UNIQUE key / FK target since the range-PK slice — the first CONTAINER key (range-bounds, encoding.md §2.11: empty/±∞/inclusivity framing around the element key, sorting by range_total_cmp; point-lookup pushdown deferred, so a range `=` WHERE full-scans + residual-filters), with a range DEFAULT and a GIN-over-range index still 0A000; the accessor functions (lower/upper/isempty/…) are func.range_accessors and the constructor + operator surface (@>/&&/…) lands in RF2–RF4. Builds on types.i32"

[[capability]]
id = "types.array_composite"
description = "array-of-composite element types (spec/design/array.md §12 AC1) — a previously-defined composite type is a first-class array element type (items addr[]): no format_version bump (the catalog already framed element_type_code 14 + name, §3; the codec/comparison/text-I/O recurse). Construct via the '{…}'::addr[] text literal (array_in coerces each element through record_in) — the ARRAY[ROW(…)] constructor path is a per-core unit-test concern; store/load round-trip; array_out nests the two quoting layers (record_out doubling inside array_out backslash-escaping, §7); the whole-value comparison =/<>/< <= > >= / ORDER BY / DISTINCT / GROUP BY where a composite element's per-element compare routes through the composite TOTAL ORDER (NULLs-last, definite), NOT the composite 3VL — so ARRAY[ROW(1,NULL)::addr] = ARRAY[ROW(1,NULL)::addr] is TRUE and equal-with-NULL-field arrays sort/group together (§5, oracle-pinned); subscript items[i] → the composite element, slice items[m:n] → addr[], field access (items[i]).field; multidimensional addr[] values. unnest over a composite array and the polymorphic array function surface over composite elements stay deferred. Builds on types.array and types.composite"

[[capability]]
id = "types.composite_array_field"
description = "a composite type with an ARRAY-typed field (spec/design/array.md §12 — the mirror of types.array_composite) — CREATE TYPE poly AS (name text, pts i32[]) declares a composite whose field is a structural T[]. No format_version bump (still 10): the catalog composite-type entry gains a field_type_code 15 + the inline element-type descriptor (the same descriptor an array column uses, §3), placed before the field flags byte where a nested-composite name sits; the value codec / comparison / record_out / record_in all recurse for free through the array field (an array field's record_in token is an array text literal coerced through array_in, one level down). The element is a scalar or a previously-defined composite (the doubly-nested addr[] field — element_type_code 14 + name). Build via ROW('a', '{1,2,3}') / ROW('a', ARRAY[1,2,3]) (the array field as a text literal or ARRAY[…]); the PG-portable '(a,\"{1,2,3}\")'::poly cast parses it through record_in/array_in. Store/load round-trip; array_out renders the array field (then record_out quotes it, the two layers nest); composite 3VL comparison uses the array field's BTREE (always-definite) comparison and the lexicographic sort uses the array total order. DROP TYPE addr is blocked (2BP01) while an addr[] field (or column) references it — the dependency check looks through one array level. An array field typmod is 0A000; an unknown array element type is 42704. Builds on types.array and types.composite"

[[capability]]
id = "expr.array_subscript"
description = "array element subscript a[i] (spec/design/array.md §6) — reads the i-th element of an array, 1-based (PG / SQL-standard convention). An out-of-bounds index (0, negative, or past the end), a NULL index, and a subscript of a NULL array all yield NULL — never an error (PG, a documented divergence from the SQL standard's mandated data exception). The result type is the element type; the un-aliased output column is named after the base array. The index is an integer expression (a literal adapts to int4); subscripting a non-array base is 42804. Builds on types.array"

[[capability]]
id = "types.array_multidim"
description = "multidimensional array values + custom lower bounds (spec/design/array.md §12) — the codec header (ndim/dims/lbounds) is exercised beyond 1-D-lb-1. ARRAY[ARRAY[…],…] stacks sub-arrays into a higher dimension (non-rectangular → 2202E; a scalar/array mix → 42804); the '{{…},{…}}' literal parses nested braces (non-rectangular / count-mismatch → 22P02); the '[l:u]={…}' literal sets custom lower bounds (an inverted bound l>u → 2202E). array_out renders nested braces and emits a '[l1:u1]…=' prefix iff any lower bound ≠ 1. Element access needs all N subscripts (a[i] on an N-D value with fewer/more is NULL); the subscript domain is the value's lb..ub. array_eq/array_cmp include dimensionality and lower bounds as tiebreaks ([2:4]={1,2,3} ≠ {1,2,3}), after the element-wise comparison and total element count. Builds on types.array"

[[capability]]
id = "expr.array_slice"
description = "array slices a[m:n] (spec/design/array.md §6) — read a sub-array; either bound may be omitted ([:n], [m:], [:]) and defaults to the value's own lower/upper bound. The requested range is clamped to each dimension's [lb,ub]; an empty (or fully out-of-range) result is the empty array {} (NOT NULL); a NULL bound, or a slice of a NULL array, yields NULL. If any subscript in a multidimensional access is a slice the whole access is a slice and a scalar index i means 1:i; too many subscripts → {}, fewer leave the trailing dimensions at full range. The result is renumbered to lower bound 1 on every dimension (PG array_get_slice). Builds on expr.array_subscript and types.array_multidim"

[[capability]]
id = "func.regexp_replace"
description = "regexp_replace(source, pattern, replacement [, flags]) → text (spec/design/regex.md §8) — replace the FIRST match (or ALL with the `g` flag) of the regex `pattern` in `source` by the replacement TEMPLATE: \\1..\\9 splice in capture group 1..9, \\& the whole match, \\\\ a literal backslash (these are template back-references INTO the replacement string, NOT regex backreferences). No match → source unchanged. jed's RE2-able flavor over the hand-written Pike VM (the same engine as expr.regex_match). flags: `i` (case-insensitive, the ~* fold — matching folds both sides but the spliced text is the ORIGINAL-case substring), `g` (global); unknown flag 2201B. STRICT (a NULL arg → NULL). Cost: operatorEval + regex_compile (once, constant pattern) + regex_step per match run. Builds on expr.regex_match"

[[capability]]
id = "func.regexp_match"
description = "regexp_match(source, pattern [, flags]) → text[] (spec/design/regex.md §8) — the capture array of the FIRST match of the regex `pattern` in `source`: element i is group i's captured substring (groups 1..n when the pattern has ≥1 group, else a 1-element array of the whole match, matching PG); an unset (non-participating) group element is NULL. NO match → NULL (the whole result, not an empty array). jed's RE2-able flavor over the hand-written Pike VM. flags: `i` (case-insensitive, the captures are the ORIGINAL-case substrings). This is the first text[]-returning scalar function (resolved via the RegexFunc node, the array/range-function precedent). STRICT (a NULL arg → NULL). Builds on expr.regex_match and types.array"

[[capability]]
id = "func.array"
description = "array function/operator surface AF1 (spec/design/array-functions.md) — the polymorphic anyarray/anyelement resolution (one type variable ELEM bound by structural equality across the array-accepting slots, read back into the anyarray/anyelement result codes; a non-array where anyarray is required, or an element-type conflict, is 42883) plus the scalar-function-shaped surface: introspection array_ndims/cardinality/array_dims (1-arg) and array_length/array_lower/array_upper (2-arg, the integer dimension), all reading the value's ndim/dims/lbounds header — propagating NULL and returning NULL for an out-of-shape request (array_length/lower/upper NULL for an empty array or out-of-range dim; array_ndims/array_dims NULL for the empty array; cardinality 0 for empty), array_dims rendering [l1:u1][l2:u2]…; and the NON-STRICT builders array_append/array_prepend (a NULL/empty array → {e}; a 1-D array grows preserving its lower bound; a multidimensional array is 22000) and array_cat (identity-aware concatenation along the outer dimension; an incompatible dimensionality is 2202E). The untyped-literal element adapts to the array's element type (with a range check). Builds on types.array_multidim"

[[capability]]
id = "func.unnest"
description = "array function surface AF3 (spec/design/array-functions.md §9) — the polymorphic set-returning function unnest(anyarray), a FROM-clause row source (functions.md §10, grammar.md §35, reusing query.set_returning's synthetic-relation machinery) that EXPANDS an array into one row per element. The anyarray arg binds ELEM := its element type and the produced one-column relation (named after the alias, else unnest) is typed at ELEM (the set_of_element result). One row per element in flattened row-major order: a multidimensional array flattens, a NULL element is produced as a NULL row, the empty array {} and a NULL array argument each yield zero rows (the empty_on_null discipline). A non-array argument (e.g. unnest(5)) is 42883; a bare untyped NULL is 42P18 (jed's polymorphic posture). Each produced element charges one generated_row (cost.md §3), so a max_cost ceiling bounds a runaway unnest (54P01); it composes with WHERE/ORDER BY/LIMIT/cross-join exactly as generate_series does, and is non-LATERAL (args see $N/outer, not sibling FROM tables). The SELECT-list SRF position, LATERAL, and WITH ORDINALITY are deferred narrowings. Builds on func.array and query.set_returning"

[[capability]]
id = "func.array_containment"
description = "array function surface AF4 (spec/design/array-functions.md §10) — the array containment / overlap operators @> (contains), <@ (contained by), && (overlaps), three polymorphic `anyarray <op> anyarray → boolean` operators sharing ||'s precedence rung (37, the PostgreSQL 'any other operator' level, left-associative). a @> b is true iff every element of b is present in a; a && b iff they share ≥1 element; a <@ b is b @> a. The comparison is over the FLATTENED element multiset under STRICT equality — a NULL element matches NOTHING, including another NULL (the inverse of the search/edit functions' NOT DISTINCT FROM, §5 #10), so ARRAY[1,2,NULL] @> ARRAY[NULL] is false — and works on ANY dimensionality (no 1-D 0A000 restriction); duplicates and custom lower bounds are irrelevant. The empty array is contained by anything (a @> {} true) and overlaps nothing (a && {} false). The operators are STRICT (a NULL whole-array operand → NULL). The two operands' element types must unify; a non-array operand or an element-type mismatch is 42883. New tokens @>/<@/&& (a lone @ / & is 42601); the result is always boolean so an all-untyped-NULL pair is not 42P18. Builds on func.array"

[[capability]]
id = "func.array_quantified"
description = "array function surface AF5 (spec/design/array-functions.md §11) — the ANY/ALL/SOME quantified array comparisons (x = ANY(arr), x op ALL(arr)), the array spelling of IN and its universal dual. A comparison operator (= < > <= >=) may be followed by a quantifier over a parenthesized array (grammar.md §41); no new tokens (ANY/SOME/ALL are keywords), an Expr/RExpr 'quantified' node, and a three-valued fold over the array's FLATTENED elements that reuses the IN-list membership machinery (eq3/lt3/gt3): ANY/SOME is the OR-fold (TRUE if any x op e is TRUE, else NULL if any is NULL, else FALSE; empty → FALSE), ALL is the AND-fold (FALSE if any is FALSE, else NULL if any is NULL, else TRUE; empty → TRUE), and a NULL array operand → NULL. SOME folds to ANY. Multidimensional arrays flatten; custom lower bounds are irrelevant (elements, not subscripts). x and the array operand take the same literal adaptation the comparison operators use (a bare-literal x adapts to the element type, a bare ARRAY[…] to x's type). The right operand must be an array — a non-array side is 42809, an incomparable element type 42883; charges per element like IN so max_cost bounds the walk (54P01). A bare untyped NULL operand is 42P18 and the subquery form op ANY(SELECT …) is a deferred 0A000 (both jed-specific, out of the oracle corpus). Builds on types.array"

[[capability]]
id = "func.variadic"
description = "array function surface AF6 (spec/design/array-functions.md §12) — the VARIADIC call syntax + variadic overload resolution, the make_interval-era follow-on unblocked by the array type, spent on the engine's first VARIADIC built-ins num_nulls/num_nonnulls (count the NULL / non-NULL arguments, result i32). A catalog row marked variadic=true makes its last parameter VARIADIC: the call takes EITHER a SPREAD of trailing arguments — num_nulls(1,'x',NULL), heterogeneous since the variadic element family is 'any', ≥1 arg required (num_nulls() is 42883) — OR a single array via the VARIADIC keyword — num_nulls(VARIADIC ARRAY[1,NULL,3]), whose flattened elements (any dimensionality) are counted. One grammar change: the VARIADIC keyword before a call's final argument only (a non-final or named VARIADIC is 42601), recorded as a variadic flag on the FuncCall node; VARIADIC is not reserved. NON-STRICT (null='none'): the spread form NEVER returns NULL (num_nulls(NULL) is 1), while the VARIADIC-array form returns NULL on a NULL whole-array operand. A VARIADIC keyword on a non-array or a bare untyped NULL operand is 42804 (not the polymorphic 42P18). The kernel charges one operator_eval (the per-element count walk is unmetered, like the array introspectors); arguments charge their own cost. Oracle-checked (postgres:18). Builds on func.array"

[[capability]]
id = "func.array_composite"
description = "array function surface AF7 (spec/design/array-functions.md §13) — the whole AF1–AF6 polymorphic array function/operator surface over a COMPOSITE element type, plus unnest(composite[]). The polymorphic resolution (anyarray/anyelement, §2) already unifies a composite element by catalog ref, so the builders (array_append/array_prepend/array_cat/||), introspectors (array_ndims/array_length/array_lower/array_upper/cardinality/array_dims), num_nulls/num_nonnulls (VARIADIC), and the containment/overlap operators (@>/<@/&&) all work over addr[] with no kernel change — the per-element compare already routes through value_cmp, the composite TOTAL ORDER (NULL fields comparable, definite — array.md §5), so @> matches a composite element with NULL fields yet a whole-element NULL still matches nothing (strict, §10 #12). Two pieces needed code: (a) unnest(composite[]) — the SRF binds ELEM to the composite type and types its synthetic output column at it (the set_of_element result generalized past scalars), producing one composite row per element (NULL element → NULL row; empty/NULL array → zero rows), composable with (unnest(…)).field, ORDER BY, etc.; (b) x op ANY/ALL(composite[]) — the per-element 3VL comparison routes a composite pair through the composite total order (definite, NULL fields comparable — record_eq), NOT the bare-ROW composite 3VL eq3/lt3/gt3, so ROW('a',NULL)::addr = ANY(ARRAY[ROW('a',NULL)::addr]) is TRUE (PG record_eq), while a whole-element NULL still folds to UNKNOWN. The search/edit functions (array_remove/array_replace/array_position/array_positions) match composite elements NULL-safely (value_cmp == Equal), the inverse of @>'s strict rule, exactly as for scalars. Construct via the PG-portable '{…}'::addr[] / '(…)'::addr literals (or ARRAY[ROW(…)] with column context, a jed extension in per-core unit tests). Oracle-checked (postgres:18). Builds on func.array, func.unnest, func.array_containment, func.array_quantified, func.variadic, and types.array_composite"

[[capability]]
id = "func.range_accessors"
description = "range accessor functions RF1 (spec/design/range-functions.md §1) — the polymorphic anyrange resolution (a sibling of anyarray: an anyrange slot matches any range argument and binds ELEM := its element type, read back into the anyelement result; a non-range where anyrange is required is 42883) plus the seven STRICT scalar-shaped accessors over a range value: lower(anyrange)/upper(anyrange) → the bound VALUE (ELEM), NULL when the range is empty or unbounded on that side; isempty/lower_inc/upper_inc/lower_inf/upper_inf(anyrange) → boolean. For the empty range isempty is true and every other reader is false/NULL; for an infinite bound the *_inf reader is true, the *_inc reader false (an infinite bound is never inclusive), and lower/upper are NULL. A NULL range propagates to NULL. jed has no string lower(text)/upper(text), so these names are range-only — a documented divergence from PG's overloaded lower/upper. Oracle-pinned (postgres:18). Builds on types.range"

[[capability]]
id = "func.range_constructors"
description = "range constructor functions RF2 (spec/design/range-functions.md §2) — the six concrete-result builders int4range/int8range/numrange/tsrange/tstzrange/daterange (jed also spells the integer ones i32range/i64range — a documented extra), each with a 2-arg (lo, hi) overload defaulting the bounds to [) and a 3-arg (lo, hi, bounds) overload taking the 2-char flags text ('[]'/'[)'/'(]'/'()'). The constructor is NON-strict: a NULL bound is an INFINITE bound (int4range(NULL,5) → (,5)), not a NULL result. Each bound is coerced to the element type assignment-style (a bare integer/decimal literal or a string-literal datetime adapts; an integer bound range-checks 22003; an int→decimal / text→temporal bound adapts; a non-assignable family is 42883), then the value is finalized exactly like a range literal — lower > upper traps 22000, a discrete subtype canonicalizes to [) (22003 if the +1 step overflows the element domain), and equal bounds not-both-inclusive normalize to empty. The 3-arg form's NULL flags traps 22000 (PG \"flags argument must not be null\") and an invalid flags string 42601 (PG \"invalid range bound flags\"). The bound coercion is more permissive than PG's strict function-argument matching in two non-corpus corners (jed accepts a wider integer for a narrower range with a runtime range-check; jed rejects an unknown string literal for an integer/decimal bound) — both follow from reusing jed's assignment model. Oracle-pinned (postgres:18). Builds on types.range"

[[capability]]
id = "func.range_operators"
description = "range boolean operators RF3 (spec/design/range-functions.md §3) — the eight PostgreSQL range operators, each returning a DEFINITE boolean (a range total order, never 3VL): @> (contains, range@>range and range@>element), <@ (contained-by, range<@range and element<@range), && (overlaps), << (strictly left), >> (strictly right), &< (does not extend to the right of), &> (does not extend to the left of), and -|- (adjacent). @>/<@/&& are shared with the array surface — a RANGE operand routes to the range axis (the resolver dispatches on operand type) and @>/<@ add the element overload (the element is coerced to the range's element type, assignment-style); the other five are range-only. All are STRICT (a NULL operand → NULL). Empty-range edges follow PG: the empty range contains nothing and is contained by everything, overlaps nothing, and is neither strictly-left/right of nor adjacent to anything. A range operand pairs only with a range over the SAME element type (else 42883 \"operator does not exist\", matching PG). The new tokens << >> &< &> -|- are lexed greedily (-|- before the -- line comment). Oracle-pinned (postgres:18). Builds on func.range_constructors and func.array_containment"

[[capability]]
id = "func.range_set_operators"
description = "range set operators RF4 (spec/design/range-functions.md §4) — the three set operators + (union), * (intersection), - (difference) over two ranges of a common element type, plus the range_merge(anyrange, anyrange) function. The operators REUSE the arithmetic tokens (no new grammar): a +/-/* with a range operand is dispatched to the range axis at resolve, anyrange <op> anyrange → anyrange. Both operands must be ranges over the SAME element type — a range × non-range or a cross-element pair is 42883 (\"operator does not exist\", matching PG). All are STRICT (a NULL operand → NULL; a bare untyped NULL beside a range is a NULL range). Union: the smallest single range covering both — empty + r → r; + raises 22000 (\"result of range union would not be contiguous\") when the operands neither overlap nor are adjacent. Intersection: the overlap, or empty when the ranges are disjoint/adjacent/either empty; never errors. Difference: the part of a not covered by b — a disjoint b (or an empty operand) yields a unchanged, b wholly covering a yields empty, and a b strictly inside a raises 22000 (\"result of range difference would not be contiguous\"). range_merge(a, b) is union without the contiguity check — it spans any gap silently, never errors. Discrete subtypes stay in canonical [) form (the set-op results are built from already-canonical operand bounds). Oracle-pinned (postgres:18). Builds on func.range_constructors"

[[capability]]
id = "expr.interval_arithmetic"
description = "interval arithmetic (spec/design/interval.md §5): interval ± interval → interval (field-wise, no justification) and unary minus; a NULL operand propagates; an i32 month/day or i64 micros overflow traps 22008. interval ×÷ number and timestamp ± interval are separate capabilities (later slices)"

[[capability]]
id = "expr.interval_scale"
description = "interval ×÷ number (spec/design/interval.md §5): interval × integer/decimal, integer/decimal × interval (commute), interval ÷ integer/decimal → interval, each field scaled with the fractional part cascading months→days→micros — computed EXACTLY (no float; a documented PG divergence on sub-unit ties), µs half-away. Overflow → 22008, zero divisor → 22012"

[[capability]]
id = "expr.timestamp_arithmetic"
description = "timestamp arithmetic (the engine's first; spec/design/interval.md §5): timestamp[tz] ± interval → timestamp[tz] (months added first with day-of-month clamping, then days as 24 h, then micros; ±infinity stays ±infinity; overflow → 22008), interval + timestamp[tz] commutes, and timestamp[tz] − timestamp[tz] → interval justified into days + time (months = 0; an infinite operand → 22008)"

[[capability]]
id = "null.three_valued"
description = "Three-valued NULL logic in comparisons (CLAUDE.md §4)"

[[capability]]
id = "error.overflow_trap"
description = "Integer overflow traps with SQLSTATE 22003 (CLAUDE.md §8)"

[[capability]]
id = "cast.explicit"
description = "Explicit CAST(x AS type), including narrowing that may trap"

[[capability]]
id = "cast.string_literal"
description = "Typed string literals — PostgreSQL's `type 'string'` form and `CAST(<string literal> AS type)` (spec/design/grammar.md §36): the literal's string is coerced to the NAMED type at resolve (i16/i32/i64, decimal, boolean, text + the string-native bytea/uuid/timestamp/timestamptz/interval). Unknown type name → 42704, malformed → 22P02, out of range → 22003. A runtime text→T cast on a non-literal text expression stays deferred (0A000); a bare string still does not silently coerce to a number/bool (strict, 42804). For integer/decimal, jed's own literal grammar — scientific `e`-notation is accepted (numeric '1.5e3' → 1500), but hex/underscore/NaN trap 22P02 where PG accepts them"

[[capability]]
id = "cast.operator"
description = "PostgreSQL's postfix `::` cast operator — `expr :: type` is exactly `CAST(expr AS type)` (spec/design/grammar.md §37): same cast matrix, string-literal coercion, deferred narrowings, typmod, and resolve codes. Chains left-associatively (`x::int8::int2`); binds tighter than unary minus (`-32768::i16` traps 22003, `(-32768)::i16` is in range); a lone `:` is 42601"

[[capability]]
id = "cast.bool_int"
description = "boolean ⇄ i32 casts (the boolean cast slice — spec/types/casts.toml, spec/design/types.md §9). PostgreSQL ties the boolean↔integer cast to int4 ONLY and makes both directions EXPLICIT, so jed admits exactly two pairs: boolean → i32 (CAST(true AS int) → 1, false → 0) and i32 → boolean (0 → false, any NONZERO including negative → true); NULL → NULL either way, and boolean → boolean is the identity. An integer LITERAL operand of a boolean target adapts to i32 (CAST(5 AS boolean) / 5::boolean), matching PG (a bare 5 is int4); a literal beyond i32 range then traps 22003 (PG 42846 — a documented divergence). The cast is explicit-only (neither implicit nor assignment): INSERT INTO int_col VALUES (true) and int_col = true stay 42804. There is NO bool⇄i16 / bool⇄i64 cast (PG has none): those forbidden pairs are 42804 (cannot cast boolean to i16 / cannot cast i64 to boolean) where PG reports 42846 — jed's standing convention for a forbidden cast pair, covered by the per-core unit tests, not this oracle corpus. A string-literal 't'::boolean / BOOLEAN 'true' is the separate cast.string_literal coercion, unaffected. Builds on cast.explicit and types.boolean_storable"

[[capability]]
id = "compare.promotion"
description = "Cross-type integer comparison via the promotion tower (i16<i32<i64)"

[[capability]]
id = "types.boolean"
description = "boolean / bool scalar type (TRUE/FALSE literals, projected boolean values; expression-only)"

[[capability]]
id = "expr.arithmetic"
description = "Integer arithmetic operators + - * / % with trap-on-overflow (22003)"

[[capability]]
id = "expr.unary_minus"
description = "Unary minus (negation) as an expression operator"

[[capability]]
id = "expr.parens"
description = "Parenthesized sub-expressions"

[[capability]]
id = "expr.precedence"
description = "Operator precedence across logical / comparison / arithmetic levels"

[[capability]]
id = "expr.comparison_value"
description = "Comparisons produce boolean values usable in the SELECT list and nested expressions"

[[capability]]
id = "expr.not_equal"
description = "The not-equal operator `<>` (and its `!=` alias) — the 3VL negation of `=`: propagates NULL like `=` (`NULL <> NULL` is unknown), overloaded across every comparable family, and `!=` lexes to the same operator"

[[capability]]
id = "query.logical_connectives"
description = "AND / OR / NOT with three-valued (Kleene) truth tables"

# Predicate forms (Phase 2, spec/design/grammar.md §20-§23). IN/BETWEEN are sugar over the
# existing =/OR/AND/NOT machinery; LIKE is a text operator; CASE is a primary-level form.
[[capability]]
id = "expr.in_list"
description = "x IN (list) / NOT IN — membership over a non-empty value list, desugared to the OR-chain (x = a OR x = b …); three-valued NULL (1 IN (2,NULL) is NULL); per-element typing (too-wide literal 22003, cross-family 42804); empty IN () is 42601 (spec/design/grammar.md §20)"

[[capability]]
id = "expr.between"
description = "x BETWEEN lo AND hi / NOT BETWEEN — range test desugared to (x >= lo AND x <= hi); Kleene AND gives 5 BETWEEN 10 AND NULL = FALSE but 5 BETWEEN 1 AND NULL = NULL; bounds parse at the additive level so the structural AND is not the connective (spec/design/grammar.md §21)"

[[capability]]
id = "expr.like"
description = "text LIKE pattern / NOT LIKE — % matches any run, _ one code point, default \\ escape; text×text→boolean, NULL propagates, non-text 42804; a pattern ending in a lone escape reached during matching is 22025; code-point (not UTF-16) iteration (spec/design/grammar.md §22)"

[[capability]]
id = "expr.ilike"
description = "text ILIKE / NOT ILIKE — case-insensitive LIKE (spec/design/collation.md §16, grammar.md §22). Same contract as LIKE; the matcher simple-lowercases (1:1) both operands first — ASCII-only when no Unicode property bundle is loaded, full simple Unicode mappings when one is. % matches any run, _ one code point, default \\ escape; NULL propagates; non-text 42804; trailing-escape 22025. Builds on expr.like"

[[capability]]
id = "expr.regex_match"
description = "text ~ pattern / text !~ pattern — regular-expression match (case-sensitive), jed's RE2-able subset (spec/design/regex.md, grammar.md §22b), NOT PostgreSQL-flavor-compatible. UNANCHORED (matches a substring; anchor with ^/$). Pattern surface: literals, . (any code point except newline), classes [...]/[^...], \\d \\w \\s + negations, anchors ^ $, alternation |, groups (...)/(?:...), quantifiers * + ? {n} {n,} {n,m} greedy + lazy, leftmost-first greedy semantics. Hand-written Pike VM (linear-time, no backtracking). text×text→boolean, NULL propagates, non-text 42804, malformed pattern 2201B. !~ is the AST-negated form. Code-point (not UTF-16) iteration"

[[capability]]
id = "expr.regex_imatch"
description = "text ~* pattern / text !~* pattern — case-insensitive regular-expression match. Same contract as expr.regex_match; both operands simple-lowercased first (the ILIKE mechanism, spec/design/collation.md §16) — ASCII baseline without a Unicode property bundle, full simple mappings with one. Builds on expr.regex_match"

[[capability]]
id = "expr.case"
description = "CASE expression (searched + simple forms): lazy first-match evaluation (later arms not evaluated — the one short-circuit exception); searched WHEN must be boolean (42804); result-arm types unify to a common type (numeric promote; cross-family 42804; all-NULL → text); no match + no ELSE → NULL; output name ?column? (spec/design/grammar.md §23)"

# Scalar functions (kind = "function", spec/design/functions.md §9) — named f(args) calls
# evaluated per row, valid anywhere an expression is (unlike aggregates). One capability per
# function so a core can land them independently.
[[capability]]
id = "func.sequence"
description = "nextval('s') / currval('s') sequence value functions (volatile, i64) — nextval advances a sequence and returns the new value (first call returns START, then +INCREMENT, bounded by MIN/MAXVALUE → 2200H or CYCLE wrap), making the statement a WRITE (25006 in a read-only txn) and TRANSACTIONALLY (rolls back — a documented PG divergence, sequences.md §5); currval returns the value nextval last produced IN THIS SESSION (55000 before the first nextval), a per-handle read. Missing sequence 42P01, NULL name propagates NULL; one sequence_advance cost unit per nextval (spec/design/functions.md §14, sequences.md §4)"

[[capability]]
id = "func.abs"
description = "abs(x) scalar function — abs(i16|i32|i64) → same int type (abs(INT_MIN) overflows, 22003); abs(numeric) → numeric; NULL propagates (spec/design/functions.md §9)"

[[capability]]
id = "func.round"
description = "round(x[, n]) scalar function — numeric/integer → numeric, half-away-from-zero to scale 0 or n places; integer overloads return numeric (PG round(5)); NULL propagates (spec/design/functions.md §9)"

[[capability]]
id = "func.casing"
description = "lower(text) / upper(text) — Unicode case folding (spec/design/collation.md §16), the text OVERLOAD of the range accessors (the resolver branches on the argument type). With no property bundle loaded they fold ASCII a–z/A–Z only and pass other code points through (the SQLite default, version-independent); with a bundle's property section loaded they fold via the full Unicode case mappings incl. SpecialCasing (ß→SS, a divergence from glibc's 1:1 — unit-tested, not oracle). text → text, NULL propagates; one operator_eval. Builds on types.text"

[[capability]]
id = "func.named_arguments"
description = "PostgreSQL named-argument notation f(name => value) + DEFAULT parameter values, exercised by make_interval(years,months,weeks,days,hours,mins,secs) — every parameter named and defaulting to 0. Positional, named, and mixed (positional-then-named) calls; a positional arg after a named one is 42601, an unknown name or a named arg on a nameless function is 42883; field overflow is 22008. The legacy ':=' spelling is rejected (42601 — a deliberate surface narrowing; PG accepts it). spec/design/functions.md §11"

[[capability]]
id = "func.uuid_extract"
description = "PURE uuid inspectors (spec/design/functions.md §12), oracle-checked against PostgreSQL 18 — uuid_extract_version(uuid) → i16 (the version nibble) and uuid_extract_timestamp(uuid) → timestamptz (the embedded instant). Both gate on the RFC 4122 variant ((byte8 & 0xC0)==0x80) and return NULL off-variant (Microsoft GUIDs, the nil uuid); uuid_extract_timestamp returns the instant for VERSION 1 and 7 only (v7 = 48-bit ms; v1 = 60-bit Gregorian 100ns minus the 1582→1970 offset, truncated to micros) and NULL for every other version (v6 included, matching PG 18). NULL input propagates"

[[capability]]
id = "func.uuid_generate"
description = "VOLATILE uuid generators on the host-injected entropy+clock seam (spec/design/entropy.md) — uuidv4() (random) and uuidv7([shift interval]) (48-bit ms timestamp + a per-statement monotonic counter in rand_a + random rand_b; an out-of-48-bit/pre-epoch ms traps 22008; the optional interval shifts the embedded instant via calendar-aware timestamptz arithmetic). A spec'd byte-exact PRNG (splitmix64) makes the seeded path cross-core identical; the `# seed:` and `# clock:` corpus directives inject a fixed seed + statement clock so the output is exact and deterministic (production reads OS entropy + the wall clock). NOT oracle-imported (PG's entropy differs); cost is one operator_eval per call, independent of the random values. Builds on types.uuid"

[[capability]]
id = "func.now"
description = "STABLE current-time function now() [alias: the bare keyword current_timestamp] → timestamptz, on the host-injected clock seam (spec/design/entropy.md §5, determinism.md §5). Statement-stable: the clock is read ONCE per statement and reused for every row (PG's now() semantics), so a statement's time cannot vary row-to-row. current_timestamp is parser sugar for now() (same value, same `now` column label, same cost). The `# clock:` / `# clock_advance:` corpus directives inject a fixed / advancing clock so output is exact and deterministic cross-core; production reads the wall clock. NOT oracle-imported (PG's wall clock differs); cost is one operator_eval per call, independent of the clock value. Builds on types.timestamptz"

[[capability]]
id = "func.clock_timestamp"
description = "VOLATILE current-time function clock_timestamp() → timestamptz, on the host-injected clock seam (spec/design/entropy.md §5, determinism.md §5). Per-call: reads the clock on EVERY evaluation (distinct from the statement-stable now()), so it may advance within a statement. The `# clock_advance: start,step` corpus directive injects an advancing clock (one increment per read, in expression-evaluation order) so the per-call reads are deterministic and distinguishable from now() cross-core; production reads the wall clock per call. NOT oracle-imported (PG's wall clock differs); cost is one operator_eval per call. Builds on types.timestamptz"

[[capability]]
id = "error.division_by_zero"
description = "Integer division / modulo by zero is defined and traps SQLSTATE 22012"

# Resource accounting (CLAUDE.md §13) — orthogonal to the SQL feature levels, so it is
# not bundled into a profile. A core declares it once its harness can assert the
# deterministic, cross-core-identical query cost (the `# cost:` directive).
[[capability]]
id = "resource.cost_metering"
description = "Deterministic, cross-core-identical query cost accounting (CLAUDE.md §13)"

[[capability]]
id = "resource.cost_limit"
description = "Caller-set execution-cost ceiling (`max_cost`) with a deterministic, cross-core-identical abort (54P01) the instant accrued cost reaches it (CLAUDE.md §13; spec/design/cost.md §6). The safety gate for untrusted, user-supplied queries; the `# max_cost: N` corpus directive runs the next record under a ceiling of N. Builds on resource.cost_metering."

[[capability]]
id = "resource.depth_limit"
description = "Fixed maximum expression / subquery / set-operation nesting depth (MAX_EXPR_DEPTH = 256), checked in the parser and aborting with 54001 (statement_too_complex) (CLAUDE.md §13; spec/design/cost.md §7). The SECOND untrusted-query safety gate: it guards the native call stack, which the cost ceiling cannot — deeply-nested input overflows the recursive parser/resolve/eval walks BEFORE any cost is metered. The limit is a deterministic, cross-core-identical constant (a documented divergence from PG's runtime stack probe), so the same statement is accepted or rejected identically in every core; not oracle-checked."

[[capability]]
id = "resource.sql_length_limit"
description = "Per-handle maximum input SQL length in bytes (`max_sql_length`, default 1 MiB, `0` ⇒ unlimited), checked at the handle's parse entry and aborting with 54000 (program_limit_exceeded) BEFORE lexing (CLAUDE.md §13; spec/design/cost.md §7, api.md §8). The input-size sibling of resource.depth_limit: both bound the parse before any cost is metered (the 54P01 cost ceiling cannot catch parse-time blowup), and together they bound the parse tree in both dimensions — depth (54001) and breadth/total size (54000). Because jed is single-statement-per-call and nothing desugars super-linearly, the input-byte cap transitively bounds the parse-tree node count too. The `# max_sql_length: N` corpus directive runs the next record under a (small) cap. jed-specific (PG has no fixed query-length limit), so not oracle-checked; the cap is a deterministic, cross-core-identical setting."

[[capability]]
id = "resource.identifier_length_limit"
description = "Fixed maximum identifier length (MAX_IDENTIFIER_LENGTH = 63 bytes), checked at the lexer's identifier-token production and aborting with 42622 (name_too_long) on every parse path (CLAUDE.md §13; spec/design/cost.md §7). Bounds an unbounded table/column/type/alias/function name — which would otherwise consume O(input) memory and land verbatim in the on-disk catalog and keys. Matches PostgreSQL's NAMEDATALEN−1 boundary but ERRORS where PG silently truncates (a documented PG divergence: jed has no notices, and silent truncation could collide two distinct names). Identifiers are ASCII-only (grammar.md §3), so bytes = characters; the limit is a deterministic, cross-core-identical constant, so not oracle-checked."

[[capability]]
id = "resource.composite_depth_limit"
description = "Fixed maximum composite-type nesting depth (MAX_COMPOSITE_DEPTH = 32), enforced at the two producers of catalog types: a CREATE TYPE whose result would nest deeper than the limit aborts with 54001 (statement_too_complex), and a loaded catalog that exceeds it is rejected as corrupt with XX001 (data_corrupted) (CLAUDE.md §13; spec/design/cost.md §7b, composite.md §3). The third native-stack untrusted-query gate, completing resource.depth_limit's coverage: a chain of cheap CREATE TYPEs each nesting the previous (`a`, `b AS (x a)`, …) builds unbounded depth across MANY statements — which neither the per-statement input-size cap (resource.sql_length_limit) nor the parser nesting counter (resource.depth_limit) sees, because the depth is a property of the catalog graph, not any one statement's AST. Bounding it at the producer makes every derived recursive walk (value codec, comparator, record_out/record_in, resolve_col_type) transitively stack-safe. An array field counts as its element (array levels are not composite levels — composite_ref looks through one array level). A deterministic, cross-core-identical constant (a documented divergence from PG, which bounds composite nesting only by a runtime stack probe), so not oracle-checked. Builds on types.composite."

[[capability]]
id = "resource.regex_program_limit"
description = "Fixed maximum regex compiled-program size (MAX_REGEX_PROGRAM = 32768 NFA instructions), enforced at the pattern compiler: a well-formed pattern whose compiled program would exceed the cap — chiefly via bounded-repetition {n,m} unroll (`(a{1000}){1000}`) — aborts with 54001 (statement_too_complex), checked PROJECTIVELY before the oversized program is allocated (CLAUDE.md §13; spec/design/cost.md §7c, regex.md §6). The fourth native-stack/allocation-bound untrusted-query gate, the regex sibling of resource.composite_depth_limit: it protects the UNLIMITED handle (max_cost = 0) where the regex_compile cost ceiling cannot reach. A MALFORMED pattern is 2201B instead (invalid_regular_expression). A deterministic, cross-core-identical constant (jed-specific — PG bounds regex size differently), so not oracle-checked. Builds on expr.regex_match."

[[capability]]
id = "resource.temp_budget"
description = "Temporary-table storage budget (spec/design/temp-tables.md §7) — the §13 gate on RETAINED temp bytes, the hazard no cost ceiling covers (max_cost bounds work per statement, lifetime_max_cost across statements; neither bounds bytes a temp table HOLDS between cheap statements). `temp_buffers` (a per-session byte budget, 0 ⇒ unlimited) bounds a session's total temp footprint; an over-budget temp write aborts 54P03 (temp_storage_limit_exceeded). Measured in BYTE-IDENTICAL on-disk record bytes (record_size, summed over every temp table + index store — NOT the per-core work_mem spill estimator), checked per-statement, so the abort point is a pure function of (operations, budget), identical across cores (§8). The over-budget write is staged, so the abort rolls it back (nothing commits); the within-statement bound stays max_cost. The `# temp_buffers: N` directive sets the per-record budget (like `# max_cost:`). jed-specific (PostgreSQL bounds temp storage only via nondeterministic OS limits), so cross-core-checked, not oracle-checked. Builds on ddl.temp_table."

[[capability]]
id = "resource.shared_temp_budget"
description = "Shared-temporary-table storage budget (spec/design/temp-tables.md §7) — the GLOBAL analogue of resource.temp_budget for DATABASE-WIDE shared temp tables (ddl.shared_temp_table). `shared_temp_mem` (a Database-level byte budget, 0 ⇒ unlimited — shared temp data is global, so its budget must be too) bounds total shared-temp storage across sessions; an over-budget shared-temp write aborts the SAME 54P03 (temp_storage_limit_exceeded), staged so the abort rolls it back. Measured identically — BYTE-IDENTICAL on-disk record bytes summed over every shared-temp table + index store — and checked per-statement, so the abort point is a pure function of (operations, budget), identical across cores (§8). The `# shared_temp_mem: N` directive sets the per-record budget (like `# temp_buffers:`). jed-specific, so cross-core-checked, not oracle-checked. Builds on ddl.shared_temp_table."

[[capability]]
id = "resource.pure_builtins"
description = "The built-in function/operator surface is pure and side-effect-free, and the grammar exposes no host-reaching statement (CLAUDE.md §13 guarantee #2; spec/design/functions.md §13). The THIRD untrusted-query safety pillar: the first two BOUND a query (cost ceiling, nesting depth), this one bounds what it can REACH. No built-in touches the filesystem, network, process, or environment, and none adds nondeterminism outside the host-injected entropy/clock seam (uuidv4/uuidv7, now()/clock_timestamp()). Enforced as absence: a host-reaching function call is 42883 (undefined_function) and a host-reaching statement keyword is 42601 (syntax_error). A documented divergence from PostgreSQL (which provides pg_read_file/COPY/pg_sleep/current_setting/...), so not oracle-checked; pinned by suites/resource/no_escape_hatch.test."

# Session authorization (spec/design/session.md §5.3, the bucket-A safety envelope) — the
# GRANT/REVOKE privilege model, the §13 untrusted-query envelope made concrete. CLAUDE.md §3 deletes
# in-database users/roles, so the host configures the envelope on the session and the engine
# enforces it (42501) at name resolution. jed-specific (the envelope is host-configured, not
# reachable as SQL roles), so cross-core-checked, NOT PostgreSQL-oracle-checked. The four
# `# default_privileges:` / `# grant:` / `# revoke:` / `# allow_ddl:` corpus directives configure
# the session for the next record (like `# seed:` / `# max_cost:`).
[[capability]]
id = "session.privileges"
description = "Per-object GRANT/REVOKE authorization — per-table SELECT/INSERT/UPDATE/DELETE and per-function EXECUTE, enforced at name resolution with 42501 (insufficient_privilege) once a name resolves to an existing catalog object (a missing object stays 42P01) (spec/design/session.md §5.3). Three layers compose into the effective set for OP on object X: the default_privileges granted to every table (the GRANT … ON ALL TABLES default; a read-only session is {SELECT}), per-object grant (additions), and per-object revoke (removals) — OP ∈ (default ∪ grant[X]) \\ revoke[X], with revoke winning (deny is order-independent). A statement needs SELECT on every table it reads (FROM/JOIN, subqueries, an INSERT … SELECT source, an UPDATE/DELETE WHERE / RHS / RETURNING) and INSERT/UPDATE/DELETE on its write target (a bare INSERT … VALUES needs only INSERT; UPDATE t … WHERE needs UPDATE and SELECT), plus EXECUTE on every named function called (built-in operators are not gated). The `# default_privileges:` / `# grant:` / `# revoke:` directives configure the session for the next record. jed-specific (host-configured envelope, no SQL role catalog), so cross-core-checked, not oracle-checked. v1 narrowings: base-table + named-function names only (no per-column GRANT); function EXECUTE defaults on (the deny-list shape) — a default-off function allow-list is deferred."

[[capability]]
id = "session.allow_ddl"
description = "The single DDL gate — a session capability `allow_ddl` (default on) governing CREATE/DROP/ALTER of tables, indexes, types, and sequences; a denied schema change is 42501 (spec/design/session.md §5.3). jed has no schema/owner model (CLAUDE.md §3), so all DDL folds under one boolean (a per-object CREATE/ownership privilege is a deferred follow-on). The `# allow_ddl: on|off` directive sets it for the next record. jed-specific (host-configured), so cross-core-checked, not oracle-checked. Builds on session.privileges."

[[capability]]
id = "session.allow_temp_ddl"
description = "The temp-scoped split of the DDL gate (spec/design/temp-tables.md §5) — `allow_temp_ddl` governs CREATE/DROP of a SESSION-LOCAL temporary table, independent of `allow_ddl` (which now scopes to persistent DDL). The split lets a host serve an untrusted session bounded scratch tables (allow_ddl off + allow_temp_ddl on) while withholding persistent schema changes; the two new gates (the other is allow_shared_temp_ddl) default-inherit allow_ddl's value, so existing callers are unaffected. CREATE TEMP is gated statically; DROP of a temp table is gated by resolving the name. A denied temp DDL is 42501. The `# allow_temp_ddl: on|off` directive sets it for the next record. jed-specific (host-configured), so cross-core-checked, not oracle-checked. Builds on session.allow_ddl and ddl.temp_table."

[[capability]]
id = "session.allow_shared_temp_ddl"
description = "The shared-temp-scoped split of the DDL gate (spec/design/temp-tables.md §5) — `allow_shared_temp_ddl` governs CREATE/DROP of a DATABASE-WIDE shared temporary table (ddl.shared_temp_table), independent of `allow_ddl` and `allow_temp_ddl`. Shared-temp DDL mutates GLOBAL state and charges the global budget (resource.shared_temp_budget), so it is the more privileged of the two temp gates. Like allow_temp_ddl it default-inherits allow_ddl's value (so existing callers are unaffected). CREATE SHARED TEMP is gated statically; DROP of a shared temp table is gated by resolving the name. A denied shared-temp DDL is 42501. The `# allow_shared_temp_ddl: on|off` directive sets it for the next record. jed-specific (host-configured), so cross-core-checked, not oracle-checked. Builds on session.allow_ddl and ddl.shared_temp_table."

# Per-session cumulative cost budget (spec/design/session.md §5.4). Sibling to resource.cost_limit:
# where `max_cost` bounds ONE statement (54P01), `lifetime_max_cost` bounds the whole SESSION (54P02).
# The cumulative cost is session state that builds across records on the one Database the harness runs
# a file against, so a sticky `# lifetime_max_cost: N` directive + an ordered statement sequence pins
# the abort cross-core (the per-record `# cost:` cannot express a cumulative budget).
[[capability]]
id = "session.lifetime_cost"
description = "Per-session cumulative cost budget — `lifetime_max_cost` bounds the SESSION's running cost total, aborting the in-flight statement with 54P02 (session_cost_limit_exceeded) the instant the cumulative reaches the budget (spec/design/session.md §5.4). Sibling to resource.cost_limit's per-statement `max_cost`/54P01; a statement aborts at whichever ceiling it reaches first. The budget is a hard, monotonic allowance: an aborted statement's partial cost still counts, and once it is spent every further statement is rejected 54P02 at admission (it cannot accrue). The cumulative is session state, not snapshot state, so it does NOT roll back with a transaction. The sticky `# lifetime_max_cost: N` directive sets the budget for the rest of the file (the cumulative builds across records on the one Database). jed-specific (PostgreSQL has no execution-cost budget), so cross-core-checked, not oracle-checked. Builds on resource.cost_metering."

# Session variables (spec/design/session.md §6.1) — PostgreSQL's GUC model scoped to the session: a
# string→string map the host configures (session.set_var / reset_var / var) and SQL reads with
# current_setting('name'[, missing_ok]). The session is the "fourth host seam" (§6), and the values
# feed query RESULTS, so they are deterministic and cross-core. v1 is the host API + current_setting
# read only; the SQL SET/RESET/SHOW grammar, set_config(), and SET LOCAL are deferred follow-ons.
[[capability]]
id = "session.variables"
description = "Session variables — PostgreSQL's GUC model scoped to the session: a string→string map the host sets through the API (session.set_var / reset_var / var) and SQL reads with current_setting('name'[, missing_ok]) (spec/design/session.md §6.1). A custom variable is namespaced like PG (a dotted name, e.g. myapp.tenant); setting a non-dotted name is 42704 (no built-in setting reaches this map in v1 — the time_zone built-in is a separate slice). current_setting on an unset name is 42704 (unrecognized configuration parameter) unless the two-arg overload passes missing_ok = true, which returns NULL; current_setting(NULL) is NULL (the function is STABLE, null-propagating). Variables are session state, not snapshot state, so they do NOT roll back with a transaction (PG SET SESSION; SET LOCAL is deferred). The `# set: name=value, …` directive configures the session for the next record (reset after, like `# seed:` / `# grant:`). The configuration mechanism is jed's host API (not reproducible as the same SQL against PG), so cross-core-checked, not oracle-checked. v1 narrowing: host API + current_setting only — the SQL SET/RESET/SHOW grammar, set_config(), and transaction-scoped SET LOCAL are deferred follow-ons."

# Transaction control (Phase 5, spec/design/transactions.md §4). The SQL surface
# BEGIN/COMMIT/ROLLBACK over the handle's single current transaction; tested by deterministic,
# single-handle visibility sequences (the harness runs a whole .test file against one Database).
[[capability]]
id = "txn.explicit"
description = "Explicit transaction blocks — BEGIN [TRANSACTION|WORK] / START TRANSACTION ... COMMIT|END / ROLLBACK. A block's INSERT/UPDATE/DELETE and DDL CREATE/DROP commit atomically or roll back together (read-your-writes within the block); a nested BEGIN is 25001; a COMMIT/ROLLBACK with no open block is a lenient no-op success (no 25P01). spec/design/grammar.md §27"

[[capability]]
id = "txn.read_only"
description = "Transaction access modes — BEGIN READ ONLY / READ WRITE (default READ WRITE). A write statement in a READ ONLY block is 25006 (read_only_sql_transaction); ROLLBACK clears it and autocommit resumes. spec/design/transactions.md §4.3"

[[capability]]
id = "txn.failed_state"
description = "Failed-block poisoning — a statement error inside an explicit block aborts the transaction; every later statement but ROLLBACK/COMMIT is 25P02 (in_failed_sql_transaction), and COMMIT of a failed block acts as ROLLBACK (PostgreSQL). The whole working set is discarded, including statements that succeeded before the error. spec/design/transactions.md §6"

# Shared-handle concurrency (Phase 5 P5.3b, spec/design/transactions.md §8/§10). Tested by the
# deterministic schedule format — a `# format: concurrency` .test file under suites/concurrency/,
# an explicit total order over named read/write sessions (spec/design/concurrency-testing.md §4).
# A core that has not implemented the shared handle declares none of these, so its harness skips
# such files before parsing (the capability gate); the format never reaches the sequential runner.
[[capability]]
id = "txn.shared"
description = "The thread/goroutine-safe SharedDb handle — concurrent readers running in parallel with a single writer, the writer publishing the committed snapshot atomically (CLAUDE.md §3, spec/design/transactions.md §10). The schedule format opens named read/write sessions over one SharedDb and runs a deterministic total order of operations against them (spec/design/concurrency-testing.md §4)."

[[capability]]
id = "txn.read_handle"
description = "A ReadHandle pins one committed snapshot at read() and serves every read from it for the handle's life — snapshot isolation, never blocked by and never blocking a writer; a write through it is 25006 (without poisoning the handle); close() deregisters it. spec/design/transactions.md §10"

[[capability]]
id = "txn.watermark"
description = "The reader-liveness watermark — oldest_live_txid is the minimum version any still-open reader pins, or the committed version when none is live (the Phase-6 free-list reclamation gate). A pinned reader holds it back; closing the reader lets it advance. spec/design/transactions.md §8"

[[capability]]
id = "txn.gate_blocking"
description = "The write-gate `blocks` annotation (Layer 2) — `open <sid> write blocks` asserts the single-writer gate is currently held, so the writer-open is queued rather than run (calling write() now would block the runner) and logically completes the instant the holding writer commits/rolls back: the equivalent serial order. Deterministic on every core (a single-threaded core queues the open; it never needs to truly block); the threaded cores additionally verify real blocking under the race detector. At most one writer may be blocked at a time (the single-writer model). spec/design/concurrency-testing.md §5"

[[capability]]
id = "expr.collate"
description = "The COLLATE expression operator + ORDER BY … COLLATE over a vendored collation (collation slice 1c + the reference-only pivot, spec/design/collation.md §2/§9/§14). A collation is VENDORED into the binary; the `# load-collation: name = fixture` corpus directive declares which vendored collation a test needs (a no-op when vendored, as the dev collations are — it compiles the fixture only as a fallback for a not-yet-vendored name). `expr COLLATE \"name\"` and `ORDER BY col COLLATE \"name\"` then order text by that collation's UCA sort key in the ordering comparisons (< <= > >=) — `=`/`<>` stay byte-equality (deterministic-collation equality is byte-identity). `\"C\"` is the built-in byte/code-point order. Errors: two different explicit collations conflict (42P21), a name neither vendored nor referenced is 42704, COLLATE on a non-text type is 42804. Charged by the `collate` cost unit (per code point of each ordering-comparison operand)."

[[capability]]
id = "expr.at_time_zone"
description = "The AT TIME ZONE operator (and the timezone(zone, value) function it desugars to) + host-loaded IANA time-zone data (spec/design/timezones.md §6, grammar.md §49, spec/tz/README.md). `value AT TIME ZONE zone` converts between an instant and a local wall clock: `timestamptz AT TIME ZONE zone` -> timestamp (render the UTC instant as local in the zone) and `timestamp AT TIME ZONE zone` -> timestamptz (interpret the wall clock as in the zone). A zone is provided by a host-loaded JTZ bundle of RFC 8536 TZif (the `# load-timezone: [zone]` corpus directive loads jed's pinned spec/tz/fixtures/tzdata.jtz, exactly as a production host would); `UTC` and fixed `±HH:MM` offsets are built in (the fixed offset uses the POSIX sign — '+05:30' means UTC-5:30, matching PG). NULL propagates, ±infinity passes through, an unknown zone is 22023, a non-text zone is 42883 (PG resolves via function overload). Charged by the `timezone` cost unit (once per conversion). No on-disk change — timestamptz is a UTC i64, so its order is tz-independent (timezones.md §2)."

[[capability]]
id = "session.timezone"
description = "The session time-zone slot (spec/design/session.md §6.2, timezones.md §9.4): the built-in `time_zone` setting (default `UTC`) — the zone a `timestamptz` is decomposed in by date_trunc / EXTRACT / the cross-family datetime casts. Set through the host API (set_time_zone / SessionOptions::time_zone), validated against the loaded set (`UTC` + fixed `±HH:MM` offsets always; a named IANA zone when a loaded JTZ bundle provides it, else 22023). The `# timezone: <zone>` corpus directive sets it for the next record (reset to UTC after, like `# set:`). No SQL `SET TIME ZONE` grammar yet; the slot drives computation, not yet timestamptz rendering (which stays UTC — §9.5). Session state (no storage effect). The configuration is jed's host API (not the same SQL on PG), so cross-core-checked; the resulting query is oracle-checked under a matching `SET TIME ZONE` on the oracle."

[[capability]]
id = "expr.date_trunc"
description = "date_trunc(unit, source[, zone]) (spec/design/timezones.md §9.1, grammar.md §50): truncate a datetime down to `unit` (microseconds/milliseconds/second/minute/hour/day/week/month/quarter/year/decade/century/millennium, case-insensitive; an unrecognized unit is 22023 at eval). 2-arg over timestamp -> timestamp, timestamptz -> timestamptz (truncated in the SESSION zone), interval -> interval (no `week`, 0A000); 3-arg date_trunc(unit, timestamptz, zone) -> timestamptz truncates in the explicit zone. A `date` argument is 42883 (no implicit date->timestamp cast). ±infinity passes through. The session/explicit-zone forms charge the `timezone` cost unit; the zone-free forms only `operator_eval`."

[[capability]]
id = "expr.extract"
description = "EXTRACT(field FROM source) (spec/design/timezones.md §9.2, grammar.md §50): the requested datetime field as `numeric` (PG 14+). The field is syntactic (identifier or string literal, case-insensitive), validated at resolve. Source is timestamp / timestamptz / date / interval (else 42883); the field-validity matrix matches PG (an unsupported field for the type is 0A000, an unrecognized field is 22023). For a timestamptz source every field is computed in the SESSION zone except `epoch` (the instant) and the `timezone*` fields (the session offset). `julian` is a deferred field (0A000, a documented divergence). `date_part` is deferred (it returns double precision, and jed has no float type). The session-zone fields charge `timezone`."

[[capability]]
id = "cast.datetime"
description = "The cross-family timestamp/timestamptz/date casts in a zone (spec/design/timezones.md §9.3, spec/types/casts.toml): the six explicit (timestamp, timestamptz, date) cast pairs. Casts crossing the timestamptz boundary (timestamp<->timestamptz, timestamptz->date, date->timestamptz) consult the SESSION zone and charge `timezone`; timestamp<->date is zone-free calendar arithmetic. ±infinity and NULL pass through. The text<->datetime casts stay deferred (a string still adapts to a datetime context by literal adaptation)."

[[capability]]
id = "harness.fixture_open"
description = "The conformance harness can run a .test file against a PRE-BUILT on-disk database image named by a file-level `# fixture: <spec-relative-path>` directive, instead of the default fresh in-memory database. This lets the corpus exercise persisted state that SQL cannot construct — chiefly the collation version-SKEW read-safety regression (spec/design/collation.md §12/§14): a file whose collation pin (e.g. a bogus 9999.0.0) differs from the loaded JUCD bundle, carrying a secondary index whose stored keys are WRONG for the loaded collation. The harness loads the production bundle, then reconstructs the database in memory (`from_image` / `LoadDatabase` / `loadDatabase`) read-WRITE, so reads run and a write hits the real XX002 skew guard. A capability rather than always-on, so a core whose harness has not yet implemented `# fixture:` declares it unsupported and skips the file cleanly (instead of mis-parsing the directive as a comment and running against an empty DB)."

[[capability]]
id = "harness.upgrade_collations"
description = "The conformance harness can run the COLLATION UPGRADE migration on the running database via a file-level `# upgrade-collations:` directive — the privileged host op `db.upgrade_collations()` (spec/design/collation.md §12). It rebuilds every collated key stored under a version-SKEWED collation against the loaded JUCD bundle and re-pins the stamp, clearing the skew so the affected tables are read-write again and their collated indexes regain pushdown. Paired with `# fixture:` it lets a shared corpus test drive the full skew→migrate→writable arc on a pre-built skewed image (which SQL cannot construct): assert a write is XX002 (still skewed), `# upgrade-collations:`, then assert the same write succeeds and a query is served correctly by the rebuilt index. A capability rather than always-on, so a core whose harness has not yet wired the directive declares it unsupported and skips the file cleanly."

[[capability]]
id = "ddl.collate_column"
description = "A per-column COLLATE clause in CREATE TABLE (`name text COLLATE \"en-US\"`) — collation slice 1d, spec/design/collation.md §1/§5. The column's effective collation is frozen at CREATE TABLE (text-only, else 42804; the name must be loaded or \"C\", else 42704). A column reference's IMPLICIT collation in the derivation: `ORDER BY name` / `name < other` use the column's collation with no explicit COLLATE. Two different IMPLICIT collations in one comparison (C counts as a distinct implicit collation) with no explicit COLLATE to break the tie is 42P22 (indeterminate_collation), resolved by an explicit COLLATE. Persisted as column flag bit6 + a trailing name (format_version 17 — verified by the on-disk goldens, not the corpus)."

# --- profiles ----------------------------------------------------------------
# A named bundle of capabilities = a conformance level. `includes` (optional)
# inherits another profile's capabilities transitively, so profiles are cumulative.
# An implementation "meets" a profile iff its declared capability set is a superset
# of the profile's (transitive) capabilities.

[[profile]]
id = "core"
title = "The \"it's alive\" milestone — integer DDL/DML/SELECT (CLAUDE.md §11 step 5)"
capabilities = [
  "ddl.create_table",
  "ddl.primary_key",
  "dml.insert",
  "query.select",
  "query.where_eq",
  "query.is_null",
  "query.order_by",
  "types.i16",
  "types.i32",
  "types.i64",
  "null.three_valued",
  "error.overflow_trap",
]

[[profile]]
id = "mutation"
title = "core + row mutation (UPDATE / DELETE)"
includes = "core"
capabilities = ["dml.update", "dml.delete"]

[[profile]]
id = "casts"
title = "core + explicit CAST narrowing (spec/types/casts.toml)"
includes = "core"
capabilities = ["cast.explicit"]

[[profile]]
id = "comparison"
title = "core + cross-type comparison via the promotion tower (spec/types/compare.toml)"
includes = "core"
capabilities = ["query.comparison_order", "compare.promotion"]

[[profile]]
id = "expression"
title = "comparison + the general expression substrate (arithmetic, boolean, logical connectives)"
includes = "comparison"
capabilities = [
  "types.boolean",
  "expr.arithmetic",
  "expr.unary_minus",
  "expr.parens",
  "expr.precedence",
  "expr.comparison_value",
  "expr.not_equal",
  "query.logical_connectives",
  "query.is_distinct_from",
  "error.division_by_zero",
]

[[profile]]
id = "decimal"
title = "expression + the exact decimal / numeric type (numeric(p,s), comparison, casts, arithmetic)"
includes = "expression"
capabilities = ["types.decimal", "expr.decimal_arithmetic"]

[[profile]]
id = "functions"
title = "decimal + scalar functions abs / round (per-row, valid anywhere an expression is)"
includes = "decimal"
capabilities = [
  "func.abs",
  "func.round",
  "func.uuid_extract",
  "func.uuid_generate",
  "func.now",
  "func.clock_timestamp",
]

[[profile]]
id = "joins"
title = "decimal + multi-table FROM with INNER/CROSS JOIN, table aliases, and qualified columns (Phase 4)"
includes = "decimal"
capabilities = [
  "query.join_inner",
  "query.cross_join",
  "query.table_alias",
  "query.qualified_column",
]

[[profile]]
id = "outer_joins"
title = "joins + LEFT/RIGHT/FULL [OUTER] JOIN — unmatched rows NULL-extended on the absent side (Phase 4)"
includes = "joins"
capabilities = [
  "query.join_left",
  "query.join_right",
  "query.join_full",
]

[[profile]]
id = "constraints"
title = "outer_joins + the NOT NULL / DEFAULT (constant + expression) column constraints + INSERT column list / INSERT ... SELECT (spec/design/constraints.md)"
includes = "outer_joins"
capabilities = [
  "ddl.not_null",
  "ddl.column_default",
  "ddl.column_default_expr",
  "dml.insert_column_list",
  "dml.insert_select",
]

[[profile]]
id = "aggregates"
title = "decimal + scalar aggregates COUNT/SUM/MIN/MAX/AVG over the whole table — no GROUP BY (Phase 2)"
includes = "decimal"
capabilities = [
  "query.aggregates",
]

[[profile]]
id = "grouping"
title = "aggregates + GROUP BY bucketing, the grouping-error rule, and ORDER BY over grouping keys (Phase 2)"
includes = "aggregates"
capabilities = [
  "query.group_by",
]

[[profile]]
id = "having"
title = "grouping + HAVING — a boolean filter over grouped rows, after aggregation, before ORDER BY (Phase 2)"
includes = "grouping"
capabilities = [
  "query.having",
]

[[profile]]
id = "predicates"
title = "decimal + the predicate forms IN / BETWEEN / LIKE / CASE (Phase 2, spec/design/grammar.md §20-§23)"
includes = "decimal"
capabilities = [
  "expr.in_list",
  "expr.between",
  "expr.like",
  "expr.case",
]

[[profile]]
id = "timestamps"
title = "outer_joins + the datetime types (timestamp / timestamptz, instant model, no time zone db)"
includes = "outer_joins"
capabilities = [
  "types.timestamp",
  "types.timestamptz",
]

[[profile]]
id = "set_operations"
title = "decimal + set operations UNION/INTERSECT/EXCEPT (each [ALL]) with PG precedence, column-type unification, and a trailing ORDER BY by output name (Phase 4, spec/design/grammar.md §25)"
includes = "decimal"
capabilities = [
  "query.union",
  "query.intersect",
  "query.except",
]

[[profile]]
id = "transactions"
title = "mutation + explicit transactions: BEGIN/COMMIT/ROLLBACK, READ ONLY/READ WRITE access modes, and failed-block poisoning (Phase 5, spec/design/transactions.md §4)"
includes = "mutation"
capabilities = [
  "ddl.drop_table",
  "txn.explicit",
  "txn.read_only",
  "txn.failed_state",
]

[[profile]]
id = "subqueries"
title = "having + joins + subqueries: scalar (SELECT ...), x [NOT] IN (SELECT ...), [NOT] EXISTS (SELECT ...), both uncorrelated (folded once at plan time) and correlated (planned once, re-executed per outer row, any depth); a $N inside is typed by an inner context (uninferable -> 42P18); a correlated GROUP BY|ORDER BY key -> 0A000 (Phase 4, spec/design/grammar.md §26)"
includes = "having"
capabilities = [
  "query.join_inner",
  "query.table_alias",
  "query.qualified_column",
  "expr.in_list",
  "query.subquery_scalar",
  "query.subquery_in",
  "query.subquery_exists",
  "query.subquery_correlated",
  "query.subquery_quantified",
]

[[profile]]
id = "cte"
title = "subqueries + set operations + common table expressions: WITH [RECURSIVE] name [(cols)] AS [NOT] MATERIALIZED (query) [, ...] <query>, forward-only visibility, PG's hybrid inline-single / materialize-multi rule, recursive fixpoint (working-table) evaluation, and derived tables FROM (SELECT …) AS t (Phase 4, spec/design/cte.md, spec/design/recursive-cte.md, grammar.md §42)"
includes = "subqueries"
capabilities = [
  "query.cross_join",
  "query.union",
  "query.intersect",
  "query.except",
  "query.cte",
  "query.cte_recursive",
  "query.cte_data_modifying",
  "dml.with_clause",
  "query.derived_table",
  "query.values",
  "query.lateral",
]
