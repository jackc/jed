# Conformance manifest — CANONICAL DATA (CLAUDE.md §5, §7).
#
# The conformance taxonomy has THREE independent axes (see ../design/conformance.md):
#   1. suites/      — the directory tree; ORGANIZES tests by feature area.
#   2. capabilities — fine-grained features an implementation declares it supports.
#                     Each .test file declares the capabilities it needs via an
#                     in-band `# requires:` header line; a test runs for an impl iff
#                     the impl supports every capability the test requires.
#   3. profiles     — named, cumulative bundles of capabilities = the conformance
#                     LEVELS an implementation targets ("does impl X meet `core`?").
#
# This file defines axes 2 and 3 (axis 1 is the filesystem). TEST-TIME ONLY — the
# harness reads it; no shipped engine does. Validated by `rake verify`.

schema_version = 1

# --- capabilities ------------------------------------------------------------
# One feature an implementation may support, named with a dotted id. Add a
# capability only when some .test file actually requires it (the checker rejects
# orphans). Implementations declare the set they support; tests declare the set
# they require.

[[capability]]
id = "ddl.create_table"
description = "CREATE TABLE with typed columns"

[[capability]]
id = "ddl.primary_key"
description = "PRIMARY KEY column constraint (enables point lookup by key)"

[[capability]]
id = "ddl.composite_primary_key"
description = "Table-level PRIMARY KEY (a, b, …) constraint — a composite key over one or more columns in LIST order (any order — the order narrowing was lifted by the format-5 catalog reshape); key bytes are the members' concatenated encodings, uniqueness is over the whole tuple (23505), every member is implicitly NOT NULL; PG-matching DDL errors 42703/42701/42P16 (spec/design/constraints.md §3, grammar.md §28)"

[[capability]]
id = "ddl.secondary_index"
description = "CREATE INDEX [name] ON t (cols) / DROP INDEX name — non-unique secondary indexes: PG auto-naming (t_col_idx + suffixes), relation namespace shared with tables (42P07), validation order 42P01/42703/0A000/42P07, DROP errors 42704/42809; maintained on every write; the planner bounds a SELECT base-relation scan by a first-column equality (spec/design/indexes.md, grammar.md §30)"

[[capability]]
id = "ddl.unique"
description = "UNIQUE constraints + unique indexes — column-level and table-level [CONSTRAINT name] UNIQUE (cols) and CREATE UNIQUE INDEX, all backed by a unique secondary index: PG auto-naming (t_col_key + suffixes; an explicit CONSTRAINT name names the index), identical-list dedup/PK fold, NULLS DISTINCT enforcement at INSERT/UPDATE (23505 names the constraint; UPDATE validates the end state — a documented PG divergence), build-over-duplicates 23505; the v6 catalog persists a per-index unique flag (spec/design/constraints.md §5, indexes.md §8)"

[[capability]]
id = "ddl.check"
description = "CHECK constraints — column-level and table-level [CONSTRAINT name] CHECK (expr): boolean row predicates enforced per candidate row at INSERT/UPDATE (23514; TRUE/NULL pass), evaluated in name order; PG auto-naming (t_col_check / t_check + suffixes); DDL rejections 42804/0A000/42803/42P02/42703/42710; persisted as expression text in the v4 catalog (spec/design/constraints.md §4, grammar.md §29)"

[[capability]]
id = "ddl.drop_table"
description = "DROP TABLE — remove a table (definition + rows) from the catalog; missing table is 42P01 (grammar.md §13)"

[[capability]]
id = "ddl.not_null"
description = "NOT NULL column constraint — storing NULL (direct, defaulted, or omitted) traps 23502 (spec/design/constraints.md §1)"

[[capability]]
id = "ddl.column_default"
description = "DEFAULT <literal> column constraint — evaluated + type-coerced once at CREATE TABLE (bad default traps 22003/42804 there), applied for an omitted column or the DEFAULT keyword (spec/design/constraints.md §2)"

[[capability]]
id = "dml.insert_column_list"
description = "INSERT with an explicit column list `(a, c)` — unlisted columns take their default else NULL; the DEFAULT keyword in a value slot; unknown column 42703, duplicate 42701 (spec/design/grammar.md §12)"

[[capability]]
id = "dml.insert"
description = "INSERT ... VALUES"

[[capability]]
id = "dml.insert_multi_row"
description = "Multi-row INSERT ... VALUES (..),(..) — two-phase / all-or-nothing (grammar.md §12)"

[[capability]]
id = "dml.insert_select"
description = "INSERT ... SELECT — insert the rows a query produces, through the same two-phase / all-or-nothing validation; output arity must match the target (42601) and projected types must be assignable up front (42804, even over an empty source); cost = the embedded SELECT's accrued cost (grammar.md §24)"

[[capability]]
id = "dml.update"
description = "UPDATE ... SET ... [WHERE] (in-place value replacement)"

[[capability]]
id = "dml.delete"
description = "DELETE FROM ... [WHERE]"

[[capability]]
id = "dml.returning"
description = "The RETURNING clause on INSERT/UPDATE/DELETE — the statement becomes a query result projecting each affected row (INSERT the stored row, UPDATE the new row, DELETE the old row); items resolve against the target table only (subqueries allowed and observe the pre-statement snapshot; aggregates 42803); zero affected rows is an empty result; row order unspecified (grammar.md §32, cost.md §3)"

[[capability]]
id = "dml.returning_old_new"
description = "The old./new. row-version qualifiers in a RETURNING list (PG 18 semantics, grammar.md §32): old.col = the pre-statement value, new.col = the post-statement value, the absent side the all-NULL row (INSERT's old, DELETE's new); valid only in RETURNING (elsewhere 42P01), shadowed by a target table actually named old/new, usable inside item subqueries; the WITH (OLD AS o, NEW AS n) aliasing form stays deferred"

[[capability]]
id = "query.select"
description = "SELECT of columns from a single table"

[[capability]]
id = "query.where_eq"
description = "WHERE with an equality predicate ( = )"

[[capability]]
id = "query.comparison_order"
description = "WHERE with an ordering predicate ( < , > , <= , >= )"

[[capability]]
id = "query.point_lookup"
description = "Primary-key predicate pushdown — a single-table WHERE on the primary key (`pk = c`, `pk < c`, BETWEEN, AND-combinations) seeks/ranges the storage B-tree instead of a full scan, so page_read drops to the nodes on the access path and storage_row_read to the rows in range (spec/design/cost.md §3 \"bounded scan / point lookup\"). A cost-visible optimization: a core lacking it would compute the higher full-scan cost, so cost-asserting tests over PK predicates require it."

[[capability]]
id = "query.limit_short_circuit"
description = "LIMIT short-circuit — a single-table query with a LIMIT and no blocking operator (no join, aggregate, DISTINCT, or ORDER BY) streams scan→filter→project and STOPS the scan once the window is filled, so storage_row_read counts only the rows actually read (spec/design/cost.md §3 \"LIMIT short-circuit\"). A cost-visible optimization: a core lacking it scans every row and computes the higher cost, so cost-asserting LIMIT-without-ORDER-BY tests require it."

[[capability]]
id = "query.correlated_pushdown"
description = "Correlated primary-key pushdown — when a correlated subquery's inner query is a single table whose WHERE compares the inner primary key to an enclosing-query column (`inner.pk = outer.col`), the inner scan bounds to that outer row's value (a per-outer-row point lookup/range) instead of re-scanning the whole inner table for every outer row (spec/design/cost.md §3 \"bounded scan / correlated\"). The same point-lookup mechanism as query.point_lookup, with the bound source resolved per outer row; results are unchanged, only the inner re-scan cost drops. A cost-visible optimization: a core lacking it re-scans the whole inner table per outer row and computes the higher cost, so cost-asserting correlated-PK tests require it."

[[capability]]
id = "query.join_pushdown"
description = "Join base-table primary-key pushdown — in a multi-table FROM, each base table is bounded independently by the WHERE predicates on its OWN primary key against a CONSTANT (`a JOIN b … WHERE a.pk = 5`), so that table materializes a seek/range instead of a full scan (spec/design/cost.md §3 \"bounded scan / JOIN\"). The same point-lookup mechanism as query.point_lookup applied per relation; a cross-relation `b.pk = a.x` (index-nested-loop) is NOT bounded (a follow-on). Sound for outer joins: a non-NULL PK conjunct in WHERE eliminates that relation's NULL-extended rows. A cost-visible optimization: a core lacking it full-scans every join base table and computes the higher cost, so cost-asserting join-PK tests require it."

[[capability]]
id = "query.is_null"
description = "IS NULL / IS NOT NULL predicates"

[[capability]]
id = "query.is_distinct_from"
description = "IS [NOT] DISTINCT FROM (NULL-safe equality) predicates"

[[capability]]
id = "query.order_by"
description = "ORDER BY for deterministic multi-row output"

[[capability]]
id = "query.order_by_keys"
description = "ORDER BY with multiple keys, per-key ASC/DESC, and per-key NULLS FIRST|LAST"

[[capability]]
id = "query.select_star"
description = "SELECT * expands to all columns with their canonical names"

[[capability]]
id = "query.column_alias"
description = "Select-list output naming: bare column → canonical name, expr AS alias → alias, other expr → ?column?"

[[capability]]
id = "query.limit"
description = "LIMIT clause: cap the number of returned rows (non-negative integer literal)"

[[capability]]
id = "query.offset"
description = "OFFSET clause: skip leading rows of the result (non-negative integer literal)"

[[capability]]
id = "query.distinct"
description = "SELECT DISTINCT: deduplicate projected output rows (NULL-safe), with the PostgreSQL ORDER-BY-in-select-list restriction"

[[capability]]
id = "query.select_no_from"
description = "FROM-less SELECT — the select list evaluates over ONE virtual zero-column row with no table access (PostgreSQL semantics, spec/design/grammar.md §34): WHERE/LIMIT/OFFSET/DISTINCT/HAVING/aggregates compose (SELECT 1 WHERE false → zero rows; SELECT count(*) → 1 via the single-group rule), and it is a full citizen of set operations, subqueries (a correlated zero-relation scope resolves purely outward), and INSERT ... SELECT. SELECT * with no FROM is 42601 (PG's exact message), a bare column the ordinary 42703. Cost charges no scan units — just the items' metered evaluation plus row_produced (spec/design/cost.md §3)"

[[capability]]
id = "query.join_inner"
description = "INNER JOIN ... ON <expr> — combine rows from two tables on a boolean predicate (left-deep nested loop, 3-valued ON). A bare JOIN is INNER; an INNER JOIN with no ON is 42601 (spec/design/grammar.md §15)"

[[capability]]
id = "query.cross_join"
description = "CROSS JOIN — the Cartesian product of two tables (no ON)"

[[capability]]
id = "query.join_left"
description = "LEFT [OUTER] JOIN ... ON <expr> — every left row preserved; an unmatched left row is emitted once with the right side NULL-extended (3-valued ON; a NULL join key never matches → NULL-extends). spec/design/grammar.md §15"

[[capability]]
id = "query.join_right"
description = "RIGHT [OUTER] JOIN ... ON <expr> — every right row preserved; an unmatched right row is emitted with the left side NULL-extended. spec/design/grammar.md §15"

[[capability]]
id = "query.join_full"
description = "FULL [OUTER] JOIN ... ON <expr> — every row from both sides preserved; unmatched rows on either side are NULL-extended on the absent side. spec/design/grammar.md §15"

[[capability]]
id = "query.table_alias"
description = "Table aliases in FROM — `t AS a` / `t a`; the alias (else the table name) is the relation label, distinct per query (a self-join needs aliases; duplicate label is 42712)"

[[capability]]
id = "query.qualified_column"
description = "Qualified column references `rel.col` — resolved against the named relation; a bare column ambiguous across relations is 42702, unknown relation is 42P01 (spec/design/grammar.md §15)"

[[capability]]
id = "query.aggregates"
description = "Scalar aggregate functions COUNT/SUM/MIN/MAX/AVG over the whole table (no GROUP BY): single-row result; COUNT(*) counts rows, COUNT(expr)/SUM/AVG/MIN/MAX skip NULL; COUNT->0 and SUM/AVG/MIN/MAX->NULL over empty/all-NULL; PG widening (SUM int16/int32->int64, int64->decimal, decimal->decimal; AVG->decimal; MIN/MAX->input type); overflow 22003; aggregate in WHERE/nested is 42803; unknown function 42883; DISTINCT-in-aggregate 42601 (spec/design/aggregates.md)"

[[capability]]
id = "query.group_by"
description = "GROUP BY <column,...>: one result row per distinct grouping-key combination; NULL is its own group; decimal keys bucket value-canonically; first-occurrence group order (ORDER BY over a grouping column overrides); a non-aggregated SELECT/ORDER BY column not in GROUP BY is 42803; GROUP BY over an empty table yields zero rows (spec/design/aggregates.md §5-6, grammar.md §18)"

[[capability]]
id = "query.having"
description = "HAVING <predicate>: boolean filter over grouped rows, after aggregation and before ORDER BY; may reference aggregates (even ones not projected) and grouping keys; a non-grouped column is 42803, non-boolean is 42804; HAVING alone makes a query an aggregate query; HAVING with no GROUP BY filters the single whole-table group (spec/design/aggregates.md §8, grammar.md §19)"

[[capability]]
id = "query.union"
description = "UNION / UNION ALL — combine two SELECTs' result rows; the bare form deduplicates (NULL-safe, value-canonical), ALL keeps multiplicities; output column count + names come from the left operand; per-column type unification (integer max-rank, integer<->decimal, all-NULL->text); arity mismatch 42601, type mismatch 42804; INTERSECT binds tighter; optional trailing ORDER BY/LIMIT/OFFSET resolves by output column name (spec/design/grammar.md §25)"

[[capability]]
id = "query.intersect"
description = "INTERSECT / INTERSECT ALL — rows present in both operands; the bare form is distinct, ALL keeps min(m,n) multiplicities; same column/type unification and trailing ORDER BY rules as UNION; binds tighter than UNION/EXCEPT (spec/design/grammar.md §25)"

[[capability]]
id = "query.except"
description = "EXCEPT / EXCEPT ALL — rows in the left operand not in the right; the bare form is distinct, ALL keeps max(0,m-n) multiplicities; same column/type unification and trailing ORDER BY rules as UNION (spec/design/grammar.md §25)"

[[capability]]
id = "query.subquery_scalar"
description = "Uncorrelated scalar subquery (SELECT ...) in expression position — yields the single row/single column value; 0 rows -> typed NULL, >1 row -> 21000, >1 column -> 42601; executed once at plan time and folded to a constant carrying its output type (so it promotes/compares like that type); correlation is layered by query.subquery_correlated; a bind parameter inside is allowed, typed by its inner context (uninferable -> 42P18) (spec/design/grammar.md §26)"

[[capability]]
id = "query.subquery_in"
description = "x [NOT] IN (SELECT ...) — uncorrelated membership over the subquery's single column; folds to the literal-IN OR-chain so the three-valued NULL logic is inherited (a NULL in the result with no match -> NULL); an empty result -> FALSE (IN) / TRUE (NOT IN) regardless of x; >1 column -> 42601; correlation via query.subquery_correlated; a param inside is typed by its inner context (uninferable -> 42P18) (spec/design/grammar.md §26)"

[[capability]]
id = "query.subquery_exists"
description = "[NOT] EXISTS (SELECT ...) — uncorrelated existence test; boolean (rows>0) XOR negated, the select list is ignored entirely (even SELECT * / SELECT 1,2,3), never NULL; correlation via query.subquery_correlated; a param inside is typed by its inner context (uninferable -> 42P18) (spec/design/grammar.md §26)"

[[capability]]
id = "query.subquery_correlated"
description = "Correlated scalar / IN / EXISTS — the subquery references a column of an enclosing query, resolved via a scope chain (inner FROM first, then outward; nearest scope shadows). Planned once (type/structure errors raised even over an empty outer) and re-executed per outer row. Any correlation depth (parent, grandparent, ...); outer refs allowed inside an aggregate arg/select-list/HAVING as a per-row constant. A $N inside is allowed, typed by an inner context (uninferable -> 42P18). Narrowing: a correlated GROUP BY / ORDER BY key is 0A000 (degenerate) (spec/design/grammar.md §26)"

[[capability]]
id = "types.int16"
description = "int16 / smallint scalar type"

[[capability]]
id = "types.int32"
description = "int32 / int / integer scalar type"

[[capability]]
id = "types.int64"
description = "int64 / bigint scalar type"

[[capability]]
id = "types.text"
description = "text scalar type (variable-width UTF-8, collation C): storage, literals, and comparison/ordering. Non-key column only this slice — a text PRIMARY KEY is rejected 0A000 (spec/design/types.md §11)"

[[capability]]
id = "types.boolean_storable"
description = "storable boolean column: CREATE/INSERT/SELECT of false/true/NULL, boolean×boolean comparison and ORDER BY (false < true). Non-key column only — a boolean PRIMARY KEY is rejected 0A000; boolean⇄integer casts are deferred (spec/design/types.md §9)"

[[capability]]
id = "types.decimal"
description = "decimal / numeric scalar type (exact base-10): the first parameterized type (numeric(p,s)), storage, literals, comparison/ordering, casts (int<->decimal). Non-key column this slice — a decimal PRIMARY KEY is rejected 0A000 (spec/design/decimal.md)"

[[capability]]
id = "expr.decimal_arithmetic"
description = "Decimal arithmetic operators + - * / % and unary - with PostgreSQL result-scale rules and half-away-from-zero rounding (spec/design/decimal.md §4)"

[[capability]]
id = "types.bytea"
description = "bytea scalar type (variable-width raw bytes): storage, hex-input literals, and unsigned-byte comparison/ordering. Non-key column only this slice — a bytea PRIMARY KEY is rejected 0A000 (spec/design/types.md §13)"

[[capability]]
id = "types.uuid"
description = "uuid scalar type (fixed 16-byte RFC 4122 value): storage, PostgreSQL-flexible input literals (braces/hyphens-anywhere/32-hex, any case; canonical 8-4-4-4-12 lowercase output), and unsigned-byte comparison/ordering. uuid is the FIRST non-integer type usable as a PRIMARY KEY — its uuid-raw16 key encoding is exercised (spec/design/types.md §14, encoding.md §2.7)"

[[capability]]
id = "types.timestamp"
description = "timestamp / timestamp without time zone scalar type (zoneless wall clock, int64 microseconds): storage, ISO-8601-ish literals, comparison/ordering, infinity sentinels, and timestamp PRIMARY KEY (key encoding = int64). No time zone db (spec/design/timestamp.md)"

[[capability]]
id = "types.timestamptz"
description = "timestamptz / timestamp with time zone scalar type (UTC instant, int64 microseconds): storage, literals with offset→UTC normalization (offset then discarded), comparison/ordering, infinity, and timestamptz PRIMARY KEY. No named zones (spec/design/timestamp.md)"

[[capability]]
id = "null.three_valued"
description = "Three-valued NULL logic in comparisons (CLAUDE.md §4)"

[[capability]]
id = "error.overflow_trap"
description = "Integer overflow traps with SQLSTATE 22003 (CLAUDE.md §8)"

[[capability]]
id = "cast.explicit"
description = "Explicit CAST(x AS type), including narrowing that may trap"

[[capability]]
id = "compare.promotion"
description = "Cross-type integer comparison via the promotion tower (int16<int32<int64)"

[[capability]]
id = "types.boolean"
description = "boolean / bool scalar type (TRUE/FALSE literals, projected boolean values; expression-only)"

[[capability]]
id = "expr.arithmetic"
description = "Integer arithmetic operators + - * / % with trap-on-overflow (22003)"

[[capability]]
id = "expr.unary_minus"
description = "Unary minus (negation) as an expression operator"

[[capability]]
id = "expr.parens"
description = "Parenthesized sub-expressions"

[[capability]]
id = "expr.precedence"
description = "Operator precedence across logical / comparison / arithmetic levels"

[[capability]]
id = "expr.comparison_value"
description = "Comparisons produce boolean values usable in the SELECT list and nested expressions"

[[capability]]
id = "query.logical_connectives"
description = "AND / OR / NOT with three-valued (Kleene) truth tables"

# Predicate forms (Phase 2, spec/design/grammar.md §20-§23). IN/BETWEEN are sugar over the
# existing =/OR/AND/NOT machinery; LIKE is a text operator; CASE is a primary-level form.
[[capability]]
id = "expr.in_list"
description = "x IN (list) / NOT IN — membership over a non-empty value list, desugared to the OR-chain (x = a OR x = b …); three-valued NULL (1 IN (2,NULL) is NULL); per-element typing (too-wide literal 22003, cross-family 42804); empty IN () is 42601 (spec/design/grammar.md §20)"

[[capability]]
id = "expr.between"
description = "x BETWEEN lo AND hi / NOT BETWEEN — range test desugared to (x >= lo AND x <= hi); Kleene AND gives 5 BETWEEN 10 AND NULL = FALSE but 5 BETWEEN 1 AND NULL = NULL; bounds parse at the additive level so the structural AND is not the connective (spec/design/grammar.md §21)"

[[capability]]
id = "expr.like"
description = "text LIKE pattern / NOT LIKE — % matches any run, _ one code point, default \\ escape; text×text→boolean, NULL propagates, non-text 42804; a pattern ending in a lone escape reached during matching is 22025; code-point (not UTF-16) iteration (spec/design/grammar.md §22)"

[[capability]]
id = "expr.case"
description = "CASE expression (searched + simple forms): lazy first-match evaluation (later arms not evaluated — the one short-circuit exception); searched WHEN must be boolean (42804); result-arm types unify to a common type (numeric promote; cross-family 42804; all-NULL → text); no match + no ELSE → NULL; output name ?column? (spec/design/grammar.md §23)"

# Scalar functions (kind = "function", spec/design/functions.md §9) — named f(args) calls
# evaluated per row, valid anywhere an expression is (unlike aggregates). One capability per
# function so a core can land them independently.
[[capability]]
id = "func.abs"
description = "abs(x) scalar function — abs(int16|int32|int64) → same int type (abs(INT_MIN) overflows, 22003); abs(numeric) → numeric; NULL propagates (spec/design/functions.md §9)"

[[capability]]
id = "func.round"
description = "round(x[, n]) scalar function — numeric/integer → numeric, half-away-from-zero to scale 0 or n places; integer overloads return numeric (PG round(5)); NULL propagates (spec/design/functions.md §9)"

[[capability]]
id = "error.division_by_zero"
description = "Integer division / modulo by zero is defined and traps SQLSTATE 22012"

# Resource accounting (CLAUDE.md §13) — orthogonal to the SQL feature levels, so it is
# not bundled into a profile. A core declares it once its harness can assert the
# deterministic, cross-core-identical query cost (the `# cost:` directive).
[[capability]]
id = "resource.cost_metering"
description = "Deterministic, cross-core-identical query cost accounting (CLAUDE.md §13)"

[[capability]]
id = "resource.cost_limit"
description = "Caller-set execution-cost ceiling (`max_cost`) with a deterministic, cross-core-identical abort (54P01) the instant accrued cost reaches it (CLAUDE.md §13; spec/design/cost.md §6). The safety gate for untrusted, user-supplied queries; the `# max_cost: N` corpus directive runs the next record under a ceiling of N. Builds on resource.cost_metering."

# Transaction control (Phase 5, spec/design/transactions.md §4). The SQL surface
# BEGIN/COMMIT/ROLLBACK over the handle's single current transaction; tested by deterministic,
# single-handle visibility sequences (the harness runs a whole .test file against one Database).
[[capability]]
id = "txn.explicit"
description = "Explicit transaction blocks — BEGIN [TRANSACTION|WORK] / START TRANSACTION ... COMMIT|END / ROLLBACK. A block's INSERT/UPDATE/DELETE and DDL CREATE/DROP commit atomically or roll back together (read-your-writes within the block); a nested BEGIN is 25001; a COMMIT/ROLLBACK with no open block is a lenient no-op success (no 25P01). spec/design/grammar.md §27"

[[capability]]
id = "txn.read_only"
description = "Transaction access modes — BEGIN READ ONLY / READ WRITE (default READ WRITE). A write statement in a READ ONLY block is 25006 (read_only_sql_transaction); ROLLBACK clears it and autocommit resumes. spec/design/transactions.md §4.3"

[[capability]]
id = "txn.failed_state"
description = "Failed-block poisoning — a statement error inside an explicit block aborts the transaction; every later statement but ROLLBACK/COMMIT is 25P02 (in_failed_sql_transaction), and COMMIT of a failed block acts as ROLLBACK (PostgreSQL). The whole working set is discarded, including statements that succeeded before the error. spec/design/transactions.md §6"

# --- profiles ----------------------------------------------------------------
# A named bundle of capabilities = a conformance level. `includes` (optional)
# inherits another profile's capabilities transitively, so profiles are cumulative.
# An implementation "meets" a profile iff its declared capability set is a superset
# of the profile's (transitive) capabilities.

[[profile]]
id = "core"
title = "The \"it's alive\" milestone — integer DDL/DML/SELECT (CLAUDE.md §11 step 5)"
capabilities = [
  "ddl.create_table",
  "ddl.primary_key",
  "dml.insert",
  "query.select",
  "query.where_eq",
  "query.is_null",
  "query.order_by",
  "types.int16",
  "types.int32",
  "types.int64",
  "null.three_valued",
  "error.overflow_trap",
]

[[profile]]
id = "mutation"
title = "core + row mutation (UPDATE / DELETE)"
includes = "core"
capabilities = ["dml.update", "dml.delete"]

[[profile]]
id = "casts"
title = "core + explicit CAST narrowing (spec/types/casts.toml)"
includes = "core"
capabilities = ["cast.explicit"]

[[profile]]
id = "comparison"
title = "core + cross-type comparison via the promotion tower (spec/types/compare.toml)"
includes = "core"
capabilities = ["query.comparison_order", "compare.promotion"]

[[profile]]
id = "expression"
title = "comparison + the general expression substrate (arithmetic, boolean, logical connectives)"
includes = "comparison"
capabilities = [
  "types.boolean",
  "expr.arithmetic",
  "expr.unary_minus",
  "expr.parens",
  "expr.precedence",
  "expr.comparison_value",
  "query.logical_connectives",
  "query.is_distinct_from",
  "error.division_by_zero",
]

[[profile]]
id = "decimal"
title = "expression + the exact decimal / numeric type (numeric(p,s), comparison, casts, arithmetic)"
includes = "expression"
capabilities = ["types.decimal", "expr.decimal_arithmetic"]

[[profile]]
id = "functions"
title = "decimal + scalar functions abs / round (per-row, valid anywhere an expression is)"
includes = "decimal"
capabilities = [
  "func.abs",
  "func.round",
]

[[profile]]
id = "joins"
title = "decimal + multi-table FROM with INNER/CROSS JOIN, table aliases, and qualified columns (Phase 4)"
includes = "decimal"
capabilities = [
  "query.join_inner",
  "query.cross_join",
  "query.table_alias",
  "query.qualified_column",
]

[[profile]]
id = "outer_joins"
title = "joins + LEFT/RIGHT/FULL [OUTER] JOIN — unmatched rows NULL-extended on the absent side (Phase 4)"
includes = "joins"
capabilities = [
  "query.join_left",
  "query.join_right",
  "query.join_full",
]

[[profile]]
id = "constraints"
title = "outer_joins + the NOT NULL / DEFAULT column constraints + INSERT column list / INSERT ... SELECT (spec/design/constraints.md)"
includes = "outer_joins"
capabilities = [
  "ddl.not_null",
  "ddl.column_default",
  "dml.insert_column_list",
  "dml.insert_select",
]

[[profile]]
id = "aggregates"
title = "decimal + scalar aggregates COUNT/SUM/MIN/MAX/AVG over the whole table — no GROUP BY (Phase 2)"
includes = "decimal"
capabilities = [
  "query.aggregates",
]

[[profile]]
id = "grouping"
title = "aggregates + GROUP BY bucketing, the grouping-error rule, and ORDER BY over grouping keys (Phase 2)"
includes = "aggregates"
capabilities = [
  "query.group_by",
]

[[profile]]
id = "having"
title = "grouping + HAVING — a boolean filter over grouped rows, after aggregation, before ORDER BY (Phase 2)"
includes = "grouping"
capabilities = [
  "query.having",
]

[[profile]]
id = "predicates"
title = "decimal + the predicate forms IN / BETWEEN / LIKE / CASE (Phase 2, spec/design/grammar.md §20-§23)"
includes = "decimal"
capabilities = [
  "expr.in_list",
  "expr.between",
  "expr.like",
  "expr.case",
]

[[profile]]
id = "timestamps"
