# Conformance manifest — CANONICAL DATA (CLAUDE.md §5, §7).
#
# The conformance taxonomy has THREE independent axes (see ../design/conformance.md):
#   1. suites/      — the directory tree; ORGANIZES tests by feature area.
#   2. capabilities — fine-grained features an implementation declares it supports.
#                     Each .test file declares the capabilities it needs via an
#                     in-band `# requires:` header line; a test runs for an impl iff
#                     the impl supports every capability the test requires.
#   3. profiles     — named, cumulative bundles of capabilities = the conformance
#                     LEVELS an implementation targets ("does impl X meet `core`?").
#
# This file defines axes 2 and 3 (axis 1 is the filesystem). TEST-TIME ONLY — the
# harness reads it; no shipped engine does. Validated by `rake verify`.

schema_version = 1

# --- capabilities ------------------------------------------------------------
# One feature an implementation may support, named with a dotted id. Add a
# capability only when some .test file actually requires it (the checker rejects
# orphans). Implementations declare the set they support; tests declare the set
# they require.

[[capability]]
id = "ddl.create_table"
description = "CREATE TABLE with typed columns"

[[capability]]
id = "ddl.primary_key"
description = "PRIMARY KEY column constraint (enables point lookup by key)"

[[capability]]
id = "ddl.composite_primary_key"
description = "Table-level PRIMARY KEY (a, b, …) constraint — a composite key over one or more columns in LIST order (any order — the order narrowing was lifted by the format-5 catalog reshape); key bytes are the members' concatenated encodings, uniqueness is over the whole tuple (23505), every member is implicitly NOT NULL; PG-matching DDL errors 42703/42701/42P16 (spec/design/constraints.md §3, grammar.md §28)"

[[capability]]
id = "ddl.secondary_index"
description = "CREATE INDEX [name] ON t (cols) / DROP INDEX name — non-unique secondary indexes: PG auto-naming (t_col_idx + suffixes), relation namespace shared with tables (42P07), validation order 42P01/42703/0A000/42P07, DROP errors 42704/42809; maintained on every write; the planner bounds a SELECT base-relation scan by a first-column equality (spec/design/indexes.md, grammar.md §30)"

[[capability]]
id = "ddl.unique"
description = "UNIQUE constraints + unique indexes — column-level and table-level [CONSTRAINT name] UNIQUE (cols) and CREATE UNIQUE INDEX, all backed by a unique secondary index: PG auto-naming (t_col_key + suffixes; an explicit CONSTRAINT name names the index), identical-list dedup/PK fold, NULLS DISTINCT enforcement at INSERT/UPDATE (23505 names the constraint; UPDATE validates the end state — a documented PG divergence), build-over-duplicates 23505; the v6 catalog persists a per-index unique flag (spec/design/constraints.md §5, indexes.md §8)"

[[capability]]
id = "ddl.index_expr"
description = "CREATE [UNIQUE] INDEX ON t (expr) — EXPRESSION index keys (spec/design/indexes.md §1/§2/§6): a key element may be a bare column, a bare function call (lower(email)), or a parenthesized expression ((a + b)); a parenthesized bare column (a) normalizes to a column key; a general operator expression must be parenthesized (bare a + b is a syntax error, as in PG); indexes may MIX column and expression keys. PG auto-naming with a name-part per element (column name / function name / literal 'expr' + suffixes). The expression is validated at CREATE INDEX: an aggregate 42803, a window 42P20, a subquery 0A000, a bind parameter 42P02, a non-immutable seam function (uuidv4/uuidv7/now/clock_timestamp) 42P17, a composite result 0A000 — all AGREEING with PostgreSQL. Evaluated per row in phase-1 maintenance (so a failing expression aborts the statement before any write, all-or-nothing) and enforced for UNIQUE (23505 over the evaluated tuple; the case-insensitive-unique lower(email) idiom). Persisted as canonical text (format_version 26, a 0xFFFF per-element sentinel). Deliberate jed divergences (per-core tests / oracle overrides, NOT the corpus): jed conservatively rejects timestamptz-dependent expressions 42P17 (session-tz hazard, even forms PG allows); expression-key text collation is C. Builds on ddl.secondary_index, ddl.unique."

[[capability]]
id = "ddl.index_partial"
description = "CREATE [UNIQUE] INDEX ON t (keys) WHERE predicate — PARTIAL indexes (spec/design/indexes.md §9): only rows whose predicate is TRUE (3VL — FALSE and NULL are excluded) are indexed, and for UNIQUE only those rows are constrained. B-tree only (a WHERE on a gin/gist index is 0A000). The predicate is a boolean expression over the table's own columns, validated at CREATE INDEX with PG-AGREEING codes: a subquery 0A000, a bind parameter 42P02, an unknown column 42703, a non-boolean result 42804, an aggregate 42803, a window 42P20, a non-immutable seam function 42P17. Maintenance is uniform (a row maps to a set of entries, empty when the predicate is not TRUE — INSERT/DELETE/UPDATE need no special code); the build indexes only qualifying rows; a UNIQUE partial build/enforcement conflicts only among qualifying rows (an inactive row may duplicate an active row's key). The auto-name is UNAFFECTED by WHERE (t_col_idx). Persisted as index_flags bit1 + the predicate canonical text after index_root_page (format_version 27). jed_indexes gains a predicate column. Deliberate jed divergences (per-core tests / oracle overrides, NOT the corpus): a timestamptz-referencing predicate is conservatively 42P17 (session-tz hazard). Builds on ddl.secondary_index, ddl.unique."

[[capability]]
id = "query.index_partial"
description = "PARTIAL-index bound — an index-bounded base-relation SELECT scan that uses a PARTIAL index (spec/design/indexes.md §9). Because the index holds only the rows whose predicate is TRUE, the planner uses it ONLY when the WHERE AND-chain contains a conjunct STRUCTURALLY EQUAL to the index predicate (a syntactic implication test — PostgreSQL's, not a semantic prover): WHERE status = 'active' AND amt = 100 seeks an index on (amt) WHERE status = 'active' (the amt = 100 access predicate, gated by the present status = 'active' conjunct), while WHERE amt = 100 alone takes the full scan. The whole WHERE — including the predicate conjunct — stays the residual filter (harmless, always correct). Only the ordinary access-predicate bound uses a partial index this slice (the OR/IN merged-point-lookup, ORDER-BY-skip-sort, and index-nested-loop / UPDATE-DELETE index paths stay non-partial). A cost-visible optimization: a core lacking it full-scans and computes the higher cost. Builds on ddl.index_partial and query.point_lookup."

[[capability]]
id = "ddl.gin_index"
description = "CREATE INDEX ... USING gin (col) — GIN inverted indexes, a second index KIND beside the ordered B-tree (spec/design/gin.md). This slice: the array_ops operator class over a single integer-element array column (i16[]/i32[]/i64[]), one entry per DISTINCT non-NULL element (entry = encode(elem) ‖ storage-key, empty payload; a whole-NULL/empty array yields no entries), maintained on every write; auto-naming/namespace/DROP reuse the ordinary index. Validation: unknown access method 42704, non-array column 42704 (no GIN operator class), UNIQUE gin 0A000; a non-integer element type / multi-column gin is 0A000 (deferred, PG builds them — oracle overrides). Persisted via the per-index index_kind byte (format_version 13). The query-side acceleration is query.gin_scan. Builds on ddl.secondary_index and types.array"

[[capability]]
id = "ddl.gist_index"
description = "CREATE INDEX ... USING gist (col) — GiST indexes, a third index KIND beside the ordered B-tree and GIN (spec/design/gist.md GX1). This slice: the range_ops operator class over a single range column (i32range/i64range/numrange/tsrange/tstzrange/daterange), maintained on every write; auto-naming/namespace/DROP reuse the ordinary index. The on-disk form is a persisted R-tree (page types 5/6, format_version 20: a leaf entry is bound_len ‖ encode_range_body(bound) ‖ skey_len ‖ skey, an interior entry bound_len ‖ encode_range_body(union) ‖ child_page), rebuilt CANONICALLY from the leaf set so it is content-deterministic and byte-identical cross-core; the in-memory leaf store is the maintained source of truth. Validation that AGREES with PG: unknown access method 42704, non-range column 42704 (no GiST operator class). Deliberate jed divergences (oracle overrides / per-core tests, NOT in the corpus): UNIQUE gist 0A000, multi-column gist 0A000 (PG builds it via btree_gist), gist-on-temp-table 0A000. The query-side acceleration is query.gist_scan. Builds on ddl.secondary_index and types.range"

[[capability]]
id = "ddl.gist_scalar_index"
description = "CREATE INDEX ... USING gist (scalar_col) — the scalar `=` operator class, the in-core btree_gist equivalent (spec/design/gist.md GX2). A GiST index over a FIXED-WIDTH keyable scalar column (the integers / boolean / uuid / date / timestamp / timestamptz) whose bounding key is [min,max] over that type's order-preserving key encoding, compared / unioned / descended as raw bytes (no value decode, no per-type comparator, no collation). Reuses the entire GiST tree machinery, maintenance, persistence, and cost unit (the opclass is the only type-specific part). Persisted within v20's GiST page types 5/6 — NO format bump: a node's bound flavor (range body vs [min,max] key blob) is keyed off the indexed column's catalog type. Validation: a deferred keyable scalar (text/bytea/decimal/interval) is 0A000 (not supported yet — the GIN element-staging precedent), a type with no GiST opclass (float/json/array/composite/jsonpath) is 42704. PG needs CREATE EXTENSION btree_gist for a scalar GiST index, so the DDL itself is a jed divergence — this corpus is NOT oracle-imported (the rows it produces ARE PG-clean: a `=` scan returns the same rows with or without the index). The query-side acceleration is query.gist_scalar_scan. Builds on ddl.gist_index"

[[capability]]
id = "ddl.exclusion_constraint"
description = "EXCLUDE constraints — table-level [CONSTRAINT name] EXCLUDE [USING gist] (col WITH op [, …]) (spec/design/gist.md §7, GX3): no two distinct rows may make every element comparison (R1.expr_i op_i R2.expr_i) simultaneously TRUE. The supported WITH operators are && (a range column, range_ops) and = (a fixed-width keyable scalar, the in-core btree_gist); the constraint IS its backing MULTI-COLUMN GiST index (the UNIQUE-is-its-index model generalized to an operator list), maintained on every write, whose tuple bound is the per-column component bounds concatenated. Enforcement is a conjunction PROBE inside the two-phase INSERT/UPDATE pass: descend the backing tree (the leaf recheck is the full conjunction, so a hit is a conflict), trap 23P01 exclusion_violation. The NULL rule (PG-matched): a NULL in any excluded column, or an empty range under &&, exempts the row (it never conflicts). End-state semantics like UNIQUE: a re-keying/value-swap UPDATE is validated against the statement's end state (an end-state-valid swap succeeds where PG fails the per-row transient). Validation: && over a non-range column / = over a no-opclass type is 42704, = over a deferred keyable (text/bytea/decimal/interval) is 0A000, any other operator is 0A000; the backing index cannot be DROP INDEX'd directly (2BP01). EXCLUDE on a temp table is 0A000. Persisted in the v21 catalog (a per-table exclusion list after the FK list). PG needs CREATE EXTENSION btree_gist for the scalar `=` member, so the multi-column DDL is a jed in-core divergence — the rows/errors are PG-faithful. Builds on ddl.gist_index and ddl.gist_scalar_index"

[[capability]]
id = "ddl.check"
description = "CHECK constraints — column-level and table-level [CONSTRAINT name] CHECK (expr): boolean row predicates enforced per candidate row at INSERT/UPDATE (23514; TRUE/NULL pass), evaluated in name order; PG auto-naming (t_col_check / t_check + suffixes); DDL rejections 42804/0A000/42803/42P02/42703/42710; persisted as expression text in the v4 catalog (spec/design/constraints.md §4, grammar.md §29)"

[[capability]]
id = "ddl.foreign_key"
description = "FOREIGN KEY constraints — column-level REFERENCES and table-level [CONSTRAINT name] FOREIGN KEY (cols) REFERENCES parent (cols) [ON DELETE/UPDATE NO ACTION|RESTRICT]: referential integrity enforced at four write sites (child INSERT/UPDATE 23503 when the key is absent in the parent — batch end-state-aware; parent DELETE/UPDATE 23503 when a child still references the row), MATCH SIMPLE NULL exemption; referenced columns must be the parent PK or a UNIQUE set (42830), same-type pairing (42804, stricter than PG), PG auto-naming (t_col_fkey + suffixes), per-table constraint namespace 42710; CASCADE/SET NULL/SET DEFAULT and MATCH FULL are 0A000; DROP TABLE of a referenced table is 2BP01; persisted in the v11 catalog (spec/design/constraints.md §6, grammar.md §43)"

[[capability]]
id = "ddl.drop_table"
description = "DROP TABLE — remove a table (definition + rows) from the catalog; missing table is 42P01 (grammar.md §13)"

[[capability]]
id = "ddl.drop_table_if_exists"
description = "DROP TABLE IF EXISTS — the idempotent form: a missing table is a no-op success instead of 42P01 (PostgreSQL turns the error into a notice; jed has no notice channel so it is a silent success). IF EXISTS suppresses only the missing-table error — a name resolving to a non-table relation (a secondary index) is still 42809 wrong_object_type. Recognized by a two-token lookahead, so a lone `if` stays an ordinary identifier and `DROP TABLE if` drops a table named `if` (PG-faithful). Builds on ddl.drop_table (grammar.md §13)"

[[capability]]
id = "ddl.drop_table_multi"
description = "DROP TABLE a, b [, …] [CASCADE | RESTRICT] — a comma list drops several tables in one two-phase / all-or-nothing statement (every name is resolved and validated — missing 42P01 unless IF EXISTS, non-table 42809, external FK dependent 2BP01 under RESTRICT — before any is removed), and a repeated name is deduplicated (PG collects the targets into a set). The trailing keyword picks the FK-dependency mode: RESTRICT (the default, and the bare form's behavior) refuses to drop a table another table's FOREIGN KEY references (2BP01 dependent_objects_still_exist); CASCADE drops those now-dangling FK constraints along with the table, the referencing table and its rows surviving. A FOREIGN KEY between two tables both named in the same statement never blocks under either mode (the drop-set exclusion). Builds on ddl.drop_table + ddl.foreign_key (grammar.md §13)"

[[capability]]
id = "ddl.temp_table"
description = "CREATE [TEMP|TEMPORARY] TABLE + DROP — session-local temporary tables that make ZERO writes to the database file (held in a per-session temp snapshot outside the serialized catalog, no format_version change — spec/design/temp-tables.md §2). Full CRUD (INSERT/SELECT/UPDATE/DELETE) + PRIMARY KEY / UNIQUE / CHECK / NOT NULL / DEFAULT, dropped at session close. TEMP/TEMPORARY are non-reserved, positional between CREATE and TABLE (a table named 'temp' stays persistent). Namespace PRECLUDES overlaps (a temp name colliding with temp OR persistent is 42P07; a documented PG divergence — no pg_temp shadowing — §3). A standalone CREATE INDEX / DROP INDEX is supported on a temp table (the index lives in the temp snapshot, zero file writes, planner-used, gated by the same allow_temp_ddl) — see suites/ddl/temp_index.test. serial / bigserial / smallserial / GENERATED AS IDENTITY columns are supported too: the auto-created OWNED sequence lives in the same temp snapshot (zero file writes, resolved/advanced by a scope-aware sequence funnel, shares the relation namespace 42P07, 2BP01 to drop directly, auto-dropped with the table, gated by the same temp DDL split) — see suites/ddl/temp_serial_identity.test. Composite-typed columns are supported too: the composite TYPE is always persistent (CREATE TYPE is persistent DDL) and a temp table only REFERENCES it; the column's storage codec resolves against the main type catalog at staging time and is self-contained thereafter (zero file writes), a composite column cannot be a PRIMARY KEY (0A000, never keyable), and DROP TYPE of a referenced type is 2BP01 (the dependency check is scope-aware) — see suites/ddl/temp_composite.test. Deferred on a temp table, each 0A000 (§8): FOREIGN KEY, COLLATE columns. The DDL is gated by session.allow_temp_ddl; the storage footprint by resource.temp_budget."

[[capability]]
id = "ddl.not_null"
description = "NOT NULL column constraint — storing NULL (direct, defaulted, or omitted) traps 23502 (spec/design/constraints.md §1)"

[[capability]]
id = "ddl.column_default"
description = "DEFAULT <literal> column constraint — evaluated + type-coerced once at CREATE TABLE (bad default traps 22003/42804 there), applied for an omitted column or the DEFAULT keyword (spec/design/constraints.md §2)"

[[capability]]
id = "ddl.column_default_expr"
description = "DEFAULT <expression> column constraint — a non-constant default (function calls like uuidv7(), arithmetic like 1 + 1); no column refs/subqueries/aggregates/params (0A000/0A000/42803/42P02), result type checked assignable to the column (42804) at CREATE TABLE; evaluated per row at INSERT through the per-statement seam (spec/design/constraints.md §2)"

[[capability]]
id = "ddl.sequence"
description = "CREATE SEQUENCE [IF NOT EXISTS] name [AS type] [INCREMENT [BY] n] [MINVALUE m | NO MINVALUE] [MAXVALUE x | NO MAXVALUE] [START [WITH] s] [CACHE c] [[NO] CYCLE] / DROP SEQUENCE [IF EXISTS] name [, …] — a named, persisted, monotonic generator as the third catalog-object kind (entry_kind 2, format_version 12). Order-free options; the value type is AS smallint|integer|bigint (default bigint — ddl.sequence_as_type); the name shares the relation namespace (42P07 duplicate / 42P01 missing); INCREMENT 0 / CACHE < 1 / inconsistent START/MIN/MAX is 22023; CACHE accepted but behaves as 1 (a documented PG divergence); RESTRICT-only (CASCADE 0A000). nextval is TRANSACTIONAL — rolls back with the txn (a documented PG divergence mandated by determinism.md §5) (spec/design/sequences.md, grammar.md §44)"

[[capability]]
id = "ddl.sequence_as_type"
description = "CREATE SEQUENCE … AS { smallint | integer | bigint } (and int2/int4/int8/i16/i32/i64 aliases) — the sequence value data type (an order-free option), which sets the default + validated MINVALUE/MAXVALUE (smallint [-32768,32767], integer [-2147483648,2147483647], bigint full i64). A non-integer AS type is 22023 (\"sequence type must be smallint, integer, or bigint\"); an explicit MINVALUE/MAXVALUE outside the type range is 22023 (\"… out of range for sequence data type T\", checked before the MIN>MAX consistency check). serial follows the pseudo-type (serial→integer, bigserial→bigint, smallserial→smallint) and a GENERATED AS IDENTITY column follows its column type; an AS clause inside identity ( … ) options is 42601. The type is NOT persisted (reducible to the bounds) — no format_version change (spec/design/sequences.md §14)"

[[capability]]
id = "ddl.alter_sequence"
description = "ALTER SEQUENCE [IF EXISTS] name — beyond RESTART (ddl.sequence): the definition-changing option set and RENAME TO (spec/design/sequences.md §15). The option form takes the same order-free CREATE options MINUS AS (INCREMENT/MINVALUE/MAXVALUE/START/CACHE/[NO] CYCLE) plus an interleavable RESTART [[WITH] n], requiring ≥1 option (a bare ALTER SEQUENCE s is 42601). It re-runs PG init_params with isInit=false: only written options change, last_value/is_called are preserved unless RESTART is given; INCREMENT sign does not recompute bounds; MINVALUE < MAXVALUE is strict (22023); the post-edit cross-checks are START in [MIN,MAX] then the preserved/restarted last_value in [MIN,MAX] (each 22023). RENAME TO new_name moves the catalog key (42P07 if new_name already names a relation, the same name included) and rewrites an OWNED sequence's owning-column nextval default text so a later INSERT still advances it. A missing sequence is 42P01 unless IF EXISTS. ALTER … AS type / OWNED BY / OWNER TO / SET {SCHEMA|LOGGED|UNLOGGED} stay 0A000. No format_version change. The transactional rollback of an ALTER and the read-only 25006 are per-core unit tests"

[[capability]]
id = "ddl.alter_table"
description = "ALTER TABLE slices 1-5 (spec/design/alter.md): qualified targeting; standalone table/column/constraint renames; comma-combinable column default/nullability edits; ADD/DROP CHECK/UNIQUE/FOREIGN KEY/EXCLUDE constraints; ADD/DROP COLUMN; ALTER COLUMN TYPE [USING]; and standalone ADD/DROP PRIMARY KEY. Multi-actions apply left-to-right and publish all-or-nothing. Rewrite forms share one scan, re-encode changed values, validate the cascade-adjusted final constraint state, and rebuild/re-key affected table and index stores without changing the file format. A changed final PRIMARY KEY member is always re-keyed and keyability-checked; retyping an IDENTITY column atomically retypes its owned sequence bounds."

[[capability]]
id = "ddl.serial"
description = "serial / bigserial / smallserial (aliases serial4 / serial8 / serial2) CREATE TABLE column pseudo-types — sugar (PostgreSQL) for an integer column (i32 / i64 / i16) that is NOT NULL with a DEFAULT nextval(...) backed by a newly-created OWNED sequence named <table>_<column>_seq (numeric-suffix collision resolution). Recognized only in a column-type position. The owned sequence follows the pseudo-type (serial→integer, bigserial→bigint, smallserial→smallint — ddl.sequence_as_type), so it is bounded to the column's range; DROP TABLE auto-drops it; DROP SEQUENCE of an owned sequence is 2BP01; an explicit DEFAULT on a serial column is 42601. The owner link persists (format_version 14). nextval stays TRANSACTIONAL (spec/design/sequences.md §12)"

[[capability]]
id = "ddl.identity"
description = "GENERATED { ALWAYS | BY DEFAULT } AS IDENTITY column constraint (the SQL-standard identity surface) + the optional ( sequence_options ) + the INSERT OVERRIDING { SYSTEM | USER } VALUE clause. Desugars like serial — an OWNED sequence of the column type (named <table>_<column>_seq, suffix collision resolution — ddl.sequence_as_type) + a DEFAULT nextval(...) + NOT NULL — plus the persisted ALWAYS/BY DEFAULT distinction (format_version 15, two column flag bits). The column type must be smallint/integer/bigint (22023). ALWAYS rejects an explicit INSERT value without OVERRIDING SYSTEM VALUE and an ordinary UPDATE assignment (428C9), while UPDATE SET id = DEFAULT is accepted and advances the owned sequence; OVERRIDING USER VALUE discards a supplied value and uses the sequence; BY DEFAULT uses an explicit value (not advancing the sequence). DEFAULT-and-identity / serial-and-identity / two identity specs / an AS clause in the identity ( … ) options are 42601 (spec/design/sequences.md §13)"

[[capability]]
id = "dml.insert_column_list"
description = "INSERT with an explicit column list `(a, c)` — unlisted columns take their default else NULL; the DEFAULT keyword in a value slot; unknown column 42703, duplicate 42701 (spec/design/grammar.md §12)"

[[capability]]
id = "dml.insert_default_values"
description = "INSERT INTO t DEFAULT VALUES — insert exactly one row with every column omitted, so each column takes its declared constant/expression default else NULL, through the ordinary two-phase INSERT validation; supports ON CONFLICT and RETURNING. PostgreSQL syntax does not combine DEFAULT VALUES with an explicit column list or OVERRIDING (42601). Builds on ddl.column_default / ddl.column_default_expr and dml.insert (constraints.md §2, grammar.md §16)"

[[capability]]
id = "dml.insert"
description = "INSERT ... VALUES"

[[capability]]
id = "dml.insert_multi_row"
description = "Multi-row INSERT ... VALUES (..),(..) — two-phase / all-or-nothing (grammar.md §12)"

[[capability]]
id = "dml.insert_select"
description = "INSERT ... SELECT — insert the rows a query produces, through the same two-phase / all-or-nothing validation; output arity must match the target (42601) and projected types must be assignable up front (42804, even over an empty source); cost = the embedded SELECT's accrued cost (grammar.md §24)"

[[capability]]
id = "dml.update"
description = "UPDATE ... SET ... [WHERE] (in-place value replacement)"

[[capability]]
id = "dml.update_default"
description = "UPDATE ... SET col = DEFAULT — replace each matched row's column with its declared constant/expression default else NULL, using the same per-row evaluation, statement RNG/clock seam, storage coercion, NOT NULL/CHECK/uniqueness/FK validation, cost, index maintenance, and PK re-keying as ordinary UPDATE/INSERT default application. GENERATED ALWAYS identity columns accept this sole update form and advance their owned sequence. ON CONFLICT DO UPDATE SET col = DEFAULT remains its separate deferred follow-on (constraints.md §2, sequences.md §13.4)"

[[capability]]
id = "dml.update_container"
description = "UPDATE ... SET <range|array column> = … — assigning a CONTAINER (range or array) column in an UPDATE (spec/design/ranges.md §4, array.md §4). The RHS adapts like INSERT: a bare string literal via range_in/array_in, a bare NULL to the typed NULL, an ARRAY[…]/i32range(…)/cast/column-ref/set-op expression resolving to the SAME container type (a mismatched element or a scalar RHS is 42804). Stored through the same coerce_for_store container codec as INSERT, so the row round-trips identically; index maintenance (a GiST tree over a range column, a GIN index over an array column) and the EXCLUDE/UNIQUE/FK end-state probes all consume the new value, so an EXCLUDE-constrained range reschedules correctly (23P01 on a real conflict) and a range PRIMARY-KEY re-key moves the row (23505 on an end-state collision). Composite-column UPDATE and a top-level $N parameter into a container column stay 0A000 (per-core), as does the ON CONFLICT DO UPDATE conflict-action path for a container column. No on-disk format change. Builds on dml.update + types.range / types.array"

[[capability]]
id = "dml.delete"
description = "DELETE FROM ... [WHERE]"

[[capability]]
id = "dml.returning"
description = "The RETURNING clause on INSERT/UPDATE/DELETE — the statement becomes a query result projecting each affected row (INSERT the stored row, UPDATE the new row, DELETE the old row); items resolve against the target table only (subqueries allowed and observe the pre-statement snapshot; aggregates 42803); zero affected rows is an empty result; row order unspecified (grammar.md §32, cost.md §3)"

[[capability]]
id = "dml.returning_old_new"
description = "The old./new. row-version qualifiers in a RETURNING list (PG 18 semantics, grammar.md §32): old.col = the pre-statement value, new.col = the post-statement value, the absent side the all-NULL row (INSERT's old, DELETE's new); valid only in RETURNING (elsewhere 42P01), shadowed by a target table actually named old/new, usable inside item subqueries; the WITH (OLD AS o, NEW AS n) aliasing form stays deferred"

[[capability]]
id = "dml.insert_on_conflict"
description = "INSERT ... ON CONFLICT [target] { DO NOTHING | DO UPDATE SET … [WHERE …] } — UPSERT (spec/design/upsert.md, grammar.md §46). A candidate row that would violate a UNIQUE/PRIMARY KEY constraint takes the conflict action instead of trapping 23505: DO NOTHING skips it; DO UPDATE updates the existing conflicting row, with the proposed row exposed as the qualifier-only `excluded` pseudo-relation (a bare/qualified column = the existing row). The arbiter target is a column SET matched order-independently against a unique index / the PK (no match 42P10), or ON CONSTRAINT name (a unique-index name or the synthesized <table>_pkey; miss 42704); DO UPDATE requires a target (42601 without one), DO NOTHING may omit it (any conflict skipped). A non-arbiter conflict still traps 23505; two proposed rows sharing the arbiter key are 21000 under DO UPDATE, skipped under DO NOTHING. Two-phase / all-or-nothing with sequential planning; RETURNING projects the affected (inserted + updated) rows. Reuses existing error codes (no registry change) and adds no on-disk format change. Divergences: DO UPDATE assigning a PK column is 0A000, end-state (not per-row transient) uniqueness, no INSERT INTO t AS alias (upsert.md §9)"

[[capability]]
id = "query.select"
description = "SELECT of columns from a single table"

[[capability]]
id = "query.where_eq"
description = "WHERE with an equality predicate ( = )"

[[capability]]
id = "query.comparison_order"
description = "WHERE with an ordering predicate ( < , > , <= , >= )"

[[capability]]
id = "query.point_lookup"
description = "Primary-key predicate pushdown — a WHERE on the primary key seeks/ranges the storage B-tree instead of a full scan, so page_read drops to the nodes on the access path and storage_row_read to the rows in range (spec/design/cost.md §3 \"bounded scan / point lookup\"). For a single-column key this covers `pk = c`, ordering comparisons, BETWEEN, and AND-combinations. A cost-visible optimization: a core lacking it would compute the higher full-scan cost, so cost-asserting tests over PK predicates require it."

[[capability]]
id = "query.composite_pk_pushdown"
description = "Composite-primary-key tuple bounds — a WHERE over `(pk1, pk2, ...)` consumes the maximal equality prefix in PK key order plus an optional range on the next member. Equality on every member is an exact tuple point lookup; a proper prefix scans `[P, prefix-successor(P))`; a trailing range tightens that byte interval. NULL, conflicting equality sources, and unrepresentable equality values are empty; a non-leading member alone does not bound (no skip-scan). The same bound serves SELECT, UPDATE/DELETE, independent join-relation pushdown, correlated scans, and index-nested-loop inner scans, with the complete predicate retained as a residual recheck. Builds on query.point_lookup and ddl.composite_primary_key."

[[capability]]
id = "query.or_in_point_lookup"
description = "OR / IN-list merged point lookups — a disjunction of equalities on one single-column PK or leading B-tree index key lowers to canonical encoded point intervals instead of a full scan. Runtime values are sorted, de-duplicated, and probed in key order; the complete WHERE remains the residual filter. UPDATE/DELETE share the path. Builds on query.point_lookup and expr.in_list; generalized by query.interval_set."

[[capability]]
id = "query.interval_set"
description = "Canonical key-interval sets — a pure OR whose leaves are same-key equality/range comparisons (including BETWEEN conjunctions) lowers to a runtime-encoded, sorted, disjoint interval list over a single-column PK or leading B-tree key. A co-present same-key AND range clips every OR/IN interval; empty intervals vanish; overlaps, duplicates, touching endpoints, and fixed-width byte-adjacent closed intervals merge, so each candidate emits once in key order. Cost sums canonical interval scans, not source disjuncts. SELECT and UPDATE/DELETE share the path; mixed keys, NOT/non-bound leaves, promoted comparisons, unsafe collations, and variable-width secondary range unions fall back. Builds on query.or_in_point_lookup and query.index_range."

[[capability]]
id = "query.bounded_limit_streaming"
description = "LIMIT streaming over bounded access paths — a non-blocking single-table SELECT pulls contiguous PK/index bounds, canonical PK/index interval sets, and the storage-key candidate sets gathered by GIN/GiST only until OFFSET+LIMIT residual-filter survivors are found. Contiguous bounds retain their up-front access-path page block; canonical sets charge an interval when it is first pulled, so untouched later intervals charge nothing. GIN/GiST still complete and charge their opclass gather, but table point-lookups and per-row work stop at the window. ORDER BY may elide its sort only when the bound emits the requested PK order or walks the exact ordered B-tree index. Builds on query.limit_short_circuit, query.interval_set, query.index_range, query.gin_scan, and query.gist_scan."

[[capability]]
id = "query.index_mutation"
description = "Secondary-index-bounded UPDATE/DELETE — a mutation target whose WHERE yields the ordinary B-tree access predicate (maximal equality prefix plus optional trailing range, including eligible expression/partial indexes) gathers keyed old rows from the pre-mutation index state instead of full-scanning; a last-resort OR/IN disjunction on a leading secondary-index column gathers the de-duplicated union of point probes. The complete WHERE remains the residual recheck and all candidates are collected before the two-phase write pass, so indexed-column and PK-changing updates are safe. Cost is the matching index-bounded SELECT scan without row_produced (RETURNING adds its normal projection/production work). Builds on ddl.secondary_index, query.index_range, query.index_prefix, and query.or_in_point_lookup."

[[capability]]
id = "query.limit_short_circuit"
description = "LIMIT short-circuit — a single-table query with a LIMIT and no blocking operator (no join, aggregate, DISTINCT, or ORDER BY) streams scan→filter→project and STOPS the scan once the window is filled, so storage_row_read counts only the rows actually read (spec/design/cost.md §3 \"LIMIT short-circuit\"). A cost-visible optimization: a core lacking it scans every row and computes the higher cost, so cost-asserting LIMIT-without-ORDER-BY tests require it."

[[capability]]
id = "query.order_by_pk_scan"
description = "ORDER BY satisfied by primary-key scan order — a single-table, non-aggregate, non-DISTINCT SELECT whose ORDER BY keys are a PREFIX of the table's PRIMARY KEY columns, all one direction (ASC ⇒ forward scan; DESC over the FULL PK ⇒ a reverse scan) and sorting by the column's stored key collation, needs no sort: the table tree already yields rows in that order (spec/design/cost.md §3 \"ORDER BY satisfied by primary-key order\"). The engine elides the sort and STREAMS scan→filter→project; with a LIMIT it stops the scan once the window is filled (a top-N early-out, reading from the high end for a reverse scan), so storage_row_read drops to the rows actually read. Composes with a primary-key range bound (the range walk is already PK order) and with a collated PK (the tree is stored in collation order, so a collated ORDER BY is satisfied without an in-memory re-sort, in either direction). A cost-visible optimization: a core lacking it sorts every row and computes the higher cost, so cost-asserting ORDER-BY-on-the-PK tests require it. Narrowings (each a follow-on): a strict-prefix DESC, DISTINCT, and joins keep the sort/eager path. Builds on query.order_by and query.limit_short_circuit."

[[capability]]
id = "query.order_by_join_scan"
description = "ORDER BY satisfied by the selected physical OUTER relation's primary-key scan order in a two-table join — P7 costs both orientations of an eligible INNER/CROSS join, and an orientation whose ORDER BY is a prefix of its outer relation's PK with a LIMIT needs no sort: output already arrives in (outer PK, inner key) order (spec/design/cost.md §3 \"JOIN\"). The engine elides the sort and STOPS the selected nested/hash/INL loop once the LIMIT/OFFSET window is filled, so later outer calls, ON/WHERE operator_evals, and row_produced are skipped. Ordinary inner/base materialization and hash build remain complete; query.order_by_join_inl supplies the per-outer bounded-inner combination. Gated to exactly two non-lateral base relations, an INNER/CROSS join, a forward selected-outer-PK ORDER BY (DESC / a reverse outer scan, >2 relations, an outer-table non-PK bound, LEFT/RIGHT/FULL, and DISTINCT are follow-ons). A cost-visible optimization: a core lacking it runs the full join + sort and computes the higher cost, so cost-asserting tests require it. Builds on query.join_inner and query.order_by_pk_scan."

[[capability]]
id = "query.order_by_join_inl"
description = "Two-table join top-N combined with index-nested-loop — when query.order_by_join_scan elides the sort and the INNER/CROSS right relation has a PK or ordered-B-tree sibling bound, the streaming join opens that bound once per outer row instead of materializing the right relation once. It retains outer-PK order and the eager INL path's per-outer inner-key order, applies the complete ON/WHERE residuals, and stops opening later inner bounds once OFFSET+LIMIT survivors are found. NULL sibling values are empty, misses still charge their probe, secondary-index fanout is gathered completely for each started outer row, and an ORDER BY key beyond the outer PK remains blocking. Builds on query.order_by_join_scan and query.index_nested_loop."

[[capability]]
id = "query.order_by_index_scan"
description = "ORDER BY satisfied by SECONDARY-INDEX scan order — when the PK scan does NOT satisfy an ORDER BY but a B-tree secondary index's columns do, AND there is a LIMIT, the engine walks that index in key order (which IS the indexed-column order) and point-looks-up each row by its primary key, instead of full-scanning + sorting (spec/design/cost.md §3 \"secondary-index order\"). With the LIMIT it stops once the window is filled (a top-N early-out), so it reads only the first few index entries and looks up only those rows. The PK suffix is peeled off the END of each index entry key (the fixed-width \"key-suffix skip\"), so the indexed column may itself be variable-width (text / collated) — the general non-PK collated-ORDER-BY payoff. The ORDER BY must be EXACTLY the index's columns, each ASC with default NULLS LAST and matching the column's stored key collation (a Skewed collated index is never walked, §12). A WHERE bound may compose when it walks that exact index; query.bounded_limit_streaming then limits the bound itself. Gated to a LIMIT (without one the index walk + N point lookups costs more than a full scan + sort). DESC (a reverse index walk) and a strict-prefix-of-a-multi-column-index ORDER BY are follow-ons. A cost-visible optimization: a core lacking it full-scans + sorts and computes the higher cost, so cost-asserting tests require it. Builds on query.order_by, query.limit and ddl.secondary_index."

[[capability]]
id = "query.order_by_topk"
description = "Bounded top-k selection for a blocking ORDER BY with LIMIT/OFFSET — a plain SELECT whose order is not supplied by a PK/index/join scan retains only K=OFFSET+LIMIT rows in a max-heap, using the exact ORDER BY comparator plus input position as the stable tie-break, then sorts the retained rows for output. LIMIT 0 retains none but still executes scan/filter and every fallible ORDER expression/collation decoration at the same point. DISTINCT, aggregate/group, window, and set-operation shapes remain full-sort. A checked K overflow falls back to full sort. The all-C single-base scan feeds the heap directly when touched columns are fixed-width and K fits work_mem (untouched payloads are dropped from private retained copies); otherwise the existing external merge sorter remains authoritative. Expression/collated/eager sources complete their pre-sort evaluation sequence before top-k reduction. Results, errors, and deterministic costs are identical to full sort. Builds on query.order_by, query.limit, and query.offset."

[[capability]]
id = "query.qualified_table"
description = "Database-QUALIFIED table names — `db.table` in table position (FROM/JOIN targets and the DML targets INSERT INTO / UPDATE / DELETE FROM), jed's first multi-part name in table position (spec/design/attached-databases.md §3, Slice 1a). An optional leading `identifier \".\"` names the ATTACHED DATABASE the table lives in; a bare name resolves in IMPLICIT scope. This slice recognizes only the two RESERVED implicit qualifiers `main` (the file / persistent database) and `temp` (the session-local domain); any other qualifier is 42P01 \"database … is not attached\" (host-attached databases arrive in Slice 1b). A qualified name whose TABLE is absent in the claimed database is 42P01 (`main.<absent>` / a persistent name under `temp.` / a temp name under `main.`). Because jed precludes overlaps (a name is temp XOR persistent within a session — §3), a valid qualifier resolves to the SAME relation the bare name would, so resolution is a VALIDATION GATE (assert the relation is in the claimed scope), not a routing change; the qualifier never appears in COLUMN position (a column stays 2-part `label.col`), and a qualified name is a base table only (never a set-returning function — 42601). jed-specific (PostgreSQL has no embedded multi-database model; `main`/`temp` are not PG database/schema qualifiers), so cross-core-checked, not oracle-checked. No new error code, no format_version change. Builds on query.select and dml.insert/update/delete."

[[capability]]
id = "attach.in_memory"
description = "Host-attached IN-MEMORY databases — the Slice 1b capability that turns Slice 1a's validation-gate qualifiers into real N-way routing (spec/design/attached-databases.md §5/§6). A host attaches a fresh empty database under a name via the host API (Go Database.Attach / Rust attach / TS attach — never SQL, so an untrusted SQL session cannot reach the filesystem), and SQL then reaches it by the `db.table` qualifier: `CREATE TABLE mydb.t (…)` / `CREATE INDEX … ON mydb.t (…)` create INTO the attachment's working snapshot; INSERT/UPDATE/DELETE mutate it; SELECT/JOIN read and join across `main`, `temp`, and any number of attachments in one consistent cross-database snapshot (a reader pins the whole roots — one lock-free Load). A commit is an N-root commit — main (durable) plus each dirtied in-memory attachment (pointer-swap, no fsync) publish together in one atomic roots swap. A READ-ONLY attachment rejects every write (DML+DDL) with 25006 before any I/O and never competes for the one-durable-writer slot; a write to a nonexistent attachment / table under an attached name is 42P01. Deferred narrowings on an attachment table this slice, each a clean 0A000: FOREIGN KEY, EXCLUDE, a composite-typed column, a serial/IDENTITY column, COLLATE, a non-btree (GIN/GiST) index, and ON CONFLICT (no cross-scope catalog/sequence/index-store threading yet); an attachment relation full-scans (index-bound pushdown is a perf follow-on). In-memory attachments carry NO byte contract (never serialized), so no format_version change; the read-only-with-data + detach lifecycle are per-core host-API unit tests (§11). jed-specific (PostgreSQL has no embedded multi-database model), so cross-core-checked, not oracle-checked. Builds on query.qualified_table."

[[capability]]
id = "query.correlated_pushdown"
description = "Correlated primary-key pushdown — when a correlated subquery's inner query is a single table whose WHERE compares the inner primary key to an enclosing-query column (`inner.pk = outer.col`), the inner scan bounds to that outer row's value (a per-outer-row point lookup/range) instead of re-scanning the whole inner table for every outer row (spec/design/cost.md §3 \"bounded scan / correlated\"). The same point-lookup mechanism as query.point_lookup, with the bound source resolved per outer row; results are unchanged, only the inner re-scan cost drops. A cost-visible optimization: a core lacking it re-scans the whole inner table per outer row and computes the higher cost, so cost-asserting correlated-PK tests require it."

[[capability]]
id = "query.join_pushdown"
description = "Join base-table primary-key pushdown — in a multi-table FROM, each base table is bounded independently by the WHERE predicates on its OWN primary key against a CONSTANT (`a JOIN b … WHERE a.pk = 5`), so that table materializes a seek/range instead of a full scan (spec/design/cost.md §3 \"bounded scan / JOIN\"). The same point-lookup mechanism as query.point_lookup applied per relation; a cross-relation `b.pk = a.x` bound to a sibling column is the SEPARATE query.index_nested_loop optimization. Sound for outer joins: a non-NULL PK conjunct in WHERE eliminates that relation's NULL-extended rows. A cost-visible optimization: a core lacking it full-scans every join base table and computes the higher cost, so cost-asserting join-PK tests require it."

[[capability]]
id = "query.index_nested_loop"
description = "Index-nested-loop join — a physical INNER relation whose primary key or indexed column is compared to a column of the selected physical OUTER relation is re-materialized once per outer row and bounded to that sibling value instead of full-scanning (spec/design/cost.md §3 \"bounded scan / JOIN\"). P7 inventories every PK, B-tree, GiST, and GIN sibling bound for each eligible two-base INNER/CROSS orientation, admitting one only when its dependency is physical-left; thus `indexed JOIN driver ON indexed.pk = driver.x` may reverse and seek indexed. LEFT retains source order and may bound only its right/nullable side; RIGHT/FULL remain barriers. The whole ON/WHERE stays the residual filter, preserving rows and sound LEFT NULL-extension. A cost-visible optimization: a core lacking it full-scans the inner table per outer row and computes the higher cost. Builds on query.join_inner and query.point_lookup (and query.join_left for LEFT cases)."

[[capability]]
id = "query.hash_join"
description = "Deterministic in-memory hash join — for an eligible two-base INNER join, P7 inventories hash beside nested loop and every legal INL in both physical orientations; the selected inner/build and outer/probe sides are explicit, and hash wins only when its complete scheduled estimate is cheaper. A LEFT join is a P7 barrier and retains the established source-right build after INL refusal. ON must contain same-type bare-column equality keys and only non-trapping leaf equality/inequality residuals. Multiple keys follow source order; SQL NULL never matches; buckets retain build order and probes retain outer order; full canonical bytes reject collisions; complete ON is residual-rechecked. Cost is hash_build/hash_probe per canonical key byte plus ON cost for exact candidates. CROSS, RIGHT/FULL, wider joins, expression keys, and trapping residuals retain nested loop. In-memory only; grace-hash spill is deferred."

[[capability]]
id = "query.gin_index_nested_loop"
description = "GIN sibling-bound index-nested-loop — a GIN-indexed array column on an INNER/CROSS/LEFT join's right base relation may derive its @>, &&, array =, or scalar = ANY query operand from a bare column of an earlier sibling relation. The query is evaluated once per outer row, posting lists combine and candidates return in storage-key order, and the complete ON/WHERE predicate is residual-rechecked. NULL, empty, NULL-containing, and duplicate-term values retain query.gin_scan's empty/fallback behavior per outer row. PK and ordered-B-tree sibling bounds retain precedence; a usable sibling opclass bound overrides an ordinary constant bound. Builds on query.index_nested_loop, query.gin_scan, query.gin_any_eq, and query.gin_array_eq."

[[capability]]
id = "query.gist_index_nested_loop"
description = "GiST sibling-bound index-nested-loop — a single-column GiST range_ops &&/@> or fixed-width scalar = predicate on an INNER/CROSS/LEFT join's right base relation may take its query operand from a bare earlier-sibling column. The opclass query is formed once per outer row, the resident tree descends, candidates return in storage-key order, and the complete predicate is residual-rechecked. NULL and empty values retain query.gist_scan's empty/fallback behavior per outer row; multi-column exclusion GiST remains ineligible. PK and ordered-B-tree sibling bounds retain precedence; a usable sibling GiST bound overrides an ordinary constant bound. Builds on query.index_nested_loop, query.gist_scan, and query.gist_scalar_scan."

[[capability]]
id = "query.index_range"
description = "Index range scan — an index-bounded base-relation SELECT scan whose bound column has a RANGE conjunct (`col < c`, `col > c`, `col <= c`, `col >= c`, `BETWEEN`, AND-combinations) rather than an equality, over the index's LEADING key column (`col > c` on index (col)) or the column immediately after a multi-column equality prefix (`a = 1 AND b > 3` on index (a, b)), range-scans the index tree over the corresponding key range instead of a full scan (spec/design/indexes.md §5.1, cost.md §3 \"index-bounded scan\"). The range endpoints encode into the index key space relative to the equality prefix; the upper endpoint stops before the range column's NULL slot (a range is never true for NULL, 3VL); a NULL endpoint / contradictory pair is a provably-empty bound. The range column and every trailing column must be fixed-width (the key-suffix skip advances by width). The whole WHERE stays the residual filter, so rows are unchanged — only cost drops. A cost-visible optimization: a core lacking it full-scans and computes the higher cost. Builds on ddl.secondary_index and query.point_lookup."

[[capability]]
id = "query.index_prefix"
description = "Index multi-column prefix bound — an index-bounded base-relation SELECT scan that binds MORE than the leading key column: a maximal EQUALITY PREFIX on the index's leading key columns (`a = 1 AND b = 2` on index (a, b, …) seeks the (a=1, b=2) key range instead of scanning all a=1 and residual-filtering b), optionally followed by a range on the next column (query.index_range) (spec/design/indexes.md §5.1, cost.md §3 \"index-bounded scan\"). The equality-prefix columns encode into a concatenated key prefix P and may be ANY width including collated text (skipped by known byte length, not width), so a multi-column index whose leading columns are variable-width becomes usable when the WHERE pins them by equality. A prefix equality against NULL / a disagreement between two equalities on one column is a provably-empty bound. The whole WHERE stays the residual filter, so rows are unchanged — only cost drops (a tighter bound scans fewer index entries). A cost-visible optimization: a core lacking it binds only the first column (or full-scans) and computes a different cost. Builds on ddl.secondary_index and query.point_lookup."

[[capability]]
id = "query.index_expr"
description = "Index EXPRESSION bound — an index-bounded base-relation SELECT scan whose leading equality-prefix / range element is an EXPRESSION index key rather than a column: `WHERE lower(email) = $1` seeks an index on `lower(email)`, `WHERE a + b = 10` an index on `(a + b)` (spec/design/indexes.md §5). The planner matches a WHERE conjunct operand STRUCTURALLY against the resolved index key expression (PostgreSQL's syntactic, not semantic, matching — `b + a` does not match an index on `a + b`); the matched const-source encodes under the expression's RESULT type, and trailing key components width-skip by their result types (as for a column key). An expression key seeks only when its result is a fixed-width-tail-eligible scalar and its collation is C (this slice); the OR/IN, index-nested-loop, and ORDER-BY-skip-sort bound paths stay column-only (documented follow-ons). The whole WHERE stays the residual filter, so rows are unchanged — only cost drops. A cost-visible optimization: a core lacking it full-scans and computes the higher cost. Builds on ddl.index_expr and query.point_lookup."

[[capability]]
id = "query.explain"
description = "EXPLAIN — `EXPLAIN <query>` renders the planner's chosen plan as a deterministic result set instead of executing the statement (spec/design/explain.md). Output columns are `depth` (i32, the plan node's 0-based nesting level from a pre-order DFS), `node` (text, a fixed cross-core operator label), `detail` (text attributes or `-`), `est_rows` (non-NULL i64 rows emitted to the parent), and `est_cost` (non-NULL i64 cumulative scheduled cost through the node). Estimate arithmetic and semantic CTE attribution are the cross-core contract in estimator.md; DML roots report estimated affected rows. Every cell is non-empty and carries no leading/trailing whitespace (indentation is the `depth` integer), so rows are asserted with `nosort`. Plain EXPLAIN plans WITHOUT executing the inner statement and never mutates. Plan text and estimates are byte-identical across cores; this jed-specific rendering is not oracle-imported."

[[capability]]
id = "maintenance.analyze"
description = "Explicit deterministic column-statistics collection through `ANALYZE table [(columns)]` (spec/design/statistics.md): a transactional write that scans each requested column in storage-key order, replaces only those snapshot facts, retains facts as stale after later DML, and feeds the shared integer estimator. It requires target SELECT plus the appropriate DDL capability; database-wide/multi-target/automatic analyze and configurable targets are deferred."

[[capability]]
id = "introspect.statistics"
description = "The read-only qualified `jed_statistics` computed relation (spec/design/statistics.md §8): one generated row per collected table column exposing analyzed population, stale state, NULL/NDV/sample/width summaries, and MCV/histogram counts without exposing typed bucket values."

[[capability]]
id = "query.explain_analyze"
description = "EXPLAIN ANALYZE of a read query — runs the inner statement and reports its ACTUAL accrued cost + row count on an `Analyze` root node (`cost=<C> rows=<R>`), with the plan tree one level deeper (spec/design/explain.md §3). The Analyze row repeats the planned child's `est_rows`/`est_cost`; actual figures remain detail-only. Because jed's cost meter is deterministic, the reported cost is byte-identical and corpus-assertable. The EXPLAIN statement's OWN cost (one row_produced per emitted plan row) is independent of the inner cost. Builds on query.explain."

[[capability]]
id = "dml.explain_analyze"
description = "EXPLAIN ANALYZE of a DML statement (INSERT / UPDATE / DELETE) — unlike plain EXPLAIN, ANALYZE EXECUTES the inner statement, so the mutation happens and is committed (EXPLAIN ANALYZE of a write IS a write, classified by stmtIsWrite). The Analyze root reports the mutation's actual accrued cost + affected-row count; the plan tree (Insert/Update/Delete + source/scan) sits one level deeper (spec/design/explain.md §3). Builds on dml.explain and query.explain_analyze."

[[capability]]
id = "dml.explain"
description = "EXPLAIN of a DML statement (INSERT / UPDATE / DELETE) — renders the plan WITHOUT executing it, so an EXPLAIN of a DELETE deletes nothing and an EXPLAIN of an INSERT inserts nothing (spec/design/explain.md §2). The DML root node is `Insert <table>` (with an `on conflict …` note), `Update <table>` (with `sets=N`), or `Delete <table>`; an INSERT … VALUES has a `Values rows=N` child, an INSERT … SELECT renders its source subplan, and an UPDATE/DELETE renders its residual `Filter` and its target `Scan` with the chosen access path. The scan bound is chosen by the SAME detectors the executor uses (the PK range bound, then GIN, then GiST — UPDATE/DELETE do not use secondary B-tree index bounds, indexes.md §5), so the reported access path matches the one the statement would run. Builds on query.explain."

[[capability]]
id = "query.gin_scan"
description = "GIN-bounded scan — a SELECT base relation whose WHERE has `arr_col @> const` (contains) or `arr_col && const` (overlaps) against a GIN-indexed array column bounds the scan to candidate rows: the opclass extracts the query terms, each term's posting list is a prefix range scan of the GIN tree, the sets combine by INTERSECTION (@>) or UNION (&&), and the original predicate stays the residual WHERE filter (results identical to the full scan — gin.md §6). Degenerate constant queries: a NULL / NULL-containing query (and && of an empty/all-NULL query) is a provably-empty bound; @> '{}' falls back to the full scan. Cost: page_read per query term + gin_entry per posting entry + per-candidate point-lookup (page_read + storage_row_read) + residual operator_eval + row_produced (cost.md §3). With query.bounded_limit_streaming the posting gather remains complete while candidate table lookups stop at the LIMIT window. A cost-visible optimization (a core lacking it full-scans and computes the higher cost, so cost-asserting GIN tests require it); narrowings: constant query only and @>/&& only. Builds on ddl.gin_index and func.array_containment"

[[capability]]
id = "query.gist_scan"
description = "GiST-bounded scan — a SELECT/UPDATE/DELETE base relation whose WHERE has `range_col && const` (overlaps) or `range_col @> const` (contains, the column the LEFT/container operand) against a GiST-indexed range column bounds its target-row scan: the planner DESCENDS the index's resident R-tree visiting only children whose bounding union is consistent with the query (an overlaps prune that is sound for &&/@>), collects candidate storage keys at the leaves, point-looks-up each candidate, and re-applies the original predicate as the residual WHERE filter (results identical to the full scan — gist.md §5). Degenerate constant queries: a NULL Q and `col && 'empty'` are provably empty; `col @> 'empty'` matches every row and falls back to the full scan (an empty bound is invisible to the overlap-descend). Cost: page_read per tree node visited + gist_descent per INTERIOR node visited + per-candidate point-lookup (page_read + storage_row_read) + residual operator_eval + row_produced (cost.md §3). A cost-visible optimization (a core lacking it full-scans and computes the higher cost, so cost-asserting GiST tests require it); narrowings: constant query only, &&/@> only (the positional/<@/= operators stay full-scan this slice). The resident R-tree is content-deterministic (rebuilt canonically from the leaf set), so the gist_descent count is cross-core identical. Same rows as PG (range overlap/containment semantics are PG's); the tree shape / plan / cost are jed's own (gist.md §3/§10). Builds on ddl.gist_index and func.range_operators"

[[capability]]
id = "query.gist_scalar_scan"
description = "GiST scalar `=` bounded scan — a SELECT/UPDATE/DELETE base relation whose WHERE has `scalar_col = const` against a GiST-indexed FIXED-WIDTH scalar column (the scalar `=` opclass, gist.md §6) bounds its target-row scan: the planner DESCENDS the index's resident R-tree visiting only children whose [min,max] key-byte interval brackets the query key, collects candidate storage keys at the leaves, point-looks-up each candidate, and re-applies `=` as the residual filter (results identical to the full scan). A NULL constant is provably empty (= NULL is 3VL-unknown). The GiST `=` bound is the FALLBACK: a `col = const` over a PK or B-tree-indexed column takes the cheaper bound, so it fires only when a GiST index is the column's only index; the ordered-index pushdown explicitly skips a GiST index (its store key is [v,v]‖skey, not the ordered-index key form). Cost: identical block to query.gist_scan (page_read per node + gist_descent per interior + per-candidate point-lookup + residual operator_eval + row_produced). A cost-visible optimization (cost-asserting tests require it). The rows are PG-clean (a `=` scan), but the CREATE INDEX USING gist (scalar) DDL needs PG's btree_gist extension, so this corpus is NOT oracle-imported (a jed-in-core divergence, gist.md §10). Builds on ddl.gist_scalar_index"

[[capability]]
id = "query.gin_any_eq"
description = "GIN-bounded `const = ANY(col)` membership — a SELECT base relation whose WHERE has `c = ANY(arr_col)` (the array spelling of membership) against a GIN-indexed array column, with `c` a CONSTANT scalar, bounds the scan: the opclass extracts c's single term, its posting list is a prefix range scan of the GIN tree, and the original predicate stays the residual WHERE filter (results identical to the full scan — gin.md §6). Equivalent to a single-term `@>` gather (`c = ANY(col)` ⇔ `col @> ARRAY[c]`). Degenerate constant: a NULL `c` (a typed NULL::i32; a bare NULL is 42P18) is a provably-empty bound that reads nothing. jed coerces `c` to the element type at resolve, so an out-of-range constant is rejected 22003 before the bound (a divergence from PG, which returns empty). Only `= ANY` (membership), never `= ALL`/`<> ANY`/etc.; the column must be ANY's array operand. Cost: page_read for the term's posting range + gin_entry per posting entry + per-candidate point-lookup (page_read + storage_row_read) + residual operator_eval + row_produced (cost.md §3) — same shape as a single-term @>. A cost-visible optimization (a core lacking it full-scans and computes the higher cost, so cost-asserting tests require it). PG does not rewrite `= ANY(array)` onto a GIN array index, so this is a jed acceleration divergence (same rows, lower cost). Builds on query.gin_scan and func.array_quantified"

[[capability]]
id = "query.gin_array_eq"
description = "GIN-bounded array equality — a SELECT base relation whose WHERE has `arr_col = const` (exact array equality; commutative, so `const = arr_col` too) against a GIN-indexed array column, with const a CONSTANT array, bounds the scan: the opclass extracts const's DISTINCT NON-NULL elements (the SAME term set + intersection gather as `@> const`, because equal arrays have identical element multisets, so `col = const` ⟹ `col @> const` — the gather is a sound SUPERSET), and the original `=` predicate stays the residual WHERE filter that makes it exact (results identical to the full scan — gin.md §6). Two degenerate shapes part from @>: (a) a NULL ELEMENT of const does NOT empty the bound (unlike @>, where @>{…,NULL} is never TRUE) — `col = ARRAY[1,NULL]` matches a `{1,NULL}` row via the `@>{1}` bound + residual; (b) when const has NO non-NULL element (`'{}'` or all-NULL), the matching rows (`{}`, `{NULL}`) carry no index terms, so the bound FALLS BACK to the full scan (not provably-empty). A whole-NULL const (`col = NULL`) is provably empty. Matches PG: its array_ops GIN opclass includes the `=` strategy (GinEqualStrategy 4) and also marks it lossy→recheck, so jed's always-recheck aligns. Cost: page_read per query term + gin_entry per posting entry + per-candidate point-lookup (page_read + storage_row_read) + residual operator_eval + row_produced (cost.md §3) — same shape as `@>`; the no-term fallback charges the full scan. A cost-visible optimization (a core lacking it full-scans and computes the higher cost, so cost-asserting tests require it). Builds on query.gin_scan"

[[capability]]
id = "query.gin_mutation"
description = "GIN-bounded UPDATE/DELETE — an UPDATE or DELETE whose WHERE has a GIN-accelerable conjunct (`col @> const`, `col && const`, `const = ANY(col)`, or `col = const`) against a GIN-indexed array column bounds its TARGET-ROW scan through the same GIN index as a SELECT, instead of full-scanning: it gathers the candidate rows (term posting lists → intersect/union), re-applies the original predicate as the residual WHERE filter, and phase-2 rewrites (UPDATE) / removes (DELETE) exactly those rows, maintaining every index — including the GIN entries — as before. The bound is over the PRE-mutation index state (the WHERE evaluates against the old row), so the candidate set equals the rows the full scan would match; the END STATE and any RETURNING rows are identical to the full scan (gin.md §6). Precedence: after PK and an eligible ordered B-tree bound, a mutation tries GIN before GiST, then point-set fallbacks. The array column is in the WHERE, hence in the touched set, hence resolved, so GIN-entry maintenance over it is correct. Cost: the SAME scan block as the matching SELECT (page_read per term + gin_entry per posting entry + per-candidate point-lookup + residual operator_eval), minus the row_produced a bare mutation omits (a RETURNING clause restores it plus its projection units); the phase-2 writes + index maintenance are unmetered (cost.md §3). A cost-visible optimization (a core lacking it full-scans a mutation and computes the higher cost, so cost-asserting tests require it). PG uses its array GIN index for UPDATE/DELETE too, so the rows/end state match PG. Builds on query.gin_scan, dml.update, and dml.delete"

[[capability]]
id = "query.gin_element_types"
description = "GIN over non-integer fixed-width key-encodable element types — a `USING gin` index, and every GIN-bounded scan (@>/&&/= ANY/= and the GIN-bounded UPDATE/DELETE), now admit an array column whose element type is any of the engine's keyable scalars beyond the integers: `uuid[]`, `date[]`, `timestamp[]`, `timestamptz[]`, `boolean[]` (the same set a PRIMARY KEY / ordered-index key column accepts). A GIN term IS the element's order-preserving key encoding (gin.md §4) — the inverted core (entry tree, gather, posting combine, residual recheck, cost) is unchanged; only the CREATE INDEX gate and the per-element term encoder generalized from integers to the shared key-value encoder, so the bytes, rows, and cost are the integer case's, just over a wider element domain. A `text[]`/`decimal[]`/`bytea[]`/`interval[]`/`f64[]` GIN stays 0A000 until that element's key encoding lifts (gin.md §3/§10). PG's array_ops GIN is element-generic too, so rows/end state match PG (the residual operator_eval per candidate is unchanged). Builds on query.gin_scan, query.gin_any_eq, query.gin_array_eq, ddl.gin_index, and types.uuid"

[[capability]]
id = "query.is_null"
description = "IS NULL / IS NOT NULL predicates"

[[capability]]
id = "query.is_distinct_from"
description = "IS [NOT] DISTINCT FROM (NULL-safe equality) predicates"

[[capability]]
id = "query.order_by"
description = "ORDER BY for deterministic multi-row output"

[[capability]]
id = "query.order_by_keys"
description = "ORDER BY with multiple keys, per-key ASC/DESC, and per-key NULLS FIRST|LAST"

[[capability]]
id = "query.order_by_ordinal"
description = "ORDER BY by an output-column ordinal (ORDER BY 1, the 1-based select-list position; out of range is 42P10). Also applies to a set-operation ORDER BY. An ordinal pointing at a computed select-list item sorts by that item's value (query.order_by_expr); WITHIN GROUP stays column-only."

[[capability]]
id = "query.order_by_expr"
description = "ORDER BY by a general expression (ORDER BY a + 1, ORDER BY b % 2, ORDER BY abs(b)) — evaluated per row and sorted by the computed value (materialized like a window key, metered per node). In a grouped query the key resolves against the group context (grouping expressions + aggregates) and may introduce a new aggregate not in the select list (ORDER BY sum(b)); a non-grouped column is 42803. A bare integer is still an ordinal and ORDER BY 1 + 1 is a constant no-op (PostgreSQL). A non-orderable result (json) is 42883. A SELECT DISTINCT expression key must match a select-list expression (42P10). A correlated key (one referencing an enclosing query) is query.order_by_correlated; a window function inside a key is query.order_by_window; a GROUPING() inside a key is query.order_by_grouping. A set-operation ORDER BY expression key and an expression key in a grouped+window query are each deferred (0A000). An output-alias key is query.order_by_alias. Builds on query.order_by and query.order_by_ordinal."

[[capability]]
id = "query.order_by_alias"
description = "ORDER BY by an output-column alias / name (SELECT a + b AS s FROM t ORDER BY s). A bare sort-key name resolves against the OUTPUT columns first, then the input columns — PostgreSQL's SQL92 rule (the opposite of GROUP BY): the alias binds even when it shadows a same-named input column (SELECT a AS b ... ORDER BY b sorts by a). The match uses each item's output name (its AS alias, else its derived name — a bare column's canonical name, an un-aliased aggregate's lowercased function name), case-insensitively. A matched plain-column item stays on the column fast path (PK-scan elision still applies); a matched computed item is materialized like a general expression (query.order_by_expr). The alias binds only for a bare-name key — ORDER BY s + 1 resolves s against the input columns (42703). Two output columns of the same name with different expressions make a bare key 42702 (ambiguous). Builds on query.order_by_expr."

[[capability]]
id = "query.order_by_correlated"
description = "A correlated ORDER BY key — an ORDER BY inside a subquery referencing a column of an enclosing query (SELECT a, (SELECT b FROM u ORDER BY t.a LIMIT 1) FROM t). The outer column is a per-evaluation constant of the enclosing row, so it is a degenerate (constant) leading sort key — a deterministic later key decides the order. PostgreSQL accepts it. Both a bare/qualified outer-column key and a general expression containing an outer reference (ORDER BY t.a + u.b) are materialized as an OuterColumn expression evaluated per outer row against the outer-row environment (never a local sort-row slot). A subquery correlated ONLY through its ORDER BY is still correlated and re-executes per outer row. Skip-level (grandparent) outer references work. The degenerate GROUP BY-outer-key case stays 0A000. Builds on query.order_by_expr, query.subquery_correlated."

[[capability]]
id = "query.order_by_window"
description = "A window function inside a query ORDER BY key (SELECT a FROM t ORDER BY row_number() OVER (ORDER BY b)) — the window function directly, or an expression containing one (ORDER BY rank() OVER (...) % 2). The window stage runs over the post-WHERE (or grouped) rows appending each window result, then the ORDER BY key is materialized over those rows and the result sorted by it (the same mechanism as a select-list window value reached via an output alias, which now also works). A query whose ONLY OVER call is in the ORDER BY still sets up the window machinery: the window placeholder rebases run after ORDER BY resolution so an order-introduced window spec / window key shifts every slot consistently. The grouped+window combination (a window function in the key of a GROUP BY query) is a separate deferral (0A000). Builds on query.window, query.order_by_expr."

[[capability]]
id = "query.order_by_grouping"
description = "A GROUPING() call inside a query ORDER BY key (SELECT a, sum(v) FROM t GROUP BY ROLLUP (a) ORDER BY GROUPING(a), a) — typically to push the higher-level subtotal / grand-total rows (GROUPING = 1) to one end. The call collects into the same grouping spec as a select-list GROUPING(), is materialized as the ORDER BY key, and sorted over the grouped rows; the GROUPING() placeholder rebases run after ORDER BY resolution. A plain (non-GROUPING-SETS) GROUP BY makes GROUPING(col) a constant 0 leading key, matching PostgreSQL. Builds on query.grouping_sets, query.order_by_expr."

[[capability]]
id = "query.order_by_grouped_window"
description = "A general-expression ORDER BY key in a query that BOTH groups (GROUP BY / aggregates) AND has window functions (SELECT g, sum(v), rank() OVER (ORDER BY sum(v)) FROM t GROUP BY g ORDER BY sum(v) + 1; ORDER BY rank() OVER (ORDER BY sum(v)) DESC). The key is resolved in the grouped+window context (collecting aggregates AND window specs at once), so it may name an aggregate the select list lacks or be a window function over a grouped aggregate; it is materialized over the grouped rows AFTER the window stage appends its results, so the order values follow the window results in the grouped row. GROUPING SETS (more than one set) combined with window functions remains 0A000. Builds on query.window_grouped, query.order_by_window."

[[capability]]
id = "query.select_star"
description = "SELECT * expands to all columns with their canonical names"

[[capability]]
id = "query.column_alias"
description = "Select-list output naming: bare column → canonical name, expr AS alias → alias, other expr → ?column?"

[[capability]]
id = "query.limit"
description = "LIMIT clause: cap the number of returned rows (non-negative integer literal)"

[[capability]]
id = "query.offset"
description = "OFFSET clause: skip leading rows of the result (non-negative integer literal)"

[[capability]]
id = "query.distinct"
description = "SELECT DISTINCT: deduplicate projected output rows (NULL-safe), with the PostgreSQL ORDER-BY-in-select-list restriction"

[[capability]]
id = "query.select_no_from"
description = "FROM-less SELECT — the select list evaluates over ONE virtual zero-column row with no table access (PostgreSQL semantics, spec/design/grammar.md §34): WHERE/LIMIT/OFFSET/DISTINCT/HAVING/aggregates compose (SELECT 1 WHERE false → zero rows; SELECT count(*) → 1 via the single-group rule), and it is a full citizen of set operations, subqueries (a correlated zero-relation scope resolves purely outward), and INSERT ... SELECT. SELECT * with no FROM is 42601 (PG's exact message), a bare column the ordinary 42703. Cost charges no scan units — just the items' metered evaluation plus row_produced (spec/design/cost.md §3)"

[[capability]]
id = "query.set_returning"
description = "Set-returning functions in the FROM clause — generate_series(start, stop[, step]) over the integer family, the engine's first SRF, a COMPUTED row source rather than a scanned table (spec/design/functions.md §10, grammar.md §35). The produced relation has one column named generate_series, typed at the promoted integer type of the args; it joins/cross-joins with other FROM relations and composes with WHERE/ORDER BY/LIMIT/subqueries. PostgreSQL semantics: any NULL arg → zero rows; start > stop with a positive step → zero rows; a step of zero → 22023; an i64 overflow while stepping stops the series cleanly. Non-LATERAL (args see $N/outer, not sibling FROM tables); the SELECT-list SRF position, LATERAL, and the column-alias-list form (AS g(n)) are deferred narrowings (0A000). Each generated element charges one generated_row (spec/design/cost.md §3), so a max_cost ceiling bounds a runaway series (54P01)"

[[capability]]
id = "query.join_inner"
description = "INNER JOIN ... ON <expr> — combine rows from two tables on a boolean predicate (left-deep nested loop, 3-valued ON). A bare JOIN is INNER; an INNER JOIN with no ON is 42601 (spec/design/grammar.md §15)"

[[capability]]
id = "query.cross_join"
description = "CROSS JOIN — the Cartesian product of two tables (no ON)"

[[capability]]
id = "query.join_using"
description = "JOIN ... USING (col, …) — an equi-join on the named columns that MERGES each into a single output column (spec/design/grammar.md §15). `a JOIN b USING(k)` matches on `a.k = b.k` (3-valued) and the output carries ONE `k`, placed FIRST (before a's other columns, then b's — PostgreSQL `*` order). A bare `k` resolves to the merged column (never the 42702 ambiguity of the two underlying copies); qualified `a.k`/`b.k` still reach each side. The merge is the SURVIVING side: the left for INNER/LEFT, the right for RIGHT. Composes with LEFT/RIGHT joins, multi-column USING, and a USING chain. A USING column absent from either side is 42703. Deliberate divergences (oracle_overrides.toml): FULL JOIN USING is 0A000 (its merge is a COALESCE the single-index model does not carry), and a type-mismatched USING column is jed's strict-comparison 42804 (PG 42883)."

[[capability]]
id = "query.join_natural"
description = "NATURAL JOIN — a join whose USING column list is DERIVED as the column names common to both sides, in left order, then merged exactly like USING (spec/design/grammar.md §15). `a NATURAL JOIN b` joins on every shared column name and the output carries each once (merged first). Composes with the join kinds — `NATURAL [INNER|LEFT|RIGHT] JOIN`. With NO common column it degenerates to a CROSS join (the Cartesian product). NATURAL is non-reserved (positional, in the implicit-alias stop set); `NATURAL CROSS JOIN` and a bare `NATURAL` not followed by a join are 42601. Reuses the USING merge machinery, so `NATURAL FULL JOIN` with a common column is the same 0A000 as FULL JOIN USING (oracle_overrides.toml)."

[[capability]]
id = "query.comma_from"
description = "Comma-separated FROM — `FROM a, b` is an implicit CROSS JOIN (the Cartesian product), identical in result to `a CROSS JOIN b` (spec/design/grammar.md §15). The comma binds LOOSER than JOIN, so each comma-separated FROM item is its own join sub-chain and its own ON-resolution segment: a later join's ON may reference only relations within its own comma item — `FROM a, b JOIN c ON a.x = c.x` is a 42P01 on `a` (matching PostgreSQL). Composes with `FROM t, LATERAL (…)` (a lateral item still sees earlier comma items). More than two comma items chain left-deep."

[[capability]]
id = "query.join_left"
description = "LEFT [OUTER] JOIN ... ON <expr> — every left row preserved; an unmatched left row is emitted once with the right side NULL-extended (3-valued ON; a NULL join key never matches → NULL-extends). spec/design/grammar.md §15"

[[capability]]
id = "query.join_right"
description = "RIGHT [OUTER] JOIN ... ON <expr> — every right row preserved; an unmatched right row is emitted with the left side NULL-extended. spec/design/grammar.md §15"

[[capability]]
id = "query.join_full"
description = "FULL [OUTER] JOIN ... ON <expr> — every row from both sides preserved; unmatched rows on either side are NULL-extended on the absent side. spec/design/grammar.md §15"

[[capability]]
id = "query.table_alias"
description = "Table aliases in FROM — `t AS a` / `t a`; the alias (else the table name) is the relation label, distinct per query (a self-join needs aliases; duplicate label is 42712)"

[[capability]]
id = "query.qualified_column"
description = "Qualified column references `rel.col` — resolved against the named relation; a bare column ambiguous across relations is 42702, unknown relation is 42P01 (spec/design/grammar.md §15)"

[[capability]]
id = "query.qualified_star"
description = "Qualified-star select item `t.*` — expands the FROM relation labeled `t` into one output column per column, in catalog order (spec/design/grammar.md §15). Like bare `*` but for a single named relation, and (unlike bare `*`) MIXABLE with other select items (`SELECT t.*, u.x`). The qualifier resolves against the local FROM scope; an unknown label is 42P01. It takes no `AS` alias (42601), and is a select-list / RETURNING construct only — in a scalar position (`WHERE t.*`, `t.* + 1`) it is 42601. Recognized by the identifier-dot-star token shape, so `t.col` and `a * b` are unaffected. Distinct from the composite `(expr).*` whole-row expansion."

[[capability]]
id = "query.aggregates"
description = "Scalar aggregate functions COUNT/SUM/MIN/MAX/AVG over the whole table (no GROUP BY): single-row result; COUNT(*) counts rows, COUNT(expr)/SUM/AVG/MIN/MAX skip NULL; COUNT->0 and SUM/AVG/MIN/MAX->NULL over empty/all-NULL; PG widening (SUM i16/i32->i64, i64->decimal, decimal->decimal; AVG->decimal; MIN/MAX->input type); overflow 22003; aggregate in WHERE/nested is 42803; unknown function 42883; DISTINCT-in-aggregate is query.aggregate_distinct, FILTER-in-aggregate is query.aggregate_filter (spec/design/aggregates.md)"

[[capability]]
id = "query.aggregate_distinct"
description = "DISTINCT inside an aggregate — COUNT(DISTINCT x), SUM/AVG/MIN/MAX(DISTINCT x) (aggregates.md §5): the aggregate folds only the distinct non-NULL argument values, deduplicated value-canonically (the same Eq/Hash as group-key bucketing, so 1.5 == 1.50 and -0.0 == 0.0) keeping the first occurrence in scan order; an all-NULL/empty distinct group is COUNT 0 and SUM/AVG NULL like any aggregate. Works whole-table and per GROUP. DISTINCT on a window function is 0A000 (DISTINCT is not implemented for window functions), on a non-aggregate (scalar) function is 42809; agg(DISTINCT *) and agg(DISTINCT) (no argument) are 42601; a wrong argument count stays 42883. Cost: aggregate_accumulate is still charged per (input row x aggregate); only the actual fold (and any decimal_work) is skipped for a duplicate, so the metered cost is deterministic and cross-core identical. Builds on query.aggregates"

[[capability]]
id = "query.aggregate_filter"
description = "FILTER (WHERE cond) on an aggregate — agg(args) FILTER (WHERE cond) (aggregates.md §11): the aggregate folds only the input rows for which cond is TRUE (a FALSE or NULL cond excludes the row, contributing nothing — so a group whose every row is filtered out is COUNT 0 and SUM/AVG/MIN/MAX NULL like an empty group). Works whole-table and per GROUP, in HAVING, and composes with DISTINCT (the filter applies first, then the dedup). cond is an ordinary boolean expression over the input row: a non-boolean cond is 42804, an aggregate inside cond is 42803. FILTER on a non-aggregate (scalar) function is 42809; FILTER on a non-aggregate window function is 0A000 (matches PG's own 0A000); FILTER on a window aggregate is query.window_aggregate_filter. Cost: the filter's own operator_evals are charged per row (it is evaluated per row like the operand), and aggregate_accumulate + the operand eval are charged only for a row that passes — deterministic and cross-core identical. Builds on query.aggregates"

[[capability]]
id = "query.window_aggregate_filter"
description = "FILTER (WHERE cond) on a WINDOW aggregate — agg(x) FILTER (WHERE cond) OVER (...) (aggregates.md §20): the window aggregate folds only the frame rows for which cond is TRUE (a FALSE/NULL cond excludes the row; a frame with no passing row is COUNT 0 / SUM/AVG/MIN/MAX NULL). Works with the default frame, explicit ROWS/RANGE/GROUPS frames, EXCLUDE, and PARTITION BY. cond is a boolean over the input row (non-boolean 42804, nested aggregate 42803). A FILTER disables the sliding-frame optimization (a filtered row can't be cleanly un-folded), so every frame re-folds; the filter's operator_evals are charged per visited frame row and only a passing row folds. FILTER on a non-aggregate window function stays 0A000. Builds on query.aggregate_filter + query.window"

[[capability]]
id = "query.aggregate_select_distinct"
description = "SELECT DISTINCT in an aggregate query (aggregates.md §10): once the grouped output rows are produced (GROUP BY / HAVING / window / ORDER BY), they are projected and deduplicated by equality keeping the first occurrence, then LIMIT/OFFSET applied — the same project->dedup->window pipeline as the non-aggregate DISTINCT (query.distinct). The DISTINCT ORDER BY restriction applies (each ORDER BY key must be a select-list item, else 42P10). Cost: every grouped row is projected (its projection operator_evals charged), only an emitted row charges row_produced — deterministic and cross-core identical. Builds on query.aggregates + query.distinct"

[[capability]]
id = "query.group_by"
description = "GROUP BY <column,...>: one result row per distinct grouping-key combination; NULL is its own group; decimal keys bucket value-canonically; first-occurrence group order (ORDER BY over a grouping column overrides); a non-aggregated SELECT/ORDER BY column not in GROUP BY is 42803; GROUP BY over an empty table yields zero rows (spec/design/aggregates.md §5-6, grammar.md §18)"

[[capability]]
id = "query.group_by_expr"
description = "GROUP BY by a select-list ORDINAL (GROUP BY 1 — 1-based position, out of range 42P10; only a bare integer literal, 1+1 is a constant expression), an output ALIAS (GROUP BY s — a bare name resolves an INPUT column FIRST, then an output alias/derived name, PG's rule opposite ORDER BY), or a general EXPRESSION (GROUP BY a + b), not just a bare column (aggregates.md §15). An expression key is materialized (evaluated per row into a synthetic column) and a select-list / HAVING / ORDER BY expression that structurally matches it resolves to the group value; an aggregate operand stays per-row (sum(a+b) under GROUP BY a+b is the per-row a+b). Composes with ROLLUP/CUBE/GROUPING SETS. A non-grouped column is still 42803. Builds on query.group_by"

[[capability]]
id = "query.group_by_functional_dependency"
description = "Functional-dependency grouping (aggregates.md §16, PG): when there is a single grouping set that contains every primary-key column of a base table T, T's PK functionally determines all of T's columns, so any column of T (and expressions over them) may appear ungrouped in SELECT / HAVING / ORDER BY without 42803. Holds across a join (T's columns stay constant per PK value) and for a composite PK (every member must be grouped). Restricted to a single grouping set; a partial PK, or a column of a table whose PK is not grouped, is still 42803. Implemented by adding T's remaining columns as extra master grouping keys (the grouping is unchanged). Builds on query.group_by"

[[capability]]
id = "query.grouping_sets"
description = "GROUP BY GROUPING SETS / ROLLUP / CUBE and the GROUPING() function: several grouping sets in one GROUP BY (ROLLUP(a,b)={(a,b),(a),()}, CUBE(a,b)=every subset; a plain term cross-products with these); a column not grouped in a row's set projects NULL; a select column must be in the union of all sets else 42803; GROUPING(c1,...,ck) -> integer bitmask (1 = grouped away), its args must be grouping columns else 42803; columns only; over MAX_GROUPING_SETS aborts 54001; combined with window functions is query.grouping_sets_window (spec/design/aggregates.md §12, grammar.md §18)"

[[capability]]
id = "query.grouping_sets_window"
description = "GROUPING SETS / ROLLUP / CUBE / GROUPING() combined with window functions (aggregates.md §21): the window stage runs over the unioned grouping-set rows (the grouped row is [master cols, agg results, GROUPING results, window keys, window results], so GROUPING and window no longer collide for the trailing slots). PARTITION BY / ORDER BY window keys reference the grouped row (a grouped-away master column is NULL there); GROUPING() works in the projection / HAVING / ORDER BY of a grouped+window query. Builds on query.grouping_sets + query.window"

[[capability]]
id = "query.having"
description = "HAVING <predicate>: boolean filter over grouped rows, after aggregation and before ORDER BY; may reference aggregates (even ones not projected) and grouping keys; a non-grouped column is 42803, non-boolean is 42804; HAVING alone makes a query an aggregate query; HAVING with no GROUP BY filters the single whole-table group (spec/design/aggregates.md §8, grammar.md §19)"

[[capability]]
id = "query.ordered_set_nonconstant_fraction"
description = "A non-constant ordered-set-aggregate fraction (aggregates.md §17): the direct argument of percentile_cont / percentile_disc may be any numeric expression over GROUPING columns (not just a literal), evaluated once per group against the group's key values. percentile_cont(p) / percentile_disc(1-p) WITHIN GROUP (ORDER BY v) GROUP BY p uses each group's own fraction. A non-grouped column in the direct argument is 42803 (PG: direct arguments must use only grouped columns); an aggregate inside it is 42803; a non-numeric fraction is 42883. A NULL fraction still yields NULL and an out-of-range fraction still 22003, per group. Builds on query.ordered_set_aggregate"

[[capability]]
id = "query.hypothetical_set_aggregate"
description = "Hypothetical-set aggregates rank/dense_rank/percent_rank/cume_dist WITHIN GROUP (ORDER BY keys) (aggregates.md §19): the rank the hypothetical direct-argument row would have if inserted into the group sorted by the WITHIN GROUP keys. rank = 1 + group rows that sort strictly before the hypothetical; dense_rank = 1 + distinct values strictly before; percent_rank = (rank-1)/N (f64); cume_dist = (#rows <= hyp + 1)/(N+1) (f64). The number of direct args must equal the number of ordering columns (else 42883); each direct arg is coerced to its key's type; NULL key values and NULL hypothetical args participate via NULLS FIRST/LAST; per-key ASC/DESC/COLLATE honored; FILTER composes; OVER is 0A000, DISTINCT 42601. Over an empty group: rank/dense_rank 1, percent_rank 0, cume_dist 1. These names are also window functions — the WITHIN GROUP clause routes them here. Builds on query.ordered_set_aggregate"

[[capability]]
id = "query.ordered_set_collation"
description = "A collated WITHIN GROUP order key (aggregates.md §13): mode() / percentile_disc honor an explicit COLLATE on the WITHIN GROUP key (text operand only — else 'collations are not supported by type T'), or a text column's frozen collation, when sorting the buffered values; the default is byte (C) order. The collation drives the sort order (hence mode's tie-break and percentile_disc's index); run-equality stays value-canonical. An unmapped code point fails 0A000 at finalize. Builds on query.ordered_set_aggregate + types.collation"

[[capability]]
id = "query.ordered_set_array_fraction"
description = "An array-valued ordered-set fraction (aggregates.md §18): percentile_cont(ARRAY[...]) / percentile_disc(ARRAY[...]) computes one percentile per array element and returns an array (f64[] for percentile_cont numeric, input-type[] for percentile_disc, interval[] for percentile_cont over interval), in element order. A NULL element yields a NULL element; every non-NULL element is range-checked (22003) BEFORE the empty-group check; an empty/all-NULL group yields NULL (the whole result, not an array of NULLs). The array element type must be numeric. Builds on query.ordered_set_aggregate"

[[capability]]
id = "query.ordered_set_interval"
description = "percentile_cont over an INTERVAL WITHIN GROUP input (aggregates.md §13): the continuous percentile is interpolated in the interval domain (PG interval_lerp = lo + (hi-lo)*pct, with interval_mul's exact field cascade + microsecond rounding, byte-identical to PG) and the result is interval, not f64. Values are sorted by the canonical interval span. mode()/percentile_disc already accept interval (any sortable type). Builds on query.ordered_set_aggregate + types.interval"

[[capability]]
id = "query.ordered_set_aggregate"
description = "Ordered-set aggregates mode() / percentile_cont(f) / percentile_disc(f) WITHIN GROUP (ORDER BY col) (aggregates.md §13, grammar.md §17): the result is defined by the rows sorted by the WITHIN GROUP order key (one bare/qualified column, ASC/DESC/NULLS, like the query ORDER BY). mode() -> the most frequent input value (tie broken by sort order), result is the input type. percentile_cont(f) -> the continuous (interpolated) percentile, f64 result, numeric input only (each widened to f64 like PG numeric->float8); pos=f*(N-1), result=val[floor]+(pos-floor)*(val[ceil]-val[floor]) in f64, bit-identical to PG. percentile_disc(f) -> the discrete percentile, an actual input value at row ceil(f*N) (any sortable type, input type result). The fraction is a per-group constant f64 (NULL -> NULL result); out of [0,1] or NaN -> 22003 per group at finalize (after the NULL check, before the empty check). NULL aggregated values skipped; empty/all-NULL group -> NULL. Composes with GROUP BY/HAVING/FILTER. DISTINCT in the call is 42601; OVER is 0A000 (PG matches); aggregate in the order key is 42803; a second order key, WITHIN GROUP on a non-ordered-set function, or an ordered-set aggregate without WITHIN GROUP is 42883. Cost identical to an ordinary aggregate (operand per row, aggregate_accumulate per passing row, row_produced per group; sort + finalize unmetered). Builds on query.aggregates"

[[capability]]
id = "query.within_group_expr"
description = "The WITHIN GROUP (ORDER BY ...) order key of an ordered-set aggregate may be a general expression (ORDER BY a + b, ORDER BY abs(x)), not just a bare/qualified column — evaluated per row and sorted by the computed value, exactly like the query ORDER BY general-expression key (query.order_by_expr). The fold/finalize are unchanged; only the order-key resolve broadens. A bare integer in a WITHIN GROUP order key is a CONSTANT (every row sorts equal), not an ordinal — the opposite of a query ORDER BY (PostgreSQL: a WITHIN GROUP integer is a constant). An aggregate nested in the order key is 42803, a non-orderable result follows the ordinary order-key rules. Builds on query.ordered_set_aggregate, query.order_by_expr"

[[capability]]
id = "query.window"
description = "Window functions — a SELECT-list call carrying OVER ([PARTITION BY cols] [ORDER BY ...]): a blocking window stage after GROUP BY/HAVING and before ORDER BY/LIMIT/DISTINCT (spec/design/window.md). S0: row_number() only (the 1-based sequence position within a partition); partitions bucket value-canonically (NULL its own partition); the within-partition order is the window ORDER BY then the primary key (always fully resolved — divergence D1 from PG's unspecified order). A window-only function without OVER is 42809 (PG's wrong_object_type); a window function in WHERE/JOIN ON/GROUP BY/HAVING/nested in another window is 42P20; a window function combined with aggregates/GROUP BY is 0A000 (S0 narrowing, lifted in S3); a collated window ORDER BY is query.window_collation; named windows (OVER name / WINDOW clause) are 0A000. Cost: window_result per (row x window function), the partition+sort unmetered"

[[capability]]
id = "query.window_ranking"
description = "Window ranking functions (spec/design/window.md §4, S1): rank() and dense_rank() — peer-aware (peers = rows equal on the window ORDER BY only; the PK tie-break sequences peers but does not split a peer group). rank() = 1 + rows in earlier peer groups (1,1,3); dense_rank() = 1 + earlier peer groups (1,1,2); both i64, frame-insensitive, matching PostgreSQL exactly. No window ORDER BY → every row one peer group → 1 for all. Builds on query.window"

[[capability]]
id = "query.window_ratio"
description = "Window ratio functions percent_rank() and cume_dist() (window.md §4, S1): peer-aware relative ranks. percent_rank = (rank-1)/(N-1), 0 when N=1; cume_dist = (rows through the current peer group)/N. Result f64 (PG's float8) — one IEEE correctly-rounded division of small exactly-representable integer counts, so bit-identical across cores and to PostgreSQL (the in-contract float kernel, float.md §5). Builds on query.window_ranking"

[[capability]]
id = "query.window_ntile"
description = "Window ntile(n) (window.md §4, S1): distribute the partition into n ranked buckets, larger first, numbered 1..n; n an integer evaluated once per partition; n<=0 is 22014, NULL n yields NULL for all rows. i64, position-based, matching PostgreSQL. Builds on query.window"

[[capability]]
id = "query.window_offset"
description = "Window offset functions lag() and lead() (window.md §4, S2): the value `offset` rows before (lag) / after (lead) the current row within the partition (window ORDER BY order); offset defaults to 1, a negative offset flips direction; out-of-partition yields the default argument else NULL; NULL offset yields NULL for all rows. Result = the value expression type (same_as_input). Frame-insensitive, matching PostgreSQL. Builds on query.window"

[[capability]]
id = "query.window_aggregate"
description = "Aggregates as window functions (window.md §6, S3): sum/count/min/max/avg carrying OVER are folded over the DEFAULT frame — a RUNNING aggregate with a window ORDER BY (RANGE UNBOUNDED PRECEDING TO CURRENT ROW, peer-aware) or the WHOLE partition without. Reuses the aggregate Acc kernels + widening (sum int->i64, avg->decimal). Explicit frame clauses are deferred to S4. Builds on query.window"

[[capability]]
id = "query.window_frame"
description = "Explicit window frames + frame-sensitive value functions (window.md §6, S4): the ROWS BETWEEN frame_start AND frame_end clause (UNBOUNDED PRECEDING/FOLLOWING, CURRENT ROW, n PRECEDING/FOLLOWING with non-negative integer offsets) restricting the rows an aggregate window or first_value/last_value/nth_value sees; nth_value(e,n) n<1 is 22016, a negative frame offset 22013. Explicit RANGE/GROUPS frames are query.window_frame_range; EXCLUDE stays deferred 0A000. Builds on query.window_aggregate"

[[capability]]
id = "query.window_frame_range"
description = "Explicit RANGE and GROUPS window frames + value-based RANGE offsets (window.md §6). GROUPS counts peer groups (g PRECEDING/FOLLOWING land on the g-th peer group's start/end) and requires an ORDER BY (42P20 otherwise). RANGE with only UNBOUNDED/CURRENT ROW bounds is peer/edge based over any number of ORDER BY keys (CURRENT ROW spans the current peer group). A RANGE value offset (n PRECEDING/FOLLOWING) frames the rows whose ordering key is within n of the current key; it requires exactly one ORDER BY column (42P20 otherwise) of an integer (integer offset), decimal (integer/decimal offset), or float (integer/decimal offset computed in f64 — PG's in_range_float*_float8, the former divergence D3, now bit-identical to PG) type — an integer key with a decimal offset, or any other key type (text/uuid/etc., plus the deferred timestamp/date families, D4) is 0A000. A negative offset is 22013. A NULL current key frames only its NULL peers for offset/CURRENT-ROW bounds while UNBOUNDED bounds still reach the partition edge (PG). Frame folds are naive O(partition^2), bounded by the metered window_frame_step. Builds on query.window_frame"

[[capability]]
id = "query.window_frame_exclude"
description = "Frame exclusion (window.md §6): EXCLUDE CURRENT ROW / GROUP / TIES / NO OTHERS drops rows from the computed [lo, hi) frame, per current row, before a frame-sensitive function (aggregate window, first_value/last_value/nth_value) sees them. CURRENT ROW drops the current row; GROUP drops its whole peer group; TIES drops its peers but not itself; NO OTHERS (the default / no EXCLUDE) drops nothing. Exclusion removes only rows already inside the frame, so EXCLUDE CURRENT ROW on a frame the current row is outside of is a no-op. first/last/nth_value pick over the surviving rows; an empty-after-exclusion frame is NULL (count 0). Works with every frame mode (ROWS/RANGE/GROUPS). The metered window_frame_step is charged only for surviving folded rows. Builds on query.window_frame"

[[capability]]
id = "query.window_named"
description = "Named windows (window.md §5, S5): the WINDOW name AS (definition) clause + OVER name reference, equivalent to inlining the definition (multiple functions may share a named window; one clause may define several). A reference to an undefined window name is 42704. The shared partition/sort optimization is a deferred follow-on. Builds on query.window"

[[capability]]
id = "query.window_grouped"
description = "Window functions combined with GROUP BY / aggregates in one query (window.md §2/§5.1): the window stage runs over the GROUPED rows (PostgreSQL pipeline order GROUP BY/HAVING -> WINDOW -> ORDER BY), so a window function's arguments resolve against the grouped row [group_keys..., agg_results...] (an aggregate inside a window argument is legal, e.g. sum(sum(x)) OVER ()) and its PARTITION BY / ORDER BY column keys must be grouping columns (42803 otherwise). HAVING runs before the window stage (a window function there is 42P20); a window function nested in an aggregate argument is 42803. Builds on query.window + query.aggregates"

[[capability]]
id = "query.window_base_extend"
description = "Base-window-extending definitions (window.md §5, PostgreSQL transformWindowDefinitions): a window definition may begin with the name of an earlier WINDOW-clause entry to extend it -- OVER (w ORDER BY ...) and WINDOW w2 AS (w ORDER BY ...). The extending definition inherits the base's PARTITION BY (and its ORDER BY if the base has one) and supplies its own frame. The rules, all 42P20 in PostgreSQL's priority order PARTITION -> ORDER -> frame: the extender may not add a PARTITION BY (even one identical to the base's); it may add an ORDER BY only if the base has none; the base must not carry a frame. A base that does not exist -- including a self- or forward-reference within the WINDOW clause, which must name an EARLIER entry -- is 42704. Every WINDOW-clause entry is validated even when unreferenced. A pure OVER name reference (no parentheses) copies the named window whole, frame included and with no merge rules, and remains query.window_named. Builds on query.window_named"

[[capability]]
id = "query.window_collation"
description = "Collated window ORDER BY (window.md §3/§5, S10): a window definition's ORDER BY honors a per-key COLLATE and a text column's frozen implicit collation, ordering text by the collation's UCA sort key (the same vendored collations as query ORDER BY; COLLATE \"C\" / no collation stay raw-byte / code-point order). The collation drives BOTH the per-partition sort AND peer determination — ranking peer groups (rank/dense_rank), the running aggregate default frame, and RANGE/GROUPS frame peer groups — so a collated window orders, ranks, and frames identically. Because the vendored collations are deterministic (collated-equality is byte-identity), collated peer groups coincide with byte-equal groups; only the order changes. The window stage decorates each row's collated sort-key bytes once per spec (an unmapped code point is 0A000). COLLATE on a non-text ORDER BY key is 42804. Builds on query.window + expr.collate"

[[capability]]
id = "query.window_expr_keys"
description = "General-expression window PARTITION BY / ORDER BY keys (window.md §5.1): a window definition's PARTITION BY and ORDER BY are general expressions (PARTITION BY a + b, ORDER BY a % 2), not just column references -- the deferred S0 general-expression-key narrowing, lifted. A bare-column key resolves to its row slot directly (byte-identical); a compound key is materialized into a synthetic window-key column evaluated per row before the window stage, then the slot-based partition/sort/frame machinery runs unchanged. In a grouped query the keys resolve against the grouped row exactly as a projection does -- a bare grouping column or an aggregate (ORDER BY sum(x), the aggregate AS a window key) is valid, a non-grouping column is 42803 (the tie to the GROUP BY expression-key); an aggregate inside a window key makes the query a whole-table aggregate even with no GROUP BY. A key referencing an enclosing query (a correlated window) is 0A000. The materialized key expression is metered like any expression (operator_eval per node). Builds on query.window"

[[capability]]
id = "query.union"
description = "UNION / UNION ALL — combine two SELECTs' result rows; the bare form deduplicates (NULL-safe, value-canonical), ALL keeps multiplicities; output column count + names come from the left operand; per-column type unification (integer max-rank, integer<->decimal, all-NULL->text); arity mismatch 42601, type mismatch 42804; INTERSECT binds tighter; optional trailing ORDER BY/LIMIT/OFFSET resolves by output column name (spec/design/grammar.md §25)"

[[capability]]
id = "query.intersect"
description = "INTERSECT / INTERSECT ALL — rows present in both operands; the bare form is distinct, ALL keeps min(m,n) multiplicities; same column/type unification and trailing ORDER BY rules as UNION; binds tighter than UNION/EXCEPT (spec/design/grammar.md §25)"

[[capability]]
id = "query.except"
description = "EXCEPT / EXCEPT ALL — rows in the left operand not in the right; the bare form is distinct, ALL keeps max(0,m-n) multiplicities; same column/type unification and trailing ORDER BY rules as UNION (spec/design/grammar.md §25)"

[[capability]]
id = "query.subquery_scalar"
description = "Uncorrelated scalar subquery (SELECT ...) in expression position — yields the single row/single column value; 0 rows -> typed NULL, >1 row -> 21000, >1 column -> 42601; executed once at plan time and folded to a constant carrying its output type (so it promotes/compares like that type); correlation is layered by query.subquery_correlated; a bind parameter inside is allowed, typed by its inner context (uninferable -> 42P18) (spec/design/grammar.md §26)"

[[capability]]
id = "query.subquery_in"
description = "x [NOT] IN (SELECT ...) — uncorrelated membership over the subquery's single column; folds to the literal-IN OR-chain so the three-valued NULL logic is inherited (a NULL in the result with no match -> NULL); an empty result -> FALSE (IN) / TRUE (NOT IN) regardless of x; >1 column -> 42601; correlation via query.subquery_correlated; a param inside is typed by its inner context (uninferable -> 42P18) (spec/design/grammar.md §26)"

[[capability]]
id = "query.subquery_exists"
description = "[NOT] EXISTS (SELECT ...) — uncorrelated existence test; boolean (rows>0) XOR negated, the select list is ignored entirely (even SELECT * / SELECT 1,2,3), never NULL; correlation via query.subquery_correlated; a param inside is typed by its inner context (uninferable -> 42P18) (spec/design/grammar.md §26)"

[[capability]]
id = "query.subquery_correlated"
description = "Correlated scalar / IN / EXISTS — the subquery references a column of an enclosing query, resolved via a scope chain (inner FROM first, then outward; nearest scope shadows). Planned once (type/structure errors raised even over an empty outer) and re-executed per outer row. Any correlation depth (parent, grandparent, ...); outer refs allowed inside an aggregate arg/select-list/HAVING as a per-row constant. A $N inside is allowed, typed by an inner context (uninferable -> 42P18). Narrowing: a correlated GROUP BY / ORDER BY key is 0A000 (degenerate) (spec/design/grammar.md §26)"

[[capability]]
id = "query.cte"
description = "Non-recursive common table expressions — WITH name [(cols)] AS [NOT] MATERIALIZED (query) [, ...] <query> (spec/design/cte.md). A CTE is a named, statement-local relation the FROM clause references like a table; a list defines one or more, each visible to LATER CTEs in the list and to the main query + its nested subqueries (forward-only: a self/forward reference is 42P01). A CTE name shadows a same-named catalog table in the statement, except inside its own body (which resolves the base table). A body is an INDEPENDENT query — not correlated to the reference site (an outer column inside a body is 42703/42P01). Bodies may be JOINs, aggregates, or set operations. The optional column-rename list renames the body's output columns (a count mismatch is 42P10). Evaluation follows PostgreSQL's hybrid rule: a single-reference CTE is INLINED (body runs in place, like a derived table — a volatile body re-evaluates), a multi-reference or MATERIALIZED one is MATERIALIZED (body runs once, rows buffered, each reference charges cte_scan_row per buffered row; an unreferenced CTE is planned but not executed); [NOT] MATERIALIZED overrides the choice (spec/design/cost.md §3). A duplicate CTE name in one list is 42712. A nested WITH (inside a subquery / derived table / CTE body) is supported — query.cte_nested. RECURSIVE, data-modifying CTEs, and WITH on UPDATE/DELETE have landed (query.cte_recursive / query.cte_data_modifying / dml.with_clause)"

[[capability]]
id = "query.cte_nested"
description = "Nested WITH — a WITH clause may prefix any parenthesized query expression (a subquery, a derived table, a scalar / IN / EXISTS / ANY/ALL subquery, a set-op operand, or another CTE's body), not only the statement top level (spec/design/cte.md §7). Recognized by a shape-based lookahead (WITH RECURSIVE … / WITH <name> ( / WITH <name> AS), so `with` stays a legal identifier elsewhere (x IN (with) is still a value list). The nested CTEs establish their OWN scope with the full query.cte / query.cte_recursive machinery (forward-only visibility, 42712 duplicate, 42P01 self/forward, the column-rename list 42P10, [NOT] MATERIALIZED, WITH RECURSIVE), and plan to a QueryPlan::With that materializes them ONCE then runs the inner body against a fresh CTE context — the same deterministic materialize-then-execute cost as the top-level WITH (cte_scan_row for a materialized buffer). A nested WITH adds no correlation frame (its body sees the same outer environment as the node's position, so a LATERAL wrapper still correlates; the CTE bodies stay parent=None). A data-modifying CTE in a nested WITH is rejected 0A000 (DML-WITH is top-level only — matching PG). Divergence: the nested scope does NOT inherit the ENCLOSING statement's CTE bindings — an enclosing CTE name referenced inside a nested WITH resolves to a base table / 42P01, not the enclosing CTE (PG inherits them; pinned by per-core unit tests, a documented follow-on). No new error code, no on-disk format change. Builds on query.cte / query.derived_table"

[[capability]]
id = "query.cte_recursive"
description = "Recursive common table expressions — WITH RECURSIVE name [(cols)] AS (non_recursive_term UNION [ALL] recursive_term) <query> (spec/design/recursive-cte.md). RECURSIVE is a flag on the whole WITH list that ENABLES a CTE to reference itself (lifting the query.cte forward-only 42P01); a CTE in a RECURSIVE list that does NOT reference itself is an ordinary non-recursive CTE. A recursive CTE's body must be a top-level UNION/UNION ALL: the non-recursive (anchor) term (the UNION's left, no self-reference) seeds the computation; the recursive term (the UNION's right) references the CTE name EXACTLY ONCE as a direct FROM/JOIN relation and is re-evaluated against the previous iteration's rows. UNION ALL keeps every row; UNION (DISTINCT) drops rows duplicating any already-emitted row (and so terminates a cyclic walk). Column types are fixed by the non-recursive term — the recursive term must be assignable to them, a wider column is 42804 (recursive query column N has type … in non-recursive term but type … overall; NOT the symmetric UNION widening). Evaluated to a fixpoint by the working-table method (the self-reference reads the working table; outer references read the full result) and ALWAYS materialized ([NOT] MATERIALIZED is inert, like PG). Termination is the per-statement max_cost ceiling (54P01) with continuous cross-iteration metering — no fixed iteration cap; an unbounded recursion on an unlimited handle loops forever, like PG. Cost reuses cte_scan_row (the working-table scan + outer scans) + row_produced, no new unit. Structural ill-formedness is 42P19 (invalid_recursion): not the UNION form, a self-ref in the non-recursive term / more than once / within a subquery / within an outer join, or an aggregate in the recursive term — all matching PG. Narrowings (deferred): ORDER BY/LIMIT in a recursive query (0A000, like PG); a set-operation recursive term or a self-ref inside a FROM derived table (0A000; PG allows); mutual recursion between WITH items (42P01 via forward-only visibility; PG uses 0A000); SEARCH/CYCLE. No on-disk format change. Builds on query.cte / query.union"

[[capability]]
id = "query.cte_data_modifying"
description = "Data-modifying (writable) CTEs — a WITH item's body may be an INSERT/UPDATE/DELETE with its own optional RETURNING (spec/design/writable-cte.md), feeding its RETURNING rows forward as a named relation (the move-rows / fan-out-write idioms). Every sub-statement of the WITH — each data-modifying CTE, each query CTE, and the primary — reads ONE pre-statement snapshot (a read pin): they cannot observe each other's effects on the target tables, so data crosses ONLY via a CTE's buffered RETURNING rows (oracle-verbatim: WITH t AS (INSERT INTO foo … RETURNING *) SELECT count(*) FROM foo reads the PRE-statement foo). The parts run in deterministic lexical (WITH-list) order — data-modifying CTEs first, each exactly once and ALWAYS to completion (regardless of references) and therefore always materialized (its buffer is its RETURNING rows; [NOT] MATERIALIZED is inert), then query CTEs by the query.cte rule (still pin-read), then the primary. The whole statement is one all-or-nothing transaction (any sub-statement error aborts it; committed is never touched). A data-modifying CTE WITHOUT RETURNING runs for its effect but a FROM reference to it is 0A000 (WITH query \"name\" does not have a RETURNING clause — matching PG); a data-modifying target resolves against the catalog only (a CTE name as target with no base table is 42P01). WITH RECURSIVE with a non-self-referencing data-modifying CTE is allowed (a data-modifying body is never the anchor-UNION-recursive shape). Conflicts: two parts inserting the same key is 23505 (the second part's phase-2 write meets the first's staged row — matching PG); update/update or update/delete of the SAME row is jed's deterministic last-write-wins (each part computes RETURNING from the pin; a documented divergence on PG's unspecified case, pinned by per-core unit tests, not this oracle corpus). No new cost unit (intrinsic DML cost once + cte_scan_row per reference) and no on-disk format change. Builds on query.cte / dml.returning / dml.insert_select"

[[capability]]
id = "dml.with_clause"
description = "WITH clause on a data-modifying primary — the WITH-prefixed statement may itself be an INSERT/UPDATE/DELETE (with its own optional RETURNING), the move-rows idiom's outer half: WITH moved AS (DELETE FROM inbox WHERE ready RETURNING *) INSERT INTO archive SELECT * FROM moved (spec/design/writable-cte.md). The CTEs (data-modifying or query) are visible to the primary exactly as to a query primary — in an INSERT … SELECT source, an UPDATE/DELETE WHERE, the SET right-hand sides, and any RETURNING subquery — and the primary reads the same one pre-statement snapshot (the read pin) as every CTE. The statement's result is the PRIMARY's: a query result, an affected-row count, or the primary's own RETURNING rows (a CTE's row count is never surfaced — PG's command tag is the primary's). The primary runs LAST, after every CTE has run to completion. Reuses the query.cte_data_modifying machinery; no new error code, no format change. Builds on query.cte_data_modifying / dml.update / dml.delete / dml.insert_select"

[[capability]]
id = "query.subquery_quantified"
description = "Quantified comparison over a subquery — x op ANY/SOME/ALL (SELECT …) (spec/design/array-functions.md §11.6), the subquery spelling of IN that bridges AF5 (the array quantifier) and the §26 subquery machinery. A leading SELECT after the quantifier's ( selects this form (the §26 lookahead); the body's single column (42601 if >1) folds through the SAME three-valued quantified_membership as the array form: ANY/SOME is the OR-fold (empty → FALSE), ALL the AND-fold (empty → TRUE), a NULL x or NULL row is the UNKNOWN element. No 21000 cardinality limit (any row count is a list). x = ANY(SELECT …) ≡ x IN (SELECT …); the six operators = <> < > <= >= generalize it (x <> ALL(SELECT …) is the quantified spelling of NOT IN). x and the body's column type must be comparable, else 42883 (operator does not exist, the §11.3 posture, not 42804). Uncorrelated → planned once and folded to a constant-array Quantified node (no per-row re-exec); correlated → re-executed per outer row, rows gathered into an array, same fold. SOME folds to ANY. Builds on query.subquery_correlated / func.array_quantified"

[[capability]]
id = "query.derived_table"
description = "Derived tables — FROM ( query_expr ) [AS] t: a parenthesized subquery used as a FROM relation (spec/design/grammar.md §42). The parser surface over the CTE inline seam — a derived table is mechanically an anonymous, always-inlined single-reference CTE: the body is planned once (structural/type errors surface regardless of outer cardinality) and run IN PLACE, charging its intrinsic cost (no materialize path, no cte_scan_row). The alias is OPTIONAL (PostgreSQL 18 relaxed the old mandatory-alias rule): present, it is the label and may carry a column-rename list AS t(a,b) renaming body output columns left-to-right (fewer is a partial rename, more is 42P10; a column list with no alias name is 42601); absent, the relation has no qualifier and two unaliased derived tables coexist. An explicit label must be distinct from other FROM relations (42712); a body with duplicate output names is allowed but a later bare reference is 42702. The body is an INDEPENDENT query (parent=None, NOT correlated / no LATERAL) inheriting statement CTE bindings — an outer/sibling column inside is 42703/42P01. Disambiguation: a leading ( followed by SELECT is a derived table (the §26 lookahead); a leading ( followed by VALUES is a VALUES-body derived table (query.values); any other leading ( in FROM is 42601 (no parenthesized-join FROM — a documented PG divergence). It composes with JOIN/WHERE/GROUP BY/ORDER BY/LIMIT/subqueries and is reachable inside an UPDATE/DELETE subquery; body nesting counts toward MAX_EXPR_DEPTH (54001). Narrowings: a parenthesized-join FROM is deferred (LATERAL has since landed — query.lateral). Builds on query.cte / query.subquery_scalar"

[[capability]]
id = "query.lateral"
description = "LATERAL joins — a FROM item whose body / arguments reference columns of the FROM relations BEFORE it, a dependent (correlated) join re-evaluated once per combined left-hand row (spec/design/grammar.md §44). Reached via explicit join syntax (no comma-FROM yet): CROSS JOIN LATERAL (…), [INNER] JOIN LATERAL (…) ON …, LEFT [OUTER] JOIN LATERAL (…) ON …. The keyword precedes a derived table ((SELECT …) or (VALUES …)) or a table function (SRF) only — LATERAL before a bare base table name is 42601. A sub-SELECT/VALUES derived table is lateral ONLY with the keyword (without it a sibling reference stays 42P01/42703, the §42 non-correlation rule); a table function is IMPLICITLY lateral (its args may reference an earlier sibling with or without the keyword — PG, lifting the §35 SRF non-LATERAL narrowing). Visibility is left-to-right and earlier-only: a forward/self reference is 42P01; lateral items chain (a later lateral sees an earlier lateral's columns); the first FROM item is never lateral (a LATERAL keyword on it is a no-op). Mechanically reuses the correlated-subquery machinery (the scope parent chain → Outer{level,index}, the per-outer-row eval stack): a correlated lateral item is re-materialized per left row with that row pushed as its immediate outer; an UNcorrelated one is materialized once. LEFT JOIN LATERAL … ON <pred> NULL-extends a left row when the lateral side yields no matching row (ON true keeps a left row even when the body returns zero rows). A RIGHT/FULL JOIN to a lateral item that references the left side is 42P10 (the combining join type must be INNER or LEFT for a LATERAL reference); an uncorrelated lateral-eligible item under RIGHT/FULL is materialized once and allowed (PG). Cost = the sum of the per-left-row body evaluations (deterministic, max_cost-bounded, 54P01). No on-disk format change (a query-plan construct). Narrowing: the RIGHT/FULL rejection is slightly broader than PG (jed rejects any outer correlation, PG only a left-side one) — an override-ledger divergence. Builds on query.derived_table / query.values / func.unnest / query.subquery_correlated / query.join_left"

[[capability]]
id = "query.values"
description = "VALUES-body derived table — FROM (VALUES (e11,…),(e21,…)) [AS] v(c1,…): a parenthesized VALUES list used as a FROM relation, a computed relation of literal rows (spec/design/grammar.md §42). The FROM-position sibling of the INSERT … VALUES source, reusing the derived-table seam (anonymous always-inlined single-reference CTE): the same alias / column-rename (AS v(a,b), 42P10) / 42712 / 42702 / non-correlation / intrinsic-cost rules as query.derived_table. A value is a GENERAL CONSTANT expression (1+1, upper('a'), now(), casts, CASE, ROW(…), ARRAY[…], an uncorrelated scalar subquery) — richer than the INSERT slot (which stays literal/$N/DEFAULT). The body is non-LATERAL (parent=None): a column reference is 42703/42P01, an aggregate is 42803, a bare $N with no inferable local type is 42P18 (no cross-row inference — the §26 posture; write $1::int). All rows must have the same arity (42601, 'VALUES lists must all be the same length'); the columns default to names column1, column2, … (PG, overridable by the rename list) and each column's type unifies across rows like a set operation (int widths widen, int+decimal→decimal, anything+NULL keeps the other, all-NULL→text; 42804 on a mismatch), then coerces each value (int→decimal). Disambiguation: a leading ( followed by VALUES selects this form. Narrowings: a trailing ORDER BY/LIMIT on the body is 42601 (deferred — PG accepts it). cost = row_produced per row + each value's operator_eval (jed's deterministic cross-core contract). Builds on query.derived_table / dml.insert_multi_row"

[[capability]]
id = "types.i16"
description = "i16 / smallint scalar type"

[[capability]]
id = "types.i32"
description = "i32 / int / integer scalar type"

[[capability]]
id = "types.i64"
description = "i64 / bigint scalar type"

[[capability]]
id = "types.text"
description = "text scalar type (variable-width UTF-8, collation C): storage, literals, and comparison/ordering. text is ALSO a KEY type — a text PRIMARY KEY / composite-key member / secondary index / UNIQUE uses the variable-width text-terminated-escape key encoding (the first non-fixed-width key; spec/design/encoding.md §2.4), with point lookup, 23505 on a duplicate key, and 23502 on a NULL key; an oversized text key is 0A000 (spec/design/types.md §11)"

[[capability]]
id = "types.varchar_length"
description = "varchar(n) / string(n) length limits (the second parameterized type after numeric(p,s) — spec/design/types.md §15): a text column/field/cast-target carries a max-length typmod counted in code points. Typmod validation 1 <= n <= 10485760 else 22023. On ASSIGNMENT (INSERT/UPDATE) an over-length value traps 22001 (string_data_right_truncation), UNLESS every excess code point is a space — then it is silently truncated to n (the SQL-standard trailing-space exception). An EXPLICIT cast (expr::varchar(n) / CAST(expr AS varchar(n)) / the varchar(n) 'literal' typed literal) silently truncates to n code points, never raising 22001. The type stays `text` (canonical name text, the C collation, same value codec / key encoding); only single-word varchar(n)/string(n) this slice (two-word `character varying(n)` and `char(n)` deferred). format_version 22 (text column/field u32 varchar_max_len typmod slot). Builds on types.text"

[[capability]]
id = "types.boolean_storable"
description = "storable boolean column: CREATE/INSERT/SELECT of false/true/NULL, boolean×boolean comparison and ORDER BY (false < true). boolean is also a KEY type — a boolean PRIMARY KEY / composite-key member / secondary index uses the `bool-byte` key encoding (0x00 false < 0x01 true, the second non-integer key after uuid; spec/design/encoding.md §2.9), with point lookup, 23505 on a duplicate key, and 23502 on a NULL key. boolean⇄integer casts stay deferred (spec/design/types.md §9)"

[[capability]]
id = "types.decimal"
description = "decimal / numeric scalar type (exact base-10): the first parameterized type (numeric(p,s)), storage, literals, comparison/ordering, casts (int<->decimal). A valid PRIMARY KEY / ordered index / UNIQUE key via the order-preserving, scale-independent decimal-order-preserving encoding (1.5 and 1.50 index as one — spec/design/encoding.md §2.5, spec/design/decimal.md)"

[[capability]]
id = "expr.decimal_arithmetic"
description = "Decimal arithmetic operators + - * / % and unary - with PostgreSQL result-scale rules and half-away-from-zero rounding (spec/design/decimal.md §4)"

[[capability]]
id = "expr.numeric_transcendental"
description = "Exact-numeric transcendentals over decimal/numeric — sqrt, ln, exp, log/log10 (base 10), log(base, x), power(base, exp) — a hand-rolled PG-faithful arbitrary-precision port of numeric.c (sqrt_var/ln_var/exp_var/log_var/power_var). IN-CONTRACT (byte-identical cross-core, no determinism-ledger entry): every step is exact-decimal limb arithmetic and the result scale is chosen deterministically with no libm transcendental on the value path. Result scale ≥ NUMERIC_MIN_SIG_DIGITS (16) significant digits, never below the input scale. Domain errors: sqrt-of-negative / power domain → 2201F, ln/log of a non-positive → 2201E, exp/power overflow → 22003. arg_resolution none — a bare integer does NOT promote (sqrt(2) → 42883), a decimal literal does (sqrt(4.0) → numeric). (spec/design/decimal.md §8)"

[[capability]]
id = "types.bytea"
description = "bytea scalar type (variable-width raw bytes): storage, hex-input literals, and unsigned-byte comparison/ordering. bytea is ALSO a KEY type — a bytea PRIMARY KEY / composite-key member / secondary index / UNIQUE uses the variable-width bytea-terminated-escape key encoding (encoding.md §2.6; the embedded-0x00 escape is routinely exercised), with point lookup, 23505 on a duplicate key, and 23502 on a NULL key; an oversized bytea key is 0A000 (spec/design/types.md §13)"

[[capability]]
id = "types.uuid"
description = "uuid scalar type (fixed 16-byte RFC 4122 value): storage, PostgreSQL-flexible input literals (braces/hyphens-anywhere/32-hex, any case; canonical 8-4-4-4-12 lowercase output), and unsigned-byte comparison/ordering. uuid is the FIRST non-integer type usable as a PRIMARY KEY — its uuid-raw16 key encoding is exercised (spec/design/types.md §14, encoding.md §2.7)"

[[capability]]
id = "types.timestamp"
description = "timestamp / timestamp without time zone scalar type (zoneless wall clock, i64 microseconds): storage, ISO-8601-ish literals, comparison/ordering, infinity sentinels, and timestamp PRIMARY KEY (key encoding = i64). No time zone db (spec/design/timestamp.md)"

[[capability]]
id = "types.timestamptz"
description = "timestamptz / timestamp with time zone scalar type (UTC instant, i64 microseconds): storage, literals with offset→UTC normalization (offset then discarded), comparison/ordering, infinity, and timestamptz PRIMARY KEY. No named zones (spec/design/timestamp.md)"

[[capability]]
id = "types.interval"
description = "interval scalar type (a span — months/days/micros): storage, the 'unit + time' input subset (units with abbreviations, per-field signs, trailing 'ago', the fractional-unit cascade, bare HH:MM:SS) via a single-quoted literal or the INTERVAL '...' keyword, PG 'postgres' render, and comparison/ordering/dedup by the canonical 128-bit span (1 month = 30 days, 1 day = 24 h — so '1 mon' = '30 days'). KEYABLE — a valid PRIMARY KEY / ordered index / UNIQUE / FK target / GIN element via the 16-byte interval-span-i128 span key (encoding.md §2.10); span-equal values ('1 mon' / '30 days') share a key, so a UNIQUE interval index treats them as one. CAST and field qualifiers/precision are deferred (spec/design/interval.md)"

[[capability]]
id = "types.f64"
description = "f64 / double precision scalar type (IEEE 754 binary64): storage, literals (incl Infinity/-Infinity/NaN, e-notation), the float total order (-0=+0, NaN=NaN, NaN largest), the trapping +-*/ /sqrt arithmetic kernel, casts, the order-independent canonical-fold SUM/AVG, and MIN/MAX/COUNT. The FIRST type exempted from cross-core byte-identity for COMPUTED/RENDERED values (compared via the R tag at tolerance — conformance.md §1, float.md, determinism.md §6); storage/ordering/kernel/exact-sum/cost stay in-contract. KEYABLE since the float-key slice (the in-contract at-rest float — float-order-preserving §2.8 — sorts identically cross-core; the key surface is types.float_key). Cross-family int/decimal<->float is explicit-only (else 42804)"

[[capability]]
id = "types.f32"
description = "f32 / real scalar type (IEEE 754 binary32): the same surface as f64 at single precision; forms a promotion tower with f64 (f32->f64 lossless-implicit). Exempt from cross-core byte-identity for computed/rendered values (R tag); storage (4 bytes, on-disk code 13) / total order / kernel / exact-sum SUM/AVG / cost in-contract. KEYABLE since the float-key slice (the key surface is types.float_key). spec/design/float.md"

[[capability]]
id = "types.float_key"
description = "float (f32/f64) as a KEY (spec/design/encoding.md §2.8, the float-order-preserving rule) — the LAST scalar to become keyable, so every scalar is now keyable (only the recursive composite container stays 0A000). A f32/f64 column is a valid PRIMARY KEY / ordered secondary index / UNIQUE key / FK target, and a float-ELEMENT array (f64[]/f32[]) is keyable too (encoding.md §2.14). The key body is the IEEE bits canonicalized (-0 → +0, every NaN → one quiet pattern) then the order-preserving bit-flip (sign set → flip all, else flip sign bit), so memcmp reproduces the PG float8/float4 TOTAL order (-Inf < finite < +Inf < NaN); -0=+0 and any two NaNs share a key, so a UNIQUE float key treats them as one. This REVERSES the prior 'permanent' float-out-of-keys narrowing: a float at REST is in-contract / cross-core byte-identical (storage + total order + key bytes — float.md §1), so an ordinary float key is fully deterministic and PG-faithful; only a TAINTED (transcendental-derived) float stored into a key reaches stored order — a bounded widening of the float-transcendental exemption (determinism.md §4), not a new exemption. The corpus stores in-contract literals only, so it is cross-core exact. float[] GIN element + float GiST/EXCLUDE stay their own follow-on slices. Builds on types.f64, types.f32, ddl.primary_key, ddl.unique, ddl.secondary_index, ddl.foreign_key, types.array"

[[capability]]
id = "types.date"
description = "date scalar type (a calendar date — year/month/day, no time/zone; i32 days since 1970-01-01, reusing timestamp's calendar core): storage, strict ISO YYYY-MM-DD literals (a single-quoted string adapting to a date context, or the DATE '…' keyword literal) with optional BC/AD era and the infinity/-infinity sentinels, where a trailing time/offset is validated then DROPPED (24:00:00 does NOT roll into the day, unlike timestamp), comparison/ordering by the day count, and a date PRIMARY KEY (key encoding = i32 int-be-signflip; on-disk type code 16). jed owns a WIDER range than PG (≈ ±5.88M years). date is a STRICT ISLAND — it does not COMPARE to timestamp/timestamptz/int (date × timestamp is 42804, a documented PG divergence). Landed since: date arithmetic (expr.date_arithmetic), the cross-family datetime casts (cast.datetime), the runtime text → date cast (cast.text_date), the clock-relative literals (types.date_clock_literal), and the date functions (func.make_date / func.date_part / func.current_date). Malformed input traps 22007, an out-of-range field / day count 22008 (spec/design/date.md)"

[[capability]]
id = "types.composite"
description = "composite (row) types — CREATE TYPE name AS (field type [NOT NULL], …) / DROP TYPE [IF EXISTS] name [RESTRICT]: a named, user-defined heterogeneous tuple living in the database's type catalog, persisted across reopen (format_version 9 — the catalog becomes kind-tagged entries with a composite-type section, two-pass load). Named composites only (no anonymous record); nested composites (a field typed as another composite) supported by name. Duplicate type 42710, unknown field type 42704, duplicate field 42701, DROP with dependents 2BP01, DROP missing 42704 (unless IF EXISTS). This slice (S2) creates/drops/persists the TYPE; a composite-typed COLUMN, the ROW(…) constructor, field access, comparison, and text I/O are later slices (rejected 0A000 for now) — composite-as-key stays 0A000. spec/design/composite.md"

[[capability]]
id = "types.array"
description = "array types (spec/design/array.md) — a structural T[] type over any scalar element type (i32[], text[], …): the ARRAY[…] constructor + the '{…}' text literal ('{}'::T[] / a bare string adapting to an array column), the compact value codec (the array body — ndim/flags/dims + a HAS_NULLS-gated bitmap + element bodies, type_code 15), array_out rendering ({e1,e2,…} with PG element quoting + unquoted NULL elements), element-wise comparison with PG BTREE NULL semantics (NULLs comparable and mutually equal — array equality is always a definite boolean, NOT the composite 3VL rule), ORDER BY / DISTINCT / GROUP BY array keys (the array_cmp total order, NULLs-last per element, shorter-prefix-first), and the whole-value IS NULL rule (a non-null array of NULL elements is NOT NULL). v1 ships 1-D values of scalar elements; multidimensional values (types.array_multidim), array slices (expr.array_slice), array-of-composite elements (types.array_composite), and the array function surface (func.array) landed as their own capabilities; arrays-in-keys (0A000) stay deferred. A bad element value traps 22003; a malformed array literal traps 22P02; comparing arrays of different element types is 42804; an array PRIMARY KEY is 0A000. Builds on types.i32"

[[capability]]
id = "types.range"
description = "range types (spec/design/ranges.md) — the six built-in PostgreSQL range types as a structural type over a scalar element (i32range/i64range/numrange/tsrange/tstzrange/daterange; PG int4range/int8range are aliases of i32range/i64range). This slice (R0–R3): the '[1,5)' text literal coerced by a named type ('[1,5)'::int4range / a bare string adapting to a range column), inclusive/exclusive + unbounded ([1,), (,5), (,)) endpoints and the distinguished empty value; the compact value codec (a flags byte EMPTY/LB_INF/UB_INF/LB_INC/UB_INC + present bound bodies, type_code 17, format_version 16); range_out rendering ([lo,hi) with PG bound quoting where the element text has special chars — a tsrange bound's space → double-quoted, a daterange bound bare); canonicalization of discrete subtypes (i32/i64/date stored in the canonical [) form — '[1,5]'::int4range → [1,6), '(5,)' → [6,)) with continuous subtypes (num/ts/tstz) kept verbatim; empty normalization (equal bounds not-both-inclusive → empty); the whole-value IS NULL rule (empty IS NULL and '(,)' IS NULL are both FALSE); and (R3) the range_cmp total order driving =/<>/</<=/>/>=/ORDER BY/DISTINCT/GROUP BY (empty < every non-empty; then lower bound, then upper, each accounting for infinity + inclusivity — a range compares only with a range over the SAME element type, else 42804). A range lower > upper is 22000; a canonicalization step past the element domain is 22003; a malformed range literal is 22P02; an unknown range type (textrange) is 42704. A range IS a valid PRIMARY KEY / ordered (btree) secondary index / UNIQUE key / FK target since the range-PK slice — the first CONTAINER key (range-bounds, encoding.md §2.11: empty/±∞/inclusivity framing around the element key, sorting by range_total_cmp; point-lookup pushdown deferred, so a range `=` WHERE full-scans + residual-filters), with a range DEFAULT and a GIN-over-range index still 0A000; the accessor functions (lower/upper/isempty/…) are func.range_accessors and the constructor + operator surface (@>/&&/…) lands in RF2–RF4. Builds on types.i32"

[[capability]]
id = "types.jsonb_literal"
description = "json / jsonb document types — the literal-only surface (J0, spec/design/json.md §12). Two scalar arms with text I/O (json_in/out + jsonb_in/out) and the '…'::json / '…'::jsonb literal cast (+ the json '…' / jsonb '…' typed-literal form). `json` validates RFC-8259 well-formedness and stores the bytes VERBATIM (insignificant whitespace, original key order, and duplicate keys all preserved — the cheap lossless-round-trip type); `jsonb` parses + CANONICALIZES (numbers → exact decimal never binary float, object keys deduped last-wins then sorted length-then-bytewise, the canonical render with one space after each ':' and ','). Stable type codes 18 (json) / 19 (jsonb); the dictionary door (§3) is reserved (zero bytes). A storable json/jsonb COLUMN is 0A000 this slice (json/jsonb is literal-only until J1's format bump + value codec — a per-core divergence test); comparison (J2), casts (J3), and the operator surface (J4–J6) are later slices. Malformed JSON traps 22P02. jsonb_out / json_out match the postgres:18 oracle byte-for-byte (the T printable-ASCII render tag)"

[[capability]]
id = "types.json"
description = "storable json column (J1b, spec/design/json.md §4) — a column type can be `json` (on-disk type code 18, a plain scalar catalog entry with no extra descriptor; format_version 19). `json` stores the input text VERBATIM (insignificant whitespace, original key order, and duplicate keys all preserved) and selects it back unchanged — the cheap lossless-round-trip document type; json_in validates RFC-8259 (malformed → 22P02). A bare string literal adapts to a json column. NOT comparable (PG ships no btree/hash opclass — §5): =/<>/ORDER BY/DISTINCT/GROUP BY on json is 42883 and a json PRIMARY KEY / index / UNIQUE is 0A000 (per-core divergence tests). The json body rides the large-value overflow + LZ4 path like text. Builds on types.jsonb_literal"

[[capability]]
id = "types.jsonb"
description = "storable jsonb column (J1, spec/design/json.md §2) — a column type can be `jsonb` (on-disk type code 19, a plain scalar catalog entry; format_version 19 — the one JSON format bump). `jsonb` stores the CANONICAL decomposed binary form (a self-delimiting tagged-node tree: node tags + LEB128 varint counts, numbers as the exact decimal body) — object keys deduped last-wins then sorted length-then-bytewise, numbers exact (never float), insignificant whitespace dropped — and selects it back as the canonical text (jsonb_out: one space after each ':' and ','). A bare string literal adapts to a jsonb column (the same jsonb_in as the literal cast). A large jsonb document spills out-of-line via the overflow + LZ4 path. The on-disk bytes are pinned byte-for-byte across rust==go==ts==ruby by golden jsonb_table.jed; jsonb_out matches the postgres:18 oracle. Comparison/ordering (J2) and the operator surface (J4–J6) are later slices; a jsonb PRIMARY KEY / index / UNIQUE is 0A000 this slice (the order-preserving key encoding is authored but unexercised — encoding.md §2.13, a per-core divergence test). Builds on types.jsonb_literal"

[[capability]]
id = "types.jsonb_compare"
description = "jsonb comparison & ordering; json non-comparable (J2, spec/design/json.md §5). jsonb has PostgreSQL's TOTAL btree order — a DEFINITE boolean (no SQL NULLs inside a document, so NOT the composite 3VL): the outermost discriminator is the type rank Object > Array > Boolean > Number > String > Null; within a type, booleans false<true, numbers by exact decimal value, strings by collation-C UTF-8 byte order, arrays and objects by element/member COUNT first then element-wise (objects compare keys length-then-bytewise then values, in stored canonical order). One hand-written recursive comparator drives `=` `<>` `<` `<=` `>` `>=` / ORDER BY / DISTINCT / GROUP BY, so `<` and ORDER BY agree by construction; a bare string literal adapts to a jsonb sibling. jsonb compares only with jsonb (jsonb × another family is 42804). `json` is NOT comparable — PG ships no btree/hash opclass, so every json `=`/`<`/ORDER BY/DISTINCT/GROUP BY is 42883 (could not identify an ordering/equality operator), and a jsonb × json comparison is 42883 too. Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "types.json_casts"
description = "the JSON cast matrix (J3, spec/design/json.md §6.1) — the RUNTIME casts on a non-literal expression (a string-literal operand still coerces at resolve via the literal cast, J0): json → jsonb (re-parse + canonicalize: sort keys, dedup last-wins, numbers → exact decimal), jsonb → json (render the canonical text via jsonb_out), json → text (the identity on the stored verbatim bytes), jsonb → text (the canonical jsonb_out form), text → json (runtime json_in: validate RFC-8259, store verbatim), and text → jsonb (runtime jsonb_in: parse + canonicalize). Same-type is the identity. A NULL operand adapts to the target. Malformed text → json/jsonb traps 22P02. A non-text/json/jsonb source to json/jsonb (e.g. integer → jsonb) is 42804 (jed's invalid-cast convention — PG reports 42846 cannot_coerce, a documented divergence; a per-core test). Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "func.jsonb_access"
description = "the jsonb accessor operators (J4, spec/design/json-sql-functions.md §1): `->` (field by text key / element by integer index → jsonb), `->>` (same, rendered as text), `#>` (get at a text[] path → jsonb), and `#>>` (get at a path, as text). A missing key, an out-of-range or non-integer index, or a key/index applied to the wrong container kind yields SQL NULL; a negative index counts from the array end; a JSON null sub-value renders as SQL NULL under `->>`/`#>>` (and as the jsonb `null` node under `->`/`#>`). The operators are 'any other operator' precedence (same level as `@>`/`||`, left-associative — `doc -> 'a' -> 'b'`, and `doc ->> 'a' = '1'` parses as `(doc ->> 'a') = '1'`); the `#>`/`#>>` path is a text[] (a bare string literal `'{a,b}'` adapts via array_in). A NULL base or argument propagates to SQL NULL (the operators are strict). The `json` overloads (which preserve the verbatim sub-text — json.md §4) are a deferred 0A000 follow-on (a per-core test). Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "func.jsonb_contains"
description = "the jsonb containment & key-existence operators (J5, spec/design/json-sql-functions.md §1): `@>` (does the left document deeply contain the right), `<@` (contained-by, = the reverse), `?` (does a top-level key/string-element exist), `?|` (does any key of a text[] exist), `?&` (do all keys exist). `@>` is PG's deep containment: object @> object recurses on matching keys; array @> array requires every right element to be contained in the left (a scalar element must directly equal a left element, an object/array element must be contained in a same-kind left element); array @> scalar means the scalar is a direct element; scalar @> scalar is value equality; any other top-level pairing is false. `?` matches an object key, a string array element, or an equal string scalar. All return boolean and are strict (a NULL operand → SQL NULL); the `?`/`?|`/`?&` base must be jsonb, and `?|`/`?&` take a text[] (a bare '{a,b}' literal adapts). `@>`/`<@` route through the shared containment dispatcher (array/range/jsonb axes); a json operand has no @> opclass (42883). These are the predicates a future GIN jsonb_ops opclass would accelerate (gin.md); J5 ships them as sequential predicates. Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "func.jsonb_mutate"
description = "the jsonb mutation operators (J6, spec/design/json-sql-functions.md §1): `||` concatenate/shallow-merge, `-` delete key/element/keys, `#-` delete at path. `||`: two objects merge (the RIGHT side wins on a key conflict, re-canonicalized); otherwise each operand is treated as an array (an array stays, a non-array becomes a one-element array) and the two concatenate. `-`: `jsonb - text` deletes a key (object) or every matching string element (array); `jsonb - int` deletes the array element at an index (negative from the end, out-of-range a no-op); `jsonb - text[]` deletes each key. `#- text[]` deletes the element at a path (empty path a no-op; a missing/out-of-range step a no-op). A bare `'{a,b}'` string literal is a single text KEY for `-` (verbatim, like PG) but a text[] PATH for `#-`; the text[] delete needs `::text[]`/ARRAY[…]. All return jsonb and are strict (a NULL operand → SQL NULL). A delete from a scalar (or an integer index into an object) is 22023 (cannot delete from scalar / from object using integer index / path in scalar). `||` reuses the `Concat` token and `-` the `Sub` token (dispatched by operand type); `#-` is a new token. Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "func.json_processing"
description = "json/jsonb introspection & processing functions (B1, spec/design/json-sql-functions.md §2): json[b]_typeof → the JSON type name (object/array/string/number/boolean/null); json[b]_array_length → the array element count (22023 on a non-array, 'cannot get array length of a scalar'); json[b]_strip_nulls → recursively remove object members whose value is JSON null (array nulls are kept); jsonb_pretty → an indented (4-space) multi-line render. The json overloads parse the verbatim text on demand and dispatch to the same kernel (json.md §4); the json result of json_strip_nulls renders COMPACT (PG's json output style — no space after ':'/','), the jsonb result spaced-canonical. All propagate a SQL NULL input. A bare string literal argument needs an explicit ::json/::jsonb cast (jed's general function-argument strictness — implicit literal coercion is a deferred follow-on). Oracle-pinned (postgres:18). Builds on types.jsonb. The builders (to_json[b], json[b]_build_array/object, jsonb_set/insert) are a separate slice."

[[capability]]
id = "func.json_srf"
description = "json/jsonb single-column set-returning functions (B2, spec/design/json-sql-functions.md §3) in FROM position: jsonb_array_elements(jsonb) → setof jsonb (one row per array element), jsonb_array_elements_text(jsonb) → setof text (the ->>-style render: a string element's raw content, a JSON null → SQL NULL, else canonical), jsonb_object_keys(jsonb) → setof text in canonical key order, and json_object_keys(json) → setof text in INPUT order (duplicate keys kept). A non-array (array_elements) / non-object (object_keys) is 22023; a NULL argument yields zero rows (empty_on_null); each produced row charges one generated_row. Implicitly lateral (an SRF), FROM-clause only (the SELECT-list SRF / WITH ORDINALITY / the AS g(col) alias list are deferred jed limitations). The json array_elements[_text] variants (which preserve the verbatim sub-text — json.md §4) are a deferred 0A000 follow-on, like the json accessor operators. Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "func.to_jsonb"
description = "to_jsonb(anyelement) → the JSON image of a value (B1 builder subset, spec/design/json-sql-functions.md §2): a number stays EXACT (decimal, never float), text → a JSON string, boolean → a JSON boolean, a json/jsonb value canonicalizes, and a 1-D array → a JSON array recursively (a NULL element → JSON null). STRICT — a top-level NULL argument → SQL NULL. The type-info-dependent / float-divergent sources (composite [needs field names], float [the exact binary→decimal divergence], datetime/uuid/bytea/interval [string-render divergences], a multidimensional array) are a deferred 0A000 follow-on. to_json + the json[b]_build_array/object builders + jsonb_set/insert are a separate slice. Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "func.json_ctor"
description = "the SQL/JSON constructor functions (S1, spec/design/json-sql-functions.md §5): JSON(text [(WITH|WITHOUT) UNIQUE [KEYS]]) parses a character string to a json value (VERBATIM) — malformed → 22P02, a duplicate object key under WITH UNIQUE KEYS → 22030; a non-text operand → 42804. JSON_SCALAR(anyelement) → the value's JSON scalar as json (an integer/decimal → a JSON number, a boolean → a JSON boolean, text → a JSON string; the datetime/uuid/bytea/interval/float sources are a deferred 0A000). JSON_SERIALIZE(json|jsonb) → the value's text serialization (json verbatim; a jsonb value renders its canonical text — a documented divergence, as PG 18 returns NULL for a jsonb input, a per-core test). All STRICT (a NULL operand → SQL NULL). JSON() is a grammar primary (the JSON keyword + '(', distinct from the json '…' typed literal); JSON_SCALAR / JSON_SERIALIZE are plain catalog functions reachable as the standard JSON_SCALAR(expr) / JSON_SERIALIZE(expr) syntax. PG 18 has no RETURNING clause on these. Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "types.jsonpath"
description = "the jsonpath scalar type (P1a, spec/design/jsonpath.md): a first-class type (reserved type code 20) built from a '…'::jsonpath / jsonpath '…' literal, compiled at resolve and rendered to its canonical normalized form ($.a → $.\"a\", member keys quoted, lax omitted, strict kept, [*] / [i] / [i to j] / [last] subscripts). LITERAL-ONLY this slice: a jsonpath COLUMN is 0A000 (storable=false, like a J0-stage json type); a jsonpath value is NOT comparable (every comparison / ORDER BY / DISTINCT is 42883); only IS [NOT] NULL applies. P1a parses the STRUCTURAL-accessor subset ($, .key, .*, [subscripts], [*], numeric / last indices, to slices, lax/strict mode); a valid-PG filter ?(…) / item method .m() / arithmetic / like_regex / $name variable is a deferred 0A000 (P1b). A malformed path literal is 42601 (PG's syntax-error class). The eval engine + the path query functions (@?/@@, jsonb_path_*) are P1b/P2. Oracle-pinned (postgres:18)"

[[capability]]
id = "func.jsonb_path"
description = "the jsonpath query functions (P2, spec/design/jsonpath.md §5) over the P1b structural-accessor evaluator: jsonb_path_exists(jsonb, jsonpath) → boolean (the path's evaluation sequence is non-empty); jsonb_path_query(jsonb, jsonpath) → setof jsonb (one row per sequence item, an implicitly-lateral SRF); jsonb_path_query_first(jsonb, jsonpath) → the first item, or NULL if empty; jsonb_path_query_array(jsonb, jsonpath) → the sequence wrapped in a JSON array. STRICT (a NULL ctx/path → SQL NULL / zero rows). The path is recompiled from its canonical text and evaluated as the lax/strict ordered sequence: lax (default) auto-unwraps an array one level on a member accessor and treats a non-array as a singleton on an element accessor, and SUPPRESSES navigation failures (a missing member / out-of-range subscript contributes no item); strict raises 2203A (missing member) / 22033 (subscript out of bounds). A bare string literal adapts (the context to jsonb, the path to a compiled jsonpath). The P1b filter / item-method / arithmetic / like_regex constructs are still 0A000 at compile (so jsonb_path_match, jsonb_path_*_tz, @?/@@, and the vars/silent arguments are a follow-on). Oracle-pinned (postgres:18). Builds on types.jsonpath"

[[capability]]
id = "expr.is_json"
description = "the IS JSON predicate (S1, SQL/JSON standard syntax, spec/design/json-sql-functions.md §5): expr IS [NOT] JSON [VALUE|SCALAR|ARRAY|OBJECT] [(WITH|WITHOUT) UNIQUE [KEYS]] — tests whether a character-string / json / jsonb operand is well-formed JSON, optionally of the given kind (VALUE = any; SCALAR = string/number/boolean/null; ARRAY; OBJECT) and optionally with all object keys unique (recursively). A malformed string → false; a NULL operand → NULL; never raises. A non-string/json/jsonb operand (e.g. integer) → 42804 ('cannot use type X in IS JSON predicate'). jsonb is always well-formed with unique keys (canonicalized), so only its kind can fail; a string/json operand is parsed preserving duplicate keys for the UNIQUE KEYS check. Extends the IS-predicate dispatch (like IS NULL / IS DISTINCT FROM). Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "func.json_object"
description = "json/jsonb object builders from text arrays (B1 builders, spec/design/json-sql-functions.md §2): json_object(text[]) / jsonb_object(text[]) build an object from one array of ALTERNATING keys/values (an odd length → 2202E 'array must have even number of elements'); json_object(text[], text[]) / jsonb_object(text[], text[]) from two equal-length arrays of keys then values (a length mismatch → 2202E 'mismatched array dimensions'). Every VALUE is a JSON STRING of the element's text (a NULL value → JSON null); a NULL KEY → 22004 ('null value not allowed for object key'). jsonb_object canonicalizes (last-wins dedup, canonical key order, spaced); json_object keeps insertion order + duplicate keys and uses PG's ' : ' / ', ' builder spacing. STRICT in the whole array argument(s) (a NULL array → SQL NULL). A bare '{…}' literal adapts to text[]. Hand-resolved (like jsonb_set). Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "func.json_set"
description = "jsonb path-mutation builders (B1 builders, spec/design/json-sql-functions.md §2): jsonb_set(target jsonb, path text[], new_value jsonb [, create_if_missing boolean]) replaces the value at the path (creating a missing final key / out-of-range index only when create_if_missing, the default true); jsonb_insert(target jsonb, path text[], new_value jsonb [, insert_after boolean]) inserts a new element at the path (an existing object key → 22023 'cannot replace existing key'; an array index inserts before, or after when insert_after). Both: a non-final missing key/index is a no-op (the target is returned unchanged); an empty path returns the target unchanged; a scalar at any step → 22023 ('cannot set path in scalar'); a non-integer step into an array → 22P02 ('path element at position N is not an integer'); negative array indices count from the end; an out-of-range jsonb_set create appends (≥len) or prepends (<0). STRICT — any NULL argument (or a NULL path element) → SQL NULL. A bare '{a,b}' path literal adapts to text[] and a bare string new_value literal adapts to jsonb. Hand-resolved (the text[] + adapting-literal + optional-flag signature is outside the catalog family mold). The jsonb_set_lax null_value_treatment variant is a follow-on. Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "func.coldeflist"
description = "the FROM-clause column-definition-list facility (C0, spec/design/json-table.md §1): a record-returning table function followed by AS t(col type, …) declaring its output columns' names and types (reusing the composite-field parser). Carried on the synthetic SRF table; the typed columns fix the result types statically. A col-def list is valid ONLY on a record-returning function (else 42601); a record-returning function REQUIRES one (else 42601). The rename-only form AS g(col) (no types) on a table function stays a deferred 0A000. The keystone for the record functions (and, later, JSON_TABLE)"

[[capability]]
id = "func.json_record"
description = "json/jsonb record-returning functions (R1, spec/design/json-table.md §2) over the C0 col-def list: json_to_record(json) / jsonb_to_record(jsonb) → one record row; json_to_recordset / jsonb_to_recordset → setof record (one per array element). Each declared column takes the JSON object member of its NAME, coerced to the declared type: a jsonb column embeds the value, a json column its canonical text, every other scalar coerces the member's ->>-style text through the cast machinery ('42' or 42 → an int column, 1.5 → numeric, etc.). A missing member or a JSON null → SQL NULL. A non-object document (to_record) / non-array (to_recordset) → 22023; a NULL argument → zero rows. A composite/array column type in the list is a deferred 0A000. Oracle-pinned (postgres:18). Builds on func.coldeflist + types.jsonb"

[[capability]]
id = "expr.jsonpath_filter"
description = "jsonpath filter expressions `?(predicate)` (P1b, spec/design/jsonpath.md §4) + the `@?` exists operator (§6). A filter keeps only the items for which the predicate is definitely TRUE; the predicate subset is comparisons (`==` `!=`/`<>` `<` `<=` `>` `>=`) over `@`/`$`-rooted accessor paths and scalar literals, combined with `&&` / `||` / `!(…)` and parentheses. Existential comparison (true if SOME pair of items compares true) with 3-valued (Kleene) connectives; an item keeps only on definite TRUE. Filter operands never raise (even in strict). `jsonb @? jsonpath` = jsonb_path_exists. Renders canonically (PG `?(…)`: `&&`/`||` spaced, `a op b` spaced, `!(…)`). STILL deferred (0A000): item methods, arithmetic, top-level predicates (jsonb_path_match / @@), like_regex / starts with / exists / is unknown, `$name` variables. Oracle-pinned (postgres:18). Builds on types.jsonpath + func.jsonb_path"

[[capability]]
id = "func.json_table"
description = "JSON_TABLE(ctx, path [AS n] COLUMNS (...)) with the default plan (T1, json-table.md §3). A FROM-clause table source that projects a JSON document into a relation: the root path is evaluated over the context item to a sequence of row items, and the COLUMNS tree projects each. Column kinds: a regular column (name type [PATH p] [WRAPPER] [ON EMPTY] [ON ERROR]) — evaluate p (default $.<name>) over the row item with JSON_VALUE (scalar type) or JSON_QUERY (json/jsonb type) semantics, default NULL ON EMPTY/ERROR; FOR ORDINALITY — a per-level 1-based integer counter; an EXISTS column (name type EXISTS [PATH p] [ON ERROR]) — JSON_EXISTS coerced to bool/int, default FALSE ON ERROR; and NESTED [PATH] p COLUMNS (...) — recursively expanded. The default plan: parent→child LEFT OUTER (an empty nested path → one row with the nested columns NULL) and sibling NESTED paths UNIONed (each sibling's rows carry the other siblings' columns NULL). Per-level ordinality resets per parent item. A NULL context or empty root sequence → zero rows. Implicitly lateral (ctx may reference earlier FROM siblings). Deferred (0A000): explicit PLAN, PASSING, OMIT QUOTES, array/composite columns, a WRAPPER on a scalar column. Oracle-pinned (postgres:18). Builds on expr.json_query_fns + types.jsonpath"

[[capability]]
id = "expr.json_query_fns"
description = "the SQL/JSON standard query functions JSON_EXISTS / JSON_VALUE / JSON_QUERY (S2, json-sql-functions.md §5). Keyword-led primaries with sub-clauses: a context item (json/jsonb/text, FORMAT JSON accepted), a jsonpath, optional RETURNING type, JSON_QUERY's WITH/WITHOUT [COND|UNCOND] ARRAY WRAPPER + KEEP QUOTES, and CONSTANT ON EMPTY / ON ERROR behaviors (ERROR/NULL/TRUE/FALSE/UNKNOWN/EMPTY [ARRAY|OBJECT]). The path is evaluated over the context; JSON_EXISTS → non-empty (default FALSE ON ERROR); JSON_VALUE → a single SCALAR coerced to RETURNING (default text; empty → ON EMPTY default NULL; >1 / non-scalar / coercion fail → ON ERROR default NULL; a JSON null → SQL NULL); JSON_QUERY → a json/jsonb value, the wrapper controlling array-wrapping (UNCONDITIONAL always wraps, CONDITIONAL only when not a singleton, WITHOUT requires ≤1 item). A SQL/JSON (class-22) error honors ON ERROR; ERROR ON ERROR raises (e.g. 2203F non-scalar, 22034 >1). Deferred (0A000): PASSING vars, ON ERROR/EMPTY DEFAULT expr, JSON_QUERY OMIT QUOTES, RETURNING a non-json type for JSON_QUERY. Oracle-pinned (postgres:18). Builds on types.jsonpath + func.jsonb_path"

[[capability]]
id = "expr.jsonpath_match"
description = "jsonpath TOP-LEVEL predicates + `jsonb_path_match` + the `@@` operator (P1b/P2, spec/design/jsonpath.md §6). A jsonpath body may be a top-level boolean predicate (`$.a == 1`, `$.a > 1 && $.b < 2`) instead of an accessor path — the same predicate grammar as a filter, rooted at `$`/`@` = the document. `jsonb_path_match(ctx, path)` / `ctx @@ path` requires the path to produce EXACTLY one boolean item (a top-level predicate always does; a non-predicate path that yields one boolean works too) → that boolean, else 22038 (singleton_sql_json_item_required). A predicate whose result is unknown (e.g. a missing member) renders as `false`. When a top-level predicate is QUERIED (jsonb_path_query / _array), it yields the boolean as a single jsonb item. Renders parenthesized (`($.\"a\" == 1)`), which round-trips through compile. STILL deferred (0A000): like_regex / starts with / is unknown as a (top-level or filter) predicate, item methods, arithmetic. Oracle-pinned (postgres:18). Builds on expr.jsonpath_filter"

[[capability]]
id = "func.json_populate"
description = "json/jsonb populate-record functions (R2, spec/design/json-table.md §2): json_populate_record(base, json) / jsonb_populate_record(base, jsonb) → one record row, and json_populate_recordset / jsonb_populate_recordset → setof record (one per array element). Unlike json[b]_to_record(set) (which take the column shape from a C0 col-def list), these take it from the COMPOSITE TYPE of the (typically NULL) first argument — so CREATE TYPE addr AS (street text, zip int); SELECT * FROM jsonb_populate_record(NULL::addr, '{...}') yields the addr columns. Each declared field takes the JSON member of its name, coerced to the field type (the same JSON_VALUE scalar path as the record functions: jsonb embeds, json its canonical text, every other scalar via the ->>-style cast); a missing member / JSON null → SQL NULL. A non-composite first argument → 42804; an anonymous record base → 0A000; a composite/array field type → 0A000. FROM-clause SRF only (the scalar / composite-value form is a follow-on). Reuses the R1 row machinery. Oracle-pinned (postgres:18). Builds on func.json_record + types.composite"

[[capability]]
id = "func.json_each"
description = "json/jsonb two-column set-returning functions (B3, spec/design/json-sql-functions.md §3) over the C0 multi-column synthetic table: jsonb_each(jsonb) → setof (key text, value jsonb) — one row per top-level object member in canonical key order; jsonb_each_text(jsonb) → setof (key text, value text) where the value is the ->>-style render (a string member's raw content, a JSON null → SQL NULL, else canonical). A non-object argument → 22023 ('cannot call jsonb_each[_text] on a non-object'); a NULL argument → zero rows; each produced row charges one generated_row. FROM-clause only, implicitly lateral; the relation's two columns are named key/value (the FROM alias renames the relation, e.g. t.key / t.value). The json_each[_text] variants (which preserve the verbatim sub-text — json.md §4) are a deferred 0A000 follow-on, like json_array_elements. Oracle-pinned (postgres:18). Builds on types.jsonb"

[[capability]]
id = "func.json_builders"
description = "json/jsonb construction builders (B1 builders, spec/design/json-sql-functions.md §2): to_json(anyelement) → the to_jsonb JSON image rendered COMPACT as json; json[b]_build_array(VARIADIC \"any\") → a JSON array of the (heterogeneous) arguments, one element each, NULLs INCLUDED (non-strict, NULL → JSON null); json[b]_build_object(VARIADIC \"any\") → a JSON object from alternating key/value arguments. A zero-arg build is valid (json_build_array() → [], json_build_object() → {}); the VARIADIC-array form spreads its lone array (a NULL array → NULL). build_object: an ODD argument count → 22023, a NULL key → 22023; a key coerces to text (text/integer/decimal/boolean, e.g. 1 → \"1\", true → \"true\"); a non-scalar key type is a deferred 0A000. jsonb builders canonicalize (last-wins dedup, canonical key order, spaced render); json builders preserve argument order + duplicate keys and use PG's idiosyncratic builder spacing (an element's own json image — scalar/array compact, jsonb canonical-spaced, json verbatim — joined with \", \"; object pairs key \" : \" value). The element conversion reuses the to_jsonb kernel, so the same float/datetime/composite/uuid/bytea/interval/multidim-array sources defer 0A000. Also array_to_json(anyarray) → the array's compact json image (STRICT; a multidimensional array → 0A000, the to_jsonb deferral). row_to_json (composite, blocked on the composite→json deferral) is a follow-on. Oracle-pinned (postgres:18). Builds on func.to_jsonb"

[[capability]]
id = "func.json_object_agg"
description = "json/jsonb object aggregates (B4, spec/design/json-sql-functions.md §4): jsonb_object_agg(key, value) / json_object_agg(key, value) aggregate the group's (key, value) pairs into a single JSON object; jsonb_object_agg_unique / json_object_agg_unique additionally error 22030 ('duplicate JSON object key value') on a duplicate key. The key is coerced to text (text/integer/decimal/boolean — e.g. 7 → \"7\"); a NULL key → 22023 ('field name must not be null'). The value is the to_jsonb image (so the same float/datetime/composite/uuid/bytea/interval/multidim-array sources defer 0A000). An empty group → SQL NULL. jsonb_object_agg canonicalizes (last-wins dedup, canonical key order, spaced); json_object_agg keeps the group's row order + duplicate keys and uses PG's idiosyncratic '{ … }' brace-padded ', ' / ' : ' spacing. These are 2-argument aggregates, hand-resolved (the single-operand aggregate catalog can't express a key/value pair) — the key/value pair is carried as a Row operand. Deterministic under an ORDER BY of the source. Oracle-pinned (postgres:18). Builds on func.json_agg"

[[capability]]
id = "func.json_agg"
description = "json/jsonb aggregate builders (B4, spec/design/json-sql-functions.md §4): jsonb_agg(anyelement) / json_agg(anyelement) aggregate the group's values into a single JSON array (one element per input row, in the group's row order — for jed that is the input/scan order, deterministic under an ORDER BY of the source); jsonb_agg_strict / json_agg_strict additionally SKIP rows whose value is NULL (the non-strict variants keep them as JSON null). An empty group → SQL NULL (PG). Both variants render the spaced canonical array form; the json variant is typed json (and a json input element is canonicalized — the json_array_elements verbatim divergence). The element conversion reuses the to_jsonb kernel, so the same float/datetime/composite/uuid/bytea/interval/multidim-array sources are a deferred 0A000 follow-on. The in-aggregate ORDER BY (jsonb_agg(x ORDER BY y)) and the two-operand jsonb_object_agg / _unique are deferred. Oracle-pinned (postgres:18). Builds on func.to_jsonb"

[[capability]]
id = "types.array_composite"
description = "array-of-composite element types (spec/design/array.md §12 AC1) — a previously-defined composite type is a first-class array element type (items addr[]): no format_version bump (the catalog already framed element_type_code 14 + name, §3; the codec/comparison/text-I/O recurse). Construct via the '{…}'::addr[] text literal (array_in coerces each element through record_in) — the ARRAY[ROW(…)] constructor path is a per-core unit-test concern; store/load round-trip; array_out nests the two quoting layers (record_out doubling inside array_out backslash-escaping, §7); the whole-value comparison =/<>/< <= > >= / ORDER BY / DISTINCT / GROUP BY where a composite element's per-element compare routes through the composite TOTAL ORDER (NULLs-last, definite), NOT the composite 3VL — so ARRAY[ROW(1,NULL)::addr] = ARRAY[ROW(1,NULL)::addr] is TRUE and equal-with-NULL-field arrays sort/group together (§5, oracle-pinned); subscript items[i] → the composite element, slice items[m:n] → addr[], field access (items[i]).field; multidimensional addr[] values. unnest over a composite array and the polymorphic array function surface over composite elements stay deferred. Builds on types.array and types.composite"

[[capability]]
id = "types.composite_array_field"
description = "a composite type with an ARRAY-typed field (spec/design/array.md §12 — the mirror of types.array_composite) — CREATE TYPE poly AS (name text, pts i32[]) declares a composite whose field is a structural T[]. No format_version bump (still 10): the catalog composite-type entry gains a field_type_code 15 + the inline element-type descriptor (the same descriptor an array column uses, §3), placed before the field flags byte where a nested-composite name sits; the value codec / comparison / record_out / record_in all recurse for free through the array field (an array field's record_in token is an array text literal coerced through array_in, one level down). The element is a scalar or a previously-defined composite (the doubly-nested addr[] field — element_type_code 14 + name). Build via ROW('a', '{1,2,3}') / ROW('a', ARRAY[1,2,3]) (the array field as a text literal or ARRAY[…]); the PG-portable '(a,\"{1,2,3}\")'::poly cast parses it through record_in/array_in. Store/load round-trip; array_out renders the array field (then record_out quotes it, the two layers nest); composite 3VL comparison uses the array field's BTREE (always-definite) comparison and the lexicographic sort uses the array total order. DROP TYPE addr is blocked (2BP01) while an addr[] field (or column) references it — the dependency check looks through one array level. An array field typmod is 0A000; an unknown array element type is 42704. Builds on types.array and types.composite"

[[capability]]
id = "expr.array_subscript"
description = "array element subscript a[i] (spec/design/array.md §6) — reads the i-th element of an array, 1-based (PG / SQL-standard convention). An out-of-bounds index (0, negative, or past the end), a NULL index, and a subscript of a NULL array all yield NULL — never an error (PG, a documented divergence from the SQL standard's mandated data exception). The result type is the element type; the un-aliased output column is named after the base array. The index is an integer expression (a literal adapts to int4); subscripting a non-array base is 42804. Builds on types.array"

[[capability]]
id = "types.array_multidim"
description = "multidimensional array values + custom lower bounds (spec/design/array.md §12) — the codec header (ndim/dims/lbounds) is exercised beyond 1-D-lb-1. ARRAY[ARRAY[…],…] stacks sub-arrays into a higher dimension (non-rectangular → 2202E; a scalar/array mix → 42804); the '{{…},{…}}' literal parses nested braces (non-rectangular / count-mismatch → 22P02); the '[l:u]={…}' literal sets custom lower bounds (an inverted bound l>u → 2202E). array_out renders nested braces and emits a '[l1:u1]…=' prefix iff any lower bound ≠ 1. Element access needs all N subscripts (a[i] on an N-D value with fewer/more is NULL); the subscript domain is the value's lb..ub. array_eq/array_cmp include dimensionality and lower bounds as tiebreaks ([2:4]={1,2,3} ≠ {1,2,3}), after the element-wise comparison and total element count. Builds on types.array"

[[capability]]
id = "expr.array_slice"
description = "array slices a[m:n] (spec/design/array.md §6) — read a sub-array; either bound may be omitted ([:n], [m:], [:]) and defaults to the value's own lower/upper bound. The requested range is clamped to each dimension's [lb,ub]; an empty (or fully out-of-range) result is the empty array {} (NOT NULL); a NULL bound, or a slice of a NULL array, yields NULL. If any subscript in a multidimensional access is a slice the whole access is a slice and a scalar index i means 1:i; too many subscripts → {}, fewer leave the trailing dimensions at full range. The result is renumbered to lower bound 1 on every dimension (PG array_get_slice). Builds on expr.array_subscript and types.array_multidim"

[[capability]]
id = "func.regexp_replace"
description = "regexp_replace(source, pattern, replacement [, flags]) → text (spec/design/regex.md §8) — replace the FIRST match (or ALL with the `g` flag) of the regex `pattern` in `source` by the replacement TEMPLATE: \\1..\\9 splice in capture group 1..9, \\& the whole match, \\\\ a literal backslash (these are template back-references INTO the replacement string, NOT regex backreferences). No match → source unchanged. jed's RE2-able flavor over the hand-written Pike VM (the same engine as expr.regex_match). flags: `i` (case-insensitive, the ~* fold — matching folds both sides but the spliced text is the ORIGINAL-case substring), `g` (global); unknown flag 2201B. STRICT (a NULL arg → NULL). Cost: operatorEval + regex_compile (once, constant pattern) + regex_step per match run. Builds on expr.regex_match"

[[capability]]
id = "func.regexp_match"
description = "regexp_match(source, pattern [, flags]) → text[] (spec/design/regex.md §8) — the capture array of the FIRST match of the regex `pattern` in `source`: element i is group i's captured substring (groups 1..n when the pattern has ≥1 group, else a 1-element array of the whole match, matching PG); an unset (non-participating) group element is NULL. NO match → NULL (the whole result, not an empty array). jed's RE2-able flavor over the hand-written Pike VM. flags: `i` (case-insensitive, the captures are the ORIGINAL-case substrings). This is the first text[]-returning scalar function (resolved via the RegexFunc node, the array/range-function precedent). STRICT (a NULL arg → NULL). Builds on expr.regex_match and types.array"

[[capability]]
id = "func.regexp_like"
description = "regexp_like(string, pattern [, flags]) → boolean (spec/design/regex.md §8b) — TRUE iff the regex `pattern` matches somewhere in `string`, i.e. exactly `string ~ pattern` (or `~*` with the `i` flag). The simplest of PG's Oracle-compatibility regex functions; reuses the boolean Pike-VM match directly (no start argument). jed's RE2-able flavor: only the `i` flag is accepted (a `g` flag — replace-only — or any other is 2201B, a documented divergence from PG's larger flag set). STRICT (a NULL arg → NULL). Builds on func.regexp_match"

[[capability]]
id = "func.regexp_count"
description = "regexp_count(string, pattern [, start [, flags]]) → integer (spec/design/regex.md §8b) — the number of non-overlapping matches of the regex `pattern` at or after the 1-based `start` (default 1). An empty-capable pattern matches the empty string at each gap (regexp_count('abc','x*') = 4); a `start` past the end → 0. NOTE the 3-argument overload's 3rd argument is `start` (an integer), NOT flags — flags appear only in the 4-argument form (PG's overload set). start < 1 → 22023 (invalid_parameter_value). Only the `i` flag is accepted (any other, incl. `g`, is 2201B). jed's RE2-able flavor over the hand-written Pike VM. STRICT (a NULL arg → NULL). Builds on func.regexp_like"

[[capability]]
id = "func.regexp_substr"
description = "regexp_substr(string, pattern [, start [, N [, flags [, subexpr]]]]) → text (spec/design/regex.md §8b) — the substring matched by the N-th non-overlapping match (1-based N, default 1) of the regex `pattern` at or after the 1-based `start` (default 1). `subexpr` (default 0) selects a parenthesized capture group within that match: 0 = the whole match, k = group k. No N-th match, an out-of-range subexpr (> the pattern's group count), or a non-participating group → NULL. Argument validation (before the pattern compiles): start < 1, N < 1, subexpr < 0 → 22023. Only the `i` flag is accepted (any other is 2201B). jed's RE2-able flavor over the hand-written Pike VM. STRICT (a NULL arg → NULL). Builds on func.regexp_count"

[[capability]]
id = "func.regexp_instr"
description = "regexp_instr(string, pattern [, start [, N [, endoption [, flags [, subexpr]]]]]) → integer (spec/design/regex.md §8b) — the 1-based position of the N-th non-overlapping match's subexpr span. `endoption` (default 0): 0 = the position of the first character of the span, 1 = the position FOLLOWING the last character. `subexpr` (default 0) selects the whole match (0) or capture group k. No N-th match, an out-of-range subexpr, or a non-participating group → 0. Argument validation (before the pattern compiles): start < 1, N < 1, endoption ∉ {0,1}, subexpr < 0 → 22023. Only the `i` flag is accepted (any other is 2201B). jed's RE2-able flavor over the hand-written Pike VM. STRICT (a NULL arg → NULL). Builds on func.regexp_substr"

[[capability]]
id = "func.array"
description = "array function/operator surface AF1 (spec/design/array-functions.md) — the polymorphic anyarray/anyelement resolution (one type variable ELEM bound by structural equality across the array-accepting slots, read back into the anyarray/anyelement result codes; a non-array where anyarray is required, or an element-type conflict, is 42883) plus the scalar-function-shaped surface: introspection array_ndims/cardinality/array_dims (1-arg) and array_length/array_lower/array_upper (2-arg, the integer dimension), all reading the value's ndim/dims/lbounds header — propagating NULL and returning NULL for an out-of-shape request (array_length/lower/upper NULL for an empty array or out-of-range dim; array_ndims/array_dims NULL for the empty array; cardinality 0 for empty), array_dims rendering [l1:u1][l2:u2]…; and the NON-STRICT builders array_append/array_prepend (a NULL/empty array → {e}; a 1-D array grows preserving its lower bound; a multidimensional array is 22000) and array_cat (identity-aware concatenation along the outer dimension; an incompatible dimensionality is 2202E). The untyped-literal element adapts to the array's element type (with a range check). Builds on types.array_multidim"

[[capability]]
id = "func.unnest"
description = "array function surface AF3 (spec/design/array-functions.md §9) — the polymorphic set-returning function unnest(anyarray), a FROM-clause row source (functions.md §10, grammar.md §35, reusing query.set_returning's synthetic-relation machinery) that EXPANDS an array into one row per element. The anyarray arg binds ELEM := its element type and the produced one-column relation (named after the alias, else unnest) is typed at ELEM (the set_of_element result). One row per element in flattened row-major order: a multidimensional array flattens, a NULL element is produced as a NULL row, the empty array {} and a NULL array argument each yield zero rows (the empty_on_null discipline). A non-array argument (e.g. unnest(5)) is 42883; a bare untyped NULL is 42P18 (jed's polymorphic posture). Each produced element charges one generated_row (cost.md §3), so a max_cost ceiling bounds a runaway unnest (54P01); it composes with WHERE/ORDER BY/LIMIT/cross-join exactly as generate_series does, and is non-LATERAL (args see $N/outer, not sibling FROM tables). The SELECT-list SRF position, LATERAL, and WITH ORDINALITY are deferred narrowings. Builds on func.array and query.set_returning"

[[capability]]
id = "func.array_containment"
description = "array function surface AF4 (spec/design/array-functions.md §10) — the array containment / overlap operators @> (contains), <@ (contained by), && (overlaps), three polymorphic `anyarray <op> anyarray → boolean` operators sharing ||'s precedence rung (37, the PostgreSQL 'any other operator' level, left-associative). a @> b is true iff every element of b is present in a; a && b iff they share ≥1 element; a <@ b is b @> a. The comparison is over the FLATTENED element multiset under STRICT equality — a NULL element matches NOTHING, including another NULL (the inverse of the search/edit functions' NOT DISTINCT FROM, §5 #10), so ARRAY[1,2,NULL] @> ARRAY[NULL] is false — and works on ANY dimensionality (no 1-D 0A000 restriction); duplicates and custom lower bounds are irrelevant. The empty array is contained by anything (a @> {} true) and overlaps nothing (a && {} false). The operators are STRICT (a NULL whole-array operand → NULL). The two operands' element types must unify; a non-array operand or an element-type mismatch is 42883. New tokens @>/<@/&& (a lone @ / & is 42601); the result is always boolean so an all-untyped-NULL pair is not 42P18. Builds on func.array"

[[capability]]
id = "func.array_quantified"
description = "array function surface AF5 (spec/design/array-functions.md §11) — the ANY/ALL/SOME quantified array comparisons (x = ANY(arr), x op ALL(arr)), the array spelling of IN and its universal dual. A comparison operator (= < > <= >=) may be followed by a quantifier over a parenthesized array (grammar.md §41); no new tokens (ANY/SOME/ALL are keywords), an Expr/RExpr 'quantified' node, and a three-valued fold over the array's FLATTENED elements that reuses the IN-list membership machinery (eq3/lt3/gt3): ANY/SOME is the OR-fold (TRUE if any x op e is TRUE, else NULL if any is NULL, else FALSE; empty → FALSE), ALL is the AND-fold (FALSE if any is FALSE, else NULL if any is NULL, else TRUE; empty → TRUE), and a NULL array operand → NULL. SOME folds to ANY. Multidimensional arrays flatten; custom lower bounds are irrelevant (elements, not subscripts). x and the array operand take the same literal adaptation the comparison operators use (a bare-literal x adapts to the element type, a bare ARRAY[…] to x's type). The right operand must be an array — a non-array side is 42809, an incomparable element type 42883; charges per element like IN so max_cost bounds the walk (54P01). A bare untyped NULL operand is 42P18 and the subquery form op ANY(SELECT …) is a deferred 0A000 (both jed-specific, out of the oracle corpus). Builds on types.array"

[[capability]]
id = "func.variadic"
description = "array function surface AF6 (spec/design/array-functions.md §12) — the VARIADIC call syntax + variadic overload resolution, the make_interval-era follow-on unblocked by the array type, spent on the engine's first VARIADIC built-ins num_nulls/num_nonnulls (count the NULL / non-NULL arguments, result i32). A catalog row marked variadic=true makes its last parameter VARIADIC: the call takes EITHER a SPREAD of trailing arguments — num_nulls(1,'x',NULL), heterogeneous since the variadic element family is 'any', ≥1 arg required (num_nulls() is 42883) — OR a single array via the VARIADIC keyword — num_nulls(VARIADIC ARRAY[1,NULL,3]), whose flattened elements (any dimensionality) are counted. One grammar change: the VARIADIC keyword before a call's final argument only (a non-final or named VARIADIC is 42601), recorded as a variadic flag on the FuncCall node; VARIADIC is not reserved. NON-STRICT (null='none'): the spread form NEVER returns NULL (num_nulls(NULL) is 1), while the VARIADIC-array form returns NULL on a NULL whole-array operand. A VARIADIC keyword on a non-array or a bare untyped NULL operand is 42804 (not the polymorphic 42P18). The kernel charges one operator_eval (the per-element count walk is unmetered, like the array introspectors); arguments charge their own cost. Oracle-checked (postgres:18). Builds on func.array"

[[capability]]
id = "func.array_composite"
description = "array function surface AF7 (spec/design/array-functions.md §13) — the whole AF1–AF6 polymorphic array function/operator surface over a COMPOSITE element type, plus unnest(composite[]). The polymorphic resolution (anyarray/anyelement, §2) already unifies a composite element by catalog ref, so the builders (array_append/array_prepend/array_cat/||), introspectors (array_ndims/array_length/array_lower/array_upper/cardinality/array_dims), num_nulls/num_nonnulls (VARIADIC), and the containment/overlap operators (@>/<@/&&) all work over addr[] with no kernel change — the per-element compare already routes through value_cmp, the composite TOTAL ORDER (NULL fields comparable, definite — array.md §5), so @> matches a composite element with NULL fields yet a whole-element NULL still matches nothing (strict, §10 #12). Two pieces needed code: (a) unnest(composite[]) — the SRF binds ELEM to the composite type and types its synthetic output column at it (the set_of_element result generalized past scalars), producing one composite row per element (NULL element → NULL row; empty/NULL array → zero rows), composable with (unnest(…)).field, ORDER BY, etc.; (b) x op ANY/ALL(composite[]) — the per-element 3VL comparison routes a composite pair through the composite total order (definite, NULL fields comparable — record_eq), NOT the bare-ROW composite 3VL eq3/lt3/gt3, so ROW('a',NULL)::addr = ANY(ARRAY[ROW('a',NULL)::addr]) is TRUE (PG record_eq), while a whole-element NULL still folds to UNKNOWN. The search/edit functions (array_remove/array_replace/array_position/array_positions) match composite elements NULL-safely (value_cmp == Equal), the inverse of @>'s strict rule, exactly as for scalars. Construct via the PG-portable '{…}'::addr[] / '(…)'::addr literals (or ARRAY[ROW(…)] with column context, a jed extension in per-core unit tests). Oracle-checked (postgres:18). Builds on func.array, func.unnest, func.array_containment, func.array_quantified, func.variadic, and types.array_composite"

[[capability]]
id = "func.range_accessors"
description = "range accessor functions RF1 (spec/design/range-functions.md §1) — the polymorphic anyrange resolution (a sibling of anyarray: an anyrange slot matches any range argument and binds ELEM := its element type, read back into the anyelement result; a non-range where anyrange is required is 42883) plus the seven STRICT scalar-shaped accessors over a range value: lower(anyrange)/upper(anyrange) → the bound VALUE (ELEM), NULL when the range is empty or unbounded on that side; isempty/lower_inc/upper_inc/lower_inf/upper_inf(anyrange) → boolean. For the empty range isempty is true and every other reader is false/NULL; for an infinite bound the *_inf reader is true, the *_inc reader false (an infinite bound is never inclusive), and lower/upper are NULL. A NULL range propagates to NULL. jed has no string lower(text)/upper(text), so these names are range-only — a documented divergence from PG's overloaded lower/upper. Oracle-pinned (postgres:18). Builds on types.range"

[[capability]]
id = "func.range_constructors"
description = "range constructor functions RF2 (spec/design/range-functions.md §2) — the six concrete-result builders int4range/int8range/numrange/tsrange/tstzrange/daterange (jed also spells the integer ones i32range/i64range — a documented extra), each with a 2-arg (lo, hi) overload defaulting the bounds to [) and a 3-arg (lo, hi, bounds) overload taking the 2-char flags text ('[]'/'[)'/'(]'/'()'). The constructor is NON-strict: a NULL bound is an INFINITE bound (int4range(NULL,5) → (,5)), not a NULL result. Each bound is coerced to the element type assignment-style (a bare integer/decimal literal or a string-literal datetime adapts; an integer bound range-checks 22003; an int→decimal / text→temporal bound adapts; a non-assignable family is 42883), then the value is finalized exactly like a range literal — lower > upper traps 22000, a discrete subtype canonicalizes to [) (22003 if the +1 step overflows the element domain), and equal bounds not-both-inclusive normalize to empty. The 3-arg form's NULL flags traps 22000 (PG \"flags argument must not be null\") and an invalid flags string 42601 (PG \"invalid range bound flags\"). The bound coercion is more permissive than PG's strict function-argument matching in two non-corpus corners (jed accepts a wider integer for a narrower range with a runtime range-check; jed rejects an unknown string literal for an integer/decimal bound) — both follow from reusing jed's assignment model. Oracle-pinned (postgres:18). Builds on types.range"

[[capability]]
id = "func.range_operators"
description = "range boolean operators RF3 (spec/design/range-functions.md §3) — the eight PostgreSQL range operators, each returning a DEFINITE boolean (a range total order, never 3VL): @> (contains, range@>range and range@>element), <@ (contained-by, range<@range and element<@range), && (overlaps), << (strictly left), >> (strictly right), &< (does not extend to the right of), &> (does not extend to the left of), and -|- (adjacent). @>/<@/&& are shared with the array surface — a RANGE operand routes to the range axis (the resolver dispatches on operand type) and @>/<@ add the element overload (the element is coerced to the range's element type, assignment-style); the other five are range-only. All are STRICT (a NULL operand → NULL). Empty-range edges follow PG: the empty range contains nothing and is contained by everything, overlaps nothing, and is neither strictly-left/right of nor adjacent to anything. A range operand pairs only with a range over the SAME element type (else 42883 \"operator does not exist\", matching PG). The new tokens << >> &< &> -|- are lexed greedily (-|- before the -- line comment). Oracle-pinned (postgres:18). Builds on func.range_constructors and func.array_containment"

[[capability]]
id = "func.range_set_operators"
description = "range set operators RF4 (spec/design/range-functions.md §4) — the three set operators + (union), * (intersection), - (difference) over two ranges of a common element type, plus the range_merge(anyrange, anyrange) function. The operators REUSE the arithmetic tokens (no new grammar): a +/-/* with a range operand is dispatched to the range axis at resolve, anyrange <op> anyrange → anyrange. Both operands must be ranges over the SAME element type — a range × non-range or a cross-element pair is 42883 (\"operator does not exist\", matching PG). All are STRICT (a NULL operand → NULL; a bare untyped NULL beside a range is a NULL range). Union: the smallest single range covering both — empty + r → r; + raises 22000 (\"result of range union would not be contiguous\") when the operands neither overlap nor are adjacent. Intersection: the overlap, or empty when the ranges are disjoint/adjacent/either empty; never errors. Difference: the part of a not covered by b — a disjoint b (or an empty operand) yields a unchanged, b wholly covering a yields empty, and a b strictly inside a raises 22000 (\"result of range difference would not be contiguous\"). range_merge(a, b) is union without the contiguity check — it spans any gap silently, never errors. Discrete subtypes stay in canonical [) form (the set-op results are built from already-canonical operand bounds). Oracle-pinned (postgres:18). Builds on func.range_constructors"

[[capability]]
id = "expr.interval_arithmetic"
description = "interval arithmetic (spec/design/interval.md §5): interval ± interval → interval (field-wise, no justification) and unary minus; a NULL operand propagates; an i32 month/day or i64 micros overflow traps 22008. interval ×÷ number and timestamp ± interval are separate capabilities (later slices)"

[[capability]]
id = "expr.interval_scale"
description = "interval ×÷ number (spec/design/interval.md §5): interval × integer/decimal, integer/decimal × interval (commute), interval ÷ integer/decimal → interval, each field scaled with the fractional part cascading months→days→micros — computed EXACTLY (no float; a documented PG divergence on sub-unit ties), µs half-away. Overflow → 22008, zero divisor → 22012"

[[capability]]
id = "expr.timestamp_arithmetic"
description = "timestamp arithmetic (the engine's first; spec/design/interval.md §5): timestamp[tz] ± interval → timestamp[tz] (months added first with day-of-month clamping, then days as 24 h, then micros; ±infinity stays ±infinity; overflow → 22008), interval + timestamp[tz] commutes, and timestamp[tz] − timestamp[tz] → interval justified into days + time (months = 0; an infinite operand → 22008)"

[[capability]]
id = "expr.date_arithmetic"
description = "date arithmetic (spec/design/date.md §6): date ± integer → date (shift the i32 day count; ±infinity unchanged; finite overflow / a sentinel result → 22008), integer + date commutes (Add only), date − date → i32 (days between; an ±infinity operand → 22008 'cannot subtract infinite dates'; a difference beyond i32 → 22008), and date ± interval → timestamp (the date widens to midnight, then the timestamp ± interval calendar shift; a date beyond the i64-µs timestamp range → 22008). A NULL operand propagates; date × any other arithmetic combination is 42804"

[[capability]]
id = "null.three_valued"
description = "Three-valued NULL logic in comparisons (CLAUDE.md §4)"

[[capability]]
id = "error.overflow_trap"
description = "Integer overflow traps with SQLSTATE 22003 (CLAUDE.md §8)"

[[capability]]
id = "cast.explicit"
description = "Explicit CAST(x AS type), including narrowing that may trap"

[[capability]]
id = "cast.string_literal"
description = "Typed string literals — PostgreSQL's `type 'string'` form and `CAST(<string literal> AS type)` (spec/design/grammar.md §36): the literal's string is coerced to the NAMED type at resolve (i16/i32/i64, decimal, boolean, text + the string-native bytea/uuid/timestamp/timestamptz/interval). Unknown type name → 42704, malformed → 22P02, out of range → 22003. A runtime text→T cast on a non-literal text expression stays deferred (0A000); a bare string still does not silently coerce to a number/bool (strict, 42804). For integer/decimal, jed's own literal grammar — scientific `e`-notation is accepted (numeric '1.5e3' → 1500), but hex/underscore/NaN trap 22P02 where PG accepts them"

[[capability]]
id = "cast.operator"
description = "PostgreSQL's postfix `::` cast operator — `expr :: type` is exactly `CAST(expr AS type)` (spec/design/grammar.md §37): same cast matrix, string-literal coercion, deferred narrowings, typmod, and resolve codes. Chains left-associatively (`x::int8::int2`); binds tighter than unary minus (`-32768::i16` traps 22003, `(-32768)::i16` is in range); a lone `:` is 42601"

[[capability]]
id = "cast.uuid"
description = "uuid ⇄ other casts (the uuid cast slice — spec/types/casts.toml, spec/design/types.md §14): four EXPLICIT pairs, text ⇄ uuid and bytea ⇄ uuid. text → uuid runs the PG-flexible uuid_in parser at eval on a RUNTIME (non-literal) text expression — braces / hyphens-after-each-pair / 32-hex / any case all normalize to the same 16 bytes, a malformed string traps 22P02 (the literal form '…'::uuid is the separate cast.string_literal resolve-time adaptation). uuid → text emits the canonical lowercase 8-4-4-4-12 spelling (uuid_out). text → uuid AGREES with PostgreSQL exactly (PG's text→uuid is an explicit I/O cast); uuid → text is EXPLICIT only — STRICTER than PG (which assignment-casts any type to text via I/O), the same strict-matrix convention as decimal→int and jed's json/jsonb→text casts (so INSERT INTO text_col VALUES (uuid_expr) / text_col = uuid_expr stay 42804). text ⇄ uuid is oracle-checked (postgres:18). uuid ⇄ bytea are the 16 raw bytes in both directions — a cast PostgreSQL LACKS (bytea::uuid / uuid::bytea is 42846 cannot_coerce), a deliberate documented divergence (a uuid IS exactly 16 bytes); bytea → uuid requires exactly 16 bytes and traps 22P02 on any other length. Because uuid ⇄ bytea SUCCEEDS where PG errors, those two pairs cannot live in the PG-clean corpus and are covered by per-core unit tests (cast_uuid). text ⇄ bytea and every other bytea cast stay deferred (0A000 — the bytea cast slice's own follow-on). NULL → NULL throughout; uuid → uuid is the identity. Builds on cast.explicit, types.uuid, types.text, and types.bytea"

[[capability]]
id = "cast.bool_int"
description = "boolean ⇄ i32 casts (the boolean cast slice — spec/types/casts.toml, spec/design/types.md §9). PostgreSQL ties the boolean↔integer cast to int4 ONLY and makes both directions EXPLICIT, so jed admits exactly two pairs: boolean → i32 (CAST(true AS int) → 1, false → 0) and i32 → boolean (0 → false, any NONZERO including negative → true); NULL → NULL either way, and boolean → boolean is the identity. An integer LITERAL operand of a boolean target adapts to i32 (CAST(5 AS boolean) / 5::boolean), matching PG (a bare 5 is int4); a literal beyond i32 range then traps 22003 (PG 42846 — a documented divergence). The cast is explicit-only (neither implicit nor assignment): INSERT INTO int_col VALUES (true) and int_col = true stay 42804. There is NO bool⇄i16 / bool⇄i64 cast (PG has none): those forbidden pairs are 42804 (cannot cast boolean to i16 / cannot cast i64 to boolean) where PG reports 42846 — jed's standing convention for a forbidden cast pair, covered by the per-core unit tests, not this oracle corpus. A string-literal 't'::boolean / BOOLEAN 'true' is the separate cast.string_literal coercion, unaffected. Builds on cast.explicit and types.boolean_storable"

[[capability]]
id = "cast.runtime_text"
description = "Runtime text → numeric/boolean casts (the runtime-text-cast slice — spec/design/grammar.md §36, spec/design/types.md §5, spec/types/casts.toml). CAST(text_expr AS T) / text_expr :: T on a NON-LITERAL text expression (a text column, a function result) for the numeric + boolean scalar targets: i16/i32/i64, decimal/numeric (the typmod re-scale applied), f32/f64, and boolean. The cast runs the SAME per-type coercion the `type 'string'` LITERAL form folds at resolve (parse_int_literal / parse_decimal_literal / parse_f*_literal / parse_bool_literal — cast.string_literal), but per ROW in the evaluator (evalCast), metered by the cast node's existing operator_eval charge; a malformed string traps 22P02 and an out-of-range integer/decimal traps 22003 PER ROW during the scan. jed's OWN literal grammar governs (hex / digit-underscore / NaN / ±Infinity trap 22P02 where PostgreSQL accepts them — the documented grammar.md §36 divergences, identical to the literal path; covered by per-core unit tests since they cannot live in the PG-clean corpus). text → uuid is the separate cast.uuid runtime cast and text → date the separate cast.text_date; the remaining string-native targets timestamp/timestamptz/interval/bytea stay deferred (0A000), each its own follow-on. NULL → NULL throughout. The accepted-grammar cases AGREE with PostgreSQL and are oracle-checked (suites/cast/text_to_scalar.test, postgres:18). A bare string still does NOT silently coerce in a numeric context (WHERE int_col = '42' stays 42804 — the type must be named). Builds on cast.explicit, cast.string_literal, types.text"

[[capability]]
id = "cast.text_date"
description = "Runtime text → date cast (the text→date cast follow-on — spec/design/date.md §6, spec/types/casts.toml). CAST(text_expr AS date) / text_expr :: date on a NON-LITERAL text expression (a text column, a function result) runs the SAME parse_date the date literal folds at resolve (cast.string_literal / literal adaptation), but per ROW in the evaluator: the strict-ISO date grammar with optional BC/AD era and ±infinity, any trailing time/offset validated then DISCARDED (24:00:00 does not advance the day), 22007 malformed / 22008 out-of-range field or day count, PER ROW during the scan. Metered by the cast node's existing operator_eval charge (zone-free). STABLE, not immutable — the cast's input grammar admits the clock-relative specials — so an index EXPRESSION or PREDICATE containing it is 42P17 at CREATE INDEX (functions in index expression must be marked IMMUTABLE), AGREEING with PostgreSQL, whose date_in is stable (indexes.md §2; mechanically the resolver flags the plan at the cast node's birth). The strict-ISO accepted grammar AGREES with PostgreSQL and is oracle-checked (suites/cast/text_to_date.test, postgres:18); the jed-stricter rejections (DateStyle-dependent spellings like 01/15/2024 or Jan 15 2024, :60 seconds — accepted by PG, 22007/22008 in jed) are per-core tested since they cannot live in the PG-clean corpus. text → timestamp/timestamptz, datetime → text, and text → interval/bytea stay deferred (0A000). NULL → NULL. Builds on cast.runtime_text, types.date"

[[capability]]
id = "types.date_clock_literal"
description = "Clock-relative date literals (spec/design/date.md §6): the special date-input words beyond ±infinity — 'today' / 'now' (offset 0), 'tomorrow' (+1), 'yesterday' (−1), naming the STATEMENT clock's day in the SESSION zone (statement-stable, like now(); one timezone cost unit per evaluation beyond the node's operator_eval), plus the constant 'epoch' (1970-01-01, folding like any date literal — no clock read, no node cost). Case-insensitive, whitespace-trimmed. A clock-relative word resolves to a STABLE node, NEVER folded — three deliberate, documented divergences from PostgreSQL (which folds the literal at parse time): (1) DEFAULT 'today' is an EXPRESSION default re-evaluated per INSERT (PG freezes the table-creation day); (2) a prepared statement's cached plan re-reads the clock per execution (PG freezes the prepare-time day); (3) an index expression or predicate containing one is 42P17 (PG silently folds it into the index definition). Accepted by LITERAL adaptation (a date context, an INSERT VALUES slot), the DATE '…' typed literal, the cast-of-a-literal, and the runtime text→date cast (per row — the reason that cast is STABLE); NOT accepted by the assignment coercion of non-literal text DATA (INSERT … SELECT of a text projection, a $N bind, array/range/composite text input — 22007, where PG's date_in evaluates them; use an explicit ::date to opt in). The timestamp family's own 'now' literal stays deferred (22007). The `# clock:` / `# clock_advance:` corpus directives inject the statement clock so output is exact and deterministic cross-core; NOT oracle-imported (PG's wall clock differs and PG folds). Builds on types.date, cast.text_date, func.now"

[[capability]]
id = "cast.array"
description = "The three array-involving casts (the array cast follow-ons — spec/design/array.md §7, spec/types/casts.toml). (1) array → text: array_out renders the value as {…} per row (multidim nested braces, the [l:u]= bound prefix). EXPLICIT only — stricter than PG's assignment-cast-to-text, the same strict-matrix convention as uuid/json → text (so INSERT INTO text_col VALUES (arr) / text_col = arr stay 42804). (2) runtime text → T[]: a NON-LITERAL text expression coerces per row via array_in against the column's element type (the '{…}'::T[] literal path, but per row in evalCast) — a malformed literal traps 22P02, an inverted [l:u] bound 2202E, a bad element its own parse error, all PER ROW. (3) element-wise array → other-element-array: each non-null element through the scalar cast to the target element type (the shape — dims/lbounds — is preserved, a NULL element stays NULL), for the casts.toml-admitted element pairs (numeric↔numeric, text→numeric/boolean/uuid, boolean⇄i32, uuid⇄text/bytea, bytea→uuid); an array of the SAME element type is the identity. Overflow traps 22003 per element. The numeric/text element pairs AGREE with PostgreSQL and are oracle-checked (suites/cast/array_casts.test, postgres:18); the jed-only element casts (uuid⇄bytea, succeeding where PG errors) and the forbidden-pair convention (a scalar element pair with no cast → 42804, where PG reports 42846; a composite-element array cast → 0A000) cannot live in the PG-clean corpus and are covered by per-core unit tests (cast_array_runtime). A bind parameter into an array type stays 0A000 (the container-param narrowing). No on-disk format change. Builds on cast.explicit, types.array"

[[capability]]
id = "compare.promotion"
description = "Cross-type integer comparison via the promotion tower (i16<i32<i64)"

[[capability]]
id = "types.boolean"
description = "boolean / bool scalar type (TRUE/FALSE literals, projected boolean values; expression-only)"

[[capability]]
id = "expr.arithmetic"
description = "Integer arithmetic operators + - * / % with trap-on-overflow (22003)"

[[capability]]
id = "expr.unary_minus"
description = "Unary minus (negation) as an expression operator"

[[capability]]
id = "expr.parens"
description = "Parenthesized sub-expressions"

[[capability]]
id = "expr.precedence"
description = "Operator precedence across logical / comparison / arithmetic levels"

[[capability]]
id = "expr.comparison_value"
description = "Comparisons produce boolean values usable in the SELECT list and nested expressions"

[[capability]]
id = "expr.not_equal"
description = "The not-equal operator `<>` (and its `!=` alias) — the 3VL negation of `=`: propagates NULL like `=` (`NULL <> NULL` is unknown), overloaded across every comparable family, and `!=` lexes to the same operator"

[[capability]]
id = "query.logical_connectives"
description = "AND / OR / NOT with three-valued (Kleene) truth tables"

# Predicate forms (Phase 2, spec/design/grammar.md §20-§23). IN/BETWEEN are sugar over the
# existing =/OR/AND/NOT machinery; LIKE is a text operator; CASE is a primary-level form.
[[capability]]
id = "expr.in_list"
description = "x IN (list) / NOT IN — membership over a non-empty value list, desugared to the OR-chain (x = a OR x = b …); three-valued NULL (1 IN (2,NULL) is NULL); per-element typing (too-wide literal 22003, cross-family 42804); empty IN () is 42601 (spec/design/grammar.md §20)"

[[capability]]
id = "expr.between"
description = "x BETWEEN lo AND hi / NOT BETWEEN — range test desugared to (x >= lo AND x <= hi); Kleene AND gives 5 BETWEEN 10 AND NULL = FALSE but 5 BETWEEN 1 AND NULL = NULL; bounds parse at the additive level so the structural AND is not the connective (spec/design/grammar.md §21)"

[[capability]]
id = "expr.like"
description = "text LIKE pattern / NOT LIKE — % matches any run, _ one code point, default \\ escape; text×text→boolean, NULL propagates, non-text 42804; a pattern ending in a lone escape reached during matching is 22025; code-point (not UTF-16) iteration (spec/design/grammar.md §22)"

[[capability]]
id = "expr.ilike"
description = "text ILIKE / NOT ILIKE — case-insensitive LIKE (spec/design/collation.md §16, grammar.md §22). Same contract as LIKE; the matcher simple-lowercases (1:1) both operands first — ASCII-only when no Unicode property bundle is loaded, full simple Unicode mappings when one is. % matches any run, _ one code point, default \\ escape; NULL propagates; non-text 42804; trailing-escape 22025. Builds on expr.like"

[[capability]]
id = "expr.regex_match"
description = "text ~ pattern / text !~ pattern — regular-expression match (case-sensitive), jed's RE2-able subset (spec/design/regex.md, grammar.md §22b), NOT PostgreSQL-flavor-compatible. UNANCHORED (matches a substring; anchor with ^/$). Pattern surface: literals, . (any code point except newline), classes [...]/[^...], \\d \\w \\s + negations, anchors ^ $, alternation |, groups (...)/(?:...), quantifiers * + ? {n} {n,} {n,m} greedy + lazy, leftmost-first greedy semantics. Hand-written Pike VM (linear-time, no backtracking). text×text→boolean, NULL propagates, non-text 42804, malformed pattern 2201B. !~ is the AST-negated form. Code-point (not UTF-16) iteration"

[[capability]]
id = "expr.regex_imatch"
description = "text ~* pattern / text !~* pattern — case-insensitive regular-expression match. Same contract as expr.regex_match; both operands simple-lowercased first (the ILIKE mechanism, spec/design/collation.md §16) — ASCII baseline without a Unicode property bundle, full simple mappings with one. Builds on expr.regex_match"

[[capability]]
id = "expr.case"
description = "CASE expression (searched + simple forms): lazy first-match evaluation (later arms not evaluated — a sanctioned short-circuit exception, with expr.coalesce); searched WHEN must be boolean (42804); result-arm types unify to a common type (numeric promote; cross-family 42804; all-NULL → text); no match + no ELSE → NULL; output name ?column? (spec/design/grammar.md §23)"

[[capability]]
id = "expr.coalesce"
description = "COALESCE(a, b, …) — first non-NULL argument, NULL when all are NULL. Lazy left-to-right: evaluation stops at the first non-NULL, each evaluated argument evaluated exactly once, later arguments never (COALESCE(1, 1/0) is 1 — the second sanctioned short-circuit, with expr.case); at least one argument (empty is 42601); argument types unify exactly like CASE result arms (numeric promote; cross-family 42804; all-NULL → text); recognized only when COALESCE is immediately followed by ( so the word stays usable as a column name; output name coalesce (spec/design/grammar.md §51)"

[[capability]]
id = "expr.greatest_least"
description = "GREATEST(a, b, …) / LEAST(a, b, …) — the variadic maximum / minimum. NULL arguments are IGNORED (result is NULL only when every argument is NULL — GREATEST(1, NULL, 2) is 2); EAGER, not a short-circuit — every argument is evaluated so GREATEST(1, 1/0) traps 22012 (the contrast with expr.coalesce); at least one argument (empty is 42601, as are the DISTINCT/FILTER/VARIADIC/named-arg/OVER modifier forms — a distinct grammar node, not a catalog function, so it also carries no EXECUTE privilege); argument types unify to one common ORDERABLE type like CASE result arms (numeric promote, float widths widen to f64, other families structural), so a non-orderable json/jsonpath is 42883 and a cross-family or structurally-mismatched pair is 42804; the winner is chosen by that type's total order — the same order ORDER BY / MIN / MAX use (text under a derived collation), so the three never disagree; each comparison after the first non-NULL argument is metered its size-scaled work; recognized only when the keyword is immediately followed by ( so greatest / least stay usable as column names; output names greatest / least (spec/design/grammar.md §52)"

# Scalar functions (kind = "function", spec/design/functions.md §9) — named f(args) calls
# evaluated per row, valid anywhere an expression is (unlike aggregates). One capability per
# function so a core can land them independently.
[[capability]]
id = "func.sequence"
description = "nextval('s') / currval('s') sequence value functions (volatile, i64) — nextval advances a sequence and returns the new value (first call returns START, then +INCREMENT, bounded by MIN/MAXVALUE → 2200H or CYCLE wrap), making the statement a WRITE (25006 in a read-only txn) and TRANSACTIONALLY (rolls back — a documented PG divergence, sequences.md §5); currval returns the value nextval last produced IN THIS SESSION (55000 before the first nextval), a per-handle read. Missing sequence 42P01, NULL name propagates NULL; one sequence_advance cost unit per nextval (spec/design/functions.md §14, sequences.md §4)"

[[capability]]
id = "func.abs"
description = "abs(x) scalar function — abs(i16|i32|i64) → same int type (abs(INT_MIN) overflows, 22003); abs(numeric) → numeric; NULL propagates (spec/design/functions.md §9)"

[[capability]]
id = "func.round"
description = "round(x[, n]) scalar function — numeric/integer → numeric, half-away-from-zero to scale 0 or n places; integer overloads return numeric (PG round(5)); NULL propagates (spec/design/functions.md §9)"

[[capability]]
id = "func.casing"
description = "lower(text) / upper(text) — Unicode case folding (spec/design/collation.md §16), the text OVERLOAD of the range accessors (the resolver branches on the argument type). With no property bundle loaded they fold ASCII a–z/A–Z only and pass other code points through (the SQLite default, version-independent); with a bundle's property section loaded they fold via the full Unicode case mappings incl. SpecialCasing (ß→SS, a divergence from glibc's 1:1 — unit-tested, not oracle). text → text, NULL propagates; one operator_eval. Builds on types.text"

[[capability]]
id = "func.named_arguments"
description = "PostgreSQL named-argument notation f(name => value) + DEFAULT parameter values, exercised by make_interval(years,months,weeks,days,hours,mins,secs) — every parameter named and defaulting to 0. Positional, named, and mixed (positional-then-named) calls; a positional arg after a named one is 42601, an unknown name or a named arg on a nameless function is 42883; field overflow is 22008. The legacy ':=' spelling is rejected (42601 — a deliberate surface narrowing; PG accepts it). spec/design/functions.md §11"

[[capability]]
id = "func.make_timestamp"
description = "PostgreSQL timestamp constructors make_timestamp(year,month,mday,hour,min,sec) → timestamp and make_timestamptz(year,month,mday,hour,min,sec[,timezone]) → timestamptz, the make_interval siblings (spec/design/functions.md §11) — every parameter named (year/month/mday/hour/min integer, sec double precision) but NONE defaulted; callable positionally, by named notation, or mixed. A negative year is BC. Field validation traps 22008 (date/time field value out of range): year magnitude 1..999999 (no year zero), month 1..12, day valid for the month, hour 0..24 / sec 0..60 within a 24:00:00 day of time. make_timestamptz interprets the assembled wall clock in the SESSION zone (6-arg) or an explicit text timezone (7-arg, an unrecognized zone is 22023), charging one timezone cost unit beyond the call's operator_eval. NULL in any argument propagates; an unknown parameter name or too many arguments is 42883, a positional arg after a named one is 42601. Builds on func.named_arguments"

[[capability]]
id = "func.uuid_extract"
description = "PURE uuid inspectors (spec/design/functions.md §12), oracle-checked against PostgreSQL 18 — uuid_extract_version(uuid) → i16 (the version nibble) and uuid_extract_timestamp(uuid) → timestamptz (the embedded instant). Both gate on the RFC 4122 variant ((byte8 & 0xC0)==0x80) and return NULL off-variant (Microsoft GUIDs, the nil uuid); uuid_extract_timestamp returns the instant for VERSION 1 and 7 only (v7 = 48-bit ms; v1 = 60-bit Gregorian 100ns minus the 1582→1970 offset, truncated to micros) and NULL for every other version (v6 included, matching PG 18). NULL input propagates"

[[capability]]
id = "func.make_date"
description = "PostgreSQL's date constructor make_date(year, month, day) → date (spec/design/functions.md §11), the make_timestamp sibling — every parameter named (PG's exact year/month/day names), none defaulted; callable positionally, by named notation (make_date(year => 2024, month => 1, day => 15)), or mixed. All three are the integer family. A negative year is BC; year ZERO traps 22008 (no year zero — PG 'date field value out of range'), as does an invalid month / day-for-month or a day count beyond jed's finite i32 window (wider than PG's — spec/design/date.md §1). Built on the same days_from_civil calendar core as the date literal, so the two cannot drift. NULL in any argument propagates; an unknown parameter name or too many arguments is 42883, a positional arg after a named one 42601. IMMUTABLE — legal in an index expression, unlike the clock readers. Oracle-checked (suites/expr/make_date.test, postgres:18). Builds on func.named_arguments, types.date"

[[capability]]
id = "func.current_date"
description = "The SQL-standard niladic CURRENT_DATE → date (spec/design/functions.md §12, date.md §6): the STATEMENT clock's day in the SESSION zone — exactly the 'today' clock-relative literal as a function, sharing its STABLE once-per-statement clock read, its session-zone decomposition (one timezone cost unit beyond the call's operator_eval), and its un-indexability (42P17 in an index expression or predicate — the current_date name joins the non-immutable call blacklist). The parser desugars the bare keyword CURRENT_DATE (when not followed by a paren) to the current_date() catalog function, like CURRENT_TIMESTAMP → now(); the default column label is current_date. jed ALSO resolves the explicit call spelling current_date(), which PostgreSQL rejects as a syntax error (CURRENT_DATE is a reserved token there) — a documented jed-lenient divergence. NOT oracle-imported (the divergence, PG's differing wall clock, and PG's parse-time fold); the `# clock:` directive pins the statement clock (suites/expr/current_date.test). Builds on types.date_clock_literal, func.now"

[[capability]]
id = "func.date_part"
description = "date_part(field, source) → double precision (spec/design/timezones.md §9.2) — PostgreSQL's float8-returning EXTRACT twin over date / timestamp / timestamptz / interval (four overloads, resolved by the source family): the SAME field values as EXTRACT (the shared extract kernel, exact decimal), converted to f64 by the landed decimal→float conversion (one correctly-rounded parse — the `R` tolerant render tag applies to results). Unlike EXTRACT's syntactic field, `field` is a RUNTIME text value (a text column works), case-insensitive, validated per row AT EVALUATION like date_trunc's unit (so zero rows raise nothing): an unrecognized unit is 22023 ('unit X not recognized'), a recognized-but-unsupported unit for the source type 0A000 ('unit X not supported for type Y'). The (field, date) overload follows PG's own catalog definition — the date WIDENS TO MIDNIGHT and the TIMESTAMP field matrix applies (PG ships date_part(text, date) as a SQL wrapper over ::timestamp) — so date_part('hour', a_date) is 0 where EXTRACT(hour FROM a_date) is 0A000, and the 0A000 message names the WIDENED type, both matching PG exactly; a date beyond the timestamp range traps 22008 on the widen. `julian` stays the deferred 0A000 EXTRACT carries (PG computes it — the same documented divergence, per-core tested, kept out of the oracle corpus). The timestamptz overload decomposes in the SESSION zone (volatility stable, matching PG; EXTRACT's exact selective timezone charge — `epoch` and ±infinity skip the zone); the date/timestamp/interval overloads are immutable. NULL (field or source) propagates. Oracle-checked (suites/expr/date_part.test, postgres:18). Builds on expr.extract, types.f64"

[[capability]]
id = "func.uuid_generate"
description = "VOLATILE uuid generators on the host-injected entropy+clock seam (spec/design/entropy.md) — uuidv4() (random) and uuidv7([shift interval]) (48-bit ms timestamp + a per-statement monotonic counter in rand_a + random rand_b; an out-of-48-bit/pre-epoch ms traps 22008; the optional interval shifts the embedded instant via calendar-aware timestamptz arithmetic). A spec'd byte-exact PRNG (splitmix64) makes the seeded path cross-core identical; the `# seed:` and `# clock:` corpus directives inject a fixed seed + statement clock so the output is exact and deterministic (production reads OS entropy + the wall clock). NOT oracle-imported (PG's entropy differs); cost is one operator_eval per call, independent of the random values. Builds on types.uuid"

[[capability]]
id = "func.now"
description = "STABLE current-time function now() [alias: the bare keyword current_timestamp] → timestamptz, on the host-injected clock seam (spec/design/entropy.md §5, determinism.md §5). Statement-stable: the clock is read ONCE per statement and reused for every row (PG's now() semantics), so a statement's time cannot vary row-to-row. current_timestamp is parser sugar for now() (same value, same `now` column label, same cost). The `# clock:` / `# clock_advance:` corpus directives inject a fixed / advancing clock so output is exact and deterministic cross-core; production reads the wall clock. NOT oracle-imported (PG's wall clock differs); cost is one operator_eval per call, independent of the clock value. Builds on types.timestamptz"

[[capability]]
id = "func.clock_timestamp"
description = "VOLATILE current-time function clock_timestamp() → timestamptz, on the host-injected clock seam (spec/design/entropy.md §5, determinism.md §5). Per-call: reads the clock on EVERY evaluation (distinct from the statement-stable now()), so it may advance within a statement. The `# clock_advance: start,step` corpus directive injects an advancing clock (one increment per read, in expression-evaluation order) so the per-call reads are deterministic and distinguishable from now() cross-core; production reads the wall clock per call. NOT oracle-imported (PG's wall clock differs); cost is one operator_eval per call. Builds on types.timestamptz"

[[capability]]
id = "error.division_by_zero"
description = "Integer division / modulo by zero is defined and traps SQLSTATE 22012"

# Resource accounting (CLAUDE.md §13) — orthogonal to the SQL feature levels, so it is
# not bundled into a profile. A core declares it once its harness can assert the
# deterministic, cross-core-identical query cost (the `# cost:` directive).
[[capability]]
id = "resource.cost_metering"
description = "Deterministic, cross-core-identical query cost accounting (CLAUDE.md §13)"

[[capability]]
id = "resource.cost_limit"
description = "Caller-set execution-cost ceiling (`max_cost`) with a deterministic, cross-core-identical abort (54P01) the instant accrued cost reaches it (CLAUDE.md §13; spec/design/cost.md §6). The safety gate for untrusted, user-supplied queries; the `# max_cost: N` corpus directive runs the next record under a ceiling of N. Builds on resource.cost_metering."

[[capability]]
id = "resource.depth_limit"
description = "Fixed maximum expression / subquery / set-operation nesting depth (MAX_EXPR_DEPTH = 256), checked in the parser and aborting with 54001 (statement_too_complex) (CLAUDE.md §13; spec/design/cost.md §7). The SECOND untrusted-query safety gate: it guards the native call stack, which the cost ceiling cannot — deeply-nested input overflows the recursive parser/resolve/eval walks BEFORE any cost is metered. The limit is a deterministic, cross-core-identical constant (a documented divergence from PG's runtime stack probe), so the same statement is accepted or rejected identically in every core; not oracle-checked."

[[capability]]
id = "resource.sql_length_limit"
description = "Per-handle maximum input SQL length in bytes (`max_sql_length`, default 1 MiB, `0` ⇒ unlimited), checked at the handle's parse entry and aborting with 54000 (program_limit_exceeded) BEFORE lexing (CLAUDE.md §13; spec/design/cost.md §7, api.md §8). The input-size sibling of resource.depth_limit: both bound the parse before any cost is metered (the 54P01 cost ceiling cannot catch parse-time blowup), and together they bound the parse tree in both dimensions — depth (54001) and breadth/total size (54000). Because jed is single-statement-per-call and nothing desugars super-linearly, the input-byte cap transitively bounds the parse-tree node count too. The `# max_sql_length: N` corpus directive runs the next record under a (small) cap. jed-specific (PG has no fixed query-length limit), so not oracle-checked; the cap is a deterministic, cross-core-identical setting."

[[capability]]
id = "resource.identifier_length_limit"
description = "Fixed maximum identifier length (MAX_IDENTIFIER_LENGTH = 63 bytes), checked at the lexer's identifier-token production and aborting with 42622 (name_too_long) on every parse path (CLAUDE.md §13; spec/design/cost.md §7). Bounds an unbounded table/column/type/alias/function name — which would otherwise consume O(input) memory and land verbatim in the on-disk catalog and keys. Matches PostgreSQL's NAMEDATALEN−1 boundary but ERRORS where PG silently truncates (a documented PG divergence: jed has no notices, and silent truncation could collide two distinct names). Identifiers are ASCII-only (grammar.md §3), so bytes = characters; the limit is a deterministic, cross-core-identical constant, so not oracle-checked."

[[capability]]
id = "resource.composite_depth_limit"
description = "Fixed maximum composite-type nesting depth (MAX_COMPOSITE_DEPTH = 32), enforced at the two producers of catalog types: a CREATE TYPE whose result would nest deeper than the limit aborts with 54001 (statement_too_complex), and a loaded catalog that exceeds it is rejected as corrupt with XX001 (data_corrupted) (CLAUDE.md §13; spec/design/cost.md §7b, composite.md §3). The third native-stack untrusted-query gate, completing resource.depth_limit's coverage: a chain of cheap CREATE TYPEs each nesting the previous (`a`, `b AS (x a)`, …) builds unbounded depth across MANY statements — which neither the per-statement input-size cap (resource.sql_length_limit) nor the parser nesting counter (resource.depth_limit) sees, because the depth is a property of the catalog graph, not any one statement's AST. Bounding it at the producer makes every derived recursive walk (value codec, comparator, record_out/record_in, resolve_col_type) transitively stack-safe. An array field counts as its element (array levels are not composite levels — composite_ref looks through one array level). A deterministic, cross-core-identical constant (a documented divergence from PG, which bounds composite nesting only by a runtime stack probe), so not oracle-checked. Builds on types.composite."

[[capability]]
id = "resource.regex_program_limit"
description = "Fixed maximum regex compiled-program size (MAX_REGEX_PROGRAM = 32768 NFA instructions), enforced at the pattern compiler: a well-formed pattern whose compiled program would exceed the cap — chiefly via bounded-repetition {n,m} unroll (`(a{1000}){1000}`) — aborts with 54001 (statement_too_complex), checked PROJECTIVELY before the oversized program is allocated (CLAUDE.md §13; spec/design/cost.md §7c, regex.md §6). The fourth native-stack/allocation-bound untrusted-query gate, the regex sibling of resource.composite_depth_limit: it protects the UNLIMITED handle (max_cost = 0) where the regex_compile cost ceiling cannot reach. A MALFORMED pattern is 2201B instead (invalid_regular_expression). A deterministic, cross-core-identical constant (jed-specific — PG bounds regex size differently), so not oracle-checked. Builds on expr.regex_match."

[[capability]]
id = "resource.temp_budget"
description = "Temporary-table storage budget (spec/design/temp-tables.md §7) — the §13 gate on RETAINED temp bytes, the hazard no cost ceiling covers (max_cost bounds work per statement, lifetime_max_cost across statements; neither bounds bytes a temp table HOLDS between cheap statements). `temp_buffers` (a per-session byte budget, 0 ⇒ unlimited) bounds a session's total temp footprint; an over-budget temp write aborts 54P03 (temp_storage_limit_exceeded). Measured in BYTE-IDENTICAL on-disk record bytes (record_size, summed over every temp table + index store — NOT the per-core work_mem spill estimator), checked per-statement, so the abort point is a pure function of (operations, budget), identical across cores (§8). The over-budget write is staged, so the abort rolls it back (nothing commits); the within-statement bound stays max_cost. The `# temp_buffers: N` directive sets the per-record budget (like `# max_cost:`). jed-specific (PostgreSQL bounds temp storage only via nondeterministic OS limits), so cross-core-checked, not oracle-checked. Builds on ddl.temp_table."

[[capability]]
id = "resource.pure_builtins"
description = "The built-in function/operator surface is pure and side-effect-free, and the grammar exposes no host-reaching statement (CLAUDE.md §13 guarantee #2; spec/design/functions.md §13). The THIRD untrusted-query safety pillar: the first two BOUND a query (cost ceiling, nesting depth), this one bounds what it can REACH. No built-in touches the filesystem, network, process, or environment, and none adds nondeterminism outside the host-injected entropy/clock seam (uuidv4/uuidv7, now()/clock_timestamp()). Enforced as absence: a host-reaching function call is 42883 (undefined_function) and a host-reaching statement keyword is 42601 (syntax_error). A documented divergence from PostgreSQL (which provides pg_read_file/COPY/pg_sleep/current_setting/...), so not oracle-checked; pinned by suites/resource/no_escape_hatch.test."

# Session authorization (spec/design/session.md §5.3, the bucket-A safety envelope) — the
# GRANT/REVOKE privilege model, the §13 untrusted-query envelope made concrete. CLAUDE.md §3 deletes
# in-database users/roles, so the host configures the envelope on the session and the engine
# enforces it (42501) at name resolution. jed-specific (the envelope is host-configured, not
# reachable as SQL roles), so cross-core-checked, NOT PostgreSQL-oracle-checked. The four
# `# default_privileges:` / `# grant:` / `# revoke:` / `# allow_ddl:` corpus directives configure
# the session for the next record (like `# seed:` / `# max_cost:`).
[[capability]]
id = "session.privileges"
description = "Per-object GRANT/REVOKE authorization — per-table SELECT/INSERT/UPDATE/DELETE and per-function EXECUTE, enforced at name resolution with 42501 (insufficient_privilege) once a name resolves to an existing catalog object (a missing object stays 42P01) (spec/design/session.md §5.3). Three layers compose into the effective set for OP on object X: the default_privileges granted to every table (the GRANT … ON ALL TABLES default; a read-only session is {SELECT}), per-object grant (additions), and per-object revoke (removals) — OP ∈ (default ∪ grant[X]) \\ revoke[X], with revoke winning (deny is order-independent). A statement needs SELECT on every table it reads (FROM/JOIN, subqueries, an INSERT … SELECT source, an UPDATE/DELETE WHERE / RHS / RETURNING) and INSERT/UPDATE/DELETE on its write target (a bare INSERT … VALUES needs only INSERT; UPDATE t … WHERE needs UPDATE and SELECT), plus EXECUTE on every named function called (built-in operators are not gated). The `# default_privileges:` / `# grant:` / `# revoke:` directives configure the session for the next record. jed-specific (host-configured envelope, no SQL role catalog), so cross-core-checked, not oracle-checked. v1 narrowings: base-table + named-function names only (no per-column GRANT); function EXECUTE defaults on (the deny-list shape) — a default-off function allow-list is deferred."

[[capability]]
id = "session.allow_ddl"
description = "The single DDL gate — a session capability `allow_ddl` (default on) governing CREATE/DROP/ALTER of tables, indexes, types, and sequences; a denied schema change is 42501 (spec/design/session.md §5.3). jed has no schema/owner model (CLAUDE.md §3), so all DDL folds under one boolean (a per-object CREATE/ownership privilege is a deferred follow-on). The `# allow_ddl: on|off` directive sets it for the next record. jed-specific (host-configured), so cross-core-checked, not oracle-checked. Builds on session.privileges."

[[capability]]
id = "session.allow_temp_ddl"
description = "The temp-scoped split of the DDL gate (spec/design/temp-tables.md §5) — `allow_temp_ddl` governs CREATE/DROP of a SESSION-LOCAL temporary table, independent of `allow_ddl` (which now scopes to persistent DDL). The split lets a host serve an untrusted session bounded scratch tables (allow_ddl off + allow_temp_ddl on) while withholding persistent schema changes; the new gate default-inherits allow_ddl's value, so existing callers are unaffected. CREATE TEMP is gated statically; DROP of a temp table is gated by resolving the name. A denied temp DDL is 42501. The `# allow_temp_ddl: on|off` directive sets it for the next record. jed-specific (host-configured), so cross-core-checked, not oracle-checked. Builds on session.allow_ddl and ddl.temp_table."

# Per-session cumulative cost budget (spec/design/session.md §5.4). Sibling to resource.cost_limit:
# where `max_cost` bounds ONE statement (54P01), `lifetime_max_cost` bounds the whole SESSION (54P02).
# The cumulative cost is session state that builds across records on the one Database the harness runs
# a file against, so a sticky `# lifetime_max_cost: N` directive + an ordered statement sequence pins
# the abort cross-core (the per-record `# cost:` cannot express a cumulative budget).
[[capability]]
id = "session.lifetime_cost"
description = "Per-session cumulative cost budget — `lifetime_max_cost` bounds the SESSION's running cost total, aborting the in-flight statement with 54P02 (session_cost_limit_exceeded) the instant the cumulative reaches the budget (spec/design/session.md §5.4). Sibling to resource.cost_limit's per-statement `max_cost`/54P01; a statement aborts at whichever ceiling it reaches first. The budget is a hard, monotonic allowance: an aborted statement's partial cost still counts, and once it is spent every further statement is rejected 54P02 at admission (it cannot accrue). The cumulative is session state, not snapshot state, so it does NOT roll back with a transaction. The sticky `# lifetime_max_cost: N` directive sets the budget for the rest of the file (the cumulative builds across records on the one Database). jed-specific (PostgreSQL has no execution-cost budget), so cross-core-checked, not oracle-checked. Builds on resource.cost_metering."

# Session variables (spec/design/session.md §6.1) — PostgreSQL's GUC model scoped to the session: a
# string→string map the host configures (session.set_var / reset_var / var) and SQL reads with
# current_setting('name'[, missing_ok]). The session is the "fourth host seam" (§6), and the values
# feed query RESULTS, so they are deterministic and cross-core. v1 is the host API + current_setting
# read only; the SQL SET/RESET/SHOW grammar, set_config(), and SET LOCAL are deferred follow-ons.
[[capability]]
id = "session.variables"
description = "Session variables — PostgreSQL's GUC model scoped to the session: a string→string map the host sets through the API (session.set_var / reset_var / var) and SQL reads with current_setting('name'[, missing_ok]) (spec/design/session.md §6.1). A custom variable is namespaced like PG (a dotted name, e.g. myapp.tenant); setting a non-dotted name is 42704 (no built-in setting reaches this map in v1 — the time_zone built-in is a separate slice). current_setting on an unset name is 42704 (unrecognized configuration parameter) unless the two-arg overload passes missing_ok = true, which returns NULL; current_setting(NULL) is NULL (the function is STABLE, null-propagating). Variables are session state, not snapshot state, so they do NOT roll back with a transaction (PG SET SESSION; SET LOCAL is deferred). The `# set: name=value, …` directive configures the session for the next record (reset after, like `# seed:` / `# grant:`). The configuration mechanism is jed's host API (not reproducible as the same SQL against PG), so cross-core-checked, not oracle-checked. v1 narrowing: host API + current_setting only — the SQL SET/RESET/SHOW grammar, set_config(), and transaction-scoped SET LOCAL are deferred follow-ons."

# Transaction control (Phase 5, spec/design/transactions.md §4). The SQL surface
# BEGIN/COMMIT/ROLLBACK over the handle's single current transaction; tested by deterministic,
# single-handle visibility sequences (the harness runs a whole .test file against one Database).
[[capability]]
id = "txn.explicit"
description = "Explicit transaction blocks — BEGIN [TRANSACTION|WORK] / START TRANSACTION ... COMMIT|END / ROLLBACK. A block's INSERT/UPDATE/DELETE and DDL CREATE/DROP commit atomically or roll back together (read-your-writes within the block); a nested BEGIN is 25001; a COMMIT/ROLLBACK with no open block is a lenient no-op success (no 25P01). spec/design/grammar.md §27"

[[capability]]
id = "txn.read_only"
description = "Transaction access modes — BEGIN READ ONLY / READ WRITE (default READ WRITE). A write statement in a READ ONLY block is 25006 (read_only_sql_transaction); ROLLBACK clears it and autocommit resumes. spec/design/transactions.md §4.3"

[[capability]]
id = "txn.failed_state"
description = "Failed-block poisoning — a statement error inside an explicit block aborts the transaction; every later statement but ROLLBACK/COMMIT is 25P02 (in_failed_sql_transaction), and COMMIT of a failed block acts as ROLLBACK (PostgreSQL). The whole working set is discarded, including statements that succeeded before the error. spec/design/transactions.md §6"

# Shared-handle concurrency (Phase 5 P5.3b, spec/design/transactions.md §8/§10). Tested by the
# deterministic schedule format — a `# format: concurrency` .test file under suites/concurrency/,
# an explicit total order over named read/write sessions (spec/design/concurrency-testing.md §4).
# A core that has not implemented the shared handle declares none of these, so its harness skips
# such files before parsing (the capability gate); the format never reaches the sequential runner.
[[capability]]
id = "txn.shared"
description = "The thread/goroutine-safe SharedDb handle — concurrent readers running in parallel with a single writer, the writer publishing the committed snapshot atomically (CLAUDE.md §3, spec/design/transactions.md §10). The schedule format opens named read/write sessions over one SharedDb and runs a deterministic total order of operations against them (spec/design/concurrency-testing.md §4)."

[[capability]]
id = "txn.read_handle"
description = "A ReadHandle pins one committed snapshot at read() and serves every read from it for the handle's life — snapshot isolation, never blocked by and never blocking a writer; a write through it is 25006 (without poisoning the handle); close() deregisters it. spec/design/transactions.md §10"

[[capability]]
id = "txn.watermark"
description = "The reader-liveness watermark — oldest_live_txid is the minimum version any still-open reader pins, or the committed version when none is live (the Phase-6 free-list reclamation gate). A pinned reader holds it back; closing the reader lets it advance. spec/design/transactions.md §8"

[[capability]]
id = "txn.gate_blocking"
description = "The write-gate `blocks` annotation (Layer 2) — `open <sid> write blocks` asserts the single-writer gate is currently held, so the writer-open is queued rather than run (calling write() now would block the runner) and logically completes the instant the holding writer commits/rolls back: the equivalent serial order. Deterministic on every core (a single-threaded core queues the open; it never needs to truly block); the threaded cores additionally verify real blocking under the race detector. At most one writer may be blocked at a time (the single-writer model). spec/design/concurrency-testing.md §5"

[[capability]]
id = "expr.collate"
description = "The COLLATE expression operator + ORDER BY … COLLATE over a vendored collation (collation slice 1c + the reference-only pivot, spec/design/collation.md §2/§9/§14). A collation is VENDORED into the binary; the `# load-collation: name = fixture` corpus directive declares which vendored collation a test needs (a no-op when vendored, as the dev collations are — it compiles the fixture only as a fallback for a not-yet-vendored name). `expr COLLATE \"name\"` and `ORDER BY col COLLATE \"name\"` then order text by that collation's UCA sort key in the ordering comparisons (< <= > >=) — `=`/`<>` stay byte-equality (deterministic-collation equality is byte-identity). `\"C\"` is the built-in byte/code-point order. Errors: two different explicit collations conflict (42P21), a name neither vendored nor referenced is 42704, COLLATE on a non-text type is 42804. Charged by the `collate` cost unit (per code point of each ordering-comparison operand)."

[[capability]]
id = "expr.at_time_zone"
description = "The AT TIME ZONE operator (and the timezone(zone, value) function it desugars to) + host-loaded IANA time-zone data (spec/design/timezones.md §6, grammar.md §49, spec/tz/README.md). `value AT TIME ZONE zone` converts between an instant and a local wall clock: `timestamptz AT TIME ZONE zone` -> timestamp (render the UTC instant as local in the zone) and `timestamp AT TIME ZONE zone` -> timestamptz (interpret the wall clock as in the zone). A zone is provided by a host-loaded JTZ bundle of RFC 8536 TZif (the `# load-timezone: [zone]` corpus directive loads jed's pinned spec/tz/fixtures/tzdata.jtz, exactly as a production host would); `UTC` and fixed `±HH:MM` offsets are built in (the fixed offset uses the POSIX sign — '+05:30' means UTC-5:30, matching PG). NULL propagates, ±infinity passes through, an unknown zone is 22023, a non-text zone is 42883 (PG resolves via function overload). Charged by the `timezone` cost unit (once per conversion). No on-disk change — timestamptz is a UTC i64, so its order is tz-independent (timezones.md §2)."

[[capability]]
id = "session.timezone"
description = "The session time-zone slot (spec/design/session.md §6.2, timezones.md §9.4): the built-in `time_zone` setting (default `UTC`) — the zone a `timestamptz` is decomposed in by date_trunc / EXTRACT / the cross-family datetime casts. Set through the host API (set_time_zone / SessionOptions::time_zone), validated against the loaded set (`UTC` + fixed `±HH:MM` offsets always; a named IANA zone when a loaded JTZ bundle provides it, else 22023). The `# timezone: <zone>` corpus directive sets it for the next record (reset to UTC after, like `# set:`). No SQL `SET TIME ZONE` grammar yet; the slot drives computation, not yet timestamptz rendering (which stays UTC — §9.5). Session state (no storage effect). The configuration is jed's host API (not the same SQL on PG), so cross-core-checked; the resulting query is oracle-checked under a matching `SET TIME ZONE` on the oracle."

[[capability]]
id = "expr.date_trunc"
description = "date_trunc(unit, source[, zone]) (spec/design/timezones.md §9.1, grammar.md §50): truncate a datetime down to `unit` (microseconds/milliseconds/second/minute/hour/day/week/month/quarter/year/decade/century/millennium, case-insensitive; an unrecognized unit is 22023 at eval). 2-arg over timestamp -> timestamp, timestamptz -> timestamptz (truncated in the SESSION zone), interval -> interval (no `week`, 0A000); 3-arg date_trunc(unit, timestamptz, zone) -> timestamptz truncates in the explicit zone. A `date` argument is 42883 (no implicit date->timestamp cast). ±infinity passes through. The session/explicit-zone forms charge the `timezone` cost unit; the zone-free forms only `operator_eval`."

[[capability]]
id = "expr.extract"
description = "EXTRACT(field FROM source) (spec/design/timezones.md §9.2, grammar.md §50): the requested datetime field as `numeric` (PG 14+). The field is syntactic (identifier or string literal, case-insensitive), validated at resolve. Source is timestamp / timestamptz / date / interval (else 42883); the field-validity matrix matches PG (an unsupported field for the type is 0A000, an unrecognized field is 22023). For a timestamptz source every field is computed in the SESSION zone except `epoch` (the instant) and the `timezone*` fields (the session offset). `julian` is a deferred field (0A000, a documented divergence). `date_part` is deferred (it returns double precision, and jed has no float type). The session-zone fields charge `timezone`."

[[capability]]
id = "cast.datetime"
description = "The cross-family timestamp/timestamptz/date casts in a zone (spec/design/timezones.md §9.3, spec/types/casts.toml): the six explicit (timestamp, timestamptz, date) cast pairs. Casts crossing the timestamptz boundary (timestamp<->timestamptz, timestamptz->date, date->timestamptz) consult the SESSION zone and charge `timezone`; timestamp<->date is zone-free calendar arithmetic. ±infinity and NULL pass through. The text<->datetime casts stay deferred (a string still adapts to a datetime context by literal adaptation)."

[[capability]]
id = "harness.fixture_open"
description = "The conformance harness can run a .test file against a PRE-BUILT on-disk database image named by a file-level `# fixture: <spec-relative-path>` directive, instead of the default fresh in-memory database. This lets the corpus exercise persisted state that SQL cannot construct — chiefly the collation version-SKEW read-safety regression (spec/design/collation.md §12/§14): a file whose collation pin (e.g. a bogus 9999.0.0) differs from the loaded JUCD bundle, carrying a secondary index whose stored keys are WRONG for the loaded collation. The harness loads the production bundle, then reconstructs the database in memory (`from_image` / `LoadDatabase` / `loadDatabase`) read-WRITE, so reads run and a write hits the real XX002 skew guard. A capability rather than always-on, so a core whose harness has not yet implemented `# fixture:` declares it unsupported and skips the file cleanly (instead of mis-parsing the directive as a comment and running against an empty DB)."

[[capability]]
id = "harness.attach"
description = "The conformance harness can attach a fresh, empty READ-WRITE in-memory database to the running handle via a file-level `# attach: <name>` directive (spec/design/attached-databases.md §6), before the file's records run — so the corpus can `CREATE TABLE <name>.t`, populate it, and JOIN across attachments without a host-API call (attaching is host-API, not SQL). An ACTION applied to the Database, visible to every session over it. In-memory attachments cannot survive the disk-mode reopen, so an # attach: file is # skip: disk. A capability rather than always-on, so a core whose harness has not yet wired the directive declares it unsupported and skips the file cleanly. The read-only-with-data + detach-in-use + attach/detach lifecycle live in per-core host-API unit tests (§11), not the corpus. Pairs with attach.in_memory."

[[capability]]
id = "harness.upgrade_collations"
description = "The conformance harness can run the COLLATION UPGRADE migration on the running database via a file-level `# upgrade-collations:` directive — the privileged host op `db.upgrade_collations()` (spec/design/collation.md §12). It rebuilds every collated key stored under a version-SKEWED collation against the loaded JUCD bundle and re-pins the stamp, clearing the skew so the affected tables are read-write again and their collated indexes regain pushdown. Paired with `# fixture:` it lets a shared corpus test drive the full skew→migrate→writable arc on a pre-built skewed image (which SQL cannot construct): assert a write is XX002 (still skewed), `# upgrade-collations:`, then assert the same write succeeds and a query is served correctly by the rebuilt index. A capability rather than always-on, so a core whose harness has not yet wired the directive declares it unsupported and skips the file cleanly."

[[capability]]
id = "ddl.collate_column"
description = "A per-column COLLATE clause in CREATE TABLE (`name text COLLATE \"en-US\"`) — collation slice 1d, spec/design/collation.md §1/§5. The column's effective collation is frozen at CREATE TABLE (text-only, else 42804; the name must be loaded or \"C\", else 42704). A column reference's IMPLICIT collation in the derivation: `ORDER BY name` / `name < other` use the column's collation with no explicit COLLATE. Two different IMPLICIT collations in one comparison (C counts as a distinct implicit collation) with no explicit COLLATE to break the tie is 42P22 (indeterminate_collation), resolved by an explicit COLLATE. Persisted as column flag bit6 + a trailing name (format_version 17 — verified by the on-disk goldens, not the corpus)."

[[capability]]
id = "introspect.tables"
description = "The jed_tables catalog relation (spec/design/introspection.md §5, slice I1): a read-only COMPUTED relation — one row per USER table (column: `name text NOT NULL`, the canonical CREATE TABLE-spelled name) — resolved like any table in EVERY database's relation namespace and scoped by the existing qualifier (unqualified = main, `temp.jed_tables`, `<attachment>.jed_tables`; an unknown qualifier is 42P01). Rows are derived at execution from the pinned catalog snapshot of the qualified database: no storage, no format_version change, files stay self-describing. Resolution order: a statement-local CTE shadows it (PG-matching, oracle-checked); it is checked BEFORE the user catalog (post-I0 the reservation makes a collision impossible; a legacy user relation of the same name becomes unreachable). Self-excluding (catalog relations list user objects only). A FROM alias renames the RELATION, never its columns (these are relations, not functions — no single-column function-alias rule). Privileges: gated exactly like a user table — per-table SELECT on its own name under the session envelope (42501). Read-only: a DML/CREATE INDEX target naming it is 42809 `cannot modify system relation`, DROP TABLE is 42809 `cannot drop system relation` (IF EXISTS does not suppress — a kind rejection, not a missing name), checked by name before qualifier validation; CREATE of any jed_-prefixed name stays 42939 (the I0 reservation). Cost: one `generated_row` per produced row, charged at the source under the meter guard; ZERO page_read / storage_row_read (the catalog is resident by construction); excluded from every scan fast path (no index pushdown, no PK order). EXPLAIN renders `Catalog Scan jed_tables (db=<scope>)`. jed-specific (PostgreSQL has no jed_ catalog), so cross-core-checked, NOT oracle-checked."

[[capability]]
id = "introspect.columns"
description = "The jed_columns catalog relation (spec/design/introspection.md §5, slice I1): one row per column of every USER table of the qualified database — columns `table_name text NOT NULL`, `name text NOT NULL`, `ordinal i32 NOT NULL` (1-based, CREATE TABLE order), `type text NOT NULL` (the CANONICAL type text — a compatibility surface: the scalar's canonical name with the typmod applied at the leaf (varchar(10), decimal(8,2)), a composite's name as created, a range's canonical id (i32range, numrange, …), `[]` appended for an array (typmod applies to the element: varchar(5)[])), `not_null boolean NOT NULL` (declared NOT NULL or PRIMARY KEY member), `pk_ordinal i32` (1-based position in the PRIMARY KEY in KEY order — which may differ from declaration order; NULL for a non-member). Growth is by ADDING columns, so consumers select columns by name, never `SELECT *` positionally. Resolution / scoping / privileges / read-only rejection / cost model identical to introspect.tables (same model, same slice). jed-specific, cross-core-checked, NOT oracle-checked."

[[capability]]
id = "introspect.indexes"
description = "The jed_indexes catalog relation (spec/design/introspection.md §5.1, slice I2): one row per SECONDARY INDEX of every USER table of the qualified database — columns `name text NOT NULL` (relation-namespace index name), `table_name text NOT NULL` (canonical owning table), `columns text[] NOT NULL` (the indexed column names in index-key order, duplicates included), `is_unique boolean NOT NULL` (the catalog unique flag), `method text NOT NULL` ('btree' | 'gin' | 'gist'). Lists every entry in the table's index list — a plain CREATE INDEX, a CREATE UNIQUE INDEX, the unique index backing a UNIQUE constraint, and the GiST index backing an EXCLUDE constraint (a constraint-backing index therefore appears in both jed_indexes and jed_constraints under the same name — the join key). The PRIMARY KEY owns no index object (not persisted) so it is NOT a row here — it is surfaced by jed_columns.pk_ordinal. Same computed-relation model as introspect.tables (resolution / qualifier scoping / privileges / 42809 read-only / one generated_row per row + zero page_read / EXPLAIN Catalog Scan). jed-specific, cross-core-checked, NOT oracle-checked."

[[capability]]
id = "introspect.constraints"
description = "The jed_constraints catalog relation (spec/design/introspection.md §5.1, slice I2): one row per CHECK / UNIQUE / FOREIGN KEY / EXCLUDE constraint of every USER table of the qualified database — columns `name text NOT NULL`, `table_name text NOT NULL`, `type text NOT NULL` ('check' | 'unique' | 'foreign_key' | 'exclude'), `columns text[]` (member/local column names — UNIQUE members, FK local columns, or EXCLUDE columns, in constraint order; NULL for a CHECK), `expression text` (the persisted canonical CHECK expression text, constraints.md §4.5 — cross-core byte-identical; NULL otherwise), `ref_table text` (FK referenced parent table; NULL otherwise), `ref_columns text[]` (FK referenced parent column names in list order; NULL otherwise). Covers those four kinds ONLY — PRIMARY KEY and NOT NULL own no named object and are described by jed_columns. A jed UNIQUE constraint IS its backing unique b-tree index (constraints.md §5, so the catalog cannot distinguish a UNIQUE table constraint from a bare CREATE UNIQUE INDEX), so type='unique' lists every unique index. Generation order: per table by a fixed KIND order (check, unique, foreign_key, exclude), each already in ascending lowercased-name order. Same computed-relation model as introspect.tables. jed-specific, cross-core-checked, NOT oracle-checked."

# --- profiles ----------------------------------------------------------------
# A named bundle of capabilities = a conformance level. `includes` (optional)
# inherits another profile's capabilities transitively, so profiles are cumulative.
# An implementation "meets" a profile iff its declared capability set is a superset
# of the profile's (transitive) capabilities.

[[profile]]
id = "core"
title = "The \"it's alive\" milestone — integer DDL/DML/SELECT (CLAUDE.md §11 step 5)"
capabilities = [
  "ddl.create_table",
  "ddl.primary_key",
  "dml.insert",
  "query.select",
  "query.where_eq",
  "query.is_null",
  "query.order_by",
  "types.i16",
  "types.i32",
  "types.i64",
  "null.three_valued",
  "error.overflow_trap",
]

[[profile]]
id = "mutation"
title = "core + row mutation (UPDATE / DELETE)"
includes = "core"
capabilities = ["dml.update", "dml.delete"]

[[profile]]
id = "casts"
title = "core + explicit CAST narrowing (spec/types/casts.toml)"
includes = "core"
capabilities = ["cast.explicit"]

[[profile]]
id = "comparison"
title = "core + cross-type comparison via the promotion tower (spec/types/compare.toml)"
includes = "core"
capabilities = ["query.comparison_order", "compare.promotion"]

[[profile]]
id = "expression"
title = "comparison + the general expression substrate (arithmetic, boolean, logical connectives)"
includes = "comparison"
capabilities = [
  "types.boolean",
  "expr.arithmetic",
  "expr.unary_minus",
  "expr.parens",
  "expr.precedence",
  "expr.comparison_value",
  "expr.not_equal",
  "query.logical_connectives",
  "query.is_distinct_from",
  "error.division_by_zero",
]

[[profile]]
id = "decimal"
title = "expression + the exact decimal / numeric type (numeric(p,s), comparison, casts, arithmetic)"
includes = "expression"
capabilities = ["types.decimal", "expr.decimal_arithmetic"]

[[profile]]
id = "functions"
title = "decimal + scalar functions abs / round (per-row, valid anywhere an expression is)"
includes = "decimal"
capabilities = [
  "func.abs",
  "func.round",
  "func.uuid_extract",
  "func.uuid_generate",
  "func.now",
  "func.clock_timestamp",
]

[[profile]]
id = "joins"
title = "decimal + multi-table FROM with INNER/CROSS JOIN, table aliases, and qualified columns (Phase 4)"
includes = "decimal"
capabilities = [
  "query.join_inner",
  "query.cross_join",
  "query.table_alias",
  "query.qualified_column",
]

[[profile]]
id = "outer_joins"
title = "joins + LEFT/RIGHT/FULL [OUTER] JOIN — unmatched rows NULL-extended on the absent side (Phase 4)"
includes = "joins"
capabilities = [
  "query.join_left",
  "query.join_right",
  "query.join_full",
]

[[profile]]
id = "constraints"
title = "outer_joins + the NOT NULL / DEFAULT (constant + expression) column constraints + INSERT column list / INSERT ... SELECT (spec/design/constraints.md)"
includes = "outer_joins"
capabilities = [
  "ddl.not_null",
  "ddl.column_default",
  "ddl.column_default_expr",
  "dml.insert_column_list",
  "dml.insert_default_values",
  "dml.insert_select",
  "dml.update",
  "dml.update_default",
]

[[profile]]
id = "aggregates"
title = "decimal + scalar aggregates COUNT/SUM/MIN/MAX/AVG over the whole table — no GROUP BY (Phase 2)"
includes = "decimal"
capabilities = [
  "query.aggregates",
]

[[profile]]
id = "grouping"
title = "aggregates + GROUP BY bucketing, the grouping-error rule, and ORDER BY over grouping keys (Phase 2)"
includes = "aggregates"
capabilities = [
  "query.group_by",
]

[[profile]]
id = "having"
title = "grouping + HAVING — a boolean filter over grouped rows, after aggregation, before ORDER BY (Phase 2)"
includes = "grouping"
capabilities = [
  "query.having",
]

[[profile]]
id = "predicates"
title = "decimal + the predicate forms IN / BETWEEN / LIKE / CASE (Phase 2, spec/design/grammar.md §20-§23)"
includes = "decimal"
capabilities = [
  "expr.in_list",
  "expr.between",
  "expr.like",
  "expr.case",
]

[[profile]]
id = "timestamps"
title = "outer_joins + the datetime types (timestamp / timestamptz, instant model, no time zone db)"
includes = "outer_joins"
capabilities = [
  "types.timestamp",
  "types.timestamptz",
]

[[profile]]
id = "set_operations"
title = "decimal + set operations UNION/INTERSECT/EXCEPT (each [ALL]) with PG precedence, column-type unification, and a trailing ORDER BY by output name (Phase 4, spec/design/grammar.md §25)"
includes = "decimal"
capabilities = [
  "query.union",
  "query.intersect",
  "query.except",
]

[[profile]]
id = "transactions"
title = "mutation + explicit transactions: BEGIN/COMMIT/ROLLBACK, READ ONLY/READ WRITE access modes, and failed-block poisoning (Phase 5, spec/design/transactions.md §4)"
includes = "mutation"
capabilities = [
  "ddl.drop_table",
  "txn.explicit",
  "txn.read_only",
  "txn.failed_state",
]

[[profile]]
id = "subqueries"
title = "having + joins + subqueries: scalar (SELECT ...), x [NOT] IN (SELECT ...), [NOT] EXISTS (SELECT ...), both uncorrelated (folded once at plan time) and correlated (planned once, re-executed per outer row, any depth); a $N inside is typed by an inner context (uninferable -> 42P18); a correlated GROUP BY|ORDER BY key -> 0A000 (Phase 4, spec/design/grammar.md §26)"
includes = "having"
capabilities = [
  "query.join_inner",
  "query.table_alias",
  "query.qualified_column",
  "expr.in_list",
  "query.subquery_scalar",
  "query.subquery_in",
  "query.subquery_exists",
  "query.subquery_correlated",
  "query.subquery_quantified",
]

[[profile]]
id = "cte"
title = "subqueries + set operations + common table expressions: WITH [RECURSIVE] name [(cols)] AS [NOT] MATERIALIZED (query) [, ...] <query>, forward-only visibility, PG's hybrid inline-single / materialize-multi rule, recursive fixpoint (working-table) evaluation, and derived tables FROM (SELECT …) AS t (Phase 4, spec/design/cte.md, spec/design/recursive-cte.md, grammar.md §42)"
includes = "subqueries"
capabilities = [
  "query.cross_join",
  "query.union",
  "query.intersect",
  "query.except",
  "query.cte",
  "query.cte_recursive",
  "query.cte_data_modifying",
  "dml.with_clause",
  "query.derived_table",
  "query.values",
  "query.lateral",
]
