  "txn.read_only",
  "txn.failed_state",
]

[[profile]]
id = "subqueries"
title = "having + joins + subqueries: scalar (SELECT ...), x [NOT] IN (SELECT ...), [NOT] EXISTS (SELECT ...), both uncorrelated (folded once at plan time) and correlated (planned once, re-executed per outer row, any depth); a $N inside is typed by an inner context (uninferable -> 42P18); a correlated GROUP BY|ORDER BY key -> 0A000 (Phase 4, spec/design/grammar.md §26)"
includes = "having"
capabilities = [
  "query.join_inner",
  "query.table_alias",
  "query.qualified_column",
  "expr.in_list",
  "query.subquery_scalar",
  "query.subquery_in",
  "query.subquery_exists",
  "query.subquery_correlated",
]
