# Conformance manifest — CANONICAL DATA (CLAUDE.md §5, §7).
#
# The conformance taxonomy has THREE independent axes (see ../design/conformance.md):
#   1. suites/      — the directory tree; ORGANIZES tests by feature area.
#   2. capabilities — fine-grained features an implementation declares it supports.
#                     Each .test file declares the capabilities it needs via an
#                     in-band `# requires:` header line; a test runs for an impl iff
#                     the impl supports every capability the test requires.
#   3. profiles     — named, cumulative bundles of capabilities = the conformance
#                     LEVELS an implementation targets ("does impl X meet `core`?").
#
# This file defines axes 2 and 3 (axis 1 is the filesystem). TEST-TIME ONLY — the
# harness reads it; no shipped engine does. Validated by `rake verify`.

schema_version = 1

# --- capabilities ------------------------------------------------------------
# One feature an implementation may support, named with a dotted id. Add a
# capability only when some .test file actually requires it (the checker rejects
# orphans). Implementations declare the set they support; tests declare the set
# they require.

[[capability]]
id = "ddl.create_table"
description = "CREATE TABLE with typed columns"

[[capability]]
id = "ddl.primary_key"
description = "PRIMARY KEY column constraint (enables point lookup by key)"

[[capability]]
id = "ddl.composite_primary_key"
description = "Table-level PRIMARY KEY (a, b, …) constraint — a composite key over one or more columns in LIST order (any order — the order narrowing was lifted by the format-5 catalog reshape); key bytes are the members' concatenated encodings, uniqueness is over the whole tuple (23505), every member is implicitly NOT NULL; PG-matching DDL errors 42703/42701/42P16 (spec/design/constraints.md §3, grammar.md §28)"

[[capability]]
id = "ddl.secondary_index"
description = "CREATE INDEX [name] ON t (cols) / DROP INDEX name — non-unique secondary indexes: PG auto-naming (t_col_idx + suffixes), relation namespace shared with tables (42P07), validation order 42P01/42703/0A000/42P07, DROP errors 42704/42809; maintained on every write; the planner bounds a SELECT base-relation scan by a first-column equality (spec/design/indexes.md, grammar.md §30)"

[[capability]]
id = "ddl.unique"
description = "UNIQUE constraints + unique indexes — column-level and table-level [CONSTRAINT name] UNIQUE (cols) and CREATE UNIQUE INDEX, all backed by a unique secondary index: PG auto-naming (t_col_key + suffixes; an explicit CONSTRAINT name names the index), identical-list dedup/PK fold, NULLS DISTINCT enforcement at INSERT/UPDATE (23505 names the constraint; UPDATE validates the end state — a documented PG divergence), build-over-duplicates 23505; the v6 catalog persists a per-index unique flag (spec/design/constraints.md §5, indexes.md §8)"

[[capability]]
id = "ddl.gin_index"
description = "CREATE INDEX ... USING gin (col) — GIN inverted indexes, a second index KIND beside the ordered B-tree (spec/design/gin.md). This slice: the array_ops operator class over a single integer-element array column (i16[]/i32[]/i64[]), one entry per DISTINCT non-NULL element (entry = encode(elem) ‖ storage-key, empty payload; a whole-NULL/empty array yields no entries), maintained on every write; auto-naming/namespace/DROP reuse the ordinary index. Validation: unknown access method 42704, non-array column 42704 (no GIN operator class), UNIQUE gin 0A000; a non-integer element type / multi-column gin is 0A000 (deferred, PG builds them — oracle overrides). Persisted via the per-index index_kind byte (format_version 13). The query-side acceleration is query.gin_scan. Builds on ddl.secondary_index and types.array"

[[capability]]
id = "ddl.check"
description = "CHECK constraints — column-level and table-level [CONSTRAINT name] CHECK (expr): boolean row predicates enforced per candidate row at INSERT/UPDATE (23514; TRUE/NULL pass), evaluated in name order; PG auto-naming (t_col_check / t_check + suffixes); DDL rejections 42804/0A000/42803/42P02/42703/42710; persisted as expression text in the v4 catalog (spec/design/constraints.md §4, grammar.md §29)"

[[capability]]
id = "ddl.foreign_key"
description = "FOREIGN KEY constraints — column-level REFERENCES and table-level [CONSTRAINT name] FOREIGN KEY (cols) REFERENCES parent (cols) [ON DELETE/UPDATE NO ACTION|RESTRICT]: referential integrity enforced at four write sites (child INSERT/UPDATE 23503 when the key is absent in the parent — batch end-state-aware; parent DELETE/UPDATE 23503 when a child still references the row), MATCH SIMPLE NULL exemption; referenced columns must be the parent PK or a UNIQUE set (42830), same-type pairing (42804, stricter than PG), PG auto-naming (t_col_fkey + suffixes), per-table constraint namespace 42710; CASCADE/SET NULL/SET DEFAULT and MATCH FULL are 0A000; DROP TABLE of a referenced table is 2BP01; persisted in the v11 catalog (spec/design/constraints.md §6, grammar.md §43)"

[[capability]]
id = "ddl.drop_table"
description = "DROP TABLE — remove a table (definition + rows) from the catalog; missing table is 42P01 (grammar.md §13)"

[[capability]]
id = "ddl.temp_table"
description = "CREATE [TEMP|TEMPORARY] TABLE + DROP — session-local temporary tables that make ZERO writes to the database file (held in a per-session temp snapshot outside the serialized catalog, no format_version change — spec/design/temp-tables.md §2). Full CRUD (INSERT/SELECT/UPDATE/DELETE) + PRIMARY KEY / UNIQUE / CHECK / NOT NULL / DEFAULT, dropped at session close. TEMP/TEMPORARY are non-reserved, positional between CREATE and TABLE (a table named 'temp' stays persistent). Namespace PRECLUDES overlaps (a temp name colliding with temp OR persistent is 42P07; a documented PG divergence — no pg_temp shadowing — §3). A standalone CREATE INDEX / DROP INDEX is supported on a temp table (the index lives in the temp snapshot, zero file writes, planner-used, gated by the same allow_temp_ddl) — see suites/ddl/temp_index.test. serial / bigserial / smallserial / GENERATED AS IDENTITY columns are supported too: the auto-created OWNED sequence lives in the same temp snapshot (zero file writes, resolved/advanced by a scope-aware sequence funnel, shares the relation namespace 42P07, 2BP01 to drop directly, auto-dropped with the table, gated by the same temp DDL split) — see suites/ddl/temp_serial_identity.test (+ concurrency/shared_temp_serial.test for the cross-session shared case). Composite-typed columns are supported too: the composite TYPE is always persistent (CREATE TYPE is persistent DDL) and a temp table only REFERENCES it; the column's storage codec resolves against the main type catalog at staging time and is self-contained thereafter (zero file writes), a composite column cannot be a PRIMARY KEY (0A000, never keyable), and DROP TYPE of a referenced type is 2BP01 (the dependency check is scope-aware) — see suites/ddl/temp_composite.test (+ concurrency/shared_temp_composite.test for the cross-session shared case). Deferred on a temp table, each 0A000 (§8): FOREIGN KEY, COLLATE columns. The DDL is gated by session.allow_temp_ddl; the storage footprint by resource.temp_budget. The database-wide SHARED form is ddl.shared_temp_table"

[[capability]]
id = "ddl.shared_temp_table"
description = "CREATE SHARED [TEMP|TEMPORARY] TABLE + DROP — DATABASE-WIDE shared temporary tables (spec/design/temp-tables.md §4): one set of rows visible to and writable by EVERY session of the open Database, but — like session-local temps — held in an in-memory temp snapshot OUTSIDE the serialized catalog, so they make ZERO writes to the file (no format_version change, §2). Unlike PostgreSQL's GLOBAL TEMPORARY (which shares only the definition, per-session data), SHARED shares the DATA too (divergence D3) — hence a new keyword, not GLOBAL. SHARED is non-reserved, positional, must be immediately followed by TEMP/TEMPORARY (a stray CREATE SHARED TABLE is 42601). Shares the session-local feature set (full CRUD + PRIMARY KEY / UNIQUE / CHECK / NOT NULL / DEFAULT, same 0A000 narrowings §8) and the preclude-overlaps namespace (a shared name colliding with ANY relation is 42P07, §3). Writes ride the single-writer gate and become visible to other sessions only at COMMIT (the two-root commit — the file snapshot fsynced, the shared-temp snapshot a pure in-memory pointer swap; a reader pins both roots together, §5); cross-session visibility is tested via the concurrency schedule format (concurrency-testing.md). The DDL is gated by session.allow_shared_temp_ddl; the global footprint by resource.shared_temp_budget. Builds on ddl.temp_table"

[[capability]]
id = "ddl.not_null"
description = "NOT NULL column constraint — storing NULL (direct, defaulted, or omitted) traps 23502 (spec/design/constraints.md §1)"

[[capability]]
id = "ddl.column_default"
description = "DEFAULT <literal> column constraint — evaluated + type-coerced once at CREATE TABLE (bad default traps 22003/42804 there), applied for an omitted column or the DEFAULT keyword (spec/design/constraints.md §2)"

[[capability]]
id = "ddl.column_default_expr"
description = "DEFAULT <expression> column constraint — a non-constant default (function calls like uuidv7(), arithmetic like 1 + 1); no column refs/subqueries/aggregates/params (0A000/0A000/42803/42P02), result type checked assignable to the column (42804) at CREATE TABLE; evaluated per row at INSERT through the per-statement seam (spec/design/constraints.md §2)"

[[capability]]
id = "ddl.sequence"
description = "CREATE SEQUENCE [IF NOT EXISTS] name [AS type] [INCREMENT [BY] n] [MINVALUE m | NO MINVALUE] [MAXVALUE x | NO MAXVALUE] [START [WITH] s] [CACHE c] [[NO] CYCLE] / DROP SEQUENCE [IF EXISTS] name [, …] — a named, persisted, monotonic generator as the third catalog-object kind (entry_kind 2, format_version 12). Order-free options; the value type is AS smallint|integer|bigint (default bigint — ddl.sequence_as_type); the name shares the relation namespace (42P07 duplicate / 42P01 missing); INCREMENT 0 / CACHE < 1 / inconsistent START/MIN/MAX is 22023; CACHE accepted but behaves as 1 (a documented PG divergence); RESTRICT-only (CASCADE 0A000). nextval is TRANSACTIONAL — rolls back with the txn (a documented PG divergence mandated by determinism.md §5) (spec/design/sequences.md, grammar.md §44)"

[[capability]]
id = "ddl.sequence_as_type"
description = "CREATE SEQUENCE … AS { smallint | integer | bigint } (and int2/int4/int8/i16/i32/i64 aliases) — the sequence value data type (an order-free option), which sets the default + validated MINVALUE/MAXVALUE (smallint [-32768,32767], integer [-2147483648,2147483647], bigint full i64). A non-integer AS type is 22023 (\"sequence type must be smallint, integer, or bigint\"); an explicit MINVALUE/MAXVALUE outside the type range is 22023 (\"… out of range for sequence data type T\", checked before the MIN>MAX consistency check). serial follows the pseudo-type (serial→integer, bigserial→bigint, smallserial→smallint) and a GENERATED AS IDENTITY column follows its column type; an AS clause inside identity ( … ) options is 42601. The type is NOT persisted (reducible to the bounds) — no format_version change (spec/design/sequences.md §14)"

[[capability]]
id = "ddl.alter_sequence"
description = "ALTER SEQUENCE [IF EXISTS] name — beyond RESTART (ddl.sequence): the definition-changing option set and RENAME TO (spec/design/sequences.md §15). The option form takes the same order-free CREATE options MINUS AS (INCREMENT/MINVALUE/MAXVALUE/START/CACHE/[NO] CYCLE) plus an interleavable RESTART [[WITH] n], requiring ≥1 option (a bare ALTER SEQUENCE s is 42601). It re-runs PG init_params with isInit=false: only written options change, last_value/is_called are preserved unless RESTART is given; INCREMENT sign does not recompute bounds; MINVALUE < MAXVALUE is strict (22023); the post-edit cross-checks are START in [MIN,MAX] then the preserved/restarted last_value in [MIN,MAX] (each 22023). RENAME TO new_name moves the catalog key (42P07 if new_name already names a relation, the same name included) and rewrites an OWNED sequence's owning-column nextval default text so a later INSERT still advances it. A missing sequence is 42P01 unless IF EXISTS. ALTER … AS type / OWNED BY / OWNER TO / SET {SCHEMA|LOGGED|UNLOGGED} stay 0A000. No format_version change. The transactional rollback of an ALTER and the read-only 25006 are per-core unit tests"

[[capability]]
id = "ddl.serial"
description = "serial / bigserial / smallserial (aliases serial4 / serial8 / serial2) CREATE TABLE column pseudo-types — sugar (PostgreSQL) for an integer column (i32 / i64 / i16) that is NOT NULL with a DEFAULT nextval(...) backed by a newly-created OWNED sequence named <table>_<column>_seq (numeric-suffix collision resolution). Recognized only in a column-type position. The owned sequence follows the pseudo-type (serial→integer, bigserial→bigint, smallserial→smallint — ddl.sequence_as_type), so it is bounded to the column's range; DROP TABLE auto-drops it; DROP SEQUENCE of an owned sequence is 2BP01; an explicit DEFAULT on a serial column is 42601. The owner link persists (format_version 14). nextval stays TRANSACTIONAL (spec/design/sequences.md §12)"

[[capability]]
id = "ddl.identity"
description = "GENERATED { ALWAYS | BY DEFAULT } AS IDENTITY column constraint (the SQL-standard identity surface) + the optional ( sequence_options ) + the INSERT OVERRIDING { SYSTEM | USER } VALUE clause. Desugars like serial — an OWNED sequence of the column type (named <table>_<column>_seq, suffix collision resolution — ddl.sequence_as_type) + a DEFAULT nextval(...) + NOT NULL — plus the persisted ALWAYS/BY DEFAULT distinction (format_version 15, two column flag bits). The column type must be smallint/integer/bigint (22023). ALWAYS rejects an explicit INSERT value without OVERRIDING SYSTEM VALUE (428C9) and any UPDATE assignment (428C9); OVERRIDING USER VALUE discards a supplied value and uses the sequence; BY DEFAULT uses an explicit value (not advancing the sequence). DEFAULT-and-identity / serial-and-identity / two identity specs / an AS clause in the identity ( … ) options are 42601 (spec/design/sequences.md §13)"

[[capability]]
id = "dml.insert_column_list"
description = "INSERT with an explicit column list `(a, c)` — unlisted columns take their default else NULL; the DEFAULT keyword in a value slot; unknown column 42703, duplicate 42701 (spec/design/grammar.md §12)"

[[capability]]
id = "dml.insert"
description = "INSERT ... VALUES"

[[capability]]
id = "dml.insert_multi_row"
description = "Multi-row INSERT ... VALUES (..),(..) — two-phase / all-or-nothing (grammar.md §12)"

[[capability]]
id = "dml.insert_select"
description = "INSERT ... SELECT — insert the rows a query produces, through the same two-phase / all-or-nothing validation; output arity must match the target (42601) and projected types must be assignable up front (42804, even over an empty source); cost = the embedded SELECT's accrued cost (grammar.md §24)"

[[capability]]
id = "dml.update"
description = "UPDATE ... SET ... [WHERE] (in-place value replacement)"

[[capability]]
id = "dml.delete"
description = "DELETE FROM ... [WHERE]"

[[capability]]
id = "dml.returning"
description = "The RETURNING clause on INSERT/UPDATE/DELETE — the statement becomes a query result projecting each affected row (INSERT the stored row, UPDATE the new row, DELETE the old row); items resolve against the target table only (subqueries allowed and observe the pre-statement snapshot; aggregates 42803); zero affected rows is an empty result; row order unspecified (grammar.md §32, cost.md §3)"

[[capability]]
id = "dml.returning_old_new"
description = "The old./new. row-version qualifiers in a RETURNING list (PG 18 semantics, grammar.md §32): old.col = the pre-statement value, new.col = the post-statement value, the absent side the all-NULL row (INSERT's old, DELETE's new); valid only in RETURNING (elsewhere 42P01), shadowed by a target table actually named old/new, usable inside item subqueries; the WITH (OLD AS o, NEW AS n) aliasing form stays deferred"

[[capability]]
id = "dml.insert_on_conflict"
description = "INSERT ... ON CONFLICT [target] { DO NOTHING | DO UPDATE SET … [WHERE …] } — UPSERT (spec/design/upsert.md, grammar.md §46). A candidate row that would violate a UNIQUE/PRIMARY KEY constraint takes the conflict action instead of trapping 23505: DO NOTHING skips it; DO UPDATE updates the existing conflicting row, with the proposed row exposed as the qualifier-only `excluded` pseudo-relation (a bare/qualified column = the existing row). The arbiter target is a column SET matched order-independently against a unique index / the PK (no match 42P10), or ON CONSTRAINT name (a unique-index name or the synthesized <table>_pkey; miss 42704); DO UPDATE requires a target (42601 without one), DO NOTHING may omit it (any conflict skipped). A non-arbiter conflict still traps 23505; two proposed rows sharing the arbiter key are 21000 under DO UPDATE, skipped under DO NOTHING. Two-phase / all-or-nothing with sequential planning; RETURNING projects the affected (inserted + updated) rows. Reuses existing error codes (no registry change) and adds no on-disk format change. Divergences: DO UPDATE assigning a PK column is 0A000, end-state (not per-row transient) uniqueness, no INSERT INTO t AS alias (upsert.md §9)"

[[capability]]
id = "query.select"
description = "SELECT of columns from a single table"

[[capability]]
id = "query.where_eq"
description = "WHERE with an equality predicate ( = )"

[[capability]]
id = "query.comparison_order"
description = "WHERE with an ordering predicate ( < , > , <= , >= )"

[[capability]]
id = "query.point_lookup"
description = "Primary-key predicate pushdown — a single-table WHERE on the primary key (`pk = c`, `pk < c`, BETWEEN, AND-combinations) seeks/ranges the storage B-tree instead of a full scan, so page_read drops to the nodes on the access path and storage_row_read to the rows in range (spec/design/cost.md §3 \"bounded scan / point lookup\"). A cost-visible optimization: a core lacking it would compute the higher full-scan cost, so cost-asserting tests over PK predicates require it."

[[capability]]
id = "query.limit_short_circuit"
description = "LIMIT short-circuit — a single-table query with a LIMIT and no blocking operator (no join, aggregate, DISTINCT, or ORDER BY) streams scan→filter→project and STOPS the scan once the window is filled, so storage_row_read counts only the rows actually read (spec/design/cost.md §3 \"LIMIT short-circuit\"). A cost-visible optimization: a core lacking it scans every row and computes the higher cost, so cost-asserting LIMIT-without-ORDER-BY tests require it."

[[capability]]
id = "query.order_by_pk_scan"
description = "ORDER BY satisfied by primary-key scan order — a single-table, non-aggregate, non-DISTINCT SELECT whose ORDER BY keys are a PREFIX of the table's PRIMARY KEY columns, each ASC and sorting by the column's stored key collation, needs no sort: the table tree already yields rows in that order (spec/design/cost.md §3 \"ORDER BY satisfied by primary-key order\"). The engine elides the sort and STREAMS scan→filter→project; with a LIMIT it stops the scan once the window is filled (a top-N early-out), so storage_row_read drops to the rows actually read. Composes with a primary-key range bound (the forward range walk is already PK order) and with a collated PK (the tree is stored in collation order, so a collated ORDER BY is satisfied without an in-memory re-sort). A cost-visible optimization: a core lacking it sorts every row and computes the higher cost, so cost-asserting ORDER-BY-on-the-PK tests require it. Narrowings (each a follow-on): DESC (reverse scan), secondary-index order, DISTINCT, and joins keep the sort/eager path. Builds on query.order_by and query.limit_short_circuit."

[[capability]]
id = "query.correlated_pushdown"
description = "Correlated primary-key pushdown — when a correlated subquery's inner query is a single table whose WHERE compares the inner primary key to an enclosing-query column (`inner.pk = outer.col`), the inner scan bounds to that outer row's value (a per-outer-row point lookup/range) instead of re-scanning the whole inner table for every outer row (spec/design/cost.md §3 \"bounded scan / correlated\"). The same point-lookup mechanism as query.point_lookup, with the bound source resolved per outer row; results are unchanged, only the inner re-scan cost drops. A cost-visible optimization: a core lacking it re-scans the whole inner table per outer row and computes the higher cost, so cost-asserting correlated-PK tests require it."

[[capability]]
id = "query.join_pushdown"
description = "Join base-table primary-key pushdown — in a multi-table FROM, each base table is bounded independently by the WHERE predicates on its OWN primary key against a CONSTANT (`a JOIN b … WHERE a.pk = 5`), so that table materializes a seek/range instead of a full scan (spec/design/cost.md §3 \"bounded scan / JOIN\"). The same point-lookup mechanism as query.point_lookup applied per relation; a cross-relation `b.pk = a.x` (index-nested-loop) is NOT bounded (a follow-on). Sound for outer joins: a non-NULL PK conjunct in WHERE eliminates that relation's NULL-extended rows. A cost-visible optimization: a core lacking it full-scans every join base table and computes the higher cost, so cost-asserting join-PK tests require it."

[[capability]]
id = "query.gin_scan"
description = "GIN-bounded scan — a SELECT base relation whose WHERE has `arr_col @> const` (contains) or `arr_col && const` (overlaps) against a GIN-indexed array column bounds the scan to candidate rows: the opclass extracts the query terms, each term's posting list is a prefix range scan of the GIN tree, the sets combine by INTERSECTION (@>) or UNION (&&), and the original predicate stays the residual WHERE filter (results identical to the full scan — gin.md §6). Degenerate constant queries: a NULL / NULL-containing query (and && of an empty/all-NULL query) is a provably-empty bound; @> '{}' falls back to the full scan. Cost: page_read per query term + gin_entry per posting entry + per-candidate point-lookup (page_read + storage_row_read) + residual operator_eval + row_produced (cost.md §3). A cost-visible optimization (a core lacking it full-scans and computes the higher cost, so cost-asserting GIN tests require it); narrowings: constant query only, @>/&& only, SELECT scans only, no LIMIT-streaming combination. Builds on ddl.gin_index and func.array_containment"

[[capability]]
id = "query.gin_any_eq"
description = "GIN-bounded `const = ANY(col)` membership — a SELECT base relation whose WHERE has `c = ANY(arr_col)` (the array spelling of membership) against a GIN-indexed array column, with `c` a CONSTANT scalar, bounds the scan: the opclass extracts c's single term, its posting list is a prefix range scan of the GIN tree, and the original predicate stays the residual WHERE filter (results identical to the full scan — gin.md §6). Equivalent to a single-term `@>` gather (`c = ANY(col)` ⇔ `col @> ARRAY[c]`). Degenerate constant: a NULL `c` (a typed NULL::i32; a bare NULL is 42P18) is a provably-empty bound that reads nothing. jed coerces `c` to the element type at resolve, so an out-of-range constant is rejected 22003 before the bound (a divergence from PG, which returns empty). Only `= ANY` (membership), never `= ALL`/`<> ANY`/etc.; the column must be ANY's array operand. Cost: page_read for the term's posting range + gin_entry per posting entry + per-candidate point-lookup (page_read + storage_row_read) + residual operator_eval + row_produced (cost.md §3) — same shape as a single-term @>. A cost-visible optimization (a core lacking it full-scans and computes the higher cost, so cost-asserting tests require it). PG does not rewrite `= ANY(array)` onto a GIN array index, so this is a jed acceleration divergence (same rows, lower cost). Builds on query.gin_scan and func.array_quantified"

[[capability]]
id = "query.gin_array_eq"
description = "GIN-bounded array equality — a SELECT base relation whose WHERE has `arr_col = const` (exact array equality; commutative, so `const = arr_col` too) against a GIN-indexed array column, with const a CONSTANT array, bounds the scan: the opclass extracts const's DISTINCT NON-NULL elements (the SAME term set + intersection gather as `@> const`, because equal arrays have identical element multisets, so `col = const` ⟹ `col @> const` — the gather is a sound SUPERSET), and the original `=` predicate stays the residual WHERE filter that makes it exact (results identical to the full scan — gin.md §6). Two degenerate shapes part from @>: (a) a NULL ELEMENT of const does NOT empty the bound (unlike @>, where @>{…,NULL} is never TRUE) — `col = ARRAY[1,NULL]` matches a `{1,NULL}` row via the `@>{1}` bound + residual; (b) when const has NO non-NULL element (`'{}'` or all-NULL), the matching rows (`{}`, `{NULL}`) carry no index terms, so the bound FALLS BACK to the full scan (not provably-empty). A whole-NULL const (`col = NULL`) is provably empty. Matches PG: its array_ops GIN opclass includes the `=` strategy (GinEqualStrategy 4) and also marks it lossy→recheck, so jed's always-recheck aligns. Cost: page_read per query term + gin_entry per posting entry + per-candidate point-lookup (page_read + storage_row_read) + residual operator_eval + row_produced (cost.md §3) — same shape as `@>`; the no-term fallback charges the full scan. A cost-visible optimization (a core lacking it full-scans and computes the higher cost, so cost-asserting tests require it). Builds on query.gin_scan"

[[capability]]
id = "query.gin_mutation"
description = "GIN-bounded UPDATE/DELETE — an UPDATE or DELETE whose WHERE has a GIN-accelerable conjunct (`col @> const`, `col && const`, `const = ANY(col)`, or `col = const`) against a GIN-indexed array column bounds its TARGET-ROW scan through the same GIN index as a SELECT, instead of full-scanning: it gathers the candidate rows (term posting lists → intersect/union), re-applies the original predicate as the residual WHERE filter, and phase-2 rewrites (UPDATE) / removes (DELETE) exactly those rows, maintaining every index — including the GIN entries — as before. The bound is over the PRE-mutation index state (the WHERE evaluates against the old row), so the candidate set equals the rows the full scan would match; the END STATE and any RETURNING rows are identical to the full scan (gin.md §6). Precedence: a mutation prefers its own PK bound first, then GIN, then a full scan — the ordered-index equality bound stays SELECT-only (a separate follow-on). The array column is in the WHERE, hence in the touched set, hence resolved, so GIN-entry maintenance over it is correct. Cost: the SAME scan block as the matching SELECT (page_read per term + gin_entry per posting entry + per-candidate point-lookup + residual operator_eval), minus the row_produced a bare mutation omits (a RETURNING clause restores it plus its projection units); the phase-2 writes + index maintenance are unmetered (cost.md §3). A cost-visible optimization (a core lacking it full-scans a mutation and computes the higher cost, so cost-asserting tests require it). PG uses its array GIN index for UPDATE/DELETE too, so the rows/end state match PG. Builds on query.gin_scan, dml.update, and dml.delete"

[[capability]]
id = "query.gin_element_types"
description = "GIN over non-integer fixed-width key-encodable element types — a `USING gin` index, and every GIN-bounded scan (@>/&&/= ANY/= and the GIN-bounded UPDATE/DELETE), now admit an array column whose element type is any of the engine's keyable scalars beyond the integers: `uuid[]`, `date[]`, `timestamp[]`, `timestamptz[]`, `boolean[]` (the same set a PRIMARY KEY / ordered-index key column accepts). A GIN term IS the element's order-preserving key encoding (gin.md §4) — the inverted core (entry tree, gather, posting combine, residual recheck, cost) is unchanged; only the CREATE INDEX gate and the per-element term encoder generalized from integers to the shared key-value encoder, so the bytes, rows, and cost are the integer case's, just over a wider element domain. A `text[]`/`decimal[]`/`bytea[]`/`interval[]`/`f64[]` GIN stays 0A000 until that element's key encoding lifts (gin.md §3/§10). PG's array_ops GIN is element-generic too, so rows/end state match PG (the residual operator_eval per candidate is unchanged). Builds on query.gin_scan, query.gin_any_eq, query.gin_array_eq, ddl.gin_index, and types.uuid"

