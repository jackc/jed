# Determinism-exception ledger (CLAUDE.md §2/§8/§10/§13; ../design/determinism.md).
#
# Determinism is DEFAULT-DENY (determinism.md §1): an engine behavior that relaxes any of the
# four determinism guarantees — G1 reproducibility, G2 cross-core identity, G3 cross-platform
# identity, G4 contract granularity — is a BUG unless it has an entry HERE. This is the cross-core
# analogue of oracle_overrides.toml (which ledgers deliberate PostgreSQL divergences); this file
# ledgers deliberate DETERMINISM divergences. Each entry names the surface, which guarantee it
# drops, the BOUNDED blast radius (determinism.md §4 — non-contamination), and how the corpus
# still tests it. An exempted behavior with no entry is a failure.
#
#   id            stable kebab-case slug
#   surface       the function / type / behavior the exception covers
#   class         U | B | A | I | P  (determinism.md §2 taxonomy by source)
#   drops         which guarantees are surrendered (subset of G1/G2/G3/G4); the rest are kept
#   blast_radius  how far the non-determinism reaches, and what bounds it (determinism.md §4)
#   test          how the corpus still catches real bugs in it
#   status        ratified | proposed | unratified
#   reason        why the non-determinism is intrinsic (not an accidental artifact)

# --- f64: transcendental function values ---------------------------------
[[exception]]
id           = "float-transcendental"
surface      = "exp, ln, log10, pow, power, sin, cos, tan, cbrt, asin, acos, atan, atan2, cot, sinh, cosh, tanh, asinh, acosh, atanh over f32/f64 (../design/float.md §8)"
class        = "A"
drops        = ["G2", "G3"]
blast_radius = "the function's result column; promotes to the row multiset / other columns ONLY via a float-gated WHERE / ORDER BY...LIMIT / narrowing CAST (the f64-control-flow entry below). A f64 query that does not call a transcendental stays bit-identical cross-core."
test         = "the `R` render tag's tolerant compare (parse to f64, equal within ULP/relative tolerance; NaN==NaN, ±Inf exact, -0==+0 — conformance.md §1); PG-oracle-only, with any larger PG divergence recorded in oracle_overrides.toml. # cost:/# names:/# types: stay exact (structural)."
status       = "ratified"
reason       = "IEEE 754 does NOT mandate correctly-rounded transcendentals (the table-maker's dilemma), so every libm differs by an ULP across Rust/Go/TS and PG. Not injectable away; bit-pinned reimplementations would cost decimal-limb-level effort on an approximate type (the over-investment determinism.md §6 declines). The arithmetic kernel (+ - * / sqrt) IS correctly-rounded and stays in-contract (float.md §5)."

# --- f64: text rendering layout ------------------------------------------
[[exception]]
id           = "float-render-layout"
surface      = "f32/f64 value -> text (each core's native shortest-round-trip formatter)"
class        = "A"
drops        = ["G2", "G3"]
blast_radius = "the rendered STRING layout only (exponent threshold/spelling). The shortest-round-trip DIGITS are mathematically unique, so the cores agree on value; only layout may differ, and the `R` tag compares by parsed value, so layout never affects a test result. No promotion path (rendering is terminal)."
test         = "the `R` render tag's tolerant compare (conformance.md §1) — parsed to f64, so layout is irrelevant. jed does NOT hand-roll a shared formatter (the exemption's payoff)."
status       = "ratified"
reason       = "Each language's shortest-round-trip formatter chooses different presentation (Rust {} vs Go FormatFloat(-1) vs JS toString) even when the digits agree. Pinning one shared formatter is decimal-limb-level effort for zero observable benefit given the `R` tolerant compare."

# --- uuidv4: random generation on the entropy seam ---------------------------
[[exception]]
id           = "uuidv4-entropy"
surface      = "uuidv4() (../design/entropy.md §3) — a random version-4 UUID"
class        = "B"
drops        = []
blast_radius = "the uuid result column; promotes to the row multiset / other columns ONLY if that uuid flows through a WHERE / ORDER BY...LIMIT / a key (uuid CAN be a primary key — that is the host's choice). On the INJECTED path (a `# seed:` directive injects the provided deterministic source) NOTHING is dropped: the spec'd splitmix64 source (entropy.md §2) makes the value byte-identical across Rust/Go/TS. In PRODUCTION the 16 bytes are drawn directly from the OS CSPRNG per call, so the value is non-deterministic AND unpredictable (not reconstructable from one sample) — only the random bytes vary; the bit layout (version/variant) stays in-contract."
test         = "injected-source-exact: the `# seed:` corpus directive injects the provided seeded source, so the value is asserted byte-for-byte across all cores (suites/expr/uuid_generate.test); the source + v4 bytes are independently re-derived by Ruby (spec/encoding/prng.toml + prng_verify.rb — the third voice). # cost: is exact and source-independent."
status       = "ratified"
reason       = "Randomness is intrinsic to uuidv4. Pushed to a host seam (determinism.md §5): with the provided deterministic source injected the engine is a deterministic function of it, so the only irreducible production non-determinism is the raw per-value OS-CSPRNG read — G1+G2 hold on the injected/test path."

# --- uuidv7: clock + entropy seam --------------------------------------------
[[exception]]
id           = "uuidv7-clock-entropy"
surface      = "uuidv7([shift interval]) (../design/entropy.md §3) — a time-ordered version-7 UUID"
class        = "B"
drops        = []
blast_radius = "the uuid result column (as for uuidv4). On the INJECTED path (`# seed:` injects the provided deterministic source, `# clock:` a fixed clock) NOTHING is dropped: the 48-bit ms comes from the injected clock, rand_a is a deterministic per-statement monotonic counter, rand_b is the spec'd source — all byte-identical across cores. In PRODUCTION rand_b is drawn directly from the OS CSPRNG per call (unpredictable) and the clock is the wall clock — those two raw reads are the only non-determinism. The within-statement-millisecond monotonic counter is itself fully deterministic (NOT an exception — and not oracle-comparable to PG's own counter, since neither byte-matches PG's entropy; the generators are not oracle-imported)."
test         = "injected-source+clock-exact: the `# seed:` / `# clock:` directives inject both, so the value (and its monotonic ordering) is asserted byte-for-byte across all cores (suites/expr/uuid_generate.test); the v7 bytes are independently re-derived by Ruby (prng_verify.rb). An out-of-48-bit/pre-epoch injected clock traps 22008 identically (deterministic). # cost: is exact and source/clock-independent."
status       = "ratified"
reason       = "Wall-clock + randomness are intrinsic to uuidv7. Both are pushed to host seams (determinism.md §5): with a deterministic source + fixed clock injected the engine is a deterministic function of them, so the only irreducible production non-determinism is the raw per-value entropy + clock reads — G1+G2 hold on the injected/test path."

# --- now() / current_timestamp: STABLE clock seam ----------------------------
[[exception]]
id           = "now-clock"
surface      = "now() [alias the bare keyword current_timestamp] (../design/entropy.md §5) — the STATEMENT timestamptz, read once and reused"
class        = "B"
drops        = []
blast_radius = "the timestamptz result column; promotes to the row multiset / other columns ONLY if that instant flows through a WHERE / ORDER BY...LIMIT / a key. STABLE: the clock is read ONCE per statement and reused for every row (PG's now() semantics), so a statement's time cannot vary row-to-row (trivially parallel-safe). On the INJECTED path (`# clock:` a fixed clock, or `# clock_advance:` an advancing one) NOTHING is dropped: the value is the injected clock's first read, byte-identical across cores. In PRODUCTION the single read is the wall clock — the only non-determinism."
test         = "injected-clock-exact: the `# clock:` / `# clock_advance:` directives inject the statement clock, so now() is asserted byte-for-byte across all cores (suites/expr/clock_functions.test); current_timestamp shares now()'s once-resolved statement clock (asserted equal even under an advancing clock). # cost: is exact (one operator_eval) and clock-independent."
status       = "ratified"
reason       = "The wall clock is intrinsic to now(). It is pushed to the host clock seam (determinism.md §5): with a clock injected the engine is a deterministic function of it, so the only irreducible production non-determinism is the single raw clock read — G1+G2 hold on the injected/test path. NOT oracle-imported (PG's wall clock differs)."

# --- clock_timestamp(): VOLATILE clock seam (per-call) -----------------------
[[exception]]
id           = "clock-timestamp-clock"
surface      = "clock_timestamp() (../design/entropy.md §5) — a per-call timestamptz, read on EVERY evaluation"
class        = "B"
drops        = []
blast_radius = "the timestamptz result column (as for now()). VOLATILE: it reads the clock on EVERY call, so it may advance within a statement (distinct from the statement-stable now()). On the INJECTED path (`# clock_advance: start,step` injects an advancing clock) NOTHING is dropped: each call takes the next tick in expression-evaluation order, byte-identical across cores. In PRODUCTION each call is a raw wall-clock read — the only non-determinism."
test         = "injected-advancing-clock-exact: the `# clock_advance:` directive injects an advancing clock so the per-call reads are deterministic and distinguishable from now() — asserted byte-for-byte across all cores (suites/expr/clock_functions.test: clock_timestamp() < clock_timestamp(), and the fully-spelled now()-stable-vs-clock_timestamp()-advances contrast). # cost: is exact (one operator_eval per call)."
status       = "ratified"
reason       = "The wall clock is intrinsic to clock_timestamp(), read per call by definition. It is pushed to the host clock seam (determinism.md §5): with an advancing clock injected the engine is a deterministic function of it, so the only irreducible production non-determinism is the raw per-call clock reads — G1+G2 hold on the injected/test path. A DISTINCT ledger entry from now() (per-call, not statement-stable). NOT oracle-imported (PG's wall clock differs)."

# --- f64: control-flow promotion of an exempted value --------------------
[[exception]]
id           = "float-control-flow"
surface      = "a query whose ROW MULTISET depends on an exempted float value (a transcendental result near a WHERE / ORDER BY...LIMIT boundary, or feeding a narrowing CAST)"
class        = "A"
drops        = ["G2", "G3"]
blast_radius = "the affected query's row multiset (and thereby its non-float columns and cost). BOUNDED by keeping f64 OUT of keys/indexes (rejected 0A000 — encoding.md §2.8): an exempted value can at worst reorder/refilter a QUERY result, never corrupt STORED order. A query not gated on an exempted value is unaffected."
test         = "such corpus entries are PG-oracle-only and authored to avoid knife-edge boundaries where possible; the documented residue is recorded here. The in-contract float surface (kernel/exact-sum/total-order) does NOT trigger this — only the transcendental-gated case does."
status       = "ratified"
reason       = "Non-determinism is infectious through boolean/control-flow boundaries (determinism.md §4): a <=1-ULP transcendental difference near a comparison boundary can flip a row's inclusion. Intrinsic to admitting transcendentals at all; bounded, not eliminable, so ledgered rather than pretended away."
