# same engine-wide simplification float.test already uses. PostgreSQL distinguishes 2201E
# (invalid_argument_for_logarithm) and 2201F (invalid_argument_for_power_function). The message
# differs; the trap and its determinism are identical.
[[override]]
file = "expr/float_math.test"
sql = "SELECT sqrt(x) FROM f WHERE id = 7"
reason = "jed: sqrt of a negative traps 22003 (jed's single numeric range/domain code — no granular 2201F in the registry). PostgreSQL raises 2201F (invalid_argument_for_power_function). Engine-wide collapse to 22003 (errors/registry.toml), as in float.test."

[[override]]
file = "expr/float_math.test"
sql = "SELECT ln(x) FROM f WHERE id = 3"
reason = "jed: ln of zero traps 22003 (jed's single numeric range/domain code — no granular 2201E in the registry). PostgreSQL raises 2201E (invalid_argument_for_logarithm). Engine-wide collapse to 22003."

[[override]]
file = "expr/float_math.test"
sql = "SELECT log10(x) FROM f WHERE id = 3"
reason = "jed: log10 of zero traps 22003 (jed's single numeric range/domain code — no granular 2201E in the registry). PostgreSQL raises 2201E (invalid_argument_for_logarithm). Engine-wide collapse to 22003."

