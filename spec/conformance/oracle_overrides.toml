sql = "SELECT * FROM (WITH c AS (SELECT 1 AS one) SELECT one FROM c) AS d"
reason = "jed: a derived-table body is the WITH-less query_expr, so a nested WITH is 42601 (the top-level-only narrowing — grammar.md §42, cte.md §1; shared with the §26 subquery forms). PostgreSQL 18 accepts a WITH-prefixed subquery body and returns 1. A deliberate, documented narrowing."

