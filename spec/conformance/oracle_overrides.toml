# deliberate parser narrowings, relaxable later.
[[override]]
file = "subquery/derived.test"
sql = "SELECT * FROM (t JOIN t ON 1 = 1) AS x"
reason = "jed: a parenthesized-join FROM is a deferred narrowing — a leading `(` in FROM not followed by SELECT is 42601 (grammar.md §42). PostgreSQL parses `(t JOIN t ON …)` as a parenthesized join and instead reports 42712 (the duplicate `t`). A deliberate surface narrowing; the row behavior of derived tables is unaffected."

[[override]]
