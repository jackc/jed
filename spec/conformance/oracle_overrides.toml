# --- date (spec/design/date.md). date tracks PG's date on nearly everything (ISO rendering, BC
# era, the infinity sentinels, comparison/ordering, a date PRIMARY KEY, 22008 field overflow), so
# most date.test records regenerate byte-identically from the oracle. These are the deliberate
# divergences:
[[override]]
file = "types/date.test"
sql = "INSERT INTO t VALUES (10, 'today')"
reason = "jed: the clock-relative special 'today' is rejected this slice (22007, date.md §2) — deferred, like timestamp's 'now'. PostgreSQL resolves 'today' to the current date and accepts the insert (a wall-clock, nondeterministic value jed forbids by design, CLAUDE.md §10)."

[[override]]
file = "types/date.test"
sql = "INSERT INTO t VALUES (13, '2024-01-15 12:00:60')"
reason = "jed: a seconds field of 60 in a date literal's (dropped) time is out of range (22008, date.md §2 — the same strict :60 rule as timestamp). PostgreSQL accepts :60, carries it over, then drops the whole time, storing 2024-01-15. jed validates the time strictly even though it discards it."

[[override]]
file = "types/date.test"
sql = "SELECT id FROM m WHERE a = b"
reason = "jed: date and timestamp are distinct comparison families — `date = timestamp` is not comparable (42804, the strict type system §4; date is a strict island this slice, date.md §4). PostgreSQL implicitly casts the date to timestamp and returns a result. Deferred to the date↔timestamp cast follow-on."

[[override]]
file = "expr/timestamp_literal.test"
sql = "SELECT TIMESTAMP '2024-01-01 00:00:00' = TIMESTAMPTZ '2024-01-01 00:00:00+00'"
reason = "jed: timestamp and timestamptz are distinct comparison families — `timestamp = timestamptz` is not comparable (42804, the strict type system §4), here spelled with the context-free typed literals (grammar.md §36). PostgreSQL implicitly coerces timestamp to timestamptz (at the session zone) and returns a result. Same divergence as the types/timestamp.test `a = b` case."

[[override]]
file = "types/timestamptz.test"
sql = "INSERT INTO t VALUES (10, '2024-01-01 12:00:00+99')"
reason = "jed: a +99 zone offset is out of range, reported as 22008. PostgreSQL reports the same rejection under 22009 (invalid_time_zone_displacement_value). Both reject; the SQLSTATE subcode differs."

# --- f64 / f32 (spec/design/float.md). jed's float behavior tracks PG's float8/float4 on
# nearly everything (the total order — NaN largest, NaN = NaN, -0 = +0; div-by-zero 22012; finite
# overflow 22003; NaN→int 22003), so most float.test records regenerate byte-identically from the
# oracle and need NO entry. These three are the deliberate divergences:
[[override]]
file = "types/float.test"
sql = "SELECT CAST(f64 '2.5' AS i32)"
reason = "jed: float→int rounds HALF AWAY FROM ZERO (2.5 → 3) — jed's single engine-wide rounding mode, no float in the value path (float.md §5, decimal.md §3). PostgreSQL's float8→int4 cast applies rint() (round half to EVEN), so 2.5 → 2. A documented divergence on the cast's rounding mode (same half-away vs half-even split as the decimal casts)."

[[override]]
file = "types/float.test"
sql = "SELECT id FROM t WHERE id = d"
reason = "jed: i64 vs f64 is not comparable (42804) — the strict type system requires an explicit cast across the int/float families (no implicit int→float promotion; float.md §2/§11). PostgreSQL implicitly coerces the bigint to double precision and compares, returning an (empty) result with no error."

[[override]]
file = "types/float.test"
sql = "CREATE TABLE bad (k f64 PRIMARY KEY)"
reason = "jed: a float PRIMARY KEY is rejected this slice (0A000), the documented narrowing every non-integer type takes — the float-order-preserving key encoding is authored but unexercised (float.md §10, encoding.md §2.8). PostgreSQL allows a double precision primary key."

