reason = "jed: sqrt takes the float family with arg_resolution = none (catalog), and an integer literal does not implicitly promote to float, so 42883. PostgreSQL casts int -> double precision and returns 2. The strict type system (§4): int<->float is explicit-cast-only (float.md). (A bare DECIMAL literal like sqrt(4.0) now resolves to the EXACT-numeric kernel — decimal.md §8 — and matches PG; only the bare INTEGER stays 42883.)"

