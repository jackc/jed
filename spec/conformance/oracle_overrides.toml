# (Nested WITH has since landed — spec/design/cte.md §7 — so jed now accepts it like PostgreSQL; the
# former cte/errors.test + subquery/derived.test override entries were removed with the feature.)

# --- recursive CTEs (spec/design/recursive-cte.md §6): three deferred shapes PostgreSQL accepts
# but jed rejects (a set-op / FROM-subquery recursive term, and mutual recursion), recorded where
# the recursive_errors.test corpus exercises them.
[[override]]
file = "cte/recursive_errors.test"
sql = "WITH RECURSIVE c(n) AS (SELECT 1 UNION ALL SELECT n + 1 FROM c WHERE n < 3 INTERSECT SELECT 99) SELECT n FROM c"
reason = "jed: a set-operation recursive term is a deferred narrowing (0A000 — recursive-cte.md §6/§8). The recursive term `… INTERSECT SELECT 99` is the UNION's right operand (INTERSECT binds tighter), a SetOp the analyzer rejects. PostgreSQL accepts it and runs it. A documented feature narrowing."

[[override]]
file = "cte/recursive_errors.test"
sql = "WITH RECURSIVE c(n) AS (SELECT 1 UNION ALL SELECT n + 1 FROM (SELECT n FROM c) s WHERE n < 3) SELECT n FROM c"
reason = "jed: a recursive self-reference inside a FROM derived table is a deferred narrowing (0A000 — recursive-cte.md §6). PostgreSQL allows FROM (… c …) and runs it. A documented feature narrowing."

[[override]]
file = "cte/recursive_errors.test"
sql = "WITH RECURSIVE a(n) AS (SELECT 1 UNION ALL SELECT n + 1 FROM b WHERE n < 3), b(n) AS (SELECT n FROM a) SELECT n FROM a"
reason = "jed: mutual recursion surfaces via forward-only visibility as 42P01 (recursive reference to a later CTE is out of scope — recursive-cte.md §3). PostgreSQL detects mutual recursion specifically and raises 0A000 (mutual recursion between WITH items is not implemented). A documented error-code divergence for a case neither engine executes."

# --- float math functions: argument resolution is `none` (catalog), so a bare integer or
# decimal literal does NOT implicitly promote to the float family. PostgreSQL resolves these
# by casting the argument to double precision and returns a value; jed rejects 42883. The
