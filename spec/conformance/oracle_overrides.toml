# Oracle-import override sidecar (CLAUDE.md §1/§7/§8; scripts/oracle_import.rb).
#
# PostgreSQL is jed's behavioral DEFAULT, not a compatibility target: jed deliberately diverges
# where the strict type system (§4) or a documented narrowing demands it. This file is the
# machine-checked ledger of those divergences. When `oracle_import.rb --check` finds jed's
# committed expected output disagreeing with the live PG oracle, a matching entry here marks the
# divergence INTENTIONAL — the importer keeps jed's answer and stays silent. A disagreement with
# NO entry is a warning ("add an override"), so the ledger cannot silently fall out of date.
#
#   file    path suffix of the .test (e.g. "types/decimal.test")
#   sql     the record's SQL, matched after whitespace-normalization
#   reason  why jed departs from PostgreSQL here

# --- AT TIME ZONE over a legacy alias: jed's starter JTZ bundle (spec/tz/2026a) ships the link
# US/Eastern -> America/New_York, so a query resolves it. The live postgres:18 oracle in this
# devcontainer is built against a tzdata set WITHOUT the legacy `US/*` backward-compatibility names
# (pg_timezone_names has 0 rows for it), so PG raises "time zone not recognized". This is an
# environment/data difference (which zones each side loaded), not a jed semantic divergence — jed's
# link resolution is independently pinned cross-core by spec/tz/vectors/tzif.toml. Keep jed's answer.
[[override]]
file = "expr/at_time_zone.test"
sql = "SELECT timestamptz '2024-01-15 12:00:00+00' AT TIME ZONE 'US/Eastern'"
reason = "jed's starter JTZ bundle ships the IANA link US/Eastern -> America/New_York (timezones.md §4, spec/tz/2026a/links.tsv), so jed resolves it to EST (2024-01-15 07:00:00). The live oracle's PG was built without the legacy US/* alias names (0 rows in pg_timezone_names), so it raises 22023. A data-availability difference between the two tz sets, not a semantic divergence; jed's link resolution is pinned cross-core by spec/tz/vectors/tzif.toml."

# --- make_interval named notation: jed accepts only the `=>` spelling. PostgreSQL also accepts
# the legacy `:=`, so this call SUCCEEDS in PG (returns 00:00:01) but jed rejects it 42601.
[[override]]
file = "expr/make_interval.test"
sql = "SELECT make_interval(secs := 1)"
reason = "jed: named notation uses only `=>` (grammar.md §17). jed has no `:` token, and `=>` alone is the modern, unambiguous PostgreSQL spelling, so `:=` is a 42601 syntax error. PostgreSQL accepts the legacy `:=` alias and returns 00:00:01. A deliberate, documented surface narrowing (a spelling, not a behavior — functions.md §11)."

# --- typed string literals: jed coerces integer/decimal by its OWN literal grammar (grammar.md
# §36), not PG's permissive input functions, so a `type 'string'` is byte-identical to writing the
# value as a native jed literal. The four forms PG accepts and jed rejects (22P02):
[[override]]
file = "expr/typed_literal.test"
sql = "SELECT integer '0x10'"
reason = "jed: a `type 'string'` integer is coerced by jed's own integer-literal grammar — decimal digits only (22P02). PostgreSQL (16+) accepts hex/octal/binary input and returns 16. jed has no hex integer literal anywhere, so admitting it only in the string form would diverge from its native literals (grammar.md §36)."

[[override]]
file = "expr/typed_literal.test"
sql = "SELECT integer '1_000'"
reason = "jed: a `type 'string'` integer is coerced by jed's own integer-literal grammar — no digit underscores (22P02). PostgreSQL (16+) accepts `1_000` and returns 1000. jed has no underscore-grouped integer literal anywhere (grammar.md §36)."

[[override]]
file = "expr/typed_literal.test"
sql = "SELECT numeric 'NaN'"
reason = "jed: jed's decimal is ALWAYS finite (decimal.md §2 — no NaN/±Infinity), so `numeric 'NaN'` traps 22P02. PostgreSQL's numeric has a NaN value and accepts it. A standing, documented decimal divergence (grammar.md §36, decimal.md §2)."

[[override]]
file = "window/expr_keys.test"
sql = "SELECT k, (SELECT row_number() OVER (PARTITION BY we.a + outert.k) FROM we LIMIT 1) FROM outert"
reason = "jed: a window PARTITION BY / ORDER BY key may not reference an enclosing-query column (a CORRELATED window) — the deferred general-expression-key follow-on stops at the current query level, so it is 0A000 (window.md §5.1/§11). PostgreSQL supports a correlated window inside a subquery and returns rows (k=1->1, k=2->1). A documented narrowing, not a semantic disagreement on the supported surface."

[[override]]
file = "aggregates/grouping_sets.test"
sql = "SELECT a FROM gt GROUP BY CUBE (a, a, a, a, a, a, a, a, a, a, a, a, a)"
reason = "jed: a GROUP BY whose grouping sets exceed jed's MAX_GROUPING_SETS (4096) is aborted 54001 (statement_too_complex) — jed's structural-complexity gate (aggregates.md §12, cost.md §7). PostgreSQL caps each construct instead ('CUBE is limited to 12 elements', 54011, a code jed's registry does not define). jed bounds the total expansion uniformly (CUBE(12)=4096 ok, CUBE(13)=8192 over), the deterministic resource bound the untrusted-query guarantee needs (CLAUDE.md §13). A documented divergence on the limit's code, not the supported surface."

[[override]]
file = "types/decimal.test"
sql = "SELECT id FROM c WHERE d = '2.5'"
reason = "jed: decimal vs text is not comparable (42804). PG implicitly coerces the text literal to numeric and returns a row. The strict type system (§4) rejects the cross-family comparison."

[[override]]
file = "types/decimal.test"
sql = "INSERT INTO c VALUES (2, 1.5, 9.9)"
reason = "jed: storing a decimal literal into an integer column is an explicit-CAST-only operation (42804), stricter than PG, which assignment-casts 1.5 -> 2 by rounding. (decimal.md)"

[[override]]
file = "types/decimal.test"
sql = "INSERT INTO c VALUES (10, 5e2, 0)"
reason = "jed: the same decimal-literal-into-integer-column 42804 as the `1.5` row above, here reached via e-notation — an exponent makes `5e2` a DECIMAL literal even though 500 is integer-valued (grammar.md §14), and the strict matrix has no decimal→integer assignment cast (§4). PG treats `5e2` as numeric and assignment-casts it to 500."

[[override]]
file = "types/decimal.test"
sql = "CREATE TABLE bad3 (x numeric(5,7))"
reason = "jed: scale > precision is an invalid typmod (22023). PG 18 accepts numeric(5,7) (it allows scale outside [0,precision]). Documented PG-version-sensitive divergence."

[[override]]
file = "types/decimal.test"
sql = "CREATE TABLE bad4 (x i32(5))"
reason = "jed: a type modifier on a non-decimal type is unsupported this slice (0A000). PG rejects `integer(5)` as a syntax error (42601) — both reject, different code/class."

[[override]]
file = "types/decimal.test"
sql = "SELECT k, n FROM dk"
reason = "jed: a full scan iterates the decimal PRIMARY KEY in key (= numeric) order — -2.5 < 0 < 0.25 < 1.5 < 10 < 100.50 (encoding.md §2.5, decimal-order-preserving). With no ORDER BY the row order is unspecified (CLAUDE.md §8); PostgreSQL returns heap/insertion order, which differs. jed's committed PK-order rows are kept; the multiset is identical (the values agree exactly — decimal key order is numeric order, so unlike text there is no collation divergence, only heap-vs-key)."

[[override]]
file = "expr/timestamp_arithmetic.test"
sql = "SELECT ts - ts2 FROM t WHERE id = 3"
reason = "jed: subtracting infinite timestamps (infinity − (−infinity)) traps 22008 — jed's interval type has NO infinity (like decimal; spec/design/interval.md §1). PG 15+ returns an infinite interval. A documented semantic divergence (jed has no interval infinity to return)."

[[override]]
file = "expr/timestamp_arithmetic.test"
sql = "SELECT ts - ts2 - 1 FROM t WHERE id = 1"
reason = "jed: an interval ± non-interval operand is a 42804 datatype mismatch (interval.md §5); PG reports 42883 (no `interval − integer` operator). Both reject; a documented error-class divergence."

[[override]]
file = "expr/interval_scale.test"
sql = "SELECT 1 / INTERVAL '1 day'"
reason = "jed: dividing a number by an interval is a 42804 datatype mismatch (interval.md §5); PG reports 42883 (no `integer / interval` operator). Both reject; a documented error-class divergence."

[[override]]
file = "expr/interval_scale.test"
sql = "SELECT INTERVAL '1 day' * INTERVAL '2 days'"
reason = "jed: multiplying two intervals is a 42804 datatype mismatch (interval.md §5); PG reports 42883 (no `interval * interval` operator). Both reject; a documented error-class divergence."

[[override]]
file = "expr/interval_arithmetic.test"
sql = "SELECT INTERVAL '1 day' + 1"
reason = "jed: an interval ± non-interval operand is a 42804 datatype mismatch (the hand-written interval-arithmetic rule — interval.md §5). PG instead reports 42883 (no `interval + integer` operator). Both reject; jed names it a type mismatch, a documented error-class divergence."

[[override]]
file = "expr/date_arithmetic.test"
sql = "SELECT d * 2 FROM t WHERE id = 1"
reason = "jed: a date in any arithmetic combination other than date ± integer, date − date, or date ± interval is a 42804 datatype mismatch (the hand-written date-arithmetic rule — date.md §6). PG reports 42883 (no `date * integer` operator). Both reject; jed names it a type mismatch, the same error-class divergence the interval-arithmetic rule carries."

[[override]]
file = "expr/date_arithmetic.test"
sql = "SELECT n - d FROM t WHERE id = 1"
reason = "jed: there is no `integer − date` operator (only `integer + date` commutes; date.md §6), so this is a 42804 datatype mismatch. PG reports 42883 (no `integer − date` operator). Both reject; jed names it a type mismatch, the same documented error-class divergence as `date * 2`."

[[override]]
file = "types/interval.test"
sql = "SELECT INTERVAL '1 m'"
reason = "jed: a bare `m` unit is ambiguous (months vs minutes) and rejected (22007 — spec/design/interval.md §3). PG resolves `m` contextually (here to minutes, `00:01:00`); jed declines the ambiguity, a documented divergence on its own surface."

[[override]]
file = "types/interval.test"
sql = "SELECT k, n FROM ik"
reason = "jed: a full scan iterates the interval PRIMARY KEY in key (= canonical-span) order — -1 mon < -1 day < 0 < 1 sec < 1 day < 1 mon < 100 years (encoding.md §2.10, interval-span-i128). With no ORDER BY the row order is unspecified (CLAUDE.md §8); PostgreSQL returns heap/insertion order, which differs. jed's committed PK-order rows are kept; the multiset is identical (the values agree exactly — interval key order is span order, the same ordering PG uses for interval comparison)."

[[override]]
file = "types/range.test"
sql = "SELECT k, n FROM rk"
reason = "jed: a full scan iterates the range PRIMARY KEY in key (= range_total_cmp) order — empty < (,5) < (,) < [1,5) < [2,4) < [2,) (encoding.md §2.11, range-bounds, the first container key). With no ORDER BY the row order is unspecified (CLAUDE.md §8); PostgreSQL returns heap/insertion order, which differs. jed's committed PK-order rows are kept; the multiset is identical (the values agree exactly — range key order is range_total_cmp order, the same ordering PG uses for its range btree opclass, only heap-vs-key)."

[[override]]
file = "ddl/composite_pk.test"
sql = "SELECT a, s FROM e6"
reason = "jed: a full scan iterates in composite-PRIMARY-KEY order — a ascending, then the text member s in C/byte (code-point) order within each a (encoding.md §2.3/§2.4), so (1,'a'),(1,'aa'),(1,'b'),(2,'a'). With no ORDER BY the row order is unspecified (CLAUDE.md §8); PostgreSQL returns heap/insertion order, which differs. jed's committed PK-order rows are kept; the multiset is identical."

[[override]]
file = "ddl/composite_pk.test"
sql = "SELECT d, a FROM e7"
reason = "jed: a full scan iterates in composite-PRIMARY-KEY order — a ascending, then the decimal member d in numeric order within each a (encoding.md §2.3/§2.5), so (1,-1.5),(1,0.5),(1,2),(2,-1.5). With no ORDER BY the row order is unspecified (CLAUDE.md §8); PostgreSQL returns heap/insertion order, which differs. jed's committed PK-order rows are kept; the multiset is identical (numeric values agree exactly)."

[[override]]
file = "ddl/composite_pk.test"
sql = "SELECT iv, a FROM e8"
reason = "jed: a full scan iterates in composite-PRIMARY-KEY order — a ascending, then the interval member iv in canonical-span order within each a (encoding.md §2.3/§2.10), so (1,-1 day),(1,1 hour),(1,1 day),(2,-1 day). With no ORDER BY the row order is unspecified (CLAUDE.md §8); PostgreSQL returns heap/insertion order, which differs. jed's committed PK-order rows are kept; the multiset is identical (interval key order is span order, the same ordering PG uses for interval comparison)."

[[override]]
file = "ddl/check.test"
sql = "CREATE TABLE odd (check int, constraint i16)"
reason = "jed: the constraint keywords (check, constraint) are NOT reserved — a column may carry those names, distinguished positionally (constraints.md intro, grammar.md §3/§29). They are fully reserved words in PostgreSQL, which raises a 42601 syntax error here."

[[override]]
file = "ddl/check.test"
sql = "INSERT INTO odd VALUES (1, 2)"
reason = "jed: follows from the override above — the table `odd` (columns named check/constraint) exists in jed but its CREATE fails in PostgreSQL, so this INSERT cannot run on the oracle."

[[override]]
file = "ddl/create_index.test"
