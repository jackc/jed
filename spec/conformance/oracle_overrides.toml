file = "expr/numeric_functions.test"
sql = "SELECT trunc(5)"
reason = "jed: trunc() over a single integer argument returns decimal/numeric (the catalog trunc integer overload — the `D` tag), like round(int). PostgreSQL has no single-arg trunc(integer); it resolves the call to trunc(double precision) and returns double precision (the `R` tag). A documented result-type divergence (floats out of the value path, float.md §8); the value is the integer itself."

# --- regexp_* flag set: jed's RE2-able flavor (regex.md §1/§8b) accepts only the `i` flag (and `g`
# for regexp_replace), unlike PostgreSQL's larger c/g/m/n/p/q/s/t/w/x set. A flag other than `i` is
# 2201B (invalid_regular_expression) across ALL of jed's regexp functions — consistent with the
# existing regexp_replace/regexp_match. PostgreSQL accepts `q` (quote) and so RETURNS a row, and uses
# 22023 (with a different message) for `z`/`g`, so these statement-error records diverge. A deliberate,
# documented flavor narrowing, not a semantic disagreement on the supported (`i`) surface.
[[override]]
file = "expr/regexp_oracle_functions.test"
sql = "SELECT regexp_like('abc', 'a', 'z') FROM one"
reason = "jed: a regexp flag other than `i` is 2201B (jed's RE2 flavor owns a smaller flag set than PG — regex.md §1/§8b, consistent with regexp_replace/regexp_match). PostgreSQL knows the `z` option and raises 22023 'invalid regular expression option: z'. The codes differ (jed folds an unknown option into invalid_regular_expression); a documented flavor narrowing."

[[override]]
file = "expr/regexp_oracle_functions.test"
sql = "SELECT regexp_count('abc', 'a', 1, 'g') FROM one"
reason = "jed: the `g` (global) flag is regexp_replace-only, so on regexp_count it is 2201B (regex.md §8b). PostgreSQL raises 22023 'regexp_count() does not support the global option'. Same rejection, different SQLSTATE/message — jed's RE2 flag set is narrower and uniform across the regexp_* family."

# --- qualified star `t.*` parser narrowings (grammar.md §15). jed's `t.*` is a select-list
# construct only, recognized by the identifier-dot-star token shape; two deliberate narrowings
# diverge from PostgreSQL, both 42601 at parse time.
[[override]]
file = "joins/qualified_star.test"
sql = "SELECT a.* AS x FROM a"
reason = "jed: a qualified star `t.*` takes no `AS` alias — 42601 (grammar.md §15). PostgreSQL accepts `a.* AS x` (the alias names the row/last expansion) and runs it. A deliberate, documented surface narrowing: jed parses `t.*` only as the bare identifier-dot-star select item, never `t.* AS name`."

[[override]]
file = "joins/qualified_star.test"
sql = "SELECT id FROM a WHERE a.* = 1"
reason = "jed: `t.*` is a select-list/RETURNING construct only; in a scalar expression position the parser rejects it 42601 (grammar.md §15 — jed has no row-valued `t.*`). PostgreSQL parses `a.*` as a whole-row value and reaches type resolution, reporting 42883 'operator does not exist: a = integer'. Same rejection (jed never supports row-valued `t.*` in an expression), different stage/SQLSTATE."

# --- JOIN ... USING divergences (grammar.md §15). jed's merge column is a single flat index (the
# surviving side), so FULL JOIN USING — whose merge is COALESCE(left, right) — is deferred; and a
# type-mismatched USING column reaches jed's strict comparison rather than PG's operator lookup.
[[override]]
file = "joins/using.test"
sql = "SELECT * FROM a FULL JOIN b USING(k)"
reason = "jed: FULL JOIN ... USING is 0A000 (grammar.md §15). The merged column of a FULL join is COALESCE(left.k, right.k) — a value, not a single column — which jed's single-flat-index merge model does not carry; INNER/LEFT (merge = left) and RIGHT (merge = right) are supported. PostgreSQL supports FULL JOIN USING and returns the coalesced merge. A deliberate, relaxable narrowing."

[[override]]
file = "joins/using.test"
sql = "SELECT * FROM a JOIN tt USING(k)"
reason = "jed: a USING column whose two sides have different types reaches jed's strict comparison, which rejects a mixed i32 = text pair as 42804 (types.md §4 — no implicit cast). PostgreSQL instead reports 42883 'operator does not exist: integer = text'. Same rejection (the join key types are incompatible), different SQLSTATE — jed's strict static type system is the documented default divergence (CLAUDE.md §4/§8)."

# --- NATURAL FULL JOIN with a common column reuses the USING merge machinery, so it inherits the
# same FULL-merge deferral as FULL JOIN USING (grammar.md §15).
[[override]]
file = "joins/natural.test"
sql = "SELECT * FROM a NATURAL FULL JOIN b"
reason = "jed: NATURAL FULL JOIN with a common column is 0A000 — its merged column is COALESCE(left, right), which jed's single-flat-index merge model does not carry (the same deferral as FULL JOIN USING, grammar.md §15). PostgreSQL supports it and returns the coalesced merge. A deliberate, relaxable narrowing."
