# Oracle-import override sidecar (CLAUDE.md §1/§7/§8; scripts/oracle_import.rb).
#
# PostgreSQL is jed's behavioral DEFAULT, not a compatibility target: jed deliberately diverges
# where the strict type system (§4) or a documented narrowing demands it. This file is the
# machine-checked ledger of those divergences. When `oracle_import.rb --check` finds jed's
# committed expected output disagreeing with the live PG oracle, a matching entry here marks the
# divergence INTENTIONAL — the importer keeps jed's answer and stays silent. A disagreement with
# NO entry is a warning ("add an override"), so the ledger cannot silently fall out of date.
#
#   file    path suffix of the .test (e.g. "types/decimal.test")
#   sql     the record's SQL, matched after whitespace-normalization
#   reason  why jed departs from PostgreSQL here

# --- make_interval named notation: jed accepts only the `=>` spelling. PostgreSQL also accepts
# the legacy `:=`, so this call SUCCEEDS in PG (returns 00:00:01) but jed rejects it 42601.
[[override]]
file = "expr/make_interval.test"
sql = "SELECT make_interval(secs := 1)"
reason = "jed: named notation uses only `=>` (grammar.md §17). jed has no `:` token, and `=>` alone is the modern, unambiguous PostgreSQL spelling, so `:=` is a 42601 syntax error. PostgreSQL accepts the legacy `:=` alias and returns 00:00:01. A deliberate, documented surface narrowing (a spelling, not a behavior — functions.md §11)."

# --- typed string literals: jed coerces integer/decimal by its OWN literal grammar (grammar.md
# §36), not PG's permissive input functions, so a `type 'string'` is byte-identical to writing the
# value as a native jed literal. The four forms PG accepts and jed rejects (22P02):
[[override]]
file = "expr/typed_literal.test"
sql = "SELECT integer '0x10'"
reason = "jed: a `type 'string'` integer is coerced by jed's own integer-literal grammar — decimal digits only (22P02). PostgreSQL (16+) accepts hex/octal/binary input and returns 16. jed has no hex integer literal anywhere, so admitting it only in the string form would diverge from its native literals (grammar.md §36)."

[[override]]
file = "expr/typed_literal.test"
sql = "SELECT integer '1_000'"
reason = "jed: a `type 'string'` integer is coerced by jed's own integer-literal grammar — no digit underscores (22P02). PostgreSQL (16+) accepts `1_000` and returns 1000. jed has no underscore-grouped integer literal anywhere (grammar.md §36)."

[[override]]
file = "expr/typed_literal.test"
sql = "SELECT numeric 'NaN'"
reason = "jed: jed's decimal is ALWAYS finite (decimal.md §2 — no NaN/±Infinity), so `numeric 'NaN'` traps 22P02. PostgreSQL's numeric has a NaN value and accepts it. A standing, documented decimal divergence (grammar.md §36, decimal.md §2)."

[[override]]
file = "types/decimal.test"
sql = "SELECT id FROM c WHERE d = '2.5'"
reason = "jed: decimal vs text is not comparable (42804). PG implicitly coerces the text literal to numeric and returns a row. The strict type system (§4) rejects the cross-family comparison."

[[override]]
file = "types/decimal.test"
sql = "INSERT INTO c VALUES (2, 1.5, 9.9)"
reason = "jed: storing a decimal literal into an integer column is an explicit-CAST-only operation (42804), stricter than PG, which assignment-casts 1.5 -> 2 by rounding. (decimal.md)"

[[override]]
file = "types/decimal.test"
sql = "INSERT INTO c VALUES (10, 5e2, 0)"
reason = "jed: the same decimal-literal-into-integer-column 42804 as the `1.5` row above, here reached via e-notation — an exponent makes `5e2` a DECIMAL literal even though 500 is integer-valued (grammar.md §14), and the strict matrix has no decimal→integer assignment cast (§4). PG treats `5e2` as numeric and assignment-casts it to 500."

[[override]]
file = "types/decimal.test"
sql = "CREATE TABLE bad3 (x numeric(5,7))"
reason = "jed: scale > precision is an invalid typmod (22023). PG 18 accepts numeric(5,7) (it allows scale outside [0,precision]). Documented PG-version-sensitive divergence."

[[override]]
file = "types/decimal.test"
sql = "CREATE TABLE bad4 (x int32(5))"
reason = "jed: a type modifier on a non-decimal type is unsupported this slice (0A000). PG rejects `integer(5)` as a syntax error (42601) — both reject, different code/class."

[[override]]
file = "types/decimal.test"
sql = "CREATE TABLE bad5 (k numeric PRIMARY KEY)"
reason = "jed: a decimal PRIMARY KEY is rejected this slice (0A000), a documented narrowing (like text PK). PG allows a numeric primary key."

[[override]]
file = "expr/timestamp_arithmetic.test"
sql = "SELECT ts - ts2 FROM t WHERE id = 3"
reason = "jed: subtracting infinite timestamps (infinity − (−infinity)) traps 22008 — jed's interval type has NO infinity (like decimal; spec/design/interval.md §1). PG 15+ returns an infinite interval. A documented semantic divergence (jed has no interval infinity to return)."

[[override]]
file = "expr/timestamp_arithmetic.test"
sql = "SELECT ts - ts2 - 1 FROM t WHERE id = 1"
reason = "jed: an interval ± non-interval operand is a 42804 datatype mismatch (interval.md §5); PG reports 42883 (no `interval − integer` operator). Both reject; a documented error-class divergence."

[[override]]
file = "expr/interval_scale.test"
sql = "SELECT 1 / INTERVAL '1 day'"
reason = "jed: dividing a number by an interval is a 42804 datatype mismatch (interval.md §5); PG reports 42883 (no `integer / interval` operator). Both reject; a documented error-class divergence."

[[override]]
file = "expr/interval_scale.test"
sql = "SELECT INTERVAL '1 day' * INTERVAL '2 days'"
reason = "jed: multiplying two intervals is a 42804 datatype mismatch (interval.md §5); PG reports 42883 (no `interval * interval` operator). Both reject; a documented error-class divergence."

[[override]]
file = "expr/interval_arithmetic.test"
sql = "SELECT INTERVAL '1 day' + 1"
reason = "jed: an interval ± non-interval operand is a 42804 datatype mismatch (the hand-written interval-arithmetic rule — interval.md §5). PG instead reports 42883 (no `interval + integer` operator). Both reject; jed names it a type mismatch, a documented error-class divergence."

[[override]]
file = "types/interval.test"
sql = "SELECT INTERVAL '1 m'"
reason = "jed: a bare `m` unit is ambiguous (months vs minutes) and rejected (22007 — spec/design/interval.md §3). PG resolves `m` contextually (here to minutes, `00:01:00`); jed declines the ambiguity, a documented divergence on its own surface."

[[override]]
file = "types/interval.test"
sql = "CREATE TABLE bad (d interval PRIMARY KEY)"
reason = "jed: an interval PRIMARY KEY is rejected this slice (0A000), a documented narrowing (like decimal/text PK — interval has no exercised order-preserving key encoding yet, interval.md §6). PG allows an interval primary key."

[[override]]
file = "ddl/composite_pk.test"
sql = "UPDATE t SET b = 9 WHERE a = 1"
reason = "jed: assigning any primary-key member is the documented 0A000 narrowing (the storage key never changes — constraints.md §3, CLAUDE.md §11 step 6). PG allows PK updates (and here would instead trap 23505 on the resulting duplicate tuple)."

[[override]]
file = "ddl/composite_pk.test"
sql = "CREATE TABLE e6 (a int32, s text, PRIMARY KEY (a, s))"
reason = "jed: a text primary-key member is the same documented 0A000 narrowing as a single-column text PRIMARY KEY (types.md §11 — the text key encoding is authored but unexercised). PG allows text key columns."

[[override]]
file = "ddl/check.test"
sql = "CREATE TABLE odd (check int, constraint int16)"
reason = "jed: the constraint keywords (check, constraint) are NOT reserved — a column may carry those names, distinguished positionally (constraints.md intro, grammar.md §3/§29). They are fully reserved words in PostgreSQL, which raises a 42601 syntax error here."

[[override]]
file = "ddl/check.test"
sql = "INSERT INTO odd VALUES (1, 2)"
reason = "jed: follows from the override above — the table `odd` (columns named check/constraint) exists in jed but its CREATE fails in PostgreSQL, so this INSERT cannot run on the oracle."

[[override]]
file = "ddl/create_index.test"
sql = "CREATE INDEX i ON t (s)"
reason = "jed: a text index key column is rejected this slice (0A000), the same documented narrowing as a text PRIMARY KEY (indexes.md §1). PG allows a text index."

[[override]]
file = "ddl/create_index.test"
sql = "CREATE TABLE on (x int32)"
reason = "jed keeps every word non-reserved (grammar.md §30): `on` is a legal table name. PG reserves ON (42601). The whole `on` block sits LAST in the file so the PG-failing ok does not poison the oracle replay prefix."

[[override]]
file = "ddl/create_index.test"
sql = "CREATE INDEX ON on (x)"
reason = "jed: the unnamed form over a table named `on` (the grammar.md §30 lookahead). PG reserves ON (42601); prefix-poisoned thereafter."

[[override]]
file = "ddl/create_index.test"
sql = "DROP INDEX on_x_idx"
reason = "Follows the PG-unparseable `on` block: the index only exists in jed (PG failed its CREATE), and the PG replay prefix is already poisoned (25P02)."

[[override]]
file = "ddl/create_index.test"
sql = "DROP TABLE on"
reason = "Follows the PG-unparseable `on` block (PG reserves ON; 25P02 in the poisoned replay prefix)."

[[override]]
file = "ddl/create_index.test"
sql = "CREATE TABLE q (x int32)"
reason = "Inside the PG-poisoned tail of the `on` block (25P02 in the replay prefix); plain SQL otherwise."

[[override]]
file = "ddl/create_index.test"
sql = "CREATE INDEX on ON q (x)"
reason = "jed: an index explicitly named `on` (the grammar.md §30 lookahead). PG reserves ON (42601)."

[[override]]
file = "ddl/create_index.test"
sql = "DROP INDEX on"
reason = "jed: dropping the index named `on`. PG reserves ON (42601)."

[[override]]
file = "ddl/unique.test"
sql = "CREATE TABLE e6 (a int32, s text UNIQUE)"
reason = "jed: a text UNIQUE member is rejected this slice (0A000), the same documented narrowing as a text PRIMARY KEY / index key column (constraints.md §5.1, indexes.md §1). PG allows text unique columns."

[[override]]
file = "ddl/unique.test"
sql = "UPDATE m SET vv = vv + 1 WHERE id < 3"
reason = "jed: UPDATE validates uniqueness against the statement's END STATE (the two-phase / all-or-nothing model — indexes.md §8); the transient 1,2 -> 2,3 shift is unique when done. PG checks per-row in heap order and fails the intermediate collision (23505)."

[[override]]
file = "ddl/unique.test"
sql = "SELECT vv FROM m ORDER BY id"
reason = "Follows the end-state UPDATE divergence: PG's failed UPDATE left m at its prior values, so the oracle's rows differ from jed's (which applied the shift, then the swap)."

[[override]]
file = "ddl/unique.test"
sql = "UPDATE m SET vv = 5 - vv WHERE id < 3"
reason = "jed: the end-state value swap succeeds (indexes.md §8); PG fails it per-row in heap order (23505) — and here runs against the state its earlier failed UPDATE preserved."

[[override]]
file = "ddl/unique.test"
sql = "DROP INDEX m_vv_key"
reason = "jed: DROP INDEX of a constraint-backed unique index is allowed and drops the UNIQUE constraint with it — jed has no ALTER TABLE ... DROP CONSTRAINT, so the index name is the constraint's only handle (indexes.md §7). PG refuses (2BP01, dependent_objects_still_exist)."

[[override]]
file = "ddl/unique.test"
sql = "INSERT INTO m VALUES (4, 30)"
reason = "Follows the constraint-drop divergence: jed dropped m's UNIQUE so the duplicate 30 inserts; in PG the constraint survived its refused DROP INDEX (and vv still holds 30 from the earlier failed UPDATEs), so the oracle traps 23505."

[[override]]
file = "dml/returning.test"
sql = "INSERT INTO t (id) SELECT a + 100 FROM src AS returning RETURNING id"
reason = "jed keeps every word non-reserved (grammar.md §3): an explicit `AS returning` source alias parses, with the RETURNING clause after it. PostgreSQL fully reserves RETURNING and rejects this (42601). Sits LAST in the file — the rows insert only in jed."

[[override]]
file = "query/comments.test"
sql = "-- nothing but a comment"
reason = "jed: comment-only input is 'no statement' (42601) — exactly one statement is parsed per input (grammar.md §1/§33). PG answers an empty query with an empty-query response, not an error."

[[override]]
file = "query/comments.test"
sql = "SELECT v */ 1 FROM t"
reason = "jed: a stray `*/` lexes as the two operator tokens `*` `/` and fails at parse (42601). PG's lexer builds multi-character operator names, so `*/` becomes an undefined operator (42883). Both reject; the code differs because jed has no multi-char operator lexing (grammar.md §33)."

[[override]]
file = "aggregates/min_max_types.test"
sql = "SELECT MIN(v), MAX(v) FROM mu"
reason = "jed: MIN/MAX over uuid is a jed extension — jed defines a total unsigned-byte order on uuid (types.md §14), so MIN/MAX work like any ordered type. PostgreSQL ships no min/max aggregate for uuid, so the query cannot run on the oracle; the committed rows (nil = MIN, all-FF = MAX) are guaranteed by the three-core agreement. Same situation as MIN/MAX(boolean)."

[[override]]
file = "aggregates/min_max.test"
sql = "SELECT MIN(f), MAX(f) FROM tb"
reason = "jed: MIN/MAX over boolean is a jed extension (false < true; types.md §9). PostgreSQL ships no min/max aggregate for boolean (it has bool_and/bool_or), so the query cannot run on the oracle; the committed rows are guaranteed by the three-core agreement. Same situation as MIN/MAX(uuid)."

[[override]]
file = "types/timestamp.test"
sql = "INSERT INTO t VALUES (10, 'now')"
reason = "jed: only literal timestamps are accepted — the special value 'now' is rejected (22007, timestamp.md). PostgreSQL resolves 'now' to the current transaction time and accepts the insert (a wall-clock, nondeterministic value jed forbids by design, CLAUDE.md §10)."

[[override]]
file = "types/timestamp.test"
sql = "INSERT INTO t VALUES (13, '2024-01-01 12:00:60')"
reason = "jed: a seconds field of 60 is out of range (22008). PostgreSQL accepts it and carries it over to 12:01:00. jed does not perform field carry-over on out-of-range time components (timestamp.md)."

[[override]]
file = "types/timestamp.test"
sql = "SELECT id FROM m WHERE a = b"
reason = "jed: timestamp and timestamptz are distinct comparison families — `timestamp = timestamptz` is not comparable (42804, the strict type system §4). PostgreSQL implicitly coerces timestamp to timestamptz (at the session zone) and returns a result."

[[override]]
file = "expr/timestamp_literal.test"
sql = "SELECT TIMESTAMP '2024-01-01 00:00:00' = TIMESTAMPTZ '2024-01-01 00:00:00+00'"
reason = "jed: timestamp and timestamptz are distinct comparison families — `timestamp = timestamptz` is not comparable (42804, the strict type system §4), here spelled with the context-free typed literals (grammar.md §36). PostgreSQL implicitly coerces timestamp to timestamptz (at the session zone) and returns a result. Same divergence as the types/timestamp.test `a = b` case."

[[override]]
file = "types/timestamptz.test"
sql = "INSERT INTO t VALUES (10, '2024-01-01 12:00:00+99')"
reason = "jed: a +99 zone offset is out of range, reported as 22008. PostgreSQL reports the same rejection under 22009 (invalid_time_zone_displacement_value). Both reject; the SQLSTATE subcode differs."

# --- float64 / float32 (spec/design/float.md). jed's float behavior tracks PG's float8/float4 on
# nearly everything (the total order — NaN largest, NaN = NaN, -0 = +0; div-by-zero 22012; finite
# overflow 22003; NaN→int 22003), so most float.test records regenerate byte-identically from the
# oracle and need NO entry. These three are the deliberate divergences:
[[override]]
file = "types/float.test"
sql = "SELECT CAST(float64 '2.5' AS int32)"
reason = "jed: float→int rounds HALF AWAY FROM ZERO (2.5 → 3) — jed's single engine-wide rounding mode, no float in the value path (float.md §5, decimal.md §3). PostgreSQL's float8→int4 cast applies rint() (round half to EVEN), so 2.5 → 2. A documented divergence on the cast's rounding mode (same half-away vs half-even split as the decimal casts)."

[[override]]
file = "types/float.test"
sql = "SELECT id FROM t WHERE id = d"
reason = "jed: int64 vs float64 is not comparable (42804) — the strict type system requires an explicit cast across the int/float families (no implicit int→float promotion; float.md §2/§11). PostgreSQL implicitly coerces the bigint to double precision and compares, returning an (empty) result with no error."

[[override]]
file = "types/float.test"
sql = "CREATE TABLE bad (k float64 PRIMARY KEY)"
reason = "jed: a float PRIMARY KEY is rejected this slice (0A000), the documented narrowing every non-integer type takes — the float-order-preserving key encoding is authored but unexercised (float.md §10, encoding.md §2.8). PostgreSQL allows a double precision primary key."

# --- composite types: a composite PRIMARY KEY is rejected this slice (composite.md §6). The
# order-preserving composite key encoding is authored (encoding.md §2.10) but unexercised — the same
# staged narrowing every non-integer key type takes. PostgreSQL allows a composite primary key.
[[override]]
file = "ddl/create_type.test"
sql = "CREATE TABLE p (home addr PRIMARY KEY)"
reason = "jed: a composite PRIMARY KEY is rejected this slice (0A000) — the composite key encoding is authored but unexercised (composite.md §6, encoding.md §2.10), the text/decimal/bytea-PK precedent. PostgreSQL allows a composite-typed primary key."

# --- DROP TYPE ... CASCADE is not supported this slice (RESTRICT-only — composite.md §7). PG drops
# the type and everything depending on it; jed rejects CASCADE 0A000 (RESTRICT is the only behavior).
[[override]]
file = "ddl/create_type.test"
sql = "DROP TYPE addr CASCADE"
reason = "jed: DROP TYPE ... CASCADE is not supported this slice (0A000); RESTRICT is the default and only behavior (composite.md §7). PostgreSQL performs the cascading drop."

# --- composite comparison error codes: jed reports an incomparable pair as 42804 datatype_mismatch
# (the strict type system's uniform comparison gate — composite.md §5), where PostgreSQL surfaces a
# more specific code. The ROWS jed returns match PG everywhere PG can evaluate; only these two
# negative cases differ in the CODE.
[[override]]
file = "types/composite.test"
sql = "SELECT at = 1 FROM places"
reason = "jed: a composite compared with a non-composite is 42804 (datatype_mismatch — the strict comparison gate, composite.md §5). PostgreSQL has no `loc = integer` operator and raises 42883 (undefined_function). A code-only divergence; both reject."

[[override]]
file = "types/composite.test"
sql = "SELECT ROW(1, 2) = ROW(1, 2, 3)"
reason = "jed: comparing rows of different sizes is 42804 (datatype_mismatch — the comparison gate, composite.md §5). PostgreSQL raises 42601 (\"unequal number of entries in row expressions\"). A code-only divergence; both reject."

# --- CTEs: two deferred narrowings jed rejects but PostgreSQL accepts (spec/design/cte.md §6).
[[override]]
file = "cte/errors.test"
sql = "WITH RECURSIVE c AS (SELECT id FROM t) SELECT id FROM c"
reason = "jed: WITH RECURSIVE is deferred this slice (0A000 — cte.md §6). PostgreSQL supports recursive CTEs and runs this (returning t's ids). A documented feature narrowing, not a behavior difference."

[[override]]
file = "cte/errors.test"
sql = "WITH a AS (WITH b AS (SELECT id FROM t) SELECT id FROM b) SELECT id FROM a"
reason = "jed: a WITH attaches only at the statement top level this slice, so a nested WITH inside a CTE body is a 42601 syntax error (cte.md §1/§6 — the body is the WITH-less query_expr). PostgreSQL accepts a nested WITH and runs it. A documented surface narrowing."

# --- float math functions: argument resolution is `none` (catalog), so a bare integer or
# decimal literal does NOT implicitly promote to the float family. PostgreSQL resolves these
# by casting the argument to double precision and returns a value; jed rejects 42883. The
# strict type system (§4): cross-family int/decimal -> float is explicit-only (float.md).
[[override]]
file = "expr/float_math.test"
sql = "SELECT sqrt(4)"
reason = "jed: sqrt takes the float family with arg_resolution = none (catalog), and an integer literal does not implicitly promote to float, so 42883. PostgreSQL casts int -> double precision and returns 2. The strict type system (§4): int<->float is explicit-cast-only (float.md)."

[[override]]
file = "expr/float_math.test"
sql = "SELECT sqrt(4.0)"
reason = "jed: sqrt takes the float family with arg_resolution = none (catalog), and a decimal literal does not implicitly promote to float, so 42883. PostgreSQL casts numeric -> double precision and returns 2. The strict type system (§4): decimal<->float is explicit-cast-only (float.md)."

# --- float round() ties: jed rounds half-AWAY-from-zero (one deterministic mode engine-wide,
# decimal.md §3 / CLAUDE.md §8), so round(2.5) = 3. PostgreSQL's float8 round uses the C library
# rint() (round-half-to-EVEN, platform-dependent), returning 2. jed deliberately diverges to keep
# float rounding deterministic and cross-core identical (§8 float-formatting bias, §10), rather than
# inherit PG's platform-sensitive rounding. round(3.5) agrees (both 4) and needs no override.
[[override]]
file = "expr/float_math.test"
sql = "SELECT round(x) FROM f WHERE id = 10"
reason = "jed: float round() is half-away-from-zero (the engine-wide deterministic rounding mode, decimal.md §3), so round(2.5::float64) = 3. PostgreSQL's double-precision round is the platform rint() (half-to-even) and returns 2 — nondeterministic across platforms, which jed deliberately avoids for cross-core determinism (CLAUDE.md §8/§10)."

# --- round(float64, n): jed defines a 2-argument round over the float family (catalog
# round/2, result float64). PostgreSQL's 2-arg round is numeric-only — there is no
# round(double precision, integer) — so PG cannot resolve this call. A deliberate jed surface
# extension (the float-math family, float_math.test); the 1-arg float round is PG-comparable.
[[override]]
file = "expr/float_math.test"
sql = "SELECT round(x, 1) FROM f WHERE id = 6"
reason = "jed extension: a 2-argument round() over float64 (catalog round/2, result float64). PostgreSQL's 2-arg round is numeric-only (no round(double precision, integer)), so PG has no such overload. jed returns 1.5."

# --- float domain-error codes: jed has a single numeric range/domain trap, 22003 (the registry
