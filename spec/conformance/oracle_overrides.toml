sql = "SELECT id FROM t WHERE a <> 'x'"
reason = "jed: int32 vs a text literal is not comparable (42804) — the strict type system (§4) rejects the cross-family comparison rather than coercing the literal. PostgreSQL coerces 'x' to integer and fails parsing it, raising 22P02. Both reject; the codes differ (the `=`/IS DISTINCT FROM precedent)."

[[override]]
file = "expr/not_equal.test"
sql = "SELECT id FROM w WHERE s <> 100000"
reason = "jed: an untyped literal adapts to the sibling column's type, so 100000 against an int16 column overflows and traps 22003 at resolve, before any row is scanned (the literal range check `=` performs — types.md §6). PostgreSQL types 100000 as int4, promotes the int2 column, and raises no error. A standing, documented divergence."

[[override]]
file = "expr/not_equal.test"
sql = "SELECT id FROM t WHERE a ! b"
reason = "jed: a lone `!` (not part of `!=`) is not in jed's surface — the lexer raises 42601 (grammar.md §4). PostgreSQL lexes `!` as an operator name and reports operator-does-not-exist 42883. jed owns its operator surface; the codes differ."

# --- IS NULL is non-associative in jed: `x IS NULL IS NULL` is a 42601 syntax error, whereas
# PostgreSQL grammar makes the null-test left-associative (`a_expr IS NULL` is itself an
# `a_expr`), so PG parses `(x IS NULL) IS NULL` and returns a boolean. A deliberate jed surface
# narrowing — the null test does not chain (grammar precedence).
[[override]]
file = "expr/precedence.test"
sql = "SELECT a IS NULL IS NULL FROM n"
reason = "jed: IS NULL is non-associative — a trailing second `IS NULL` is 42601 (the null test does not chain). PostgreSQL parses it left-associatively as `(a IS NULL) IS NULL` and returns false. A documented jed surface narrowing."

# --- >6-dimension array literal: jed rejects 7+ brace levels with its generic malformed-literal
# code 22P02 (the value codec's ndim bound, array.md §4), whereas PostgreSQL raises 54000
# (program_limit_exceeded — "number of array dimensions exceeds the maximum allowed (6)"). jed owns
# its array-literal surface and collapses the over-dimension case to 22P02; the codes differ.
[[override]]
file = "types/array_multidim.test"
sql = "SELECT '{{{{{{{1}}}}}}}'::int32[] FROM m WHERE id = 1"
reason = "jed: a text literal beyond MAXDIM (6) is 22P02 invalid_text_representation (array_in's malformed-literal code). PostgreSQL raises 54000 program_limit_exceeded. jed owns its array-literal surface; a documented code divergence."

# --- G24 timestamp/interval boundary divergences (jed owns its int64 range + engine-wide rounding) ---
# jed's finite timestamp range is i64::MIN+1 .. i64::MAX-1 microseconds from the 1970 epoch
# (timestamp.md §1); the extreme int64 values are the ±infinity sentinels, so a finite parse landing
# exactly on i64::MAX traps 22008. PostgreSQL's calendar bound (to 294276 AD) is wider and accepts
# this value as an ordinary finite timestamp.
[[override]]
file = "types/timestamp.test"
sql = "INSERT INTO e VALUES (4, '294247-01-10 04:00:54.775807')"
reason = "jed: i64::MAX microseconds is the +infinity sentinel, so a finite parse of it is out of range (22008). PostgreSQL accepts it as a finite timestamp (its calendar range reaches 294276 AD). jed owns its int64-µs range (timestamp.md §1); a documented divergence."

# jed rounds sub-microsecond fractions half-AWAY from zero (its single engine-wide rounding mode);
# PostgreSQL rounds half-to-EVEN. .1234565 → jed .123457 vs PG .123456.
[[override]]
file = "types/timestamp.test"
sql = "SELECT ts FROM e WHERE id = 5"
reason = "jed: sub-µs timestamp fractions round half-away from zero (engine-wide rounding, matching decimal.md §3) → .123457. PostgreSQL rounds half-to-even → .123456. A documented divergence."

# jed reuses its datetime field-overflow code 22008 for an interval field overflow; PostgreSQL has a
# dedicated interval_field_overflow code 22015.
[[override]]
file = "types/interval.test"
sql = "SELECT INTERVAL '100000000000 years'"
reason = "jed: an interval field overflow reuses jed's datetime field-overflow code 22008. PostgreSQL raises its dedicated 22015 interval_field_overflow. jed owns its error surface; a documented code divergence."

# --- G29 MIN/MAX(decimal) tie representation: 1.5 and 1.50 are the same value, so MIN/MAX return
# one of them. jed keeps the FIRST-seen representation (scale-1 `1.5`); PostgreSQL surfaces `1.50`.
# Same numeric value, only the rendered scale differs — a documented representation divergence.
[[override]]
file = "aggregates/min_max_types.test"
sql = "SELECT MIN(v), MAX(v) FROM mcanon"
reason = "jed: MIN/MAX over equal-value different-scale decimals keep the first-seen representation (1.5); PostgreSQL surfaces 1.50. The numeric value is identical; only the display scale differs. A documented representation divergence."

# --- G30 deferred SRF forms: jed defers the SELECT-list SRF position and WITH ORDINALITY this
# slice (array-functions.md §6), so it rejects them; PostgreSQL supports both. Pinned as rejected so
# an accidental future accept is caught by the corpus.
[[override]]
file = "query/unnest.test"
sql = "SELECT unnest(ARRAY[1,2])"
reason = "jed: a SELECT-list set-returning function is deferred (array-functions.md §6) — jed has no scalar `unnest`, so it is 42883 undefined_function. PostgreSQL allows a SELECT-list SRF and returns the rows. A documented deferral."

[[override]]
file = "query/unnest.test"
sql = "SELECT * FROM unnest(ARRAY[1,2]) WITH ORDINALITY"
reason = "jed: WITH ORDINALITY is deferred (array-functions.md §6) — the trailing keyword is a 42601 syntax error. PostgreSQL supports it. A documented deferral."

