schema_version = 1
name = "shared-file-attachment-handoff"
description = "Two handles with independent main files coordinate one writable file attachment."
requires = ["file.shared_process"]

[[step]]
actor = "b"
command = "start"
argument = "create"
path = "attachment"

[[step]]
actor = "b"
command = "exec"
sql = "CREATE TABLE t (id i64 PRIMARY KEY)"

[[step]]
actor = "b"
command = "exec"
sql = "INSERT INTO t VALUES (1)"

[[step]]
actor = "b"
command = "close"

[[step]]
actor = "a"
command = "start"
argument = "create"
path = "main_a"

[[step]]
actor = "a"
command = "attach"
name = "work"
path = "attachment"

[[step]]
actor = "b"
command = "start"
argument = "create"
path = "main_b"

[[step]]
actor = "b"
command = "attach"
name = "work"
path = "attachment"

[[step]]
actor = "a"
command = "read_open"

[[step]]
actor = "a"
command = "read_query_i64"
sql = "SELECT id FROM work.t ORDER BY id"
expect = "1"

[[step]]
actor = "b"
command = "exec"
sql = "INSERT INTO work.t VALUES (2)"

[[step]]
actor = "a"
command = "read_query_i64"
sql = "SELECT id FROM work.t ORDER BY id"
expect = "1"

[[step]]
actor = "a"
command = "read_close"

[[step]]
actor = "a"
command = "query_i64"
sql = "SELECT id FROM work.t ORDER BY id"
expect = "1,2"

[[step]]
actor = "a"
command = "write_open"
argument = "0"

[[step]]
actor = "a"
command = "write_exec"
sql = "INSERT INTO work.t VALUES (3)"

[[step]]
actor = "b"
command = "write_open"
argument = "50"
expect_error = "55P03"

[[step]]
actor = "a"
command = "write_commit"

[[step]]
actor = "b"
command = "exec"
sql = "INSERT INTO work.t VALUES (4)"

[[step]]
actor = "b"
command = "write_open"
argument = "0"

[[step]]
actor = "b"
command = "write_exec"
sql = "INSERT INTO work.t VALUES (5)"

[[step]]
actor = "b"
command = "kill"

[[step]]
actor = "a"
command = "exec"
sql = "INSERT INTO work.t VALUES (6)"

[[step]]
actor = "a"
command = "query_i64"
sql = "SELECT id FROM work.t ORDER BY id"
expect = "1,2,3,4,6"

[[step]]
actor = "a"
command = "close"
