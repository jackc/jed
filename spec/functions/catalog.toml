arg_resolution = "promote"
result         = "promoted"
null           = "propagates"
precedence     = 50
errors         = ["22003", "22012"]

# Unary minus (negation). Same family/result discipline; negating int64's minimum
# has no positive counterpart and traps 22003. Binds tighter than multiplicative.

[[operator]]
name           = "neg"
symbol         = "-"
kind           = "arithmetic"
arity          = 1
arg_families   = ["integer"]
arg_resolution = "none"
result         = "promoted"
null           = "propagates"
precedence     = 60
errors         = ["22003"]
