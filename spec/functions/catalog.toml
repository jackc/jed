# a non-RFC variant (Microsoft GUIDs, the nil uuid). volatility = "immutable" (deterministic
# functions of their input). The generators uuidv4()/uuidv7() (volatile, the entropy+clock
# seam) land in a later slice.
#
# uuid_extract_version: the version nibble (high nibble of byte 6), 0..15, as int16; NULL when
# the variant is not RFC 4122.
# uuid_extract_timestamp: the embedded instant as timestamptz, for VERSION 1 and 7 ONLY
# (matching PG 18 — v6 returns NULL there); NULL for every other version and for a non-RFC
# variant. v7 = the 48-bit big-endian Unix-millisecond field (×1000 → micros); v1 = the 60-bit
# Gregorian 100-ns count minus the 1582→1970 epoch offset, truncated to micros.
[[operator]]
