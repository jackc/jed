# === array function/operator surface AF2 (../design/array-functions.md §8) ===================
# The search/edit functions (array_remove/array_replace/array_position/array_positions) and the
# `||` concatenation operator. Like AF1 these are polymorphic over anyarray/anyelement (§2) and
# NON-STRICT (null = "none" — the kernel handles NULL): a NULL array argument yields NULL, but a
# NULL search/replacement element is a real comparable value (matched with IS NOT DISTINCT FROM,
# so it can find/remove/replace NULL elements). All rules are oracle-pinned (postgres:18).
#
# Search/edit: array_remove(a, e) drops every element NOT DISTINCT FROM e (1-D or empty only — a
# multidimensional array is 0A000); array_replace(a, from, to) substitutes (any dimensionality —
# shape preserved); array_position(a, e [, start]) returns the first element's SUBSCRIPT (in the
# array's own lower-bound space, NULL if absent — 0A000 if multidimensional; the optional start is
# a subscript to begin at, and a NULL start is 22004); array_positions(a, e) returns the i32[]
# of every match's subscript (empty {} if none, NULL if a is NULL — 0A000 if multidimensional).
