kind           = "function"
arity          = 1
arg_families   = ["text"]
arg_resolution = "none"
result         = "text"
null           = "propagates"
errors         = []

[[operator]]
name           = "upper"
kind           = "function"
arity          = 1
arg_families   = ["text"]
arg_resolution = "none"
