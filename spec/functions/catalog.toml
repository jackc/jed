symbol         = "||"
kind           = "concat"
arity          = 2
arg_families   = ["anyelement", "anyarray"]
arg_resolution = "none"
result         = "anyarray"
null           = "none"
precedence     = 37
errors         = ["22000"]

# --- the array containment / overlap operators (../design/array-functions.md §10) ------------
# Three new operators of KIND "containment": binary infix `@>` (contains), `<@` (contained by), and
# `&&` (overlaps), each `(anyarray, anyarray) → boolean`. They share `||`'s precedence (37 — the
# PostgreSQL "any other operator" rung) and are polymorphic over anyarray/anyelement like the rest
# of the surface (§2): the two operands' element types must unify, and a non-array operand or an
# element-type mismatch is 42883. Unlike the non-strict builders they are STRICT (null =
# "propagates": a NULL whole-array operand → NULL). Element matching is STRICT equality — a NULL
# element matches NOTHING (UNLIKE the search/edit functions' NOT DISTINCT FROM, §5 #10 / #12) — over
# the FLATTENED element multiset, so they work on ANY dimensionality and duplicates / custom lower
# bounds are irrelevant (set semantics). `<@` is `@>` with the operands swapped. The hand-written
# resolver (resolve_containment) routes each AST node to its boolean kernel; there is one overload
# per operator, so no overload ORDERING subtlety (contrast `concat`, §8.1). Result is boolean
# regardless of ELEM, so an all-untyped-NULL pair is NOT 42P18 (the type IS determinable).

[[operator]]
name           = "contains"
symbol         = "@>"
kind           = "containment"
arity          = 2
arg_families   = ["anyarray", "anyarray"]
arg_resolution = "none"
result         = "boolean"
null           = "propagates"
precedence     = 37
errors         = []

[[operator]]
name           = "contained_by"
symbol         = "<@"
kind           = "containment"
arity          = 2
arg_families   = ["anyarray", "anyarray"]
arg_resolution = "none"
result         = "boolean"
null           = "propagates"
precedence     = 37
errors         = []

[[operator]]
name           = "overlaps"
symbol         = "&&"
kind           = "containment"
arity          = 2
arg_families   = ["anyarray", "anyarray"]
arg_resolution = "none"
result         = "boolean"
null           = "propagates"
precedence     = 37
errors         = []

# === aggregate functions =====================================================
# Aggregates collapse the rows of a group (or, with no GROUP BY, the whole table) into a
# SINGLE value. They are NOT operators — no infix symbol, no precedence, no
# arg_resolution/promotion — so they live in their OWN array with kind = "aggregate" and
# their own field set (verify.rb validates them on a separate branch; gen_catalog.rb emits
# a separate AGGREGATES descriptor table cross-checked per core). The reserved "function"
# kind stays for future SCALAR functions (length/lower/…), which fit the operator
# result/NULL mold; aggregates do not. Semantics, the SUM/AVG widening table, the NULL /
# empty-set rules, and the GROUP BY / HAVING rules live in ../design/aggregates.md.
#
# field doc (aggregate) -------------------------------------------------------
# name          internal identity + AST aggregate selector. Overloaded across operand
#               families like operators (one row per (name, arg_families)); (name,
#               arg_families) is unique. COUNT has two rows: count_star (the COUNT(*) row
#               counter) and count (COUNT(expr)).
# kind          always "aggregate".
# surface       SQL spelling, uppercase canonical (COUNT/SUM/MIN/MAX/AVG); resolved
#               case-insensitively — aggregate names are not reserved (grammar.md §3).
# arg           "star" = the COUNT(*) no-expression row counter; "expr" = one general
#               expression argument. (DISTINCT inside an aggregate is deferred — 42601.)
# arg_families  required family of the expression argument ("any" = unconstrained).
#               Omitted for arg = "star". SUM/AVG take a numeric family (integer/decimal —
#               one row per family); COUNT(expr)/MIN/MAX take "any".
# result        a scalar id (int64, decimal) OR a reserved widening id — "sum_widen"
#               (SUM: int16/int32 -> int64, int64 -> decimal) or "same_as_input" (MIN/MAX
#               -> the argument's type). COUNT -> int64; AVG -> decimal (sum::decimal /
#               count::decimal, the exact decimal division, ../design/decimal.md §4).
# null          always "aggregate": NULL inputs are SKIPPED (COUNT(*) excepted — it counts
#               every row); over an empty/all-NULL group SUM/AVG/MIN/MAX return NULL and
#               COUNT returns 0.
# errors        SQLSTATE codes the aggregate may raise; SUM/AVG carry 22003 (overflow at
#               the result type's bound — the decimal cap or int64), COUNT/MIN/MAX [].
# -----------------------------------------------------------------------------

[[aggregate]]
name    = "count_star"
kind    = "aggregate"
surface = "COUNT"
arg     = "star"
result  = "int64"
null    = "aggregate"
errors  = []

[[aggregate]]
name         = "count"
kind         = "aggregate"
surface      = "COUNT"
arg          = "expr"
arg_families = ["any"]
result       = "int64"
null         = "aggregate"
errors       = []

[[aggregate]]
name         = "sum"
kind         = "aggregate"
