# SUM/AVG over the float family -> SAME width as input (same_as_input: SUM(float32) -> float32,
# SUM(float64) -> float64; NOT sum_widen — a float sum stays the same width, matching PG sum(real)
# -> real). Computed via the ORDER-INDEPENDENT CANONICAL-ORDER FOLD (../design/float.md §7):
# canonicalize -0, resolve NaN/±Inf first, sort the finite inputs by the §3 total order, then fold
# left with width-correct IEEE addition — so the result is identical across cores AND across any
# serial/parallel plan, IN-CONTRACT, a documented divergence from PG's order-dependent float sum
# (within R-tag tolerance). NaN/±Infinity resolve before the fold (any NaN -> NaN; mixed ±Inf -> NaN;
# else the present infinity); a running total overflowing to ±Inf traps 22003 (PG yields ±Inf —
# divergence, §7). AVG = SUM / count, one final rounding at the input width (a minor divergence from
# PG, which widens AVG(real) -> double). MIN/MAX/COUNT over float are the "any" rows (total order §3).
[[aggregate]]
name         = "sum"
kind         = "aggregate"
surface      = "SUM"
arg          = "expr"
arg_families = ["float"]
result       = "same_as_input"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "avg"
kind         = "aggregate"
surface      = "AVG"
arg          = "expr"
arg_families = ["float"]
result       = "same_as_input"
null         = "aggregate"
errors       = ["22003"]

