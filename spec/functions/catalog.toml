# --- argument-counting functions (num_nulls/num_nonnulls — the VARIADIC surface) ---
# PostgreSQL's NULL-counting functions, and the engine's FIRST VARIADIC functions
# (../design/array-functions.md §12). Each declares ONE parameter, the VARIADIC "any" (variadic =
# true, the last arg_families entry the variadic element family), so a call takes EITHER a SPREAD
# of ≥1 heterogeneous arguments — num_nulls(1, 'x', NULL) — OR a single array via the VARIADIC
# keyword — num_nulls(VARIADIC ARRAY[1,NULL,3]). num_nulls returns the count of NULL arguments;
# num_nonnulls the count of non-NULL ones; result is always int32 (PG integer). NON-STRICT (null =
# "none"): the kernel inspects null-ness itself rather than short-circuiting, so the spread form
# NEVER returns NULL (num_nulls(NULL) is 1, not NULL). The VARIADIC array form flattens the array's
# elements (row-major, any dimensionality) and counts their null-ness — but a NULL whole-array
# argument (num_nulls(VARIADIC NULL::int[])) yields NULL. A VARIADIC keyword on a non-array (or a
# bare untyped NULL) is 42804 ("VARIADIC argument must be an array"); a spread of zero args
# (num_nulls()) has no overload (42883). The VARIADIC surface was blocked on the array type (now
# landed). volatility = "immutable" (pure functions of the argument values). Oracle-checked
# (postgres:18). These names have no parameter names, so named notation on them is 42883.
[[operator]]
name           = "num_nulls"
kind           = "function"
arity          = 1
arg_families   = ["any"]
variadic       = true
arg_resolution = "none"
result         = "int32"
null           = "none"
errors         = ["42804"]
volatility     = "immutable"

[[operator]]
name           = "num_nonnulls"
kind           = "function"
arity          = 1
arg_families   = ["any"]
variadic       = true
arg_resolution = "none"
result         = "int32"
null           = "none"
errors         = ["42804"]
volatility     = "immutable"

# --- array functions (AF1: the polymorphic surface) --------------------------
# The scalar-function-shaped array surface (../design/array-functions.md). These are the
# FIRST functions over the POLYMORPHIC pseudo-families `anyarray`/`anyelement`: an `anyarray`
# slot matches any array argument and binds ELEM := its element type; an `anyelement` slot
# matches any argument and binds/checks ELEM := its type; the reserved result codes `anyarray`
# (= ELEM[]) and `anyelement` (= ELEM) read that binding back. `anyarray`/`anyelement` are
# catalog CONTRACT TOKENS interpreted by the hand-written resolver (CLAUDE.md §5) — deliberately
# NOT families in scalars.toml (not storable, no id/codec). verify.rb admits them in
# arg_families/result as an allowlist. No grammar change (the function_call production already
# parses them). All rules are oracle-pinned (postgres:18).
#
# Introspection (array_ndims/length/lower/upper/cardinality/dims): pure readers of the value's
# ndim/dims/lbounds header. They `propagate` NULL (a NULL array OR a NULL dimension arg → NULL)
# and beyond that return NULL for an out-of-shape request — array_length/lower/upper are NULL for
# an empty array or an out-of-range dimension; array_ndims/array_dims are NULL for the empty
# array; cardinality is 0 for the empty array (the one introspector distinguishing empty from
# absent). The dimension arg is the `integer` family (jed accepts any integer width — a minor
# documented divergence from PG's strict int4). All return int32 (array_dims returns text:
# `[l1:u1][l2:u2]…`).
#
# Builders (array_append/array_prepend/array_cat): result = "anyarray". They are NON-STRICT —
# null = "none" tells the resolver NOT to short-circuit a NULL argument; the kernel handles NULL
# itself (a NULL array arg is the identity/empty, NOT a propagated NULL). array_append/prepend
# require an empty-or-1-D array (a multidimensional one is 22000); array_cat concatenates along the
# outer dimension and is 2202E on incompatible dimensionalities.

