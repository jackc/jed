# === aggregate functions =====================================================
# Aggregates collapse the rows of a group (or, with no GROUP BY, the whole table) into a
# SINGLE value. They are NOT operators — no infix symbol, no precedence, no
# arg_resolution/promotion — so they live in their OWN array with kind = "aggregate" and
# their own field set (verify.rb validates them on a separate branch; gen_catalog.rb emits
# a separate AGGREGATES descriptor table cross-checked per core). The reserved "function"
# kind stays for future SCALAR functions (length/lower/…), which fit the operator
# result/NULL mold; aggregates do not. Semantics, the SUM/AVG widening table, the NULL /
# empty-set rules, and the GROUP BY / HAVING rules live in ../design/aggregates.md.
#
# field doc (aggregate) -------------------------------------------------------
# name          internal identity + AST aggregate selector. Overloaded across operand
#               families like operators (one row per (name, arg_families)); (name,
#               arg_families) is unique. COUNT has two rows: count_star (the COUNT(*) row
#               counter) and count (COUNT(expr)).
# kind          always "aggregate".
# surface       SQL spelling, uppercase canonical (COUNT/SUM/MIN/MAX/AVG); resolved
#               case-insensitively — aggregate names are not reserved (grammar.md §3).
# arg           "star" = the COUNT(*) no-expression row counter; "expr" = one general
#               expression argument. (DISTINCT inside an aggregate is deferred — 42601.)
# arg_families  required family of the expression argument ("any" = unconstrained).
#               Omitted for arg = "star". SUM/AVG take a numeric family (integer/decimal —
#               one row per family); COUNT(expr)/MIN/MAX take "any".
# result        a scalar id (int64, decimal) OR a reserved widening id — "sum_widen"
#               (SUM: int16/int32 -> int64, int64 -> decimal) or "same_as_input" (MIN/MAX
#               -> the argument's type). COUNT -> int64; AVG -> decimal (sum::decimal /
#               count::decimal, the exact decimal division, ../design/decimal.md §4).
# null          always "aggregate": NULL inputs are SKIPPED (COUNT(*) excepted — it counts
#               every row); over an empty/all-NULL group SUM/AVG/MIN/MAX return NULL and
#               COUNT returns 0.
# errors        SQLSTATE codes the aggregate may raise; SUM/AVG carry 22003 (overflow at
#               the result type's bound — the decimal cap or int64), COUNT/MIN/MAX [].
# -----------------------------------------------------------------------------

[[aggregate]]
name    = "count_star"
kind    = "aggregate"
surface = "COUNT"
arg     = "star"
result  = "int64"
null    = "aggregate"
errors  = []

[[aggregate]]
name         = "count"
kind         = "aggregate"
surface      = "COUNT"
arg          = "expr"
arg_families = ["any"]
result       = "int64"
null         = "aggregate"
errors       = []

[[aggregate]]
name         = "sum"
kind         = "aggregate"
surface      = "SUM"
arg          = "expr"
arg_families = ["integer"]
result       = "sum_widen"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "sum"
kind         = "aggregate"
surface      = "SUM"
arg          = "expr"
arg_families = ["decimal"]
result       = "decimal"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "avg"
kind         = "aggregate"
surface      = "AVG"
arg          = "expr"
arg_families = ["integer"]
result       = "decimal"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "avg"
kind         = "aggregate"
surface      = "AVG"
arg          = "expr"
arg_families = ["decimal"]
result       = "decimal"
null         = "aggregate"
errors       = ["22003"]

# SUM/AVG over the float family -> SAME width as input (same_as_input: SUM(float32) -> float32,
# SUM(float64) -> float64; NOT sum_widen — a float sum stays the same width, matching PG sum(real)
# -> real). Computed via the ORDER-INDEPENDENT CANONICAL-ORDER FOLD (../design/float.md §7):
# canonicalize -0, resolve NaN/±Inf first, sort the finite inputs by the §3 total order, then fold
# left with width-correct IEEE addition — so the result is identical across cores AND across any
# serial/parallel plan, IN-CONTRACT, a documented divergence from PG's order-dependent float sum
# (within R-tag tolerance). NaN/±Infinity resolve before the fold (any NaN -> NaN; mixed ±Inf -> NaN;
# else the present infinity); a running total overflowing to ±Inf traps 22003 (PG yields ±Inf —
# divergence, §7). AVG = SUM / count, one final rounding at the input width (a minor divergence from
# PG, which widens AVG(real) -> double). MIN/MAX/COUNT over float are the "any" rows (total order §3).
[[aggregate]]
name         = "sum"
kind         = "aggregate"
surface      = "SUM"
arg          = "expr"
arg_families = ["float"]
result       = "same_as_input"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "avg"
kind         = "aggregate"
surface      = "AVG"
arg          = "expr"
arg_families = ["float"]
result       = "same_as_input"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "min"
kind         = "aggregate"
surface      = "MIN"
arg          = "expr"
arg_families = ["any"]
result       = "same_as_input"
null         = "aggregate"
errors       = []

[[aggregate]]
name         = "max"
kind         = "aggregate"
surface      = "MAX"
arg          = "expr"
arg_families = ["any"]
result       = "same_as_input"
null         = "aggregate"
errors       = []

# === set-returning functions =================================================
# A set-returning function (SRF) EXPANDS its arguments into a ROW SET — it fits neither the
# operator mold (one value from infix operands) nor the aggregate mold (one value from a group):
# it produces zero or more rows. So, like aggregates, SRFs live in their OWN array with kind =
# "set_returning" and their own field set (verify.rb validates them on a separate branch;
# gen_catalog.rb emits a separate SET_RETURNING descriptor table cross-checked per core). The
# first SRF is `generate_series`, valid ONLY as a FROM-clause row source this slice (not in the
# SELECT list; no LATERAL; no column-alias list) — semantics, the synthetic-relation model, and
# the cost rule live in ../design/functions.md §10 and ../design/grammar.md §35. The resolve
# DISPATCH is hand-written per core (like the aggregate/scalar dispatch); this row is the shared
# registry data (CLAUDE.md §5).
#
# field doc (set_returning) ---------------------------------------------------
# name          internal identity + AST/resolver selector. Overloaded across ARITY (the 2-arg
#               and 3-arg generate_series share the name), so the uniqueness key is (name,
#               arity), not (name, arg_families) — both forms take the same family per position.
# kind          always "set_returning".
# surface       SQL spelling, lowercase canonical (resolved case-insensitively — SRF names are
#               not reserved, grammar.md §3).
# arity         operand count (generate_series: 2 = start/stop, 3 = start/stop/step).
# arg_families  required family of each operand, by position, referencing a `family` in
#               ../types/scalars.toml. generate_series takes "integer" per position this slice.
# arg_resolution "promote" = widen all operands via the promotion tower to a common type (the
#               result column type); "none" = no reconcile. generate_series uses "promote".
# result        a reserved set-returning result id (NOT a plain scalar — an SRF returns a row
#               SET): "set_of_promoted" = a row set of ONE column whose type is the promoted
#               integer type of the args (the SRF analogue of the aggregates' sum_widen).
# column        the fixed output column NAME of the produced relation (PG names it after the
#               function: generate_series). Authored data, not computed.
# null          "empty_on_null" = any NULL argument yields ZERO rows (PG generate_series), as
#               opposed to a scalar function's "propagates".
# errors        SQLSTATE codes the SRF may raise; generate_series carries 22023 (step size of
#               zero — ../errors/registry.toml). NULL→empty and i64-overflow→clean-stop are NOT
#               errors.
# -----------------------------------------------------------------------------

[[set_returning]]
name           = "generate_series"
kind           = "set_returning"
surface        = "generate_series"
arity          = 2
arg_families   = ["integer", "integer"]
arg_resolution = "promote"
result         = "set_of_promoted"
column         = "generate_series"
null           = "empty_on_null"
errors         = []

[[set_returning]]
name           = "generate_series"
kind           = "set_returning"
surface        = "generate_series"
arity          = 3
arg_families   = ["integer", "integer", "integer"]
arg_resolution = "promote"
result         = "set_of_promoted"
column         = "generate_series"
null           = "empty_on_null"
errors         = ["22023"]
