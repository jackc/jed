# --- arithmetic operators ----------------------------------------------------
# Binary integer arithmetic. A mixed-width pair is widened to the common type by
# the promotion tower (arg_resolution = "promote"); the result type is that
# common type (result = "promoted"), and a result outside the common type's range
# traps 22003 (so int16 + int16 overflows at the int16 boundary, not int64's).
# Any NULL operand yields NULL (null = "propagates"). Multiplicative binds tighter
# than additive. Division and modulo additionally trap 22012 on a zero divisor;
# integer division truncates toward zero and the remainder takes the dividend's
# sign.

[[operator]]
name           = "add"
symbol         = "+"
kind           = "arithmetic"
arity          = 2
arg_families   = ["integer", "integer"]
arg_resolution = "promote"
result         = "promoted"
null           = "propagates"
precedence     = 40
errors         = ["22003"]

[[operator]]
name           = "sub"
symbol         = "-"
kind           = "arithmetic"
arity          = 2
arg_families   = ["integer", "integer"]
arg_resolution = "promote"
result         = "promoted"
null           = "propagates"
precedence     = 40
errors         = ["22003"]

[[operator]]
