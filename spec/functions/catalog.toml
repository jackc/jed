# --- pattern matching (text) -------------------------------------------------
# LIKE is a text pattern match: `%` matches any (possibly empty) run of characters, `_`
# matches exactly one character (one Unicode CODE POINT — not a byte/UTF-16 unit, a §8
# determinism surface), with PostgreSQL's default `\` escape (`\%` `\_` `\\` match literal).
# It is a KEYWORD operator with no punctuation `symbol` (like IS [NOT] DISTINCT FROM):
# text×text → boolean, null = "propagates" (a NULL operand yields NULL — never the
# pattern-error). It binds at the comparison level (precedence 35), non-associative, and
# `NOT LIKE` is its negation (carried by the AST, not a separate operator). A pattern that
# ENDS in a lone escape char, reached during matching while subject remains, traps 22025
# (../design/grammar.md §22; verified against PostgreSQL 18). text vs a non-text operand is a
# 42804 (compare.toml lists only text×text). ILIKE is the case-insensitive form (below); the
# ESCAPE clause and SIMILAR TO remain deferred.

[[operator]]
name           = "like"
kind           = "comparison"
arity          = 2
arg_families   = ["text", "text"]
arg_resolution = "none"
result         = "boolean"
null           = "propagates"
precedence     = 35
errors         = ["22025"]

# ILIKE — case-insensitive LIKE (collation.md §16). Identical contract to LIKE; the matcher
# simple-lowercases (1:1, ASCII baseline when no Unicode property bundle is loaded; full simple
# Unicode mappings when one is) both operands before matching, so `_`/length semantics survive.
# `NOT ILIKE` is its negation (carried by the AST). Same keyword-operator shape as `like`.
[[operator]]
name           = "ilike"
kind           = "comparison"
arity          = 2
arg_families   = ["text", "text"]
arg_resolution = "none"
result         = "boolean"
null           = "propagates"
precedence     = 35
errors         = ["22025"]

# Regular-expression match — `~` (case-sensitive) and `~*` (case-insensitive), with `!~`/`!~*` their
# negations (carried by the AST `negated` flag, the NOT-LIKE precedent — not separate rows). Unlike
# LIKE these are PUNCTUATION operators (a `symbol`), and unlike LIKE the match is UNANCHORED — `~`
# is TRUE iff the pattern matches some SUBSTRING (anchor with ^/$). The flavor is jed's own RE2-able
# subset (../design/regex.md), NOT PostgreSQL-compatible; SIMILAR TO and backreferences/lookaround
# are excluded. text×text → boolean, null = "propagates" (a NULL operand → NULL, never the pattern
# error), a non-text operand is 42804 (compare.toml lists only text×text). A malformed pattern is
# 2201B; a well-formed-but-too-large compiled program is 54001 (../design/regex.md §6/§7). `~*`
# simple-lowercases both operands first (the ILIKE mechanism, collation.md §16). Binds at the
# comparison level (precedence 35), non-associative. Matching is hand-written per core (a Pike VM,
# regex.md §4), resolved directly as the AST `Regex` node (like LIKE), not via overload dispatch.
[[operator]]
name           = "regex_match"
symbol         = "~"
kind           = "comparison"
arity          = 2
arg_families   = ["text", "text"]
arg_resolution = "none"
result         = "boolean"
null           = "propagates"
precedence     = 35
errors         = ["2201B"]

[[operator]]
name           = "regex_imatch"
symbol         = "~*"
kind           = "comparison"
arity          = 2
arg_families   = ["text", "text"]
arg_resolution = "none"
result         = "boolean"
null           = "propagates"
precedence     = 35
errors         = ["2201B"]

