# --- arithmetic operators (decimal) ------------------------------------------
# The decimal-family OVERLOAD of the arithmetic operators. Computation is EXACT in limbs;
# the RESULT SCALE follows PostgreSQL's numeric rules (../design/decimal.md §4): add/sub →
# max(s1,s2); mul → s1+s2; div → select_div_scale (>= the larger input scale, with enough
# extra digits for >=16 significant figures, rounded HALF AWAY FROM ZERO); mod → max(s1,s2),
# remainder takes the dividend's sign (toward-zero quotient), matching integer `%`. result =
# "promoted" = the common operand type (decimal; the per-call scale is computed by the rules
# above). A mixed integer×decimal pair promotes the integer to decimal (scale 0) first
# (compare.toml). add/sub/mul/div trap 22003 only at the unconstrained cap (max_precision /
# max_scale, scalars.toml) or when the result is coerced into a constrained numeric(p,s);
# div/mod by zero trap 22012 (the defined, deterministic abort). Unary `neg` only flips the
# sign of a sign-magnitude value, so it can never overflow (errors = []).

