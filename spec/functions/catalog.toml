# --- current-time functions --------------------------------------------------
# Niladic timestamptz functions on the host-injected clock seam (spec/design/entropy.md):
# tests inject a fixed/advancing clock (the `# clock:` / `# clock_advance:` directives) for exact
# cross-core output; production reads the wall clock. NOT oracle-imported (PG's wall clock differs);
# expected values are hand-authored under the injected clock.
