# --- null tests --------------------------------------------------------------
# Unary null-detection over any nullable value of any type. Unlike comparisons
# these never propagate: the result is ALWAYS a definite boolean, never unknown —
# they are the sanctioned way to observe a NULL (compare.toml [null]). No infix
# `symbol`; the surface spelling is the `IS [NOT] NULL` postfix keyword form owned
# by the grammar, binding at the comparison level (precedence 35).

[[operator]]
name           = "is_null"
kind           = "null_test"
arity          = 1
arg_families   = ["any"]
arg_resolution = "none"
result         = "boolean"
null           = "detects"
precedence     = 35
errors         = []

[[operator]]
name           = "is_not_null"
kind           = "null_test"
arity          = 1
arg_families   = ["any"]
arg_resolution = "none"
result         = "boolean"
null           = "detects"
precedence     = 35
errors         = []

# --- arithmetic operators ----------------------------------------------------
# Binary integer arithmetic. A mixed-width pair is widened to the common type by
# the promotion tower (arg_resolution = "promote"); the result type is that
# common type (result = "promoted"), and a result outside the common type's range
# traps 22003 (so int16 + int16 overflows at the int16 boundary, not int64's).
# Any NULL operand yields NULL (null = "propagates"). Multiplicative binds tighter
# than additive. Division and modulo additionally trap 22012 on a zero divisor;
# integer division truncates toward zero and the remainder takes the dividend's
# sign.

[[operator]]
name           = "add"
symbol         = "+"
kind           = "arithmetic"
arity          = 2
arg_families   = ["integer", "integer"]
arg_resolution = "promote"
result         = "promoted"
null           = "propagates"
precedence     = 40
errors         = ["22003"]

[[operator]]
name           = "sub"
symbol         = "-"
kind           = "arithmetic"
arity          = 2
arg_families   = ["integer", "integer"]
arg_resolution = "promote"
result         = "promoted"
null           = "propagates"
precedence     = 40
errors         = ["22003"]

[[operator]]
