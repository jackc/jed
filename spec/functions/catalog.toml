# === aggregate functions =====================================================
# Aggregates collapse the rows of a group (or, with no GROUP BY, the whole table) into a
# SINGLE value. They are NOT operators — no infix symbol, no precedence, no
# arg_resolution/promotion — so they live in their OWN array with kind = "aggregate" and
# their own field set (verify.rb validates them on a separate branch; gen_catalog.rb emits
# a separate AGGREGATES descriptor table cross-checked per core). The reserved "function"
# kind stays for future SCALAR functions (length/lower/…), which fit the operator
# result/NULL mold; aggregates do not. Semantics, the SUM/AVG widening table, the NULL /
# empty-set rules, and the GROUP BY / HAVING rules live in ../design/aggregates.md.
#
# field doc (aggregate) -------------------------------------------------------
# name          internal identity + AST aggregate selector. Overloaded across operand
#               families like operators (one row per (name, arg_families)); (name,
#               arg_families) is unique. COUNT has two rows: count_star (the COUNT(*) row
#               counter) and count (COUNT(expr)).
# kind          always "aggregate".
# surface       SQL spelling, uppercase canonical (COUNT/SUM/MIN/MAX/AVG); resolved
#               case-insensitively — aggregate names are not reserved (grammar.md §3).
# arg           "star" = the COUNT(*) no-expression row counter; "expr" = one general
#               expression argument. (DISTINCT inside an aggregate is deferred — 42601.)
# arg_families  required family of the expression argument ("any" = unconstrained).
#               Omitted for arg = "star". SUM/AVG take a numeric family (integer/decimal —
#               one row per family); COUNT(expr)/MIN/MAX take "any".
# result        a scalar id (i64, decimal) OR a reserved widening id — "sum_widen"
#               (SUM: i16/i32 -> i64, i64 -> decimal) or "same_as_input" (MIN/MAX
#               -> the argument's type). COUNT -> i64; AVG -> decimal (sum::decimal /
#               count::decimal, the exact decimal division, ../design/decimal.md §4).
# null          always "aggregate": NULL inputs are SKIPPED (COUNT(*) excepted — it counts
#               every row); over an empty/all-NULL group SUM/AVG/MIN/MAX return NULL and
#               COUNT returns 0.
# errors        SQLSTATE codes the aggregate may raise; SUM/AVG carry 22003 (overflow at
#               the result type's bound — the decimal cap or i64), COUNT/MIN/MAX [].
# -----------------------------------------------------------------------------

[[aggregate]]
name    = "count_star"
kind    = "aggregate"
surface = "COUNT"
arg     = "star"
result  = "i64"
null    = "aggregate"
errors  = []

[[aggregate]]
name         = "count"
kind         = "aggregate"
surface      = "COUNT"
arg          = "expr"
arg_families = ["any"]
result       = "i64"
null         = "aggregate"
errors       = []

[[aggregate]]
name         = "sum"
kind         = "aggregate"
surface      = "SUM"
arg          = "expr"
arg_families = ["integer"]
result       = "sum_widen"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "sum"
kind         = "aggregate"
surface      = "SUM"
arg          = "expr"
arg_families = ["decimal"]
result       = "decimal"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "avg"
kind         = "aggregate"
surface      = "AVG"
arg          = "expr"
arg_families = ["integer"]
result       = "decimal"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "avg"
kind         = "aggregate"
surface      = "AVG"
arg          = "expr"
arg_families = ["decimal"]
result       = "decimal"
null         = "aggregate"
errors       = ["22003"]

# SUM/AVG over the float family -> SAME width as input (same_as_input: SUM(f32) -> f32,
# SUM(f64) -> f64; NOT sum_widen — a float sum stays the same width, matching PG sum(real)
# -> real). Computed via the ORDER-INDEPENDENT CANONICAL-ORDER FOLD (../design/float.md §7):
# canonicalize -0, resolve NaN/±Inf first, sort the finite inputs by the §3 total order, then fold
# left with width-correct IEEE addition — so the result is identical across cores AND across any
# serial/parallel plan, IN-CONTRACT, a documented divergence from PG's order-dependent float sum
# (within R-tag tolerance). NaN/±Infinity resolve before the fold (any NaN -> NaN; mixed ±Inf -> NaN;
# else the present infinity); a running total overflowing to ±Inf traps 22003 (PG yields ±Inf —
# divergence, §7). AVG = SUM / count, one final rounding at the input width (a minor divergence from
# PG, which widens AVG(real) -> double). MIN/MAX/COUNT over float are the "any" rows (total order §3).
[[aggregate]]
name         = "sum"
kind         = "aggregate"
surface      = "SUM"
arg          = "expr"
arg_families = ["float"]
result       = "same_as_input"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "avg"
kind         = "aggregate"
surface      = "AVG"
arg          = "expr"
arg_families = ["float"]
result       = "same_as_input"
null         = "aggregate"
errors       = ["22003"]

[[aggregate]]
name         = "min"
kind         = "aggregate"
surface      = "MIN"
arg          = "expr"
arg_families = ["any"]
result       = "same_as_input"
null         = "aggregate"
errors       = []

[[aggregate]]
name         = "max"
kind         = "aggregate"
surface      = "MAX"
arg          = "expr"
arg_families = ["any"]
result       = "same_as_input"
null         = "aggregate"
errors       = []

# json/jsonb array aggregates (B4, json-sql-functions.md §4): aggregate the input values into a JSON
# array, in the group's row order (jed has no in-aggregate ORDER BY yet). json_agg/jsonb_agg INCLUDE
# a NULL input (as JSON null); the _strict variants SKIP a NULL input. Result NULL over an empty
# group. Each input's JSON image is the to_jsonb kernel (so the same deferred 0A000 sources apply).
# The object_agg variants (2-arg key/value) + the _unique dup-key variants are a follow-on slice.
[[aggregate]]
name         = "jsonb_agg"
kind         = "aggregate"
surface      = "jsonb_agg"
arg          = "expr"
arg_families = ["any"]
result       = "jsonb"
null         = "aggregate"
errors       = ["0A000"]

[[aggregate]]
name         = "json_agg"
kind         = "aggregate"
surface      = "json_agg"
arg          = "expr"
arg_families = ["any"]
result       = "json"
null         = "aggregate"
errors       = ["0A000"]

[[aggregate]]
name         = "jsonb_agg_strict"
kind         = "aggregate"
surface      = "jsonb_agg_strict"
arg          = "expr"
arg_families = ["any"]
result       = "jsonb"
null         = "aggregate"
errors       = ["0A000"]

[[aggregate]]
name         = "json_agg_strict"
kind         = "aggregate"
surface      = "json_agg_strict"
arg          = "expr"
arg_families = ["any"]
result       = "json"
null         = "aggregate"
errors       = ["0A000"]

# === window functions ========================================================
# A WINDOW function computes a per-row value over a related set of rows (its frame) WITHOUT
# collapsing them (../design/window.md). It is neither an operator (one value from infix
# operands) nor an aggregate (one value from a whole group) — it is per-row AND a fold at once,
# evaluated in a dedicated WINDOW stage after GROUP BY/HAVING and before ORDER BY/LIMIT. So the
# window-ONLY functions live in their OWN array with kind = "window" and their own field set
# (verify.rb validates them on a separate branch; gen_catalog.rb emits a separate WINDOWS
# descriptor table cross-checked per core). The catalog AGGREGATES (count/sum/min/max/avg) are
# ALSO usable as window functions with an OVER clause (S3) — they are NOT duplicated here; the
# resolver dispatches an aggregate name carrying OVER through the same AggPlan/Acc kernels folded
# over a frame. This array holds only the window-EXCLUSIVE functions. The resolve dispatch is
# hand-written per core (like the aggregate/scalar/SRF dispatch); these rows are the shared
# registry data (CLAUDE.md §5). Lands across slices S0–S4 (../design/window.md §1).
#
# field doc (window) ----------------------------------------------------------
# name           internal identity + AST/resolver WindowPlan selector. Uniqueness key is `name`
#                (no overloading this slice — each window function has one signature).
# kind           always "window".
# surface        SQL spelling, uppercase canonical (resolved case-insensitively — window names are
#                not reserved, grammar.md §3).
# args           argument shape: "none" (row_number/rank/dense_rank/percent_rank/cume_dist —
#                no argument), "one" (ntile(n)/first_value(e)/last_value(e) — one argument),
#                "value_offset_default" (lag/lead — a value expr + optional integer offset +
#                optional default), "value_n" (nth_value(e, n) — a value expr + an integer
#                position). Interpreted by the hand-written resolver.
# arg_families   required family of the constrained argument(s), by position; "any" =
#                unconstrained. Omitted for args = "none". ntile's n is "integer"; the
#                value-expression of lag/lead/first_value/… is "any".
# result         a scalar id (i64, f64) OR the reserved "same_as_input" id (the value
#                functions return their value-expression's type, like MIN/MAX). Ranking counters
#                → i64; percent_rank/cume_dist → f64 (PG's float8 — the ratio division is the
#                IEEE correctly-rounded f64 kernel, ../design/window.md §4).
# frame_sensitive whether the function reads the per-row FRAME (true) or ignores it and sees the
#                whole partition / a positional offset (false). row_number/rank/dense_rank/
#                percent_rank/cume_dist/ntile/lag/lead are frame-INSENSITIVE; the aggregate
#                windows + first_value/last_value/nth_value are frame-SENSITIVE.
# requires_order whether the function REQUIRES a window ORDER BY (42P20 if absent). All current
#                window functions tolerate no ORDER BY (then every row is one peer group; the
#                within-partition order is PK order — the fully-resolved-order rule, window.md §3).
# null           "never" (ranking counters never NULL), "offset" (lag/lead → NULL when the offset
#                leaves the partition and no default is given), "frame" (first/last/nth_value →
#                NULL when the frame is empty / has < n rows).
# errors         SQLSTATE codes the function may raise; ntile/nth_value carry 22023 (argument < 1),
#                the rest [].
# -----------------------------------------------------------------------------

[[window]]
name           = "row_number"
kind           = "window"
surface        = "ROW_NUMBER"
args           = "none"
result         = "i64"
frame_sensitive = false
requires_order = false
null           = "never"
errors         = []

# rank / dense_rank — peer-aware ranking (peers = rows equal on the window ORDER BY only; the PK
# tie-break orders peers for row_number but does NOT split a peer group — window.md §3). rank skips
# ranks after a tie (1,1,3); dense_rank does not (1,1,2). Both i64, frame-insensitive (S1).
[[window]]
name           = "rank"
kind           = "window"
surface        = "RANK"
args           = "none"
result         = "i64"
frame_sensitive = false
requires_order = false
null           = "never"
errors         = []

[[window]]
name           = "dense_rank"
kind           = "window"
surface        = "DENSE_RANK"
args           = "none"
result         = "i64"
frame_sensitive = false
requires_order = false
null           = "never"
errors         = []

# percent_rank / cume_dist — relative ranking ratios, peer-aware. percent_rank = (rank-1)/(N-1)
# (0 when N=1); cume_dist = (# rows through the current peer group)/N. Result f64 — PG's float8
# (window.md §4). The ratio is one IEEE correctly-rounded f64 division of small integers that
# convert exactly to binary64, so the result is bit-identical across cores AND to PG (the
# in-contract float kernel, float.md §5) — no longer the old decimal divergence.
[[window]]
name           = "percent_rank"
kind           = "window"
surface        = "PERCENT_RANK"
args           = "none"
result         = "f64"
frame_sensitive = false
requires_order = false
null           = "never"
errors         = []

[[window]]
name           = "cume_dist"
kind           = "window"
surface        = "CUME_DIST"
args           = "none"
result         = "f64"
frame_sensitive = false
requires_order = false
null           = "never"
errors         = []

# ntile(n) — distribute the partition's rows into n ranked buckets as evenly as possible (larger
# buckets first), numbered 1..n. The bucket-count argument is an integer evaluated once per
# partition; n <= 0 is 22014; a NULL n yields NULL for every row (PG). Position-based (NOT
# peer-based), i64. (S1)
[[window]]
name           = "ntile"
kind           = "window"
surface        = "NTILE"
args           = "one"
arg_families   = ["integer"]
result         = "i64"
frame_sensitive = false
requires_order = false
null           = "frame"
errors         = ["22014"]

# lag / lead — the value of the row `offset` positions BEFORE (lag) / AFTER (lead) the current row
# within the partition (in window ORDER BY order). offset is an integer (default 1); when the
# target falls outside the partition the result is the `default` argument, else NULL. The value
# expression's type is the result type (same_as_input). Frame-INSENSITIVE (offset is by position,
# not the frame). (S2)
[[window]]
name           = "lag"
kind           = "window"
surface        = "LAG"
args           = "value_offset_default"
arg_families   = ["any"]
result         = "same_as_input"
frame_sensitive = false
requires_order = false
null           = "offset"
errors         = []

[[window]]
name           = "lead"
kind           = "window"
surface        = "LEAD"
args           = "value_offset_default"
arg_families   = ["any"]
result         = "same_as_input"
frame_sensitive = false
requires_order = false
null           = "offset"
errors         = []

# first_value / last_value / nth_value — FRAME-SENSITIVE value pickers (window.md §4/§6). first_value
# is the value of the frame's first row; last_value its last row; nth_value(e, n) its n-th row (NULL
# if the frame has fewer than n rows, n < 1 → 22016). With the default frame (RANGE UNBOUNDED
# PRECEDING TO CURRENT ROW) last_value is the current row's value (a classic PG gotcha) — an explicit
# frame (S4 ROWS) widens it. Result = the value expression's type (same_as_input). (S4)
[[window]]
name           = "first_value"
kind           = "window"
surface        = "FIRST_VALUE"
args           = "one"
arg_families   = ["any"]
result         = "same_as_input"
frame_sensitive = true
requires_order = false
null           = "frame"
errors         = []

[[window]]
name           = "last_value"
kind           = "window"
surface        = "LAST_VALUE"
args           = "one"
arg_families   = ["any"]
result         = "same_as_input"
frame_sensitive = true
requires_order = false
null           = "frame"
errors         = []

[[window]]
name           = "nth_value"
kind           = "window"
surface        = "NTH_VALUE"
args           = "value_n"
arg_families   = ["any"]
result         = "same_as_input"
frame_sensitive = true
requires_order = false
null           = "frame"
errors         = ["22016"]

# === set-returning functions =================================================
# A set-returning function (SRF) EXPANDS its arguments into a ROW SET — it fits neither the
# operator mold (one value from infix operands) nor the aggregate mold (one value from a group):
# it produces zero or more rows. So, like aggregates, SRFs live in their OWN array with kind =
# "set_returning" and their own field set (verify.rb validates them on a separate branch;
# gen_catalog.rb emits a separate SET_RETURNING descriptor table cross-checked per core). The
# first SRF is `generate_series`; the second is the polymorphic `unnest` (AF3 — array-functions.md
# §6). Both are valid ONLY as a FROM-clause row source this slice (not in the SELECT list; no
# LATERAL; no column-alias list) — semantics, the synthetic-relation model, and the cost rule live
# in ../design/functions.md §10 and ../design/grammar.md §35 (unnest in array-functions.md §9). The
# resolve DISPATCH is hand-written per core (like the aggregate/scalar dispatch); this row is the
# shared registry data (CLAUDE.md §5).
#
# field doc (set_returning) ---------------------------------------------------
# name          internal identity + AST/resolver selector. Overloaded across ARITY (the 2-arg
#               and 3-arg generate_series share the name), so the uniqueness key is (name,
#               arity), not (name, arg_families) — both forms take the same family per position.
# kind          always "set_returning".
# surface       SQL spelling, lowercase canonical (resolved case-insensitively — SRF names are
#               not reserved, grammar.md §3).
# arity         operand count (generate_series: 2 = start/stop, 3 = start/stop/step; unnest: 1).
# arg_families  required family of each operand, by position, referencing a `family` in
#               ../types/scalars.toml. generate_series takes "integer" per position; unnest takes
#               the polymorphic pseudo-family "anyarray" (array-functions.md §2 — matches any array
#               arg and binds ELEM := its element type), interpreted by the hand-written resolver.
# arg_resolution "promote" = widen all operands via the promotion tower to a common type (the
#               result column type); "none" = no reconcile. generate_series uses "promote"; the
#               single-arg unnest uses "none".
# result        a reserved set-returning result id (NOT a plain scalar — an SRF returns a row
#               SET): "set_of_promoted" = a row set of ONE column whose type is the promoted
#               integer type of the args (the SRF analogue of the aggregates' sum_widen);
#               "set_of_element" = a row set of ONE column whose type is the ELEM bound from the
#               `anyarray` argument (unnest — the SRF analogue of the `anyelement` result code).
# column        the fixed output column NAME of the produced relation (PG names it after the
#               function: generate_series / unnest). Authored data, not computed.
# null          "empty_on_null" = any NULL argument yields ZERO rows (PG generate_series; a NULL
#               array → zero rows for unnest), as opposed to a scalar function's "propagates". A
#               NULL *element* of a non-NULL array is still produced as a NULL row (unnest).
# errors        SQLSTATE codes the SRF may raise; generate_series carries 22023 (step size of
#               zero — ../errors/registry.toml). NULL→empty and i64-overflow→clean-stop are NOT
#               errors. unnest carries none (a bare untyped NULL arg → 42P18 is a resolver posture,
#               not a registered SRF error).
# -----------------------------------------------------------------------------

[[set_returning]]
name           = "generate_series"
kind           = "set_returning"
surface        = "generate_series"
arity          = 2
arg_families   = ["integer", "integer"]
arg_resolution = "promote"
result         = "set_of_promoted"
column         = "generate_series"
null           = "empty_on_null"
errors         = []

[[set_returning]]
name           = "generate_series"
kind           = "set_returning"
surface        = "generate_series"
arity          = 3
arg_families   = ["integer", "integer", "integer"]
arg_resolution = "promote"
result         = "set_of_promoted"
column         = "generate_series"
null           = "empty_on_null"
errors         = ["22023"]

# unnest(anyarray) → setof anyelement (AF3 — array-functions.md §9). The SRF analogue of the
# polymorphic array functions: the `anyarray` arg binds ELEM := its element type and the produced
# one-column relation is typed at ELEM (the "set_of_element" result). It EXPANDS the array into one
# row per element in flattened row-major order (a multidimensional array flattens; a NULL element
# is produced as a NULL row), so a 3-element array yields 3 rows. A NULL array argument yields ZERO
# rows ("empty_on_null", oracle-pinned); the empty array {} likewise yields zero rows. Each produced
# element charges one generated_row (cost.md §3), like generate_series. FROM-clause only this slice
# (the SELECT-list SRF, LATERAL, WITH ORDINALITY are deferred — array-functions.md §6).
[[set_returning]]
name           = "unnest"
kind           = "set_returning"
surface        = "unnest"
arity          = 1
arg_families   = ["anyarray"]
arg_resolution = "none"
result         = "set_of_element"
column         = "unnest"
null           = "empty_on_null"
errors         = []

# json/jsonb single-column SRFs (B2, json-sql-functions.md §3). Each expands a document into a
# one-column relation: jsonb_array_elements → one jsonb row per array element; _text → one text row
# per element (the ->>-style render: a string element's raw content, a JSON null → SQL NULL, else
# canonical); jsonb_object_keys → one text row per object key in canonical key order; json_object_keys
# → one text row per key in INPUT order (duplicates kept). A non-array (array_elements) / non-object
# (object_keys) is 22023; a NULL argument yields zero rows ("empty_on_null"); each produced row charges
# one generated_row. The json `array_elements[_text]` variants (which preserve the verbatim sub-text,
# json.md §4) are a deferred 0A000 follow-on, like the json accessor operators. FROM-clause only.
[[set_returning]]
name           = "jsonb_array_elements"
kind           = "set_returning"
surface        = "jsonb_array_elements"
arity          = 1
arg_families   = ["jsonb"]
arg_resolution = "none"
result         = "jsonb"
column         = "value"
null           = "empty_on_null"
errors         = ["22023"]

[[set_returning]]
name           = "jsonb_array_elements_text"
kind           = "set_returning"
surface        = "jsonb_array_elements_text"
arity          = 1
arg_families   = ["jsonb"]
arg_resolution = "none"
result         = "text"
column         = "value"
null           = "empty_on_null"
errors         = ["22023"]

[[set_returning]]
name           = "jsonb_object_keys"
kind           = "set_returning"
surface        = "jsonb_object_keys"
arity          = 1
arg_families   = ["jsonb"]
arg_resolution = "none"
result         = "text"
column         = "jsonb_object_keys"
null           = "empty_on_null"
errors         = ["22023"]

[[set_returning]]
name           = "json_object_keys"
kind           = "set_returning"
surface        = "json_object_keys"
arity          = 1
arg_families   = ["json"]
arg_resolution = "none"
result         = "text"
column         = "json_object_keys"
null           = "empty_on_null"
errors         = ["22023"]

# json/jsonb two-column SRFs (B3, json-sql-functions.md §3): jsonb_each → one row per top-level
# object member as (key text, value jsonb) in canonical key order; jsonb_each_text → (key text, value
# text) where the value is the ->>-style render (a string member's raw content, a JSON null → SQL NULL,
# else canonical). A non-object → 22023; a NULL argument → zero rows. These produce TWO columns; the
# single-column catalog descriptor records the VALUE column (the leading `key text` column is added by
# the hand-written multi-column synthetic table in the resolver, where every SRF relation is built — a
# faithful multi-column catalog schema is a follow-on). The json_each[_text] verbatim variants are a
# deferred 0A000 follow-on (json.md §4), like json_array_elements.
[[set_returning]]
name           = "jsonb_each"
kind           = "set_returning"
surface        = "jsonb_each"
arity          = 1
arg_families   = ["jsonb"]
arg_resolution = "none"
result         = "jsonb"
column         = "value"
null           = "empty_on_null"
errors         = ["22023"]

[[set_returning]]
name           = "jsonb_each_text"
kind           = "set_returning"
surface        = "jsonb_each_text"
arity          = 1
arg_families   = ["jsonb"]
arg_resolution = "none"
result         = "text"
column         = "value"
null           = "empty_on_null"
errors         = ["22023"]
