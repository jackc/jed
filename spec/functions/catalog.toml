# --- the `||` array concatenation operator (../design/array-functions.md §8) -----------------
# A new operator KIND "concat": a binary infix `||` with its own precedence (37 — tighter than the
# comparisons at 35, looser than additive at 40, matching PostgreSQL's "any other operator" rung).
# It is the operator spelling of the AF1 builders, with three polymorphic overloads sharing the
# `||` symbol and the AST node `concat`. The hand-written resolver tries them IN THIS ORDER and
# takes the first whose anyarray/anyelement slots unify (§2). Cat-first is load-bearing: a bare
# untyped NULL operand DEFERS in an anyarray slot (binds nothing), so `arr || NULL` / `NULL || arr`
# resolve to array_cat (NULL array = identity), exactly as PostgreSQL does — while a TYPED null
# element (`arr || NULL::int32`) is a concrete anyelement and resolves to array_append. The three
# overloads reuse the AF1 array_cat / array_append / array_prepend kernels (and their 2202E / 22000
# errors). Element-type / non-array operands that match no overload are 42883 (text `||` deferred).

[[operator]]
name           = "concat"
symbol         = "||"
kind           = "concat"
arity          = 2
arg_families   = ["anyarray", "anyarray"]
arg_resolution = "none"
result         = "anyarray"
null           = "none"
precedence     = 37
errors         = ["2202E"]

[[operator]]
name           = "concat"
symbol         = "||"
kind           = "concat"
arity          = 2
arg_families   = ["anyarray", "anyelement"]
arg_resolution = "none"
result         = "anyarray"
null           = "none"
precedence     = 37
errors         = ["22000"]

[[operator]]
