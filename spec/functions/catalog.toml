# setval(s, n, is_called) — when is_called=false, next nextval = n and currval stays undefined/old.
# Either form returns n. setval does NOT update lastval (PG; only nextval does — §6). A value
# outside [MINVALUE, MAXVALUE] is 22003. Two overloads (arity 2 / arity 3) like round.
