# --- null tests --------------------------------------------------------------
# Unary null-detection over any nullable value of any type. Unlike comparisons
# these never propagate: the result is ALWAYS a definite boolean, never unknown —
# they are the sanctioned way to observe a NULL (compare.toml [null]). No infix
# `symbol`; the surface spelling is the `IS [NOT] NULL` postfix keyword form owned
# by the grammar, binding at the comparison level (precedence 35).

[[operator]]
