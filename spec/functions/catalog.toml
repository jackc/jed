# Function / operator catalog — CANONICAL DATA (CLAUDE.md §5).
#
# Build-time input to per-language codegen; never parsed at runtime.
# Reasoning lives in ../design/functions.md — read it before editing this file.
#
# This file defines what operators DO: their operand contract, result type, NULL
# behavior, and precedence. It REFERENCES the type tables rather than restating
# them — operand families and the promotion that reconciles a mixed-type pair live
# in ../types/compare.toml; the scalar set and ranks in ../types/scalars.toml; error
# codes in ../errors/registry.toml. Comparison/promotion and the three-valued NULL
# logic are NOT re-encoded here (see functions.md).

schema_version = 1

# field doc -------------------------------------------------------------------
# name            internal identity; the codegen handle and AST node name (eq/lt/
#                 gt/le/ge, is_distinct_from/is_not_distinct_from, add/sub/mul/div/
#                 mod, neg, and/or/not, is_null/is_not_null). An operator may be
#                 OVERLOADED across operand families: e.g. `=` (name "eq") applies
#                 to both integer×integer and text×text, so there is one [[operator]]
#                 ROW PER OPERAND-FAMILY SIGNATURE that shares the name+symbol. The
#                 name is the single AST node (operand types pick the evaluation at
#                 run time); a row is identified by (name, arg_families). verify.rb
#                 enforces uniqueness of (name, arg_families) and of (symbol, kind,
#                 arity, arg_families), not of name/symbol alone.
# symbol          surface spelling of an infix/prefix operator ("=", "<=", "+",
#                 "-"). Omitted for operators with no single punctuation token:
#                 the IS [NOT] NULL tests and the keyword connectives AND/OR/NOT.
#                 Shared across an operator's overload rows (one `=` token, two rows).
# kind            operator class: "comparison" | "null_test" | "arithmetic" |
#                 "logical". SCALAR functions reuse this array with kind = "function" (no
#                 symbol/precedence; called by name) — abs/round are authored at the end of
#                 the [[operator]] section (functions.md §9). AGGREGATE functions (COUNT/SUM/
#                 MIN/MAX/AVG) are NOT operators and live in a separate [[aggregate]] array
#                 with kind = "aggregate" (end of file).
# arity           operand count (2 = binary, 1 = unary; scalar functions also use 1 or 2).
# arg_families    required family of each operand, by position, referencing a
#                 `family` in ../types/scalars.toml. "any" = unconstrained.
# arg_resolution  how a mixed-type operand pair is reconciled before the operator
#                 runs, referencing ../types/compare.toml: "promote" = widen both
#                 to the common type via the promotion tower; "none" = no reconcile.
# result          result type: a scalar id from scalars.toml ("boolean"), OR a
#                 reserved non-scalar id (functions.md): "promoted" = the common
#                 promoted operand type (arithmetic). Comparisons/null tests/logical
#                 connectives all yield "boolean"; unknown is represented as a NULL
#                 boolean (the three-valued domain — types.md).
# null            NULL behavior: "propagates" = any NULL operand makes the result
#                 NULL/unknown; "detects" = inspects NULL-ness, always returns a
#                 definite boolean, never unknown; "kleene" = three-valued connective
#                 truth table — NULL is absorbed by a dominant operand (FALSE for AND,
#                 TRUE for OR) and only propagates when no operand dominates;
#                 "null_safe" = NULL is a comparable value, so the result is always a
#                 definite boolean (NULL-safe equality, IS [NOT] DISTINCT FROM).
# precedence      binding tightness as an integer (higher binds tighter). Authored
#                 here as the SINGLE source of truth for the precedence tower; the
#                 hand-written parsers must agree (functions.md, grammar.ebnf `expr`).
# errors          SQLSTATE codes (../errors/registry.toml) this operator may raise;
#                 empty for operators that cannot fail.
# -----------------------------------------------------------------------------

# --- logical connectives -----------------------------------------------------
# Three-valued (Kleene) connectives over boolean operands. AND/OR are NOT plain
# NULL-propagating: FALSE AND NULL = FALSE and TRUE OR NULL = TRUE (a dominant
# operand absorbs NULL) — hence null = "kleene". NOT is genuine propagation
# (NOT NULL = NULL). The truth tables themselves live in ../design/types.md; the
# catalog records which NULL discipline each operator falls under. AND/OR/NOT are
# keyword operators with no punctuation symbol. They are the loosest-binding level.

[[operator]]
name           = "or"
kind           = "logical"
arity          = 2
arg_families   = ["boolean", "boolean"]
arg_resolution = "none"
result         = "boolean"
null           = "kleene"
precedence     = 10
errors         = []

[[operator]]
name           = "and"
kind           = "logical"
arity          = 2
arg_families   = ["boolean", "boolean"]
arg_resolution = "none"
result         = "boolean"
null           = "kleene"
precedence     = 20
errors         = []

[[operator]]
name           = "not"
kind           = "logical"
arity          = 1
arg_families   = ["boolean"]
arg_resolution = "none"
result         = "boolean"
null           = "propagates"
precedence     = 30
errors         = []

# --- comparison operators ----------------------------------------------------
# Binary comparisons over the integer family. A mixed-width pair (e.g. int16 vs
# int64) is widened to the common type by the promotion tower, then compared as
# one integer (../types/compare.toml). Result is a boolean: any NULL operand
# yields unknown (a NULL boolean) — NULL = NULL is unknown, equality is not
# reflexive across NULL. No overflow is possible (widening is lossless; no
# arithmetic). `<=`/`>=` are primitive operators here; that they equal `< OR =` /
# `> OR =` under Kleene logic is reasoning recorded in functions.md, not a data
# field. They bind between NOT and additive (precedence 35), non-associatively.

[[operator]]
name           = "eq"
symbol         = "="
kind           = "comparison"
arity          = 2
arg_families   = ["integer", "integer"]
arg_resolution = "promote"
result         = "boolean"
null           = "propagates"
precedence     = 35
errors         = []

[[operator]]
name           = "lt"
symbol         = "<"
kind           = "comparison"
arity          = 2
arg_families   = ["integer", "integer"]
arg_resolution = "promote"
result         = "boolean"
null           = "propagates"
precedence     = 35
errors         = []

[[operator]]
