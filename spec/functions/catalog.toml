# --- sequence value functions (nextval/currval/setval/lastval — ../design/sequences.md §4/§6) --
# The PostgreSQL sequence generators. nextval/currval/setval take the sequence NAME as a text
# argument (the nextval('s'::regclass) form, regclass implicit) — the FIRST built-ins to resolve a
# string to a catalog object, looked up in Snapshot.sequences at evaluation; lastval() takes none.
# null = "propagates" (nextval(NULL) is NULL, PG). volatility = "volatile": nextval/setval MUTATE
# the sequence (so a statement containing one runs on the write path, 25006 in a read-only txn —
# §4); currval/lastval read per-session state. nextval/setval are jed-TRANSACTIONAL (roll back; a
# documented PG divergence — §5/determinism.md §5). Errors: 42P01 (missing sequence), 2200H (past a
# bound without CYCLE), 25006 (read-only txn) for nextval; 42P01/22003 (value out of bounds)/25006
# for setval; 42P01, 55000 (no nextval yet this session) for currval; 55000 for lastval.
