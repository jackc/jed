kind           = "containment"
arity          = 2
arg_families   = ["anyarray", "anyarray"]
arg_resolution = "none"
result         = "boolean"
null           = "propagates"
precedence     = 37
errors         = []

[[operator]]
name           = "overlaps"
symbol         = "&&"
kind           = "containment"
arity          = 2
arg_families   = ["anyarray", "anyarray"]
arg_resolution = "none"
result         = "boolean"
null           = "propagates"
precedence     = 37
errors         = []

# --- the range boolean operators (../design/range-functions.md §3, RF3) ------------------------
# The eight PostgreSQL range operators, KIND "containment" like the array ones and sharing their
# precedence (37). `@>`/`<@`/`&&` are shared with the array surface — a RANGE operand routes to the
# range axis (the hand-written resolve_set_op dispatches on operand type), and `@>`/`<@` add an
# ELEMENT overload (range @> element, element <@ range; the element is coerced to the range's element
