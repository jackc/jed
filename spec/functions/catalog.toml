# (the resolver picks by argument type). With no Unicode property bundle loaded they fold ASCII only
# and pass other code points through (the SQLite default, version-independent); with a bundle's
# property section loaded they fold via the full Unicode case mappings incl. SpecialCasing (`ß`→`SS`).
# STRICT (null = "propagates"). Pure (the casing tables are jed's own pinned bytes — no host read, no
# determinism-ledger entry). `initcap` is a deferred follow-on (needs word-boundary titlecasing).
[[operator]]
