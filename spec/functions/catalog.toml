# === scalar functions ========================================================
# Named scalar functions (kind = "function", functions.md §9). They take scalar argument(s)
# and return a scalar, fitting the operator result/NULL mold, so they REUSE the [[operator]]
# field set — but with no `symbol` and no `precedence` (called by name, not infix), and
# arg_resolution = "none" (each argument keeps its own family; the value and a `round`
# count are NOT reconciled to one type). Like operators they are OVERLOADED across operand
# families: one row per (name, arg_families). Unlike aggregates they are evaluated PER ROW
# and are valid anywhere an expression is (projection, WHERE, JOIN ON). The hand-written
# resolver dispatches them; verify.rb already lists "function" in KNOWN_KINDS and validates
# these rows on the operator branch (no symbol/precedence required), and gen_catalog.rb
# emits them into the OPERATORS table unchanged.
