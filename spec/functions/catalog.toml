# --- NULL-safe comparisons ---------------------------------------------------
# `IS [NOT] DISTINCT FROM`: NULL-safe equality. Same integer operand contract as `=`
# (a mixed-width pair is widened by the promotion tower, then compared as one integer),
# but NULL is treated as a comparable value instead of poisoning the result: `NULL IS
# NOT DISTINCT FROM NULL` is TRUE, `1 IS DISTINCT FROM NULL` is TRUE, and the result is
# ALWAYS a definite boolean — never unknown. That total NULL handling is the only thing
# distinguishing these from the propagating comparisons above, recorded as null =
# "null_safe" (functions.md §3). They are keyword operators with no punctuation `symbol`
# (like the null tests), bind at the comparison level (precedence 35), and are
# non-associative. `is_not_distinct_from` is the NULL-safe `=`; `is_distinct_from` is its
# negation.

[[operator]]
name           = "is_distinct_from"
kind           = "comparison"
arity          = 2
arg_families   = ["integer", "integer"]
arg_resolution = "promote"
result         = "boolean"
null           = "null_safe"
precedence     = 35
errors         = []

[[operator]]
name           = "is_not_distinct_from"
kind           = "comparison"
arity          = 2
arg_families   = ["integer", "integer"]
arg_resolution = "promote"
result         = "boolean"
null           = "null_safe"
precedence     = 35
errors         = []

