# families: one row per (name, arg_families). Unlike aggregates they are evaluated PER ROW
# and are valid anywhere an expression is (projection, WHERE, JOIN ON). The hand-written
# resolver dispatches them; verify.rb already lists "function" in KNOWN_KINDS and validates
# these rows on the operator branch (no symbol/precedence required), and gen_catalog.rb
# emits them into the OPERATORS table unchanged.
