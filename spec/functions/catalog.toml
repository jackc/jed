kind           = "function"
arity          = 7
arg_families   = ["integer", "integer", "integer", "integer", "integer", "integer", "float"]
arg_names      = ["years", "months", "weeks", "days", "hours", "mins", "secs"]
arg_defaults   = ["0", "0", "0", "0", "0", "0", "0"]
arg_resolution = "none"
result         = "interval"
null           = "propagates"
errors         = ["22008"]

# --- uuid functions (extractors) ---------------------------------------------
# PURE inspectors of a uuid's bits (../design/functions.md §12), oracle-checked against
# PostgreSQL 18. Both gate on the RFC 4122 variant ((b[8] & 0xC0) == 0x80) and return NULL on
# a non-RFC variant (Microsoft GUIDs, the nil uuid). volatility = "immutable" (deterministic
# functions of their input). The generators uuidv4()/uuidv7() (volatile, the entropy+clock
# seam) land in a later slice.
#
# uuid_extract_version: the version nibble (high nibble of byte 6), 0..15, as i16; NULL when
# the variant is not RFC 4122.
# uuid_extract_timestamp: the embedded instant as timestamptz, for VERSION 1 and 7 ONLY
# (matching PG 18 — v6 returns NULL there); NULL for every other version and for a non-RFC
# variant. v7 = the 48-bit big-endian Unix-millisecond field (×1000 → micros); v1 = the 60-bit
# Gregorian 100-ns count minus the 1582→1970 epoch offset, truncated to micros.
[[operator]]
name           = "uuid_extract_version"
kind           = "function"
arity          = 1
arg_families   = ["uuid"]
arg_resolution = "none"
result         = "i16"
null           = "propagates"
errors         = []
volatility     = "immutable"

[[operator]]
name           = "uuid_extract_timestamp"
kind           = "function"
arity          = 1
arg_families   = ["uuid"]
arg_resolution = "none"
result         = "timestamptz"
null           = "propagates"
errors         = []
volatility     = "immutable"

