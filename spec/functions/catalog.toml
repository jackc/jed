# --- interval constructor (make_interval) ------------------------------------
# PostgreSQL's interval builder, and the engine's FIRST named + defaulted function
# (../design/functions.md §11). Every parameter is NAMED and DEFAULTs to 0, so it is callable
# by named notation with any subset: make_interval(days => 3, hours => 2), make_interval() ,
# make_interval(secs => 1.5). years/months fold into the months field (×12), weeks/days into
# the days field (×7), hours/mins/secs into the microsecond field. `secs` is `double precision`
# (the `float` family) — the one float input, folded EXACTLY into micros by a single
# correctly-rounded multiply, so the result is in-contract (byte-identical cross-core, not an
# `R`-exempt float render — ../design/float.md §8). Any field overflow (the i32 month/day or
# i64 micros bound) traps 22008 (PG "interval out of range"). arg_resolution = "none" (each
# argument keeps its own family; no promotion). arg_names + arg_defaults carry the
# named/default data (codegen → the descriptor table the resolver reads).
[[operator]]
