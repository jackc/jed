services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/jed:cached
      - devstate-local:/persist/local
      - devstate-shared:/persist/shared
    command: sleep infinity
    environment:
      # PostgreSQL connection settings for testing
      PGHOST: localhost
      PGUSER: postgres
      PGDATABASE: postgres

  db:
    image: postgres:18
    restart: unless-stopped
    volumes:
      - postgresql:/var/lib/postgresql
    network_mode: service:app
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

volumes:
  postgresql:
  # per-container persistence (unique per devcontainer instance via project-name prefix)
  devstate-local:
  # shared across all containers for this project
  # pre-created in devcontainer.json's initializeCommand
  devstate-shared:
    name: devstate-shared-jed
    external: true
