# Benchmark definitions — one entry per benchmark, shared by every harness binary.
# spec/design/benchmarks.md §3. SQL uses $N placeholders (SQLite harnesses rewrite to ?N);
# multi-row queries MUST carry a total-order ORDER BY (explicit id tie-break) so the
# cross-engine answer checksum is deterministic.

schema_version = 1

[[bench]]
name = "point_lookup_pk"
description = "PK point lookup on 1M rows; a B-tree seek in every engine"
dataset = "large"
kind = "query"
sql = "SELECT id, customer_id, amount, note FROM orders WHERE id = $1"
warmup = 2000
iterations = 50000
seed = 4201
expect_rows_per_iter = 1

[[bench.param]]
gen = "int_uniform"
min = 1
max = 1000000

# Composite-PK complete tuple lookup (query.composite_pk_pushdown). The scratch setup builds 100
# contiguous 1000-row bucket prefixes; fixing bucket=42 and probing id exercises direct tuple-key
# encoding. Before the tuple-bound slice jed full-scanned all 100k rows per iteration.
[[bench]]
name = "composite_pk_lookup"
description = "Composite-PK exact tuple lookup on 100k rows; direct concatenated-key seek"
dataset = "scratch"
kind = "query"
sql = "SELECT v FROM composite_orders WHERE bucket = 42 AND id = $1"
warmup = 500
iterations = 20000
seed = 4253
expect_rows_per_iter = 1
engines = ["jed", "postgres"]
setup_sql = [
  "CREATE TABLE composite_orders (bucket bigint, id bigint, v bigint, PRIMARY KEY (bucket, id))",
  "INSERT INTO composite_orders SELECT (g - 1) / 1000, g, g * 2 FROM generate_series(1, 100000) AS g"
]

[[bench.param]]
gen = "int_uniform"
min = 42001
max = 43000

