# Benchmark definitions — one entry per benchmark, shared by every harness binary.
# spec/design/benchmarks.md §3. SQL uses $N placeholders (SQLite harnesses rewrite to ?N);
# multi-row queries MUST carry a total-order ORDER BY (explicit id tie-break) so the
# cross-engine answer checksum is deterministic.

schema_version = 1

[[bench]]
name = "point_lookup_pk"
description = "PK point lookup on 1M rows; a B-tree seek in every engine"
dataset = "large"
kind = "query"
sql = "SELECT id, customer_id, amount, note FROM orders WHERE id = $1"
warmup = 2000
iterations = 50000
seed = 4201
expect_rows_per_iter = 1

[[bench.param]]
gen = "int_uniform"
min = 1
max = 1000000

[[bench]]
name = "secondary_lookup"
description = "Secondary-index equality lookup on 1M rows (~10 rows per customer)"
dataset = "large"
kind = "query"
sql = "SELECT id, amount FROM orders WHERE customer_id = $1 ORDER BY id"
warmup = 2000
iterations = 20000
seed = 4202

[[bench.param]]
gen = "int_uniform"
min = 1
max = 100000

[[bench]]
name = "full_scan_agg"
description = "Full-table aggregate over 1M rows (count + sum)"
dataset = "large"
kind = "query"
sql = "SELECT count(*), sum(amount) FROM orders"
warmup = 3
iterations = 20
seed = 4203
expect_rows_per_iter = 1

[[bench]]
name = "order_by_limit"
description = "Top-100 by non-indexed column over 1M rows (full sort or top-k)"
dataset = "large"
kind = "query"
sql = "SELECT id, amount FROM orders ORDER BY amount DESC, id ASC LIMIT 100"
warmup = 2
iterations = 10
seed = 4204
expect_rows_per_iter = 100

[[bench]]
name = "insert_rollback"
description = "Insert throughput: 1000 bound inserts per transaction, rolled back"
dataset = "small"
kind = "write_rollback"
sql = "INSERT INTO orders (id, customer_id, amount, note) VALUES ($1, $2, $3, $4)"
warmup = 3
iterations = 30
seed = 4205
batch = 1000

[[bench.param]]
gen = "serial"
start = 20000001

[[bench.param]]
gen = "int_uniform"
min = 1
max = 1000

[[bench.param]]
gen = "int_uniform"
min = 0
max = 99999

[[bench.param]]
gen = "text"
min_len = 8
max_len = 32

[[bench]]
name = "insert_commit_durable"
description = "Durable single-row commits: one INSERT per commit, full fsync path"
dataset = "scratch"
kind = "write_durable"
sql = "INSERT INTO scratch (id, v) VALUES ($1, $2)"
warmup = 10
iterations = 300
seed = 4206
setup_sql = ["CREATE TABLE scratch (id bigint PRIMARY KEY, v integer)"]

[bench.setup_sql_override]
sqlite = ["CREATE TABLE scratch (id INTEGER PRIMARY KEY, v INTEGER)"]

[[bench.param]]
gen = "serial"
start = 1

[[bench.param]]
gen = "int_uniform"
min = 0
max = 99999

[[bench]]
name = "cte_materialized"
description = "Multi-reference materialized CTE: a per-customer order-count aggregate (~100k rows) buffered once and scanned by two references (spec/design/cte.md, cost.md §3 cte_scan_row)"
dataset = "large"
kind = "query"
sql = "WITH cust AS (SELECT customer_id, count(*) AS n FROM orders GROUP BY customer_id) SELECT (SELECT count(*) FROM cust WHERE n > 5) AS many, (SELECT count(*) FROM cust WHERE n <= 5) AS few"
warmup = 3
iterations = 20
seed = 4207
expect_rows_per_iter = 1

[[bench]]
name = "lateral_top_n_per_group"
description = "LATERAL top-N-per-group: a 5-customer generate_series driver CROSS JOIN LATERAL into each customer's three highest-value orders via the customer_id index — the dependent join re-evaluated once per left row (spec/design/grammar.md §44). jed + PostgreSQL only (SQLite has neither LATERAL nor generate_series)"
dataset = "large"
kind = "query"
engines = ["jed", "postgres"]
sql = "SELECT g.g AS cust, top.id, top.amount FROM generate_series($1, $1 + 4) AS g CROSS JOIN LATERAL (SELECT id, amount FROM orders WHERE customer_id = g.g ORDER BY amount DESC, id LIMIT 3) AS top ORDER BY g.g, top.id"
warmup = 1000
iterations = 5000
seed = 4208

[[bench.param]]
gen = "int_uniform"
min = 1
max = 99996

# GIN-bounded scans over the `gin` dataset's 200k-row docs.tags bigint[] column behind a GIN
# index (spec/design/gin.md §6). jed + PostgreSQL only (SQLite has no array type or GIN). The
# query array is element-cast — ARRAY[$1::bigint, $2::bigint] — the one form both engines accept:
# jed defers casting *to* an array type (0A000), and PostgreSQL infers an uncast pgx-bound
# ARRAY[$1,$2] as text[] (no bigint[] @> text[]); element casts sidestep both. Params draw from
# the same [1,500] term domain as the data, so a two-term `@>` intersects to a handful of rows
# (the GIN sweet spot — jed always takes the GIN-bounded scan, rule-based) and `&&` unions to a
# few thousand. Answers are index-independent, so the cross-engine checksum holds either way.
[[bench]]
name = "gin_contains"
description = "GIN @> (contains): rows whose tags array contains BOTH query terms — a two-posting-list intersection over a 200k-row bigint[] column"
dataset = "gin"
kind = "query"
engines = ["jed", "postgres"]
sql = "SELECT id FROM docs WHERE tags @> ARRAY[$1::bigint, $2::bigint] ORDER BY id"
warmup = 500
iterations = 5000
seed = 4209

[[bench.param]]
gen = "int_uniform"
min = 1
max = 500

[[bench.param]]
gen = "int_uniform"
min = 1
max = 500

[[bench]]
name = "gin_overlaps"
description = "GIN && (overlaps): rows whose tags array shares ANY query term — a two-posting-list union over a 200k-row bigint[] column (a few thousand rows per query)"
dataset = "gin"
kind = "query"
engines = ["jed", "postgres"]
sql = "SELECT id FROM docs WHERE tags && ARRAY[$1::bigint, $2::bigint] ORDER BY id"
warmup = 100
iterations = 1000
seed = 4210

[[bench.param]]
gen = "int_uniform"
min = 1
max = 500

[[bench.param]]
gen = "int_uniform"
min = 1
max = 500

# GIN-bounded `= ANY` membership: `c = ANY(tags)` is the array spelling of membership, which jed
# accelerates as a single-term `@>` gather (spec/design/gin.md §6; query.gin_any_eq). One posting
# list (not the two-term intersection/union above), so a tighter, single-term GIN sweet spot. The
# `$1::bigint` scalar cast is the form both engines accept (jed coerces c to the bigint element;
# PostgreSQL keeps `= ANY(array)` a full scan, so this also measures jed's acceleration edge). The
# answer is index-independent, so the cross-engine checksum holds.
[[bench]]
name = "gin_member"
description = "GIN = ANY (membership): rows whose tags array contains the query term — a single-posting-list gather over a 200k-row bigint[] column"
dataset = "gin"
kind = "query"
engines = ["jed", "postgres"]
sql = "SELECT id FROM docs WHERE $1::bigint = ANY(tags) ORDER BY id"
warmup = 500
iterations = 5000
seed = 4211

[[bench.param]]
gen = "int_uniform"
min = 1
max = 500

# GIN-bounded array equality: `tags = ARRAY[$1,$2]` is exact array equality, which jed accelerates as
# the SAME two-term `@>` candidate gather as gin_contains (col = Q ⟹ col @> Q) plus a residual `=`
# that re-checks order/cardinality (spec/design/gin.md §6; query.gin_array_eq). Over the length-0..6
# tags arrays, a random length-2 query matches few/no rows — so this measures the gather's selectivity
# (a handful of candidates) + the residual rejection, the realistic equality workload. The
# `$1::bigint` element casts are the form both engines accept (jed defers casting an ARRAY constructor
# to a type; PG's array_ops GIN includes the `=` strategy too). The answer is index-independent, so
# the cross-engine checksum holds.
[[bench]]
name = "gin_array_eq"
description = "GIN = (array equality): rows whose tags array EXACTLY equals the query array — a two-posting-list intersection (the @> superset) + the residual = recheck over a 200k-row bigint[] column"
dataset = "gin"
kind = "query"
engines = ["jed", "postgres"]
sql = "SELECT id FROM docs WHERE tags = ARRAY[$1::bigint, $2::bigint] ORDER BY id"
warmup = 500
iterations = 5000
seed = 4212

[[bench.param]]
gen = "int_uniform"
min = 1
max = 500

[[bench.param]]
gen = "int_uniform"
min = 1
max = 500

# GIN-bounded DELETE: a mutation whose WHERE has a GIN-accelerable `@>` conjunct bounds its
# target-row scan through the GIN index (spec/design/gin.md §6; query.gin_mutation), just like the
# gin_contains SELECT — instead of full-scanning the 200k rows. Each iteration BEGINs, deletes the
# handful of rows whose tags contain BOTH query terms (the gather + the index-maintenance writes),
# then ROLLBACKs (so the dataset is preserved; the post-run count(*) must hold at 200k). Measures
# the bounded mutation path end-to-end (gather → delete → GIN-entry removal → rollback); a core
# lacking the bound would full-scan every iteration. jed + PostgreSQL only (the gin dataset).
[[bench]]
name = "gin_delete"
description = "GIN-bounded DELETE: delete the rows whose tags contain BOTH query terms via the GIN bound, then ROLLBACK — the bounded target-row scan + index-maintenance writes over a 200k-row bigint[] column"
dataset = "gin"
kind = "write_rollback"
engines = ["jed", "postgres"]
sql = "DELETE FROM docs WHERE tags @> ARRAY[$1::bigint, $2::bigint]"
warmup = 100
iterations = 1000
seed = 4213
batch = 1

[[bench.param]]
gen = "int_uniform"
min = 1
max = 500

[[bench.param]]
gen = "int_uniform"
min = 1
max = 500
