# Regex `~` filter over the 1M-row `note` text column (spec/design/regex.md). The hand-written
# linear-time Pike VM, scanned over every row — the perf-relevant regex path. jed + PostgreSQL only:
# SQLite has no `~` operator (its regex is an optional extension with a different flavor). The
# pattern is a basic class+quantifier both engines match identically (the oracle-agreeing subset), so
# the cross-engine answer checksum (the matching row count) holds. No new data — reuses `large`.
[[bench]]
name = "regex_filter_scan"
description = "Full-scan regex `~` filter over the 1M-row note text column (the linear-time Pike VM)"
dataset = "large"
kind = "query"
engines = ["jed", "postgres"]
sql = "SELECT count(*) FROM orders WHERE note ~ '[aeiou]{2}'"
warmup = 3
iterations = 20
seed = 4220
expect_rows_per_iter = 1

# Running (EXPANDING) window aggregate — the WINDOWED TOP-N optimization (spec/design/window.md §5.2a,
# cost.md §3). The frame (UNBOUNDED PRECEDING TO CURRENT ROW) is BACKWARD over the id order, the window
# ORDER BY id = the PK = the outer ORDER BY, and there is a LIMIT 100 — so the first 100 output rows
# depend only on the first 100 scan rows. jed reads only that prefix and folds the running sum over it
# (the window analog of the streaming LIMIT short-circuit), matching PostgreSQL/SQLite, which pipeline
# the same LIMIT through the window instead of computing all 1M rows. sum(int)→bigint in every engine,
# so the running totals agree. (Before the top-N landed, jed folded all 1M rows and was ~15000× slower
# than SQLite here — the regression this benchmark guards.)
[[bench]]
name = "window_running_sum"
description = "Running SUM window over 1M rows, ORDER BY id LIMIT 100 (the windowed top-N short-circuit)"
dataset = "large"
kind = "query"
sql = "SELECT id, sum(amount) OVER (ORDER BY id ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running FROM orders ORDER BY id LIMIT 100"
warmup = 2
iterations = 10
seed = 4221
expect_rows_per_iter = 100

# MOVING window aggregate — also the WINDOWED TOP-N optimization (window.md §5.2a). A 10-row trailing
# COUNT(*) (ROWS BETWEEN 9 PRECEDING AND CURRENT ROW) is BACKWARD over the id order, so with ORDER BY
# id LIMIT 100 the first 100 outputs need only the first 100 scan rows: jed reads that prefix and
# slides the count over it (fold each entering row, un-fold each leaving row — O(prefix)), rather than
# computing all 1M rows. Matches PostgreSQL/SQLite, which push the LIMIT through the window. The count
# is `id` for the first 9 rows, then 10 thereafter — engine-agreeing.
[[bench]]
name = "window_moving_count"
description = "Moving 10-row COUNT(*) window over 1M rows, ORDER BY id LIMIT 100 (the windowed top-N short-circuit)"
dataset = "large"
kind = "query"
sql = "SELECT id, count(*) OVER (ORDER BY id ROWS BETWEEN 9 PRECEDING AND CURRENT ROW) AS w FROM orders ORDER BY id LIMIT 100"
warmup = 2
iterations = 10
seed = 4222
expect_rows_per_iter = 100

# Concurrent-reader throughput on the shared Database (the slice-7 convergence, session.md §2.4/§10;
# the benchmarks.md §11 backfill now that file-backed concurrent sessions have landed). `kind =
# "concurrent_read"` opens ONE Database and mints `readers` independent reader Sessions, then runs the
# point lookup `iterations` times divided into `readers` contiguous blocks — each block on its own
# reader, in parallel where the core can (Go goroutines, Rust threads; the single-threaded TS core
# runs the blocks sequentially). It measures the §3 lock-free read path: readers see the committed
# snapshot without blocking, so throughput should scale with reader count until the cores run out.
# Headline metric is THROUGHPUT — ns_per_op = wall-clock / iterations — so r1's ns_per_op divided by
# r4's is the realized speedup (near-linear on a multi-core box); min/p50 are per-query latency.
#
# The dataset is `small` (10k rows) ON PURPOSE: the whole working set is RESIDENT after warmup, so the
# bench isolates the concurrent READ PATH (parse + plan + a resident B-tree seek per reader) from the
# buffer pool's page-fault path. On a larger-than-pool dataset random lookups fault under the shared
# pool mutex, which serializes readers and hides the lock-free read scaling — a pager-concurrency
# concern, separate from §3's reader/writer story and a noted future variant (benchmarks.md §8.1).
#
# jed-only (engines = ["jed"]): this validates jed's own concurrent sessions and keeps the three-way
# cross-core answer-agreement gate (Go == Rust == TS under three threading models — a new differential
# test of the concurrent read path). Cross-ENGINE concurrent comparison (PostgreSQL connection pools,
# SQLite multi-connection readers) is a deferred follow-on (benchmarks.md §8.1). The answer checksum
# is partition-folded so it is identical regardless of scheduling or reader count's effect on timing:
# each reader folds its block in order to a per-block hash, and the blocks combine in reader-index
# order (benchmarks.md §6). The two benches differ ONLY in `readers`, so r1 is the single-reader
# baseline the r4 run is read against.
[[bench]]
name = "concurrent_read_pk_r1"
description = "Concurrent PK point lookup on the resident 10k-row table, 1 reader Session (the single-reader baseline for the scaling comparison)"
dataset = "small"
kind = "concurrent_read"
engines = ["jed"]
readers = 1
sql = "SELECT id, customer_id, amount, note FROM orders WHERE id = $1"
warmup = 2000
iterations = 20000
seed = 4230
expect_rows_per_iter = 1

[[bench.param]]
gen = "int_uniform"
min = 1
max = 10000

[[bench]]
name = "concurrent_read_pk_r4"
description = "Concurrent PK point lookup on the resident 10k-row table, 4 reader Sessions sharing one Database — the §3 lock-free read path (read against concurrent_read_pk_r1 for the realized speedup)"
dataset = "small"
kind = "concurrent_read"
engines = ["jed"]
readers = 4
sql = "SELECT id, customer_id, amount, note FROM orders WHERE id = $1"
warmup = 2000
iterations = 20000
seed = 4230
expect_rows_per_iter = 1

[[bench.param]]
gen = "int_uniform"
min = 1
max = 10000
