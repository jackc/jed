# Ordered-B-tree-bounded UPDATE (spec/design/indexes.md §5.1; query.index_mutation): each iteration
# gathers the ~10 rows for one customer through orders_customer_idx, rewrites them, then rolls back
# so every iteration sees the same million-row dataset. Before the mutation-bound slice jed
# full-scanned all 1M rows for this predicate.
[[bench]]
name = "secondary_update"
description = "Secondary-index-bounded UPDATE on 1M rows (~10 rows per customer), rolled back each iteration"
dataset = "large"
kind = "write_rollback"
sql = "UPDATE orders SET amount = amount + 1 WHERE customer_id = $1"
warmup = 100
iterations = 1000
seed = 4251
batch = 1

[[bench.param]]
gen = "int_uniform"
min = 1
max = 100000

